<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout OCR Extractor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:20px}
h1{font-size:1.3rem;color:#fff;margin-bottom:4px}
.sub{color:#888;font-size:0.82rem;margin-bottom:20px}
.progress{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:20px}
.prog-bar-wrap{background:#333;border-radius:4px;height:8px;margin:10px 0}
.prog-bar{background:#3b82f6;height:8px;border-radius:4px;width:0%;transition:width .3s}
.prog-label{font-size:0.9rem;color:#fff;font-weight:600}
.prog-sub{font-size:0.75rem;color:#666;margin-top:4px}
.summary{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;display:none}
.scard{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;min-width:120px}
.scard .n{font-size:1.8rem;font-weight:700}
.scard .l{font-size:0.72rem;color:#666;margin-top:2px}
.n.ok{color:#4ade80}.n.bad{color:#f87171}.n.warn{color:#facc15}
.page-cards{display:flex;flex-direction:column;gap:12px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;overflow:hidden}
.card-hdr{padding:10px 16px;background:#222;display:flex;align-items:center;gap:10px;border-bottom:1px solid #333}
.pg{font-size:0.72rem;color:#666;font-family:monospace}
.dates{font-size:0.9rem;font-weight:600;color:#fff;flex:1}
.badge{font-size:0.72rem;padding:3px 10px;border-radius:12px}
.b-ok{background:#052e16;color:#4ade80}.b-err{background:#2d0a0a;color:#f87171}.b-proc{background:#1c1700;color:#facc15}
.card-body{display:grid;grid-template-columns:42% 58%;min-height:300px}
.img-side{border-right:1px solid #333;padding:8px;background:#111}
.img-side img{width:100%;height:auto;display:block}
.data-side{padding:12px;overflow-y:auto;max-height:600px}
.tbl{width:100%;border-collapse:collapse;font-size:0.78rem}
.tbl th{font-size:0.68rem;color:#666;text-transform:uppercase;letter-spacing:0.5px;padding:4px 6px;text-align:left;border-bottom:1px solid #222}
.tbl td{padding:3px 4px;border-bottom:1px solid #1a1a1a}
.tbl td input{background:#111;border:1px solid #2a2a2a;color:#e0e0e0;padding:2px 5px;border-radius:3px;font-size:0.77rem;width:100%}
.tbl td input:focus{outline:none;border-color:#3b82f6}
.tbl tr:hover td{background:#161616}
.del-btn{background:none;border:none;color:#444;cursor:pointer;font-size:0.9rem;padding:1px 4px}
.del-btn:hover{color:#f87171}
.add-row{font-size:0.75rem;color:#3b82f6;background:none;border:none;cursor:pointer;padding:6px 0;display:block}
.add-row:hover{color:#60a5fa}
.push-btn{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:0.82rem;cursor:pointer;margin-top:10px;font-weight:600;display:block;width:100%}
.push-btn:hover{background:#2563eb}
.push-btn:disabled{background:#222;color:#555;cursor:not-allowed}
.push-btn.done{background:#16a34a}
.err-box{background:#2d0a0a;border:1px solid #7f1d1d;border-radius:6px;padding:10px;font-size:0.78rem;color:#fca5a5;margin-top:8px}
.retry-btn{background:#7f1d1d;color:#fca5a5;border:none;border-radius:4px;padding:4px 10px;font-size:0.75rem;cursor:pointer;margin-top:6px}
</style>
</head>
<body>
<h1>Workout OCR Extractor — 2026</h1>
<div class="sub">Google Vision OCR → all 40 pages auto-loaded → review & push to Airtable</div>

<div class="progress" id="progressBox">
  <div class="prog-label" id="progLabel">Starting...</div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="prog-sub" id="progSub">Loading pages...</div>
</div>

<div class="summary" id="summary">
  <div class="scard"><div class="n ok" id="sOk">0</div><div class="l">Pages OK</div></div>
  <div class="scard"><div class="n bad" id="sErr">0</div><div class="l">Errors</div></div>
  <div class="scard"><div class="n ok" id="sSets">0</div><div class="l">Sets Extracted</div></div>
  <div class="scard"><div class="n warn" id="sPushed">0</div><div class="l">Sets Pushed</div></div>
</div>

<div class="page-cards" id="cards"></div>

<script>
const VISION_KEY = 'AIzaSyD4qdnRn9LVzC8Nm55GYpsL3rjYe82MCCs';
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE = 'appmHDG4TGT1xy6R6';
const AT_TABLE = 'tblKDqjy5RzqaJvjr';
const BASE_URL = 'https://mikeblack001.github.io/health-protocol/w3_pages/';

const DATE_MAP = {
  1:'2026-01-05',2:'2026-01-06',3:'2026-01-07',4:'2026-01-08',5:'2026-01-09',
  6:'2026-01-12',7:'2026-01-13',8:'2026-01-14',9:'2026-01-15',10:'2026-01-16',
  11:'2026-01-19',12:'2026-01-20',13:'2026-01-21',14:'2026-01-22',15:'2026-01-23',
  16:'2026-01-26',17:'2026-01-27',18:'2026-01-28',19:'2026-01-29',20:'2026-01-30',
  21:'2026-02-02',22:'2026-02-03',23:'2026-02-04',24:'2026-02-05',25:'2026-02-06',
  26:'2026-02-09',27:'2026-02-10',28:'2026-02-11',29:'2026-02-12',30:'2026-02-13',
  31:'2026-02-16',32:'2026-02-17',33:'2026-04-27',34:'2026-04-28',35:'2026-04-29',
  36:'2026-04-30',37:'2026-05-11',38:'2026-05-12',39:'2026-05-18',40:'2026-05-20'
};
const DAY_MAP = {
  1:'Push',2:'Pull',3:'Legs',4:'Arms',5:'Shoulders',
  6:'Push',7:'Pull',8:'Legs',9:'Arms',10:'Shoulders',
  11:'Push',12:'Pull',13:'Legs',14:'Arms',15:'Shoulders',
  16:'Push',17:'Pull',18:'Legs',19:'Arms',20:'Shoulders',
  21:'Push',22:'Pull',23:'Legs',24:'Arms',25:'Shoulders',
  26:'Push',27:'Pull',28:'Legs',29:'Arms',30:'Shoulders',
  31:'Push',32:'Pull',33:'Arms',34:'Push',35:'Pull',
  36:'Legs',37:'Push',38:'Pull',39:'Push',40:'Pull'
};

let totalOk=0, totalErr=0, totalSets=0, totalPushed=0;
const pageStore = {};

async function imgToB64(url) {
  const r = await fetch(url);
  const blob = await r.blob();
  return new Promise(res => {
    const reader = new FileReader();
    reader.onloadend = () => res(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

async function runVision(b64) {
  const r = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION'}]}]})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.responses[0]?.fullTextAnnotation?.text || '';
}

function parseText(text, pageNum) {
  const date = DATE_MAP[pageNum];
  const day = DAY_MAP[pageNum];
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const sets = [];

  const KNOWN = ['Wrist Twist','Bench Press','Incline Press','Decline Press','Incline Fly',
    'Lateral Raises','Seated Shoulder Press','Tricep Pushdowns','Overhead Tricep Ext',
    'High Cable Fly','Cable Cross Overs','Cable Crossovers','Lat Pulldown','Bent Over Rows',
    'Barbell Bent Over Rows','Cable Rows','Face Pulls','Rear Delt Raises','Bicep Curls',
    'Hammer Curls','Barbell Shrugs','Cable Shrugs','Cable Curls','Leg Press',
    'Leg Extensions','Leg Curls','Hip Thrust','Nordic Curl','Reverse Hyper',
    'DB Calf Raises','Smith Mach Calf Raises','Back Extension','Cable Press',
    'Low Cable Fly','Incline Curls','Overhead Tricep Press','Curls','Tricep Ext Down',
    'Tricep Ext Up','Forearm Raise'];

  let curEx = null, setNum = 0;
  for (const line of lines) {
    const up = line.toUpperCase();
    const found = KNOWN.find(ex => up.includes(ex.toUpperCase()));
    if (found) { curEx = found; setNum = 0; continue; }
    if (!curEx) continue;

    // Extract numbers — looking for reps + weight pattern
    const nums = [...line.matchAll(/\b(\d{1,3})\b/g)].map(m=>parseInt(m[1]));
    if (nums.length >= 2) {
      for (let i=0; i+1<nums.length; i+=2) {
        const reps=nums[i], wt=nums[i+1];
        if (reps>=1 && reps<=50 && wt>=1 && wt<=999) {
          setNum++;
          sets.push({date,day,session:`${date} ${day}`,exercise:curEx,variation:'',set_number:setNum,reps,weight:wt});
        }
      }
    }
  }
  return sets;
}

function mkInput(val, cls='') {
  return `<input class="${cls}" value="${String(val).replace(/"/g,'&quot;')}">`;
}

function renderTable(sets, pageNum) {
  if (!sets.length) return '<div style="color:#555;padding:10px;font-size:0.8rem">No sets parsed — add manually below</div>';
  let rows = sets.map((s,i) => `<tr id="sr-${pageNum}-${i}">
    <td>${mkInput(s.exercise)}</td>
    <td>${mkInput(s.variation)}</td>
    <td>${mkInput(s.set_number)}</td>
    <td>${mkInput(s.reps)}</td>
    <td>${mkInput(s.weight)}</td>
    <td><button class="del-btn" onclick="delRow('sr-${pageNum}-${i}')">×</button></td>
  </tr>`).join('');
  return `<table class="tbl"><thead><tr>
    <th>Exercise</th><th>Variation</th><th>Set#</th><th>Reps</th><th>Wt</th><th></th>
  </tr></thead><tbody id="tbody-${pageNum}">${rows}</tbody></table>
  <button class="add-row" onclick="addRow(${pageNum})">+ Add row</button>`;
}

function delRow(id) { const el=document.getElementById(id); if(el) el.remove(); }

function addRow(pageNum) {
  const tb = document.getElementById(`tbody-${pageNum}`);
  if (!tb) return;
  const i = tb.children.length;
  const tr = document.createElement('tr');
  tr.id = `sr-${pageNum}-${i}`;
  tr.innerHTML = `<td>${mkInput('')}</td><td>${mkInput('')}</td><td>${mkInput(i+1)}</td><td>${mkInput('')}</td><td>${mkInput('')}</td><td><button class="del-btn" onclick="delRow('sr-${pageNum}-${i}')">×</button></td>`;
  tb.appendChild(tr);
}

async function pushPage(pageNum) {
  const btn = document.getElementById(`pbtn-${pageNum}`);
  btn.disabled = true;
  const date = DATE_MAP[pageNum];
  const day = DAY_MAP[pageNum];
  const session = `${date} ${day}`;
  const tb = document.getElementById(`tbody-${pageNum}`);
  if (!tb) { btn.textContent='No table'; return; }

  const records = [];
  tb.querySelectorAll('tr').forEach((tr,idx) => {
    const inputs = tr.querySelectorAll('input');
    if (inputs.length < 5) return;
    const ex = inputs[0].value.trim();
    const vari = inputs[1].value.trim();
    const sn = parseInt(inputs[2].value)||1;
    const reps = parseInt(inputs[3].value)||0;
    const wt = parseFloat(inputs[4].value)||0;
    if (!ex || !reps) return;
    const setId = `${date}-${ex.replace(/\s+/g,'-').replace(/\//g,'').substring(0,12)}-${sn}`;
    records.push({fields:{
      'fld4hUpEzC9IqN0xh':setId,
      'fld75zYXknF0RtCWH':date,
      'fldBChNmPkNg61oTN':session,
      'fldZ93A1t7fGjjsSS':ex,
      'fld2TZdmCOloH0gAK':vari,
      'fldNm9Ao0rmcwwDXo':sn,
      'fldelUngWHRTm48m1':reps,
      'fldmrbBmfgSMtREMt':wt,
      'fldypzlwqw9AzWrEE':day
    }});
  });

  if (!records.length) { btn.textContent='Nothing to push'; return; }
  let pushed=0;
  for (let i=0;i<records.length;i+=10) {
    const batch=records.slice(i,i+10);
    btn.textContent=`Pushing ${i}/${records.length}...`;
    const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`,{
      method:'POST',headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({records:batch,typecast:true})
    });
    const d=await r.json();
    if (d.error){btn.textContent='Error: '+d.error.message;btn.disabled=false;return;}
    pushed+=batch.length;
  }
  btn.className='push-btn done';
  btn.textContent=`✓ Pushed ${pushed} sets`;
  totalPushed+=pushed;
  document.getElementById('sPushed').textContent=totalPushed;
  const badge=document.querySelector(`#card-${pageNum} .badge`);
  if(badge){badge.className='badge b-ok';badge.textContent=`✓ Pushed ${pushed}`;}
}

async function processPage(pageNum) {
  const url = `${BASE_URL}${pageNum}.jpeg`;
  const date = DATE_MAP[pageNum]||'?';
  const day = DAY_MAP[pageNum]||'?';

  // Create card immediately with loading state
  const card = document.createElement('div');
  card.className='card'; card.id=`card-${pageNum}`;
  card.innerHTML=`
    <div class="card-hdr">
      <span class="pg">Page ${pageNum}</span>
      <span class="dates">${date} — ${day}</span>
      <span class="badge b-proc" id="badge-${pageNum}">⏳ Processing</span>
    </div>
    <div class="card-body">
      <div class="img-side"><img src="${url}" alt="Page ${pageNum}" loading="lazy"></div>
      <div class="data-side" id="ds-${pageNum}"><div style="color:#555;padding:20px;font-size:0.8rem">Running Vision OCR...</div></div>
    </div>`;
  document.getElementById('cards').appendChild(card);

  try {
    const b64 = await imgToB64(url);
    const text = await runVision(b64);
    const sets = parseText(text, pageNum);
    pageStore[pageNum] = sets;
    totalSets += sets.length;
    totalOk++;
    document.getElementById('sOk').textContent=totalOk;
    document.getElementById('sSets').textContent=totalSets;
    document.getElementById(`ds-${pageNum}`).innerHTML=renderTable(sets,pageNum)+`<button class="push-btn" id="pbtn-${pageNum}" onclick="pushPage(${pageNum})">Push Page ${pageNum} → Airtable</button>`;
    document.getElementById(`badge-${pageNum}`).className='badge b-ok';
    document.getElementById(`badge-${pageNum}`).textContent=`✓ ${sets.length} sets`;
  } catch(e) {
    totalErr++;
    document.getElementById('sErr').textContent=totalErr;
    document.getElementById(`ds-${pageNum}`).innerHTML=`<div class="err-box">${e.message}<br><button class="retry-btn" onclick="retryPage(${pageNum})">Retry</button></div>`;
    document.getElementById(`badge-${pageNum}`).className='badge b-err';
    document.getElementById(`badge-${pageNum}`).textContent='⚠ Error';
  }
}

async function retryPage(pageNum) {
  document.getElementById(`ds-${pageNum}`).innerHTML='<div style="color:#555;padding:20px;font-size:0.8rem">Retrying...</div>';
  await processPage(pageNum);
}

async function run() {
  document.getElementById('summary').style.display='flex';
  const pages = Array.from({length:40},(_,i)=>i+1);

  // Process 3 at a time to avoid rate limits
  for (let i=0; i<pages.length; i+=3) {
    const batch = pages.slice(i, i+3);
    document.getElementById('progLabel').textContent=`Processing pages ${batch[0]}–${batch[batch.length-1]} of 40`;
    document.getElementById('progBar').style.width=(i/pages.length*100)+'%';
    document.getElementById('progSub').textContent=`${i} of 40 complete`;
    await Promise.all(batch.map(p=>processPage(p)));
    await new Promise(r=>setTimeout(r,500)); // small delay between batches
  }
  document.getElementById('progLabel').textContent='All pages processed';
  document.getElementById('progBar').style.width='100%';
  document.getElementById('progSub').textContent='Review each page and push to Airtable';
}

run();
</script>
</body>
</html>
