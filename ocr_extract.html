<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:20px;font-size:13px}
h1{color:#fff;font-size:1.2rem;margin-bottom:4px}

select,button{padding:7px 14px;border-radius:6px;border:1px solid #444;background:#222;color:#e0e0e0;font-size:0.82rem;cursor:pointer}
button:hover{background:#333} button.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
button.primary:hover{background:#2563eb} button.success{background:#16a34a;border-color:#16a34a;color:#fff}
button:disabled{opacity:.4;cursor:not-allowed}

.delbtn:hover{color:#f87171}
.add-row-btn{font-size:0.73rem;color:#3b82f6;background:none;border:none;cursor:pointer;padding:4px 0;display:block;margin-top:2px}
.push-page-btn{width:100%;padding:7px;border-radius:5px;border:none;background:#3b82f6;color:#fff;font-size:0.8rem;font-weight:600;cursor:pointer;margin-top:8px}

<body>
<h1>Workout OCR — All Files</h1>
<div class="sub">Vision API bounding-box parser • 152 pages • W1(48) + W2(64) + W3(40)</div>

<div class="controls">
  <select id="fileSelect">
    <option value="w1">W1 — 2024/2025 (48 pages)</option>

  <div class="stat"><div class="n y" id="sPushed">0</div><div class="l">Sets Pushed</div></div>
</div>

<div class="page-grid" id="pageGrid"></div>

<script>
const VISION_KEY = 'AIzaSyD4qdnRn9LVzC8Nm55GYpsL3rjYe82MCCs';
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE = 'appmHDG4TGT1xy6R6';
const AT_TABLE = 'tblKDqjy5RzqaJvjr';
const BASE = 'https://mikeblack001.github.io/health-protocol/';

// File configs
const FILES = {
  w1: { dir:'w1_pages', pages:48, label:'W1 2024/2025' },
  w2: { dir:'w2_pages', pages:64, label:'W2 2025' },
  w3: { dir:'w3_pages', pages:40, label:'W3 2026' }
};

// Date maps — right-column dates confirmed from prior visual inspection
const W3_DATES = {
  1:'2026-01-05',2:'2026-01-06',3:'2026-01-07',4:'2026-01-08',5:'2026-01-09',
  6:'2026-01-12',7:'2026-01-13',8:'2026-01-14',9:'2026-01-15',10:'2026-01-16',
  11:'2026-01-19',12:'2026-01-20',13:'2026-01-21',14:'2026-01-22',15:'2026-01-23',
  16:'2026-01-26',17:'2026-01-27',18:'2026-01-28',19:'2026-01-29',20:'2026-01-30',
  21:'2026-02-02',22:'2026-02-03',23:'2026-02-04',24:'2026-02-05',25:'2026-02-06',
  26:'2026-02-09',27:'2026-02-10',28:'2026-02-11',29:'2026-02-12',30:'2026-02-13',
  31:'2026-02-16',32:'2026-02-17',33:'2026-04-27',34:'2026-04-28',35:'2026-04-29',
  36:'2026-04-30',37:'2026-05-11',38:'2026-05-12',39:'2026-05-18',40:'2026-05-20'
};
// W1 and W2 dates will be read from the pages themselves (date is written on each page)
// For now use placeholder — OCR will extract actual date from the page header
const DATE_MAPS = { w1: null, w2: null, w3: W3_DATES };

let totalOk=0,totalErr=0,totalSets=0,totalPushed=0;
const allPageSets = {}; // pageId -> [{...}]

function stat(id,v){document.getElementById(id).textContent=v;}

async function imgToB64(url){
  const r=await fetch(url);
  const blob=await r.blob();
  return new Promise(res=>{const fr=new FileReader();fr.onloadend=()=>res(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
}

// Core bounding-box parser
function parseVisionResponse(resp, pageNum, fileKey) {
  const annotation = resp.fullTextAnnotation;
  if (!annotation) return [];

  // Collect all words with their bounding box center
  const words = [];
  for (const page of annotation.pages||[]) {
    for (const block of page.blocks||[]) {
      for (const para of block.paragraphs||[]) {
        for (const word of para.words||[]) {
          const text = word.symbols.map(s=>s.text).join('');
          const verts = word.boundingBox?.vertices||[];
          if (verts.length<2) continue;
          const xs = verts.map(v=>v.x||0);
          const ys = verts.map(v=>v.y||0);
          const cx = (Math.min(...xs)+Math.max(...xs))/2;
          const cy = (Math.min(...ys)+Math.max(...ys))/2;
          words.push({text, cx, cy, x0:Math.min(...xs), x1:Math.max(...xs)});
        }
      }
    }
  }

  if (!words.length) return [];

  // Group words into rows by y proximity (±12px = same row)
  words.sort((a,b)=>a.cy-b.cy);
  const rows = [];
  let curRow = [words[0]];
  for (let i=1;i<words.length;i++){
    if (Math.abs(words[i].cy - curRow[curRow.length-1].cy) < 14) {
      curRow.push(words[i]);
    } else {
      rows.push([...curRow].sort((a,b)=>a.cx-b.cx));
      curRow=[words[i]];
    }
  }
  if (curRow.length) rows.push([...curRow].sort((a,b)=>a.cx-b.cx));

  // Find date from the page if not in date map
  let pageDate = DATE_MAPS[fileKey]?.[pageNum] || null;
  let pageDay = '';

  // Try to extract date from page content
  if (!pageDate) {
    // Look for date patterns: M/D, MM/DD, or written dates
    for (const row of rows) {
      const txt = row.map(w=>w.text).join(' ');
      // Match patterns like 10/28, 1/5, 11/4 etc
      const m = txt.match(/(\d{1,2})\/(\d{1,2})/);
      if (m) {
        // Determine year from file
        const yr = fileKey==='w1'?'2024':fileKey==='w2'?'2025':'2026';
        pageDate = `${yr}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
        break;
      }
    }
  }
  if (!pageDate) pageDate = '1900-01-01'; // fallback — will be visible as wrong

  // Detect day type from row text
  for (const row of rows) {
    const txt = row.map(w=>w.text).join(' ').toLowerCase();
    if (txt.includes('monday')||txt.includes('push')) pageDay='Push';
    else if (txt.includes('tuesday')||txt.includes('pull')) pageDay='Pull';
    else if (txt.includes('wednesday')||txt.includes('legs')) pageDay='Legs';
    else if (txt.includes('thursday')||txt.includes('arms')) pageDay='Arms';
    else if (txt.includes('friday')||txt.includes('shoulder')) pageDay='Shoulders';
    if (pageDay) break;
  }
  if (!pageDay) pageDay = 'Push';

  // Known exercises (canonical names)
  const EXERCISES = [
    'Wrist Twist','Bench Press','Incline Press','Decline Press','Incline Fly',
    'Lateral Raises','Seated Shoulder Press','Tricep Pushdowns','Overhead Tricep Ext',
    'High Cable Fly','Cable Cross Overs','Lat Pulldown','Bent Over Rows',
    'Barbell Bent Over Rows','Cable Rows','Face Pulls','Rear Delt Raises',
    'Bicep Curls','Hammer Curls','Barbell Shrugs','Cable Shrugs','Cable Curls',
    'Leg Press','Leg Extensions','Leg Curls','Hip Thrust','Nordic Curl',
    'Reverse Hyper','DB Calf Raises','Smith Mach Calf Raises','Back Extension',
    'Cable Press','Low Cable Fly','Incline Curls','Overhead Tricep Press',
    'Curls','Tricep Ext Down','Tricep Ext Up','Forearm Raise'
  ];

  function matchExercise(rowText) {
    const up = rowText.toUpperCase();
    return EXERCISES.find(ex=>up.includes(ex.toUpperCase()))||null;
  }

  // Find table x-boundaries by locating header row ("Reps" and "Weight" words)
  let repsXs=[], weightXs=[];
  for (const row of rows) {
    const rowTxt = row.map(w=>w.text).join(' ');
    if (/reps/i.test(rowTxt) && /weight/i.test(rowTxt)) {
      for (const w of row) {
        if (/reps/i.test(w.text)) repsXs.push(w.cx);
        if (/weight/i.test(w.text)) weightXs.push(w.cx);
      }
      if (repsXs.length>=2) break;
    }
  }

  // Determine column positions: each set has [SetNum, Reps, Weight]
  // Typically 3 sets per exercise row
  // If we found header positions, use them; otherwise use defaults
  const pageWidth = Math.max(...words.map(w=>w.cx), 950);

  // Default column positions (normalized from typical 952px page)
  // These are the x-centers of each column
  const colRanges = repsXs.length>=2 ? [
    // Dynamic — use found header positions ±30px
    ...repsXs.map((x,i)=>({type:'reps',cx:x,set:i+1})),
    ...weightXs.map((x,i)=>({type:'weight',cx:x,set:i+1}))
  ] : [
    // Static fallback
    {type:'reps',cx:pageWidth*0.40,set:1},{type:'weight',cx:pageWidth*0.49,set:1},
    {type:'reps',cx:pageWidth*0.59,set:2},{type:'weight',cx:pageWidth*0.68,set:2},
    {type:'reps',cx:pageWidth*0.78,set:3},{type:'weight',cx:pageWidth*0.87,set:3}
  ];
  colRanges.sort((a,b)=>a.cx-b.cx);

  function getNearestCol(cx) {
    let best=null, bestDist=999;
    for (const col of colRanges) {
      const d=Math.abs(cx-col.cx);
      if (d<bestDist){bestDist=d;best=col;}
    }
    return bestDist<60?best:null;
  }

  // Parse exercise rows
  const sets=[];
  for (const row of rows) {
    const rowTxt = row.map(w=>w.text).join(' ');
    const ex = matchExercise(rowTxt);
    if (!ex) continue;

    // Variation: text between exercise name end and first number column
    const exWord = row.find(w=>rowTxt.toUpperCase().includes(w.text.toUpperCase())&&w.text.length>2);
    const exEndX = exWord ? exWord.x1+100 : pageWidth*0.30;
    const varEndX = pageWidth*0.38;

    const variationWords = row.filter(w=>w.cx>exEndX && w.cx<varEndX && !/^\d+$/.test(w.text));
    const variation = variationWords.map(w=>w.text).join(' ').trim();

    // Extract numbers and assign to columns
    const numWords = row.filter(w=>/^\d+$/.test(w.text));
    const setData = {}; // set# -> {reps, weight}

    for (const nw of numWords) {
      const col = getNearestCol(nw.cx);
      if (!col) continue;
      const n = parseInt(nw.text);
      if (!setData[col.set]) setData[col.set]={};
      if (col.type==='reps') setData[col.set].reps=n;
      else setData[col.set].weight=n;
    }

    // Emit one record per set that has both reps and weight
    for (const [setNum, sd] of Object.entries(setData)) {
      if (sd.reps && sd.weight && sd.reps>=1 && sd.reps<=50 && sd.weight>=1 && sd.weight<=999) {
        const session=`${pageDate} ${pageDay}`;
        const setId=`${pageDate}-${ex.replace(/[\s\/]+/g,'-').substring(0,12)}-${setNum}`;
        sets.push({SetID:setId,Date:pageDate,Session:session,Exercise:ex,
          Variation:variation,SetNum:parseInt(setNum),Reps:sd.reps,Weight:sd.weight,Day:pageDay});
      }
    }
  }

  return sets;
}

async function processSinglePage(fileKey, pageNum) {
  const cfg = FILES[fileKey];
  const url = `${BASE}${cfg.dir}/${pageNum}.jpeg`;
  const pageId = `${fileKey}-${pageNum}`;

  try {
    const b64 = await imgToB64(url);
    const r = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION'}]}]})
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const sets = parseVisionResponse(d.responses[0], pageNum, fileKey);
    allPageSets[pageId] = sets;
    totalOk++; totalSets+=sets.length;
    stat('sOk',totalOk); stat('sSets',totalSets);
    return {ok:true, sets, url};
  } catch(e) {
    totalErr++;
    stat('sErr',totalErr);
    return {ok:false, error:e.message, url};
  }
}

function renderPageCard(fileKey, pageNum, result) {
  const pageId = `${fileKey}-${pageNum}`;
  const cfg = FILES[fileKey];
  const sets = result.sets||[];
  const date = DATE_MAPS[fileKey]?.[pageNum] || (sets[0]?.Date||'?');
  const day = sets[0]?.Day||'';

  const badge = result.ok
    ? `<span class="phdr-badge b-ok">✓ ${sets.length} sets</span>`
    : `<span class="phdr-badge b-err">⚠ Error</span>`;

  const tableHTML = sets.length ? `
    <table class="tbl">
      <thead><tr><th>Exercise</th><th>Var</th><th>Set#</th><th>Reps</th><th>Wt</th><th></th></tr></thead>
      <tbody id="tb-${pageId}">${sets.map((s,i)=>`
        <tr id="row-${pageId}-${i}">
          <td><input value="${s.Exercise}"></td>
          <td><input value="${s.Variation||''}"></td>
          <td><input value="${s.SetNum}" style="width:36px"></td>
          <td><input value="${s.Reps}" style="width:44px"></td>
          <td><input value="${s.Weight}" style="width:52px"></td>
          <td><button class="delbtn" onclick="this.closest('tr').remove()">×</button></td>
        </tr>`).join('')}
      </tbody>
    </table>
    <button class="add-row-btn" onclick="addRow('${pageId}','${date}','${day}')">+ Add row</button>` :
    `<div style="color:#555;padding:10px;font-size:0.78rem">${result.error||'No sets extracted'}</div>
     <button class="add-row-btn" onclick="addRow('${pageId}','${date}','${day}')">+ Add row</button>`;

  const card = document.createElement('div');
  card.className='pcard'; card.id=`pcard-${pageId}`;
  card.innerHTML=`
    <div class="pcard-hdr" onclick="toggleCard('${pageId}')">
      <span class="phdr-pg">${cfg.label} p${pageNum}</span>
      <span class="phdr-date">${date}${day?' — '+day:''}</span>
      ${badge}
    </div>
    <div class="pcard-body" id="body-${pageId}">
      <div class="img-col"><img src="${result.url}" loading="lazy"></div>
      <div class="data-col">
        ${tableHTML}
        <button class="push-page-btn" id="ppbtn-${pageId}" onclick="pushPageData('${pageId}','${date}','${day}')">
          Push → Airtable
        </button>
      </div>
    </div>`;
  document.getElementById('pageGrid').appendChild(card);
}

function toggleCard(pageId) {
  const body = document.getElementById(`body-${pageId}`);
  body.classList.toggle('open');
}

function addRow(pageId, date, day) {
  const tb = document.getElementById(`tb-${pageId}`);
  if (!tb) {
    // Create table first
    const dc = document.querySelector(`#body-${pageId} .data-col`);
    dc.insertAdjacentHTML('afterbegin',`<table class="tbl"><thead><tr><th>Exercise</th><th>Var</th><th>Set#</th><th>Reps</th><th>Wt</th><th></th></tr></thead><tbody id="tb-${pageId}"></tbody></table>`);
  }
  const tbody = document.getElementById(`tb-${pageId}`);
  const i = tbody.children.length;
  const tr = document.createElement('tr');
  tr.id=`row-${pageId}-${i}`;
  tr.innerHTML=`<td><input value=""></td><td><input value=""></td><td><input value="${i+1}" style="width:36px"></td><td><input value="" style="width:44px"></td><td><input value="" style="width:52px"></td><td><button class="delbtn" onclick="this.closest('tr').remove()">×</button></td>`;
  tbody.appendChild(tr);
}

async function pushPageData(pageId, date, day) {
  const btn = document.getElementById(`ppbtn-${pageId}`);
  btn.disabled=true;
  const tb = document.getElementById(`tb-${pageId}`);
  if (!tb){btn.textContent='No data';return;}
  const session=`${date} ${day}`;
  const records=[];
  tb.querySelectorAll('tr').forEach(tr=>{
    const inp=tr.querySelectorAll('input');
    if(inp.length<5)return;
    const ex=inp[0].value.trim(),vari=inp[1].value.trim();
    const sn=parseInt(inp[2].value)||1,reps=parseInt(inp[3].value)||0,wt=parseFloat(inp[4].value)||0;
    if(!ex||!reps)return;
    const sid=`${date}-${ex.replace(/[\s\/]+/g,'-').substring(0,12)}-${sn}`;
    records.push({fields:{
      'fld4hUpEzC9IqN0xh':sid,'fld75zYXknF0RtCWH':date,'fldBChNmPkNg61oTN':session,
      'fldZ93A1t7fGjjsSS':ex,'fld2TZdmCOloH0gAK':vari,'fldNm9Ao0rmcwwDXo':sn,
      'fldelUngWHRTm48m1':reps,'fldmrbBmfgSMtREMt':wt,'fldypzlwqw9AzWrEE':day
    }});
  });
  if(!records.length){btn.textContent='Nothing';return;}
  let pushed=0;
  for(let i=0;i<records.length;i+=10){
    btn.textContent=`Pushing ${pushed+1}–${Math.min(i+10,records.length)}...`;
    const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`,{
      method:'POST',headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({records:records.slice(i,i+10),typecast:true})
    });
    const d=await r.json();
    if(d.error){btn.textContent='Error: '+d.error.message;btn.disabled=false;return;}
    pushed+=records.slice(i,i+10).length;
  }
  btn.className='push-page-btn done';btn.textContent=`✓ Pushed ${pushed}`;
  totalPushed+=pushed;stat('sPushed',totalPushed);
  document.querySelector(`#pcard-${pageId} .phdr-badge`).className='phdr-badge b-push';
  document.querySelector(`#pcard-${pageId} .phdr-badge`).textContent=`↑ ${pushed} pushed`;
}

async function pushAll() {
  for (const [pageId, sets] of Object.entries(allPageSets)) {
    const btn = document.getElementById(`ppbtn-${pageId}`);
    if (btn && !btn.classList.contains('done')) {
      const parts = pageId.split('-');
      const fileKey=parts[0], pageNum=parseInt(parts[1]);
      const date = DATE_MAPS[fileKey]?.[pageNum]||sets[0]?.Date||'';
      const day = sets[0]?.Day||'';
      await pushPageData(pageId, date, day);
      await new Promise(r=>setTimeout(r,200));
    }
  }
}

async function startFile() {
  const fileKey = document.getElementById('fileSelect').value;
  const cfg = FILES[fileKey];
  document.getElementById('pageGrid').innerHTML='';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('startBtn').disabled=true;
  totalOk=0;totalErr=0;totalSets=0;
  stat('sOk',0);stat('sErr',0);stat('sSets',0);

  // Process 2 pages at a time
  for(let i=1;i<=cfg.pages;i+=2){
    const batch=[i,i+1].filter(n=>n<=cfg.pages);
    document.getElementById('progLbl').textContent=`${cfg.label}: page ${i} / ${cfg.pages}`;
    document.getElementById('progBar').style.width=((i-1)/cfg.pages*100)+'%';
    document.getElementById('progSub').textContent=`${totalSets} sets extracted so far`;
    const results = await Promise.all(batch.map(p=>processSinglePage(fileKey,p)));
    for(let j=0;j<batch.length;j++) renderPageCard(fileKey,batch[j],results[j]);
    await new Promise(r=>setTimeout(r,300));
  }

  document.getElementById('progLbl').textContent=`Done — ${cfg.pages} pages processed`;
  document.getElementById('progBar').style.width='100%';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('pushAllBtn').disabled=false;
}
</script>
</body>
</html>
