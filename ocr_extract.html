<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout OCR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:20px;font-size:13px}
h1{color:#fff;font-size:1.2rem;margin-bottom:4px}
.sub{color:#666;font-size:0.8rem;margin-bottom:16px}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
select,button{padding:7px 14px;border-radius:6px;border:1px solid #444;background:#222;color:#e0e0e0;font-size:0.82rem;cursor:pointer}
button:hover{background:#333}
button.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
button.primary:hover{background:#2563eb}
button.success{background:#16a34a;border-color:#16a34a;color:#fff}
button:disabled{opacity:.4;cursor:not-allowed}
.prog-wrap{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:14px;margin-bottom:16px;display:none}
.prog-bar-bg{background:#333;border-radius:4px;height:6px;margin:8px 0}
.prog-bar{background:#3b82f6;height:6px;border-radius:4px;width:0%;transition:width .2s}
.prog-lbl{font-size:0.82rem;color:#aaa}
.stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:10px 16px}
.stat .n{font-size:1.5rem;font-weight:700}.stat .l{font-size:0.7rem;color:#666;margin-top:2px}
.n.g{color:#4ade80}.n.r{color:#f87171}.n.y{color:#facc15}
.page-grid{display:flex;flex-direction:column;gap:10px}
.pcard{background:#1a1a1a;border:1px solid #333;border-radius:8px;overflow:hidden}
.pcard-hdr{padding:8px 14px;background:#1e1e1e;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2a2a2a;cursor:pointer}
.pcard-hdr:hover{background:#252525}
.phdr-pg{font-size:0.7rem;color:#555;font-family:monospace;min-width:55px}
.phdr-info{flex:1}
.phdr-dates{font-size:0.88rem;font-weight:600;color:#fff}
.phdr-sub{font-size:0.72rem;color:#666;margin-top:1px}
.phdr-badge{font-size:0.7rem;padding:2px 8px;border-radius:10px}
.b-ok{background:#052e16;color:#4ade80}.b-err{background:#2d0a0a;color:#f87171}
.b-proc{background:#1c1700;color:#facc15}.b-push{background:#0c1a3a;color:#60a5fa}
.pcard-body{display:none;gap:0}
.pcard-body.open{display:grid;grid-template-columns:42% 58%}
.img-col{border-right:1px solid #2a2a2a;padding:8px;background:#111}
.img-col img{width:100%;height:auto;display:block}
.data-col{padding:10px;overflow-y:auto;max-height:620px}
.session-block{margin-bottom:14px;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden}
.session-hdr{background:#222;padding:6px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a2a}
.session-hdr .sdate{font-weight:600;font-size:0.82rem;color:#fff;flex:1}
.session-hdr .sday{font-size:0.72rem;padding:2px 7px;border-radius:10px}
.day-push{background:#1a2a1a;color:#4ade80}
.day-pull{background:#1a1a2a;color:#60a5fa}
.day-legs{background:#2a1a1a;color:#f87171}
.day-arms{background:#2a1a2a;color:#c084fc}
.day-shoulders{background:#1a2a2a;color:#facc15}
.day-other{background:#2a2a1a;color:#aaa}
.session-hdr input.date-edit{background:#111;border:1px solid #444;color:#fff;padding:2px 6px;border-radius:4px;font-size:0.8rem;width:110px}
.session-hdr select.day-edit{background:#111;border:1px solid #444;color:#ccc;padding:2px 4px;border-radius:4px;font-size:0.75rem}
.tbl-wrap{padding:8px}
.tbl{width:100%;border-collapse:collapse;font-size:0.77rem}
.tbl th{font-size:0.65rem;color:#555;text-transform:uppercase;letter-spacing:0.4px;padding:4px 4px;text-align:left;border-bottom:1px solid #252525;white-space:nowrap}
.tbl td{padding:2px 3px;border-bottom:1px solid #1e1e1e}
.tbl td input{background:#111;border:1px solid #252525;color:#e0e0e0;padding:2px 4px;border-radius:3px;font-size:0.76rem;width:100%;min-width:28px}
.tbl td input:focus{outline:none;border-color:#3b82f6}
.tbl tr:hover td{background:#161616}
.delbtn{background:none;border:none;color:#444;cursor:pointer;font-size:0.85rem;line-height:1;padding:1px 3px}
.delbtn:hover{color:#f87171}
.add-row-btn{font-size:0.72rem;color:#3b82f6;background:none;border:none;cursor:pointer;padding:3px 8px;display:block;margin-top:2px}
.push-session-btn{display:block;width:calc(100% - 16px);margin:4px 8px 8px;padding:6px;border-radius:5px;border:none;background:#3b82f6;color:#fff;font-size:0.78rem;font-weight:600;cursor:pointer}
.push-session-btn:hover{background:#2563eb}
.push-session-btn:disabled{background:#222;color:#555;cursor:not-allowed}
.push-session-btn.done{background:#16a34a}
.err-msg{background:#2d0a0a;color:#fca5a5;font-size:0.75rem;padding:8px;border-radius:4px;margin:8px}
</style>
</head>
<body>
<h1>Workout OCR — All Files</h1>
<div class="sub">Vision API • splits each page into 2 sessions • extracts date + day from each section header</div>
<div class="controls">
  <select id="fileSelect">
    <option value="w1">W1 — 2024/2025 (48 pages)</option>
    <option value="w2">W2 — 2025 (64 pages)</option>
    <option value="w3" selected>W3 — 2026 (40 pages)</option>
  </select>
  <button class="primary" id="startBtn" onclick="startFile()">▶ Run OCR</button>
  <button onclick="pushAllPending()" id="pushAllBtn" disabled>Push All → AT</button>
</div>
<div class="prog-wrap" id="progWrap">
  <div class="prog-lbl" id="progLbl">Starting...</div>
  <div class="prog-bar-bg"><div class="prog-bar" id="progBar"></div></div>
  <div style="font-size:0.72rem;color:#555;margin-top:4px" id="progSub"></div>
</div>
<div class="stats">
  <div class="stat"><div class="n g" id="sOk">0</div><div class="l">Pages Done</div></div>
  <div class="stat"><div class="n r" id="sErr">0</div><div class="l">Errors</div></div>
  <div class="stat"><div class="n g" id="sSessions">0</div><div class="l">Sessions</div></div>
  <div class="stat"><div class="n g" id="sSets">0</div><div class="l">Sets</div></div>
  <div class="stat"><div class="n y" id="sPushed">0</div><div class="l">Pushed</div></div>
</div>
<div class="page-grid" id="pageGrid"></div>

<script>
const VISION_KEY='AIzaSyD4qdnRn9LVzC8Nm55GYpsL3rjYe82MCCs';
const AT_TOKEN='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6', AT_TABLE='tblKDqjy5RzqaJvjr';
const BASE='https://mikeblack001.github.io/health-protocol/';
const FILES={w1:{dir:'w1_pages',pages:48,year:'2024'},w2:{dir:'w2_pages',pages:64,year:'2025'},w3:{dir:'w3_pages',pages:40,year:'2026'}};

const EXERCISES=['Wrist Twist','Bench Press','Incline Press','Decline Press','Incline Fly',
  'Lateral Raises','Seated Shoulder Press','Tricep Pushdowns','Overhead Tricep Ext',
  'High Cable Fly','Cable Cross Overs','Cable Crossovers','Lat Pulldown','Bent Over Rows',
  'Barbell Bent Over Rows','Cable Rows','Face Pulls','Rear Delt Raises','Bicep Curls',
  'Hammer Curls','Barbell Shrugs','Cable Shrugs','Cable Curls','Leg Press','Leg Extensions',
  'Leg Curls','Hip Thrust','Nordic Curl','Reverse Hyper','DB Calf Raises',
  'Smith Mach Calf Raises','Back Extension','Cable Press','Low Cable Fly','Incline Curls',
  'Overhead Tricep Press','Curls','Tricep Ext Down','Tricep Ext Up','Forearm Raise'];

let totOk=0,totErr=0,totSess=0,totSets=0,totPushed=0;
function stat(id,v){document.getElementById(id).textContent=v;}

async function imgToB64(url){
  const r=await fetch(url);const blob=await r.blob();
  return new Promise(res=>{const fr=new FileReader();fr.onloadend=()=>res(fr.result.split(',')[1]);fr.readAsDataURL(blob);});
}

function parseDate(txt, year) {
  // Match M/D or MM/DD patterns
  const m=txt.match(/(\d{1,2})\/(\d{1,2})/);
  if(!m)return null;
  return `${year}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
}

function detectDay(txt) {
  const t=txt.toLowerCase();
  if(t.includes('monday')||t.includes(' push')) return 'Push';
  if(t.includes('tuesday')||t.includes(' pull')) return 'Pull';
  if(t.includes('wednesday')||t.includes('leg')) return 'Legs';
  if(t.includes('thursday')||t.includes('arm')) return 'Arms';
  if(t.includes('friday')||t.includes('shoulder')) return 'Shoulders';
  return null;
}

function matchExercise(txt){
  const up=txt.toUpperCase();
  return EXERCISES.find(ex=>up.includes(ex.toUpperCase()))||null;
}

function parseVision(resp, fileKey) {
  const ann=resp.fullTextAnnotation;
  if(!ann)return[];
  const year=FILES[fileKey].year;

  // Collect words with bounding boxes
  const words=[];
  for(const pg of ann.pages||[]){
    for(const blk of pg.blocks||[]){
      for(const par of blk.paragraphs||[]){
        for(const wd of par.words||[]){
          const txt=wd.symbols.map(s=>s.text).join('');
          const verts=wd.boundingBox?.vertices||[];
          if(!verts.length)continue;
          const xs=verts.map(v=>v.x||0),ys=verts.map(v=>v.y||0);
          words.push({
            text:txt,
            cx:(Math.min(...xs)+Math.max(...xs))/2,
            cy:(Math.min(...ys)+Math.max(...ys))/2,
            x0:Math.min(...xs),x1:Math.max(...xs)
          });
        }
      }
    }
  }
  if(!words.length)return[];

  // Group into rows
  words.sort((a,b)=>a.cy-b.cy);
  const rows=[];
  let cur=[words[0]];
  for(let i=1;i<words.length;i++){
    if(Math.abs(words[i].cy-cur[cur.length-1].cy)<14){cur.push(words[i]);}
    else{rows.push([...cur].sort((a,b)=>a.cx-b.cx));cur=[words[i]];}
  }
  if(cur.length)rows.push([...cur].sort((a,b)=>a.cx-b.cx));

  // Find section splits: look for day header rows (Monday/Tuesday etc)
  // A day header row starts near left edge and contains a day name
  const sectionStarts=[];
  for(let i=0;i<rows.length;i++){
    const txt=rows[i].map(w=>w.text).join(' ');
    const day=detectDay(txt);
    // Section header: leftmost word near left edge + contains day name
    if(day && rows[i][0]?.cx<150){
      sectionStarts.push({rowIdx:i, day, y:rows[i][0].cy});
    }
  }

  // Parse each section
  const sessions=[];
  const sectionBoundaries=sectionStarts.map((s,i)=>({
    ...s,
    endRowIdx: sectionStarts[i+1]?.rowIdx??rows.length
  }));

  for(const sect of sectionBoundaries){
    const sectRows=rows.slice(sect.rowIdx, sect.endRowIdx);
    const sectTxt=sectRows.map(r=>r.map(w=>w.text).join(' ')).join(' ');

    // Extract date from section rows (look in first 4 rows)
    let date=null;
    for(const r of sectRows.slice(0,4)){
      const t=r.map(w=>w.text).join(' ');
      date=parseDate(t,year);
      if(date)break;
    }

    // Parse column boundaries from header row (find "Reps" and "Weight")
    let repsXs=[], weightXs=[];
    for(const r of sectRows.slice(0,6)){
      const t=r.map(w=>w.text).join(' ');
      if(/reps/i.test(t)&&/weight/i.test(t)){
        for(const w of r){
          if(/reps/i.test(w.text))repsXs.push(w.cx);
          if(/weight/i.test(w.text))weightXs.push(w.cx);
        }
        if(repsXs.length>=2)break;
      }
    }

    // Build col ranges
    const pageW=Math.max(...words.map(w=>w.cx),900);
    const colRanges=repsXs.length>=2?[
      ...repsXs.map((x,i)=>({type:'reps',cx:x,set:i+1})),
      ...weightXs.map((x,i)=>({type:'weight',cx:x,set:i+1}))
    ]:[
      {type:'reps',cx:pageW*0.40,set:1},{type:'weight',cx:pageW*0.49,set:1},
      {type:'reps',cx:pageW*0.59,set:2},{type:'weight',cx:pageW*0.68,set:2},
      {type:'reps',cx:pageW*0.78,set:3},{type:'weight',cx:pageW*0.87,set:3}
    ];
    colRanges.sort((a,b)=>a.cx-b.cx);

    function nearestCol(cx){
      let best=null,bd=999;
      for(const c of colRanges){const d=Math.abs(cx-c.cx);if(d<bd){bd=d;best=c;}}
      return bd<65?best:null;
    }

    // Extract sets from exercise rows
    const sets=[];
    for(const row of sectRows){
      const rowTxt=row.map(w=>w.text).join(' ');
      const ex=matchExercise(rowTxt);
      if(!ex)continue;

      // Variation: words between exercise and first number column
      const numStartX=pageW*0.35;
      const varWords=row.filter(w=>w.cx>pageW*0.22&&w.cx<numStartX&&!/^\d+$/.test(w.text)&&w.text.length>1);
      const variation=varWords.map(w=>w.text).join(' ').trim();

      const numWords=row.filter(w=>/^\d+$/.test(w.text));
      const setData={};
      for(const nw of numWords){
        const col=nearestCol(nw.cx);
        if(!col)continue;
        const n=parseInt(nw.text);
        if(!setData[col.set])setData[col.set]={};
        if(col.type==='reps')setData[col.set].reps=n;
        else setData[col.set].weight=n;
      }

      for(const[setNum,sd]of Object.entries(setData)){
        if(sd.reps&&sd.weight&&sd.reps>=1&&sd.reps<=60&&sd.weight>=1&&sd.weight<=999){
          sets.push({exercise:ex,variation,set_number:parseInt(setNum),reps:sd.reps,weight:sd.weight});
        }
      }
    }

    sessions.push({date,day:sect.day,sets});
  }

  return sessions;
}

async function processPage(fileKey, pageNum) {
  const cfg=FILES[fileKey];
  const url=`${BASE}${cfg.dir}/${pageNum}.jpeg`;
  try{
    const b64=await imgToB64(url);
    const r=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_KEY}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requests:[{image:{content:b64},features:[{type:'DOCUMENT_TEXT_DETECTION'}]}]})
    });
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const sessions=parseVision(d.responses[0],fileKey);
    totOk++;totSess+=sessions.length;
    sessions.forEach(s=>{totSets+=s.sets.length;});
    stat('sOk',totOk);stat('sSessions',totSess);stat('sSets',totSets);
    return{ok:true,sessions,url};
  }catch(e){
    totErr++;stat('sErr',totErr);
    return{ok:false,error:e.message,url};
  }
}

function dayClass(day){
  const m={'Push':'day-push','Pull':'day-pull','Legs':'day-legs','Arms':'day-arms','Shoulders':'day-shoulders'};
  return m[day]||'day-other';
}

function renderPageCard(fileKey, pageNum, result) {
  const pid=`${fileKey}-${pageNum}`;
  const sessions=result.sessions||[];
  const totalSets=sessions.reduce((a,s)=>a+s.sets.length,0);

  const badge=result.ok
    ?`<span class="phdr-badge b-ok">✓ ${sessions.length} sessions · ${totalSets} sets</span>`
    :`<span class="phdr-badge b-err">⚠ Error</span>`;

  const sessionsHTML=sessions.map((sess,si)=>{
    const sid=`${pid}-s${si}`;
    const dc=dayClass(sess.day);
    const dateVal=sess.date||'';
    const setRows=sess.sets.map((s,ri)=>`
      <tr id="row-${sid}-${ri}">
        <td><input value="${s.exercise}"></td>
        <td><input value="${s.variation||''}"></td>
        <td><input value="${s.set_number}" style="width:32px"></td>
        <td><input value="${s.reps}" style="width:38px"></td>
        <td><input value="${s.weight}" style="width:46px"></td>
        <td><button class="delbtn" onclick="this.closest('tr').remove()">×</button></td>
      </tr>`).join('');

    return`<div class="session-block" id="sess-${sid}">
      <div class="session-hdr">
        <input class="date-edit" value="${dateVal}" placeholder="YYYY-MM-DD" id="date-${sid}">
        <select class="day-edit" id="day-${sid}">
          ${['Push','Pull','Legs','Arms','Shoulders'].map(d=>`<option${d===sess.day?' selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="tbl-wrap">
        ${sess.sets.length?`<table class="tbl"><thead><tr><th>Exercise</th><th>Variation</th><th>#</th><th>Reps</th><th>Wt</th><th></th></tr></thead><tbody id="tb-${sid}">${setRows}</tbody></table>`
        :`<div style="color:#555;padding:6px;font-size:0.77rem">No sets extracted</div>`}
        <button class="add-row-btn" onclick="addRow('${sid}')">+ Add row</button>
      </div>
      <button class="push-session-btn" id="pbtn-${sid}" onclick="pushSession('${sid}')">
        Push ${sess.day||''} ${dateVal} → Airtable
      </button>
    </div>`;
  }).join('');

  const card=document.createElement('div');
  card.className='pcard';card.id=`pcard-${pid}`;
  card.innerHTML=`
    <div class="pcard-hdr" onclick="toggleCard('${pid}')">
      <span class="phdr-pg">${fileKey.toUpperCase()} p${pageNum}</span>
      <div class="phdr-info">
        <div class="phdr-dates">${sessions.map(s=>s.date||'?').join(' · ')}</div>
        <div class="phdr-sub">${sessions.map(s=>s.day||'?').join(' + ')} · ${totalSets} sets total</div>
      </div>
      ${badge}
    </div>
    <div class="pcard-body" id="body-${pid}">
      <div class="img-col"><img src="${result.url}" loading="lazy"></div>
      <div class="data-col">
        ${result.ok?sessionsHTML:`<div class="err-msg">${result.error}</div>`}
      </div>
    </div>`;
  document.getElementById('pageGrid').appendChild(card);
}

function toggleCard(pid){document.getElementById(`body-${pid}`).classList.toggle('open');}

function addRow(sid){
  let tb=document.getElementById(`tb-${sid}`);
  if(!tb){
    const dc=document.querySelector(`#sess-${sid} .tbl-wrap`);
    dc.insertAdjacentHTML('afterbegin',`<table class="tbl"><thead><tr><th>Exercise</th><th>Variation</th><th>#</th><th>Reps</th><th>Wt</th><th></th></tr></thead><tbody id="tb-${sid}"></tbody></table>`);
    tb=document.getElementById(`tb-${sid}`);
  }
  const i=tb.children.length;
  const tr=document.createElement('tr');tr.id=`row-${sid}-${i}`;
  tr.innerHTML=`<td><input value=""></td><td><input value=""></td><td><input value="${i+1}" style="width:32px"></td><td><input value="" style="width:38px"></td><td><input value="" style="width:46px"></td><td><button class="delbtn" onclick="this.closest('tr').remove()">×</button></td>`;
  tb.appendChild(tr);
}

async function pushSession(sid){
  const btn=document.getElementById(`pbtn-${sid}`);
  btn.disabled=true;
  const date=document.getElementById(`date-${sid}`)?.value?.trim()||'';
  const day=document.getElementById(`day-${sid}`)?.value||'';
  if(!date){btn.textContent='⚠ Set date first';btn.disabled=false;return;}
  const session=`${date} ${day}`;
  const tb=document.getElementById(`tb-${sid}`);
  if(!tb){btn.textContent='No data';return;}
  const records=[];
  tb.querySelectorAll('tr').forEach(tr=>{
    const inp=tr.querySelectorAll('input');
    if(inp.length<5)return;
    const ex=inp[0].value.trim(),vari=inp[1].value.trim();
    const sn=parseInt(inp[2].value)||1,reps=parseInt(inp[3].value)||0,wt=parseFloat(inp[4].value)||0;
    if(!ex||!reps)return;
    const sid2=`${date}-${ex.replace(/[\s\/]+/g,'-').substring(0,12)}-${sn}`;
    records.push({fields:{
      'fld4hUpEzC9IqN0xh':sid2,'fld75zYXknF0RtCWH':date,'fldBChNmPkNg61oTN':session,
      'fldZ93A1t7fGjjsSS':ex,'fld2TZdmCOloH0gAK':vari,'fldNm9Ao0rmcwwDXo':sn,
      'fldelUngWHRTm48m1':reps,'fldmrbBmfgSMtREMt':wt,'fldypzlwqw9AzWrEE':day
    }});
  });
  if(!records.length){btn.textContent='Nothing to push';return;}
  let pushed=0;
  for(let i=0;i<records.length;i+=10){
    btn.textContent=`Pushing ${pushed+1}–${Math.min(i+10,records.length)}...`;
    const r=await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`,{
      method:'POST',headers:{'Authorization':'Bearer '+AT_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({records:records.slice(i,i+10),typecast:true})
    });
    const d=await r.json();
    if(d.error){btn.textContent='Error: '+d.error.message;btn.disabled=false;return;}
    pushed+=records.slice(i,i+10).length;
  }
  btn.className='push-session-btn done';btn.textContent=`✓ Pushed ${pushed}`;
  totPushed+=pushed;stat('sPushed',totPushed);
}

async function pushAllPending(){
  const btns=document.querySelectorAll('.push-session-btn:not(.done):not(:disabled)');
  for(const btn of btns){
    const sid=btn.id.replace('pbtn-','');
    await pushSession(sid);
    await new Promise(r=>setTimeout(r,150));
  }
}

async function startFile(){
  const fileKey=document.getElementById('fileSelect').value;
  const cfg=FILES[fileKey];
  document.getElementById('pageGrid').innerHTML='';
  document.getElementById('progWrap').style.display='block';
  document.getElementById('startBtn').disabled=true;
  totOk=0;totErr=0;totSess=0;totSets=0;
  stat('sOk',0);stat('sErr',0);stat('sSessions',0);stat('sSets',0);

  for(let i=1;i<=cfg.pages;i+=2){
    const batch=[i,i+1].filter(n=>n<=cfg.pages);
    document.getElementById('progLbl').textContent=`${fileKey.toUpperCase()}: page ${i}/${cfg.pages}`;
    document.getElementById('progBar').style.width=((i-1)/cfg.pages*100)+'%';
    document.getElementById('progSub').textContent=`${totSets} sets extracted`;
    const results=await Promise.all(batch.map(p=>processPage(fileKey,p)));
    for(let j=0;j<batch.length;j++)renderPageCard(fileKey,batch[j],results[j]);
    await new Promise(r=>setTimeout(r,300));
  }
  document.getElementById('progLbl').textContent=`Done — ${cfg.pages} pages, ${totSets} sets`;
  document.getElementById('progBar').style.width='100%';
  document.getElementById('startBtn').disabled=false;
  document.getElementById('pushAllBtn').disabled=false;
}
</script>
</body>
</html>
