<!DOCTYPE html>
<html>
<head>
<title>Add Linked Field</title>
<style>
  body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #eee; }
  button { background: #4a90e2; color: white; border: none; padding: 10px 20px; cursor: pointer; font-size: 16px; border-radius: 4px; }
  button:disabled { background: #555; cursor: not-allowed; }
  #log { margin-top: 20px; background: #111; padding: 15px; border-radius: 4px; white-space: pre-wrap; min-height: 100px; }
  .success { color: #4caf50; }
  .error { color: #f44336; }
</style>
</head>
<body>
<h2>Add "Peptides (Linked)" field to Vendors table</h2>
<button id="btn" onclick="run()">Run</button>
<div id="log">Ready...</div>

<script>
async function run() {
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.textContent = 'Sending request...\n';

  const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
  const BASE_ID = 'appmHDG4TGT1xy6R6';
  const VENDORS_TABLE = 'tblI0nfBBuHXjp3KT';
  const PEPTIDES_TABLE = 'tblMs6YRdP4wkndUp';

  try {
    const res = await fetch(`https://api.airtable.com/v0/meta/bases/${BASE_ID}/tables/${VENDORS_TABLE}/fields`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        name: 'Peptides (Linked)',
        type: 'multipleRecordLinks',
        options: { linkedTableId: PEPTIDES_TABLE }
      })
    });

    const data = await res.json();

    if (res.ok) {
      log.innerHTML = `<span class="success">✅ SUCCESS!\n\nField ID: ${data.id}\nName: ${data.name}\nType: ${data.type}</span>`;
    } else {
      log.innerHTML = `<span class="error">❌ ERROR ${res.status}\n\n${JSON.stringify(data, null, 2)}</span>`;
    }
  } catch (err) {
    log.innerHTML = `<span class="error">❌ Exception: ${err.message}</span>`;
  }

  btn.disabled = false;
}
</script>
</body>
</html>
