  const d = document.createElement('div');

function setBar(pct) { bar.style.width = pct + '%'; }
function setStatus(s) { statusEl.textContent = s; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function kg2lbs(kg) { return Math.round(kg * 2.20462 * 10) / 10; }
function pct2display(p) { return Math.round(p * 100 * 10) / 10; } // 0.079 → 7.9

// Determine source from sample duration: RENPHO has 3-6s duration, Withings is instant (start==end)
function getSource(sample) {
  const s = new Date(sample.start).getTime();
  const e = new Date(sample.end).getTime();
  const dur = e - s;
  return dur > 500 ? 'RENPHO' : 'Withings';
}

// Fetch all AT DailyLog records from Mar 1 → today (date-indexed)
async function fetchATRecords() {
  log('Fetching Airtable DailyLog records (Mar 1 → today)...');
  const records = {};
  let offset = null;
  let total = 0;
  const filter = encodeURIComponent("AND(IS_AFTER({Date}, '2026-02-28'), IS_BEFORE({Date}, '2026-05-31'))");
  do {
    let url = `https://api.airtable.com/v0/${BASE}/${TABLE}?filterByFormula=${filter}&pageSize=100&fields[]=${F.date}`;
    if (offset) url += '&offset=' + offset;
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + AT_TOKEN } });
    const d = await r.json();
    if (d.error) throw new Error('AT error: ' + d.error.message);
    for (const rec of (d.records || [])) {
      const dt = rec.fields[F.date];
      if (dt) records[dt] = rec.id;
    }
    total += (d.records || []).length;
    offset = d.offset;
    log(`  ...fetched ${total} AT records`, 'inf');
  } while (offset);
  log(`AT: ${Object.keys(records).length} DailyLog records loaded`, 'ok');
  stat('s-matched', Object.keys(records).length);
  return records;
}

async function atPatch(records) {
  const r = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}`, {
    method: 'PATCH',
    headers: { 'Authorization': 'Bearer ' + AT_TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ records, performUpsert: { fieldsToMergeOn: [F.date] }, typecast: true })
  });
  return r.json();
}

async function run() {
  try {
    log('Loading AT records...');
    const atMap = await fetchATRecords();
    stat('s-fetched', Object.keys(WEIGHT_SAMPLES).length + ' weight days');

    // Build per-date payload
    const byDate = {};

    // Weight + BF% (source-split)
    for (const [date, wtW, wtR] of WEIGHT_SAMPLES) {
      if (!byDate[date]) byDate[date] = {};
      // For Mar 1 – May 27, stats mode only has one value — store in both fields
      // For May 28-29, we have true source-split values
      byDate[date][F.wtWithings] = kg2lbs(wtW);
      byDate[date][F.wtRenpho]   = kg2lbs(wtR);
      byDate[date][F.weight]     = kg2lbs(wtW); // prefer Withings for legacy field
      byDate[date][F.scaleSource] = (wtW !== wtR) ? 'Both' : 'Both';
    }

    for (const [date, bfW, bfR] of BF_SAMPLES) {
      if (!byDate[date]) byDate[date] = {};
      byDate[date][F.bfWithings] = pct2display(bfW);
      byDate[date][F.bfRenpho]   = pct2display(bfR);
      byDate[date][F.bf]         = pct2display(bfW); // prefer Withings for legacy
    }

    // HRV
    for (const [date, val] of Object.entries(HRV_DATA)) {
      if (!byDate[date]) byDate[date] = {};
      byDate[date][F.hrv] = Math.round(val * 10) / 10;
    }

    // Lean Mass (kg → lbs)
    for (const [date, val] of Object.entries(LEAN_DATA)) {
      if (!byDate[date]) byDate[date] = {};
      byDate[date][F.lean] = kg2lbs(val);
    }

    // RHR
    for (const [date, val] of Object.entries(RHR_DATA)) {
      if (!byDate[date]) byDate[date] = {};
      byDate[date][F.rhr] = val;
    }

    const dates = Object.keys(byDate).sort();
    log(`Built payload for ${dates.length} dates`, 'ok');
    stat('s-fetched', dates.length + ' dates');

    // Push in batches of 10 (upsert by date field)
    const BATCH = 10;
    let updated = 0, created = 0;
    for (let i = 0; i < dates.length; i += BATCH) {
      const batch = dates.slice(i, i + BATCH);
      const records = batch.map(date => ({
        fields: { [F.date]: date, ...byDate[date] }
      }));

      const res = await atPatch(records);
      if (res.error) {
        log(`Batch ${i}-${i+BATCH} ERROR: ${res.error.message}`, 'err');
      } else {
        const u = (res.updatedRecords || []).length;
        const c = (res.createdRecords || []).length;
        updated += u; created += c;
        log(`Batch ${i+1}-${Math.min(i+BATCH, dates.length)}: ${u} updated, ${c} created`, 'ok');
        stat('s-updated', updated);
        stat('s-created', created);
      }

      setBar(Math.round(((i + BATCH) / dates.length) * 100));
      setStatus(`${Math.min(i + BATCH, dates.length)} / ${dates.length} dates processed`);
      await sleep(150);
    }

    setBar(100);
    log(`✅ DONE — ${updated} records updated, ${created} records created`, 'ok');
    setStatus(`Complete: ${updated} updated, ${created} created`);
  } catch(e) {
    log('FATAL: ' + e.message, 'err');
    setStatus('Error: ' + e.message);
  }
}

window.onload = () => run();
</script>
</body>
