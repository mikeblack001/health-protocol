const logEl = document.getElementById('log');
function log(msg, cls='inf') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = new Date().toLocaleTimeString() + '  ' + msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

function setStatus(s) { document.getElementById('status').textContent = s; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Build all dates union of SCALE + HRV + LEAN + RHR
function allDates() {
  const s = new Set([...Object.keys(SCALE), ...Object.keys(HRV), ...Object.keys(LEAN), ...Object.keys(RHR)]);
  return [...s].sort();
}

function buildFields(date) {
  const f = { [F.date]: date };
  const sc = SCALE[date];
  if (sc) {
    f[F.wtR] = sc.wt_r;
    f[F.bfR] = sc.bf_r;
    // Withings only if it actually synced
    if (sc.wt_w !== null) f[F.wtW] = sc.wt_w;
    if (sc.bf_w !== null) f[F.bfW] = sc.bf_w;
    // Legacy fields: prefer Withings for accuracy, fall back to RENPHO
    f[F.weight] = sc.wt_w !== null ? sc.wt_w : sc.wt_r;
    f[F.bf]     = sc.bf_w !== null ? sc.bf_w : sc.bf_r;
    f[F.src]    = sc.wt_w !== null ? 'Both' : 'RENPHO';
  }
  if (HRV[date]  !== undefined) f[F.hrv]  = HRV[date];
  if (LEAN[date] !== undefined) f[F.lean] = LEAN[date];
  if (RHR[date]  !== undefined) f[F.rhr]  = RHR[date];
  return f;
}

async function run() {
  const dates = allDates();
  log(`${dates.length} total dates to patch (${Object.values(SCALE).filter(s=>s.wt_w!==null).length} with Withings)`, 'inf');

  let updated = 0, created = 0, errors = 0;
  const BATCH = 10;

  for (let i = 0; i < dates.length; i += BATCH) {
    const batch = dates.slice(i, i + BATCH);
    const records = batch.map(date => ({ fields: buildFields(date) }));

    try {
      const res = await fetch(`https://api.airtable.com/v0/${BASE}/${TBL}`, {
        method: 'PATCH',
        headers: { 'Authorization': 'Bearer ' + AT, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          records,
          performUpsert: { fieldsToMergeOn: [F.date] },
          typecast: true
        })
      }).then(r => r.json());

      if (res.error) {
        log(`Batch ${i+1}-${Math.min(i+BATCH,dates.length)} ERROR: ${res.error.message}`, 'err');
        errors++;
      } else {
        const u = (res.updatedRecords || []).length;
        const c = (res.createdRecords || []).length;
        updated += u; created += c;
        log(`Batch ${i+1}–${Math.min(i+BATCH,dates.length)}: ${u} updated, ${c} created`, 'ok');
        stat('s-updated', updated);
        stat('s-created', created);
      }
    } catch(e) {
      log(`Batch ${i+1} fetch error: ${e.message}`, 'err');
      errors++;
    }

    setBar(Math.round(((i + BATCH) / dates.length) * 100));
    setStatus(`${Math.min(i+BATCH, dates.length)} / ${dates.length} dates processed`);
    await sleep(200);
  }

  setBar(100);
  const msg = errors ? `⚠️ Done with ${errors} batch errors — check log` : `✅ Complete`;
  log(`${msg} — ${updated} updated, ${created} created`, errors ? 'warn' : 'ok');
  setStatus(`${msg}: ${updated} updated, ${created} created`);
}

window.onload = () => run();
