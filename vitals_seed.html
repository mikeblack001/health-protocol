// ── BF%, LEAN MASS (kg→lbs), HRV — paste Phase 2 data here ──
const BF_PCT  = {};
const LEAN_KG = {};
const HRV_MS  = {};

function buildRecords() {
  const dates = new Set([...Object.keys(BM_KG), ...Object.keys(RHR), ...Object.keys(BF_PCT), ...Object.keys(LEAN_KG), ...Object.keys(HRV_MS)]);
  const records = [];
  for (const d of [...dates].sort()) {
    if (d >= SKIP_FROM) continue;
    const rec = { date: d };
    if (BM_KG[d]   != null) rec.weight_lbs = Math.round(BM_KG[d] * 2.20462 * 10) / 10;
    if (RHR[d]     != null) rec.rhr = RHR[d];
    if (BF_PCT[d]  != null) rec.bf_pct = Math.round(BF_PCT[d] * 10) / 10;
    if (LEAN_KG[d] != null) rec.lean_lbs = Math.round(LEAN_KG[d] * 2.20462 * 10) / 10;
    if (HRV_MS[d]  != null) rec.hrv = Math.round(HRV_MS[d] * 10) / 10;
    records.push(rec);
  }
  return records;
}

async function upsertRecord(rec) {

  const findData = await findResp.json();
  const fields = { [F_DATE]: rec.date, [F_SCALE]: 'Unknown' };
  if (rec.weight_lbs != null) fields[F_WEIGHT] = rec.weight_lbs;
  if (rec.rhr        != null) fields[F_RHR]    = rec.rhr;
  if (rec.bf_pct     != null) fields[F_BF]     = rec.bf_pct;
  if (rec.lean_lbs   != null) fields[F_LEAN]   = rec.lean_lbs;
  if (rec.hrv        != null) fields[F_HRV]    = rec.hrv;
  if (findData.records && findData.records.length > 0) {
    const id = findData.records[0].id;
    const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}/${id}`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d));
    return 'updated';
  } else {
    const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d));
    return 'created';
  }
}

let running = false;
let pushed = 0, updated = 0, errors = 0;

function log(msg, cls='log-info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function updateStats(total) {
  document.getElementById('s-pushed').textContent  = pushed;
  document.getElementById('s-updated').textContent = updated;
  document.getElementById('s-errors').textContent  = errors;
  const done = pushed + updated + errors;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress-bar').style.width = pct + '%';
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function startSeed() {
  running = true; pushed = 0; updated = 0; errors = 0;
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('log').innerHTML = '';
  const records = buildRecords();
  document.getElementById('s-total').textContent = records.length;
  log(`Starting: ${records.length} dates · weight+RHR · 1300 dates`, 'log-info');
  for (let i = 0; i < records.length; i++) {
    if (!running) { log('⏹ Stopped.', 'log-info'); break; }
    const rec = records[i];
    document.getElementById('status').textContent = `Processing ${rec.date} (${i+1}/${records.length})…`;
    try {
      const result = await upsertRecord(rec);
      if (result === 'created') pushed++; else updated++;
      log(`✓ ${rec.date} — ${result} | wt:${rec.weight_lbs||'—'} rhr:${rec.rhr||'—'}`, 'log-ok');
    } catch(e) {
      errors++;
      log(`✗ ${rec.date} — ${e.message}`, 'log-err');
    }
    updateStats(records.length);
    await sleep(200);
  }
  running = false;
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  document.getElementById('status').textContent = `Done. ${pushed} created, ${updated} updated, ${errors} errors.`;
  log(`✅ Complete: ${pushed} created, ${updated} updated, ${errors} errors`, 'log-ok');
}

function stopSeed() { running = false; }
</script>
