<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Diff — PDF vs Airtable</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 18px; color: #00ff88; margin-bottom: 4px; letter-spacing: 2px; text-transform: uppercase; }
  .sub { font-size: 11px; color: #666; margin-bottom: 20px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #111; border: 1px solid #222; padding: 12px 16px; border-radius: 4px; min-width: 140px; }
  .stat-val { font-size: 24px; font-weight: bold; }
  .stat-lbl { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-val.green { color: #00ff88; }
  .stat-val.red { color: #ff4444; }
  .stat-val.yellow { color: #ffcc00; }
  .stat-val.blue { color: #4488ff; }
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: #111; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { background: #1a2a1a; border-color: #00ff88; color: #00ff88; }
  .filter-btn.red-btn.active { background: #2a1a1a; border-color: #ff4444; color: #ff4444; }
  .filter-btn.yellow-btn.active { background: #2a2a1a; border-color: #ffcc00; color: #ffcc00; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #111; color: #666; padding: 8px 10px; text-align: left; font-weight: normal; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; border-bottom: 1px solid #222; position: sticky; top: 0; }
  td { padding: 7px 10px; border-bottom: 1px solid #181818; vertical-align: top; }
  tr:hover td { background: #0f0f18; }
  .match { color: #00ff88; }
  .missing td { background: rgba(255,68,68,0.06); }
  .extra td { background: rgba(255,204,0,0.04); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .badge-match { background: #003322; color: #00ff88; }
  .badge-missing { background: #330000; color: #ff4444; }
  .badge-extra { background: #333300; color: #ffcc00; }
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .sessions { font-size: 10px; color: #555; margin-top: 2px; line-height: 1.5; }
  #loading { text-align: center; padding: 60px; color: #444; }
  .search { background: #111; border: 1px solid #333; color: #e0e0e0; padding: 7px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 200px; }
  .search:focus { outline: none; border-color: #00ff88; }
  #tableWrap { max-height: calc(100vh - 300px); overflow-y: auto; border: 1px solid #1a1a1a; border-radius: 4px; }
  .action-bar { display: flex; gap: 10px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  .btn { background: #00ff88; color: #000; border: none; padding: 8px 18px; border-radius: 4px; font-family: inherit; font-size: 12px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  .btn:hover { background: #00cc66; }
  .note { font-size: 10px; color: #555; margin-top: 8px; }
  .at-only-dates { font-size: 11px; color: #888; }
</style>
</head>
<body>
<h1>⚡ Workout Diff</h1>
<div class="sub">PDF extraction vs Airtable — static snapshot loaded from GitHub</div>

<div id="loading"><div style="color:#00ff88;font-size:14px;">Loading...</div></div>
<div id="app" style="display:none;"></div>

<script>
const BASE = 'https://raw.githubusercontent.com/mikeblack001/health-protocol/main/';
let diffData = [], pdfSets = [], currentFilter = 'all';

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

async function main() {
  try {
    const [r1, r2] = await Promise.all([
      fetch(BASE + 'extract_progress.json?t=' + Date.now()),
      fetch(BASE + 'at_sets_summary.json?t=' + Date.now())
    ]);
    const extracted = await r1.json();
    const atSummary = await r2.json();

    pdfSets = (extracted.all_sets || []).filter(s => s.date >= '2024-10-28');

    // Build PDF by-date summary
    const pdfByDate = {};
    for (const s of pdfSets) {
      if (!pdfByDate[s.date]) pdfByDate[s.date] = { count: 0, sessions: {} };
      pdfByDate[s.date].count++;
      const sess = s.session || s.date;
      pdfByDate[s.date].sessions[sess] = (pdfByDate[s.date].sessions[sess] || 0) + 1;
    }

    // All dates union
    const allDates = new Set([...Object.keys(pdfByDate), ...Object.keys(atSummary)]);

    diffData = [];
    for (const date of [...allDates].sort()) {
      const pdf = pdfByDate[date] || { count: 0, sessions: {} };
      const at = atSummary[date] || { count: 0, sessions: {} };
      const diff = pdf.count - at.count;
      let status = diff > 0 ? 'missing' : diff < 0 ? 'extra' : 'match';
      if (pdf.count === 0 && at.count > 0) status = 'extra';
      if (at.count === 0 && pdf.count > 0) status = 'missing';
      diffData.push({ date, pdfCount: pdf.count, atCount: at.count, diff,
        status, pdfSessions: pdf.sessions, atSessions: at.sessions });
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#f44">Error: ' + e.message + '</div>';
  }
}

function render() {
  const match = diffData.filter(r => r.status==='match').length;
  const missing = diffData.filter(r => r.status==='missing');
  const extra = diffData.filter(r => r.status==='extra');
  const missSets = missing.reduce((a,b)=>a+b.diff,0);
  const extSets = extra.reduce((a,b)=>a+Math.abs(b.diff),0);
  const totalPDF = diffData.reduce((a,b)=>a+b.pdfCount,0);
  const totalAT = diffData.reduce((a,b)=>a+b.atCount,0);

  document.getElementById('app').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="stat-val blue">${diffData.length}</div><div class="stat-lbl">Dates Total</div></div>
      <div class="stat"><div class="stat-val green">${match}</div><div class="stat-lbl">Matching</div></div>
      <div class="stat"><div class="stat-val red">${missing.length} dates / ${missSets} sets</div><div class="stat-lbl">PDF &gt; AT (need push)</div></div>
      <div class="stat"><div class="stat-val yellow">${extra.length} dates / ${extSets} sets</div><div class="stat-lbl">AT &gt; PDF (extra in AT)</div></div>
      <div class="stat"><div class="stat-val blue">${totalPDF.toLocaleString()}</div><div class="stat-lbl">Total PDF Sets</div></div>
      <div class="stat"><div class="stat-val blue">${totalAT.toLocaleString()}</div><div class="stat-lbl">Total AT Sets</div></div>
    </div>
    <div class="filters">
      <span style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;">Filter:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">All (${diffData.length})</button>
      <button class="filter-btn red-btn" onclick="setFilter('missing',this)">PDF&gt;AT (${missing.length})</button>
      <button class="filter-btn yellow-btn" onclick="setFilter('extra',this)">AT&gt;PDF (${extra.length})</button>
      <button class="filter-btn" onclick="setFilter('match',this)">Match (${match})</button>
      <input class="search" type="text" placeholder="Filter date..." id="dateSearch" oninput="renderTable()">
    </div>
    <div id="tableWrap">
      <table>
        <thead><tr>
          <th>Date</th><th class="num">PDF</th><th class="num">AT</th><th class="num">Diff</th>
          <th>Status</th><th>PDF Sessions</th><th>AT Sessions</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="action-bar">
      <button class="btn" onclick="downloadMissing()">⬇ Download Missing Sets JSON</button>
      <span id="dlStatus" style="font-size:11px;color:#666;"></span>
    </div>
    <div class="note">AT snapshot: 8,072 sets across 268 dates (pulled 2026-05-26). PDF: ${pdfSets.length.toLocaleString()} sets across 114 dates (>=2024-10-28).</div>
  `;
  renderTable();
}

function renderTable() {
  const search = (document.getElementById('dateSearch')||{}).value || '';
  const rows = diffData.filter(r => {
    if (search && !r.date.includes(search)) return false;
    if (currentFilter==='all') return true;
    return r.status === currentFilter;
  });
  const labels = { match:'MATCH', missing:'PDF>AT', extra:'AT>PDF' };
  const badgeClass = { match:'badge-match', missing:'badge-missing', extra:'badge-extra' };
  document.getElementById('tbody').innerHTML = rows.map(r => {
    const diffStr = r.diff > 0 ? `<span style="color:#ff4444">+${r.diff}</span>` :
                   r.diff < 0 ? `<span style="color:#ffcc00">${r.diff}</span>` :
                   `<span style="color:#00ff88">0</span>`;
    const pdfSess = Object.entries(r.pdfSessions).map(([s,c])=>`${s}(${c})`).join('<br>');
    const atSess = Object.entries(r.atSessions).map(([s,c])=>`${s}(${c})`).join('<br>');
    return `<tr class="${r.status}">
      <td><b>${r.date}</b></td>
      <td class="num">${r.pdfCount||'—'}</td>
      <td class="num">${r.atCount||'—'}</td>
      <td class="num">${diffStr}</td>
      <td><span class="badge ${badgeClass[r.status]}">${labels[r.status]}</span></td>
      <td><div class="sessions">${pdfSess||'—'}</div></td>
      <td><div class="sessions">${atSess||'—'}</div></td>
    </tr>`;
  }).join('');
}

function downloadMissing() {
  const missDates = new Set(diffData.filter(r=>r.status==='missing').map(r=>r.date));
  const out = pdfSets.filter(s=>missDates.has(s.date));
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='missing_sets.json'; a.click();
  document.getElementById('dlStatus').textContent = `Downloaded ${out.length} sets`;
}

main();
</script>
</body>
</html>
