<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Diff — PDF vs Airtable</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0a0a0f; color: #e0e0e0; padding: 20px; }
  h1 { font-size: 18px; color: #00ff88; margin-bottom: 4px; letter-spacing: 2px; text-transform: uppercase; }
  .sub { font-size: 11px; color: #666; margin-bottom: 20px; }
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #111; border: 1px solid #222; padding: 12px 16px; border-radius: 4px; min-width: 140px; }
  .stat-val { font-size: 24px; font-weight: bold; }
  .stat-lbl { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-val.green { color: #00ff88; }
  .stat-val.red { color: #ff4444; }
  .stat-val.yellow { color: #ffcc00; }
  .stat-val.blue { color: #4488ff; }
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-btn { background: #111; border: 1px solid #333; color: #888; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { background: #1a2a1a; border-color: #00ff88; color: #00ff88; }
  .filter-btn.red-btn.active { background: #2a1a1a; border-color: #ff4444; color: #ff4444; }
  .filter-btn.yellow-btn.active { background: #2a2a1a; border-color: #ffcc00; color: #ffcc00; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: #111; color: #666; padding: 8px 10px; text-align: left; font-weight: normal; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; border-bottom: 1px solid #222; position: sticky; top: 0; }
  td { padding: 7px 10px; border-bottom: 1px solid #181818; vertical-align: top; }
  tr:hover td { background: #0f0f18; }
  .match { color: #00ff88; }
  .missing { color: #ff4444; background: rgba(255,68,68,0.04); }
  .extra { color: #ffcc00; background: rgba(255,204,0,0.04); }
  .diff { color: #ff8844; background: rgba(255,136,68,0.04); }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .badge-match { background: #003322; color: #00ff88; }
  .badge-missing { background: #330000; color: #ff4444; }
  .badge-extra { background: #333300; color: #ffcc00; }
  .badge-diff { background: #2a1500; color: #ff8844; }
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .sessions { font-size: 10px; color: #555; margin-top: 3px; }
  #loading { text-align: center; padding: 60px; color: #444; }
  .progress { margin-top: 8px; font-size: 11px; color: #555; }
  .search { background: #111; border: 1px solid #333; color: #e0e0e0; padding: 7px 12px; border-radius: 4px; font-family: inherit; font-size: 12px; width: 200px; }
  .search:focus { outline: none; border-color: #00ff88; }
  #tableWrap { max-height: calc(100vh - 280px); overflow-y: auto; border: 1px solid #1a1a1a; border-radius: 4px; }
  .action-bar { display: flex; gap: 10px; margin-top: 16px; align-items: center; }
  .btn { background: #00ff88; color: #000; border: none; padding: 8px 18px; border-radius: 4px; font-family: inherit; font-size: 12px; font-weight: bold; cursor: pointer; letter-spacing: 1px; }
  .btn:hover { background: #00cc66; }
  .btn.secondary { background: #111; color: #888; border: 1px solid #333; }
  .btn.secondary:hover { color: #e0e0e0; border-color: #666; }
  .error { color: #ff4444; font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
<h1>⚡ Workout Diff</h1>
<div class="sub">PDF extraction vs Airtable — count-based by date</div>

<div id="loading">
  <div style="color:#00ff88;font-size:14px;">Loading data...</div>
  <div class="progress" id="loadMsg">Fetching extracted sets from GitHub...</div>
</div>

<div id="app" style="display:none;">
  <div class="stats" id="statsBar"></div>
  <div class="filters">
    <span style="font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;">Filter:</span>
    <button class="filter-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn red-btn" onclick="setFilter('missing')">PDF > AT (missing)</button>
    <button class="filter-btn yellow-btn" onclick="setFilter('extra')">AT > PDF (extra)</button>
    <button class="filter-btn" onclick="setFilter('match')">Match</button>
    <input class="search" type="text" placeholder="Filter by date..." id="dateSearch" oninput="renderTable()">
  </div>
  <div id="tableWrap">
    <table>
      <thead><tr>
        <th>Date</th>
        <th class="num">PDF Sets</th>
        <th class="num">AT Sets</th>
        <th class="num">Diff</th>
        <th>Status</th>
        <th>PDF Sessions</th>
        <th>AT Sessions</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="action-bar">
    <button class="btn" onclick="downloadMissing()">⬇ Download Missing Sets JSON</button>
    <span id="actionStatus" style="font-size:11px;color:#666;"></span>
  </div>
  <div class="error" id="err"></div>
</div>

<script>
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE = 'appmHDG4TGT1xy6R6';
const AT_TABLE = 'tblKDqjy5RzqaJvjr'; // Sets
const EXTRACTED_URL = 'https://raw.githubusercontent.com/mikeblack001/health-protocol/main/extract_progress.json';

let diffData = [];
let currentFilter = 'all';
let extractedByDate = {};
let atByDate = {};
let allExtractedSets = [];

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTable();
}

async function fetchAllAT() {
  let records = [];
  let offset = null;
  let page = 0;
  do {
    const url = new URL(`https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`);
    url.searchParams.set('pageSize', '100');
    url.searchParams.set('returnFieldsByFieldId', 'true');
    url.searchParams.set('fields[]', 'fld75zYXknF0RtCWH');
    url.searchParams.set('fields[]', 'fldBChNmPkNg61oTN');
    url.searchParams.set('fields[]', 'fldZ93A1t7fGjjsSS');
    url.searchParams.set('fields[]', 'fldNm9Ao0rmcwwDXo');
    if (offset) url.searchParams.set('offset', offset);
    const r = await fetch(url, { headers: { Authorization: `Bearer ${AT_TOKEN}` } });
    const j = await r.json();
    if (j.error) throw new Error(j.error.message || JSON.stringify(j.error));
    records.push(...(j.records || []));
    offset = j.offset;
    page++;
    document.getElementById('loadMsg').textContent = `Fetching AT records... ${records.length} so far`;
  } while (offset);
  return records;
}

function buildStats(extracted, at) {
  const allDates = new Set([...Object.keys(extracted), ...Object.keys(at)]);
  const rows = [];
  for (const date of [...allDates].sort()) {
    if (date < '2024-10-28') continue;
    const pdfCount = extracted[date] ? extracted[date].count : 0;
    const atCount = at[date] || 0;
    const diff = pdfCount - atCount;
    let status = 'match';
    if (pdfCount === 0 && atCount > 0) status = 'extra';
    else if (atCount === 0 && pdfCount > 0) status = 'missing';
    else if (diff > 0) status = 'missing';
    else if (diff < 0) status = 'extra';
    rows.push({ date, pdfCount, atCount, diff, status,
      pdfSessions: extracted[date] ? extracted[date].sessions : {},
      atSessions: at[date + '_sessions'] || {} });
  }
  return rows;
}

function renderStats() {
  const match = diffData.filter(r => r.status === 'match').length;
  const missing = diffData.filter(r => r.status === 'missing').length;
  const extra = diffData.filter(r => r.status === 'extra').length;
  const missSets = diffData.filter(r => r.status === 'missing').reduce((a,b)=>a+b.diff,0);
  const extSets = diffData.filter(r => r.status === 'extra').reduce((a,b)=>a+Math.abs(b.diff),0);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="stat-val blue">${diffData.length}</div><div class="stat-lbl">Dates Compared</div></div>
    <div class="stat"><div class="stat-val green">${match}</div><div class="stat-lbl">Matching Dates</div></div>
    <div class="stat"><div class="stat-val red">${missing} dates<br><small style="font-size:14px;">${missSets} sets</small></div><div class="stat-lbl">PDF > AT (need push)</div></div>
    <div class="stat"><div class="stat-val yellow">${extra} dates<br><small style="font-size:14px;">${extSets} sets</small></div><div class="stat-lbl">AT > PDF (extra)</div></div>
    <div class="stat"><div class="stat-val blue">${Object.values(extractedByDate).reduce((a,b)=>a+b.count,0)}</div><div class="stat-lbl">Total PDF Sets</div></div>
    <div class="stat"><div class="stat-val blue">${Object.values(atByDate).reduce((a,b)=>a+b,0)}</div><div class="stat-lbl">Total AT Sets</div></div>
  `;
}

function renderTable() {
  const search = document.getElementById('dateSearch').value.toLowerCase();
  const rows = diffData.filter(r => {
    if (search && !r.date.includes(search)) return false;
    if (currentFilter === 'all') return true;
    return r.status === currentFilter;
  });
  const tb = document.getElementById('tbody');
  tb.innerHTML = rows.map(r => {
    const badgeClass = { match:'badge-match', missing:'badge-missing', extra:'badge-extra', diff:'badge-diff' }[r.status] || 'badge-diff';
    const label = { match:'MATCH', missing:'PDF>AT', extra:'AT>PDF' }[r.status] || r.status;
    const diffStr = r.diff > 0 ? `+${r.diff}` : r.diff;
    const rowClass = r.status !== 'match' ? r.status : '';
    const pdfSessHtml = Object.entries(r.pdfSessions).map(([s,c])=>`${s}(${c})`).join(', ');
    const atSessHtml = Object.entries(r.atSessions).map(([s,c])=>`${s}(${c})`).join(', ');
    return `<tr class="${rowClass}">
      <td><b>${r.date}</b></td>
      <td class="num">${r.pdfCount}</td>
      <td class="num">${r.atCount}</td>
      <td class="num" style="font-weight:bold;">${diffStr}</td>
      <td><span class="badge ${badgeClass}">${label}</span></td>
      <td><div class="sessions">${pdfSessHtml || '—'}</div></td>
      <td><div class="sessions">${atSessHtml || '—'}</div></td>
    </tr>`;
  }).join('');
}

function downloadMissing() {
  const missingDates = new Set(diffData.filter(r => r.status === 'missing').map(r => r.date));
  const missingSets = allExtractedSets.filter(s => missingDates.has(s.date));
  const blob = new Blob([JSON.stringify(missingSets, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'missing_sets.json';
  a.click();
  document.getElementById('actionStatus').textContent = `Downloaded ${missingSets.length} missing sets`;
}

async function main() {
  try {
    // 1. Load extracted JSON
    document.getElementById('loadMsg').textContent = 'Fetching extracted sets from GitHub...';
    const r1 = await fetch(EXTRACTED_URL + '?t=' + Date.now());
    const extracted = await r1.json();
    allExtractedSets = (extracted.all_sets || []).filter(s => s.date >= '2024-10-28');
    
    // Build extractedByDate
    for (const s of allExtractedSets) {
      if (!extractedByDate[s.date]) extractedByDate[s.date] = { count: 0, sessions: {} };
      extractedByDate[s.date].count++;
      const sess = s.session || s.date;
      extractedByDate[s.date].sessions[sess] = (extractedByDate[s.date].sessions[sess] || 0) + 1;
    }

    // 2. Fetch AT sets
    document.getElementById('loadMsg').textContent = 'Fetching Airtable sets (this takes ~30s)...';
    const atRecords = await fetchAllAT();
    
    // Build atByDate
    const atSessions = {};
    for (const rec of atRecords) {
      const date = rec.fields['fld75zYXknF0RtCWH'];
      const sess = rec.fields['fldBChNmPkNg61oTN'] || date;
      if (!date || date < '2024-10-28') continue;
      atByDate[date] = (atByDate[date] || 0) + 1;
      if (!atSessions[date]) atSessions[date] = {};
      atSessions[date][sess] = (atSessions[date][sess] || 0) + 1;
    }
    // Attach session info to atByDate structure
    for (const [date, sessions] of Object.entries(atSessions)) {
      atByDate[date + '_sessions'] = sessions;
    }

    // 3. Build diff
    diffData = buildStats(extractedByDate, atByDate);

    // 4. Render
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderStats();
    renderTable();

  } catch(e) {
    document.getElementById('loadMsg').textContent = 'Error: ' + e.message;
    document.getElementById('err').textContent = e.stack || e.message;
    console.error(e);
  }
}

main();
</script>
</body>
</html>
