<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AT Comparison Tables Setup</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: monospace; background: #f0f0f0; padding: 20px; color: #222; max-width: 860px; margin: 0 auto; }
  h1 { font-size: 18px; margin-bottom: 4px; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
  .log { background: #1a1a1a; color: #eee; border-radius: 4px; padding: 12px; max-height: 360px; overflow-y: auto; font-size: 12px; font-family: monospace; }
  .ok { color: #4caf50; }
  .err { color: #f44336; }
  .info { color: #aaa; }
  .warn { color: #ff9800; }
  input[type=password] { padding: 8px 10px; width: 100%; font-family: monospace; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-bottom: 8px; }
  button { padding: 8px 18px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .phase { display: none; }
  .phase.active { display: block; }
  .summary { font-weight: bold; padding: 8px 0; font-size: 13px; }
</style>
</head>
<body>
<h1>AT Comparison Tables Setup</h1>

<div id="phaseCreate" class="card phase active">
  <b>Phase 1 — Create Tables</b>
  <div class="log" id="log1"></div>
  <div class="summary" id="sum1"></div>
</div>

<div id="phaseData" class="card phase">
  <b>Phase 2 — Populate Sets_PDFExtract</b>
  <p style="font-size:12px;margin:8px 0">GitHub token (repo read):</p>
  <input type="password" id="ghToken" placeholder="ghp_..." />
  <button id="btnGo" onclick="startPhase2()">Fetch & Push</button>
  <div class="log" id="log2" style="margin-top:10px"></div>
  <div class="summary" id="sum2"></div>
</div>

<script>
const AT = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE = 'appmHDG4TGT1xy6R6';
const REPO = 'mikeblack001/health-protocol';

const SETS_FIELDS = [
  { name: 'SetID', type: 'singleLineText' },
  { name: 'Date', type: 'date', options: { dateFormat: { name: 'iso' } } },
  { name: 'Session', type: 'singleLineText' },
  { name: 'PDF_Exercise_Name', type: 'singleLineText' },
  { name: 'Exercise', type: 'singleLineText' },
  { name: 'Variation', type: 'singleLineText' },
  { name: 'Set#', type: 'number', options: { precision: 0 } },
  { name: 'Reps', type: 'number', options: { precision: 0 } },
  { name: 'Weight', type: 'number', options: { precision: 1 } },
  { name: 'Day', type: 'singleLineText' },
  { name: 'Notes', type: 'multilineText' }
];

const INJ_FIELDS = [
  { name: 'Name', type: 'singleLineText' },
  { name: 'Date', type: 'date', options: { dateFormat: { name: 'iso' } } },
  { name: 'Compound', type: 'singleLineText' },
  { name: 'Dose', type: 'singleLineText' },
  { name: 'Unit', type: 'singleLineText' },
  { name: 'Site', type: 'singleLineText' },
  { name: 'Timing', type: 'singleLineText' },
  { name: 'Status', type: 'singleLineText' },
  { name: 'Notes', type: 'multilineText' }
];

const TABLES = [
  { name: 'Sets_PDFExtract', desc: 'Workout sets from PDF extraction. PDF_Exercise_Name = raw name. Exercise = canonical.', fields: SETS_FIELDS },
  { name: 'Sets_Parseur', desc: 'Workout sets from Parseur. Empty until Parseur data provided.', fields: SETS_FIELDS },
  { name: 'InjectionLog_PDFExtract', desc: 'Injection log from Injections.pdf. Populated separately.', fields: INJ_FIELDS },
  { name: 'InjectionLog_Parseur', desc: 'Injection log from Parseur. Empty until Parseur data provided.', fields: INJ_FIELDS }
];

const tableIds = {};

function log(id, msg, cls='info') {
  const el = document.getElementById(id);
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function atReq(method, path, body) {
  const opts = { method, headers: { 'Authorization': `Bearer ${AT}`, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`https://api.airtable.com${path}`, opts);
  const json = await r.json();
  return { ok: r.ok, status: r.status, data: json };
}

async function createTables() {
  log('log1', 'Creating 4 tables via AT Metadata API...', 'info');
  let ok = 0, skip = 0, fail = 0;

  for (const tbl of TABLES) {
    log('log1', `→ ${tbl.name}...`, 'info');
    const res = await atReq('POST', `/v0/meta/bases/${BASE}/tables`, {
      name: tbl.name, description: tbl.desc, fields: tbl.fields
    });

    if (res.ok && res.data.id) {
      tableIds[tbl.name] = res.data.id;
      log('log1', `  ✓ created: ${res.data.id}`, 'ok');
      ok++;
    } else if (res.data.error === 'DUPLICATE_TABLE_NAME') {
      log('log1', `  ⚠ already exists — fetching ID`, 'warn');
      skip++;
    } else {
      log('log1', `  ✗ ${JSON.stringify(res.data)}`, 'err');
      fail++;
    }
    await sleep(300);
  }

  // Fetch IDs for any skipped (already existing) tables
  if (skip > 0 || Object.keys(tableIds).length < TABLES.length) {
    const listRes = await atReq('GET', `/v0/meta/bases/${BASE}/tables`);
    if (listRes.ok) {
      for (const t of (listRes.data.tables || [])) {
        if (TABLES.find(x => x.name === t.name)) tableIds[t.name] = t.id;
      }
    }
  }

  log('log1', `Done — Created: ${ok} | Skipped: ${skip} | Failed: ${fail}`, fail > 0 ? 'warn' : 'ok');
  log('log1', `Table IDs: ${JSON.stringify(tableIds)}`, 'info');
  document.getElementById('sum1').textContent = `Created: ${ok} | Skipped: ${skip} | Failed: ${fail}`;
  document.getElementById('phaseData').className = 'card phase active';
}

async function startPhase2() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) { alert('Paste GH token'); return; }
  document.getElementById('btnGo').disabled = true;
  await fetchAndPush(token);
  document.getElementById('btnGo').disabled = false;
}

async function fetchAndPush(ghToken) {
  log('log2', 'Fetching extract_progress.json from GitHub...', 'info');
  let rawSets = [];

  try {
    const r = await fetch(
      `https://api.github.com/repos/${REPO}/contents/extract_progress.json`,
      { headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3.raw' } }
    );
    if (!r.ok) throw new Error(`GitHub ${r.status}: ${r.statusText}`);
    const data = await r.json();
    rawSets = Array.isArray(data) ? data : (data.all_sets || data.sets || []);
    log('log2', `Fetched ${rawSets.length} raw sets`, 'info');

    // Show first record to confirm structure
    if (rawSets.length > 0) log('log2', `Sample keys: ${Object.keys(rawSets[0]).join(', ')}`, 'info');
  } catch(e) {
    log('log2', `✗ GitHub fetch: ${e.message}`, 'err');
    return;
  }

  const valid = rawSets.filter(s => {
    const d = String(s.date || s.Date || '');
    const reps = parseInt(s.reps || s.Reps || 0);
    return d >= '2024-10-28' && reps > 0;
  });
  log('log2', `${valid.length} valid sets (>= 2024-10-28, reps > 0)`, 'info');

  const tblId = tableIds['Sets_PDFExtract'];
  if (!tblId) { log('log2', '✗ No table ID for Sets_PDFExtract — Phase 1 may have failed', 'err'); return; }
  log('log2', `Pushing to table ${tblId}`, 'info');

  // Map records — only include fields with real values
  function makeRecord(s) {
    const date = String(s.date || s.Date || '').trim();
    const day = String(s.day || s.Day || '').trim();
    const exercise = String(s.exercise || s.Exercise || '').trim();
    const variation = String(s.variation || s.Variation || '').trim();
    const setNum = parseInt(s.set_num || s['Set#'] || s.setNum || 1);
    const reps = parseInt(s.reps || s.Reps || 0);
    const weight = parseFloat(s.weight || s.Weight || 0);
    const notes = String(s.notes || s.Notes || '').trim();
    const abbrev = exercise.replace(/[^A-Za-z0-9]/g, '').substring(0, 6).toUpperCase() || 'UNK';
    const setId = `${date}-${abbrev}-${setNum}`;

    const fields = {
      SetID: setId,
      Session: `${date} ${day}`.trim(),
      PDF_Exercise_Name: exercise,
      Exercise: exercise,
      'Set#': setNum,
      Reps: reps
    };
    if (date) fields.Date = date;
    if (variation) fields.Variation = variation;
    if (weight > 0) fields.Weight = weight;
    if (day) fields.Day = day;
    if (notes) fields.Notes = notes;
    return { fields };
  }

  const records = valid.map(makeRecord);
  let pushed = 0, errors = 0;

  for (let i = 0; i < records.length; i += 50) {
    const batch = records.slice(i, i + 50);
    const res = await atReq('POST', `/v0/${BASE}/${tblId}`, { records: batch, typecast: true });
    if (res.ok && res.data.records) {
      pushed += res.data.records.length;
    } else {
      errors++;
      // Log real error detail
      const errMsg = res.data.error
        ? `${res.data.error}: ${res.data.message || ''}`
        : JSON.stringify(res.data).substring(0, 200);
      if (errors <= 3) log('log2', `Batch ${Math.floor(i/50)+1} error (HTTP ${res.status}): ${errMsg}`, 'err');
      if (errors === 3) log('log2', '(suppressing further batch errors...)', 'warn');
      // Rate limit — back off
      if (res.status === 429) { log('log2', 'Rate limited — waiting 30s...', 'warn'); await sleep(30000); }
    }
    if ((i + 50) % 500 === 0) log('log2', `  ${pushed} pushed, ${errors} errors so far...`, 'info');
    await sleep(150);
  }

  const msg = `✓ DONE — Pushed: ${pushed}/${valid.length} | Errors: ${errors}`;
  log('log2', msg, errors === 0 ? 'ok' : 'warn');
  document.getElementById('sum2').textContent = msg;
}

window.addEventListener('load', createTables);
</script>
</body>
</html>
