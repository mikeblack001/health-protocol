<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sets_PDFExtract Dedup</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px;margin:0;}.ok{color:#4caf50}.err{color:#f44336}.info{color:#aaa}.warn{color:#ff9800}#log{font-size:13px;line-height:1.6;}</style>
</head><body><div id="log"></div>
<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const TABLE='tbltiBtgBAIcKEjRu';
const SETID_FIELD='fld11inoyzB0OU3qM';

function log(m,c){const e=document.getElementById('log');const d=document.createElement('div');d.className=c||'info';d.textContent='['+new Date().toLocaleTimeString()+'] '+m;e.appendChild(d);e.scrollTop=e.scrollHeight;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function fetchAll(){
  log('Fetching all records...','info');
  let all=[],cursor=null;
  while(true){
    let url='https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?pageSize=100&fields[]='+SETID_FIELD;
    if(cursor) url+='&offset='+cursor;
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+AT}});
    const data=await r.json();
    all=all.concat(data.records||[]);
    if(all.length%1000===0) log('Fetched '+all.length+'...','info');
    if(!data.offset) break;
    cursor=data.offset;
    await sleep(100);
  }
  log('Total fetched: '+all.length,'info');
  return all;
}

async function run(){
  const records=await fetchAll();

  // Find duplicates — keep first occurrence per SetID, mark rest for deletion
  const seen=new Map();
  const toDelete=[];
  for(const r of records){
    const sid=(r.cellValuesByFieldId||{})[SETID_FIELD]||'';
    if(!seen.has(sid)){seen.set(sid,r.id);}
    else{toDelete.push(r.id);}
  }
  log('Unique SetIDs: '+seen.size,'ok');
  log('Duplicate records to delete: '+toDelete.length,'warn');

  if(toDelete.length===0){log('No duplicates found.','ok');return;}

  // Delete in batches of 10
  let deleted=0,errors=0;
  for(let i=0;i<toDelete.length;i+=10){
    const batch=toDelete.slice(i,i+10);
    const qs=batch.map(id=>'records[]='+id).join('&');
    const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?'+qs,{method:'DELETE',headers:{'Authorization':'Bearer '+AT}});
    const data=await r.json();
    if(r.ok&&data.records){deleted+=data.records.length;}
    else{errors++;if(errors<=3)log('Delete error: '+JSON.stringify(data).substring(0,100),'err');}
    if(i%200===0&&i>0) log(deleted+' deleted so far...','info');
    await sleep(100);
  }
  log('DONE — Deleted: '+deleted+' duplicates | Errors: '+errors,errors===0?'ok':'warn');
  log('Sets_PDFExtract should now have ~'+(records.length-deleted)+' records','ok');
}
window.addEventListener('load',run);
</script></body></html>
