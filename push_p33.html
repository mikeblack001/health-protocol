<script>
const BASE  = 'appmHDG4TGT1xy6R6';

const SETS_TBL = 'tblKDqjy5RzqaJvjr';

// Sessions fields
const SS = 'fldtyX5g2302mdKRM'; // Session

// Sets fields
const FID = 'fld4hUpEzC9IqN0xh'; // SetID
const FDT = 'fld75zYXknF0RtCWH'; // Date
const FSS = 'fldBChNmPkNg61oTN'; // Session
const FEX = 'fldZ93A1t7fGjjsSS'; // Exercise
const FVR = 'fld2TZdmCOloH0gAK'; // Variation
const FNM = 'fldNm9Ao0rmcwwDXo'; // Set#
const FRP = 'fldelUngWHRTm48m1'; // Reps
const FWT = 'fldmrbBmfgSMtREMt'; // Weight
const FDY = 'fldypzlwqw9AzWrEE'; // Day

const sessions = [
  { [SS]: '2025-02-19 LEGS', [SD]: '2025-02-19', [SY]: 'LEGS' },
  { [SS]: '2025-02-20 SHLD', [SD]: '2025-02-20', [SY]: 'SHLD' },
];

function s(date, sess, day, ex, vari, num, reps, wt) {
  const abbr = ex.replace(/[^A-Za-z0-9]/g,'').substring(0,12).toUpperCase();
  const vabbr = vari.replace(/[^A-Za-z0-9]/g,'').substring(0,6).toUpperCase();
  return {
    [FID]: `${date}-${abbr}${vabbr ? '-'+vabbr : ''}-${num}`,
    [FDT]: date, [FSS]: sess, [FEX]: ex, [FVR]: vari,
    [FNM]: num, [FRP]: reps, [FWT]: wt, [FDY]: day
  };
}

const LD = '2025-02-19', LS = '2025-02-19 LEGS', LY = 'LEGS';
const SD2 = '2025-02-20', SS2 = '2025-02-20 SHLD', SY2 = 'SHLD';

const allSets = [
  // ─── LEGS 2/19 ───
  s(LD,LS,LY,'Cable Hip Abduction','Cable',1,25,50),
  s(LD,LS,LY,'Cable Hip Abduction','Cable',2,25,50),
  s(LD,LS,LY,'Cable Hip Abduction','Cable',3,25,50),
  s(LD,LS,LY,'Cable Glute Kickback','Cable',1,25,80),
  s(LD,LS,LY,'Cable Glute Kickback','Cable',2,25,80),
  s(LD,LS,LY,'Cable Glute Kickback','Cable',3,25,80),
  s(LD,LS,LY,'Cable Hip Adduction','Cable',1,25,40),
  s(LD,LS,LY,'Cable Hip Adduction','Cable',2,25,40),
  s(LD,LS,LY,'Cable Hip Adduction','Cable',3,25,40),
  s(LD,LS,LY,'Squat','DBs',1,20,50),
  s(LD,LS,LY,'Squat','DBs',2,20,50),
  s(LD,LS,LY,'Squat','DBs',3,20,50),
  s(LD,LS,LY,'Leg Curls','Lat Machine',1,25,30),
  s(LD,LS,LY,'Leg Curls','Lat Machine',2,25,30),
  s(LD,LS,LY,'Leg Curls','Lat Machine',3,25,30),
  s(LD,LS,LY,'Leg Extensions','Lat Machine',1,25,80),
  s(LD,LS,LY,'Leg Extensions','Lat Machine',2,25,80),
  s(LD,LS,LY,'Leg Extensions','Lat Machine',3,25,80),
  s(LD,LS,LY,'Leg Press','Smith Machine',1,25,140),
  s(LD,LS,LY,'Leg Press','Smith Machine',2,25,140),
  s(LD,LS,LY,'Leg Press','Smith Machine',3,25,140),
  s(LD,LS,LY,'DB Calf Raises','DBs',1,60,55),
  s(LD,LS,LY,'DB Calf Raises','DBs',2,60,55),
  s(LD,LS,LY,'DB Calf Raises','DBs',3,60,55),
  s(LD,LS,LY,'EZ Curl','EZ-Bar',1,20,65),
  s(LD,LS,LY,'EZ Curl','EZ-Bar',2,20,65),
  s(LD,LS,LY,'EZ Curl','EZ-Bar',3,25,65),
  s(LD,LS,LY,'Cable Calf Raises','Cable',1,50,180),
  s(LD,LS,LY,'Cable Calf Raises','Cable',2,50,238),
  s(LD,LS,LY,'Cable Calf Raises','Cable',3,50,258),
  // ─── SHLD 2/20 ───
  s(SD2,SS2,SY2,'Shoulder Press','DBs',1,25,35),
  s(SD2,SS2,SY2,'Shoulder Press','DBs',2,19,35),
  s(SD2,SS2,SY2,'Shoulder Press','DBs',3,19,35),
  s(SD2,SS2,SY2,'Wide Press Down','Cable',1,25,100),
  s(SD2,SS2,SY2,'Wide Press Down','Cable',2,20,120),
  s(SD2,SS2,SY2,'Wide Press Down','Cable',3,10,140),
  s(SD2,SS2,SY2,'2 Hand Cross','Cable',1,25,40),
  s(SD2,SS2,SY2,'2 Hand Cross','Cable',2,25,60),
  s(SD2,SS2,SY2,'2 Hand Cross','Cable',3,20,70),
  s(SD2,SS2,SY2,'Back n Forth','DBs',1,25,20),
  s(SD2,SS2,SY2,'Back n Forth','DBs',2,25,25),
  s(SD2,SS2,SY2,'Back n Forth','DBs',3,15,30),
  s(SD2,SS2,SY2,'Shoulder Press','Cable',1,20,80),
  s(SD2,SS2,SY2,'Shoulder Press','Cable',2,20,90),
  s(SD2,SS2,SY2,'Shoulder Press','Cable',3,15,100),
  s(SD2,SS2,SY2,'Face Pulls','Cable',1,25,140),
  s(SD2,SS2,SY2,'Face Pulls','Cable',2,25,180),
  s(SD2,SS2,SY2,'Face Pulls','Cable',3,20,200),
  s(SD2,SS2,SY2,'1 Arm Raise','Cable',1,25,20),
  s(SD2,SS2,SY2,'1 Arm Raise','Cable',2,25,20),
  s(SD2,SS2,SY2,'1 Arm Raise','Cable',3,25,20),
  s(SD2,SS2,SY2,'EZ Curl Raise','EZ-Bar',1,25,65),
  s(SD2,SS2,SY2,'EZ Curl Raise','EZ-Bar',2,25,65),
  s(SD2,SS2,SY2,'EZ Curl Raise','EZ-Bar',3,25,65),
  s(SD2,SS2,SY2,'Shoulder Shrug','DBs',1,50,55),
  s(SD2,SS2,SY2,'Shoulder Shrug','DBs',2,50,55),
  s(SD2,SS2,SY2,'Shoulder Shrug','DBs',3,50,55),
  s(SD2,SS2,SY2,'Raise Up Bar','Cable',1,25,30),
  s(SD2,SS2,SY2,'Raise Up Bar','Cable',2,25,30),
  s(SD2,SS2,SY2,'Raise Up Bar','Cable',3,25,36),
  s(SD2,SS2,SY2,'Shoulder Shrug','Cable',1,50,200),
  s(SD2,SS2,SY2,'Shoulder Shrug','Cable',2,50,238),
  s(SD2,SS2,SY2,'Shoulder Shrug','Cable',3,50,258),
];

const TOTAL = sessions.length + allSets.length;
let pushed = 0;

function log(msg, cls='info') {
  const d = document.getElementById('log');
  const el = document.createElement('div');
  el.className = cls; el.textContent = msg;
  d.appendChild(el); d.scrollTop = d.scrollHeight;
}
function setBar(pct) { document.getElementById('bar').style.width = pct + '%'; }
function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function push(table, records) {
  const res = await fetch(`https://api.airtable.com/v0/${BASE}/${table}`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ records: records.map(f => ({ fields: f })), typecast: true })
  });
  return res.json();
}

async function run() {
  document.getElementById('runBtn').disabled = true;
  pushed = 0;

  // Sessions
  setStatus('Pushing 2 sessions...');
  const sr = await push(SESS_TBL, sessions);
  if (sr.records) {
    pushed += sr.records.length;
    log(`✓ Sessions: ${sr.records.length} created`, 'ok');
  } else {
    log(`✗ Sessions FAILED: ${JSON.stringify(sr.error||sr)}`, 'err');
  }
  setBar(Math.round(pushed/TOTAL*100));

  // Sets in batches of 10
  for (let i = 0; i < allSets.length; i += 10) {
    const batch = allSets.slice(i, i+10);
    setStatus(`Pushing sets ${i+1}–${Math.min(i+10, allSets.length)} of ${allSets.length}...`);
    const r = await push(SETS_TBL, batch);
    if (r.records) {
      pushed += r.records.length;
      log(`✓ Sets ${i+1}–${i+r.records.length} OK`, 'ok');
    } else {
      log(`✗ Sets batch ${i+1} FAILED: ${JSON.stringify(r.error||r)}`, 'err');
      break;
    }
    setBar(Math.round(pushed/TOTAL*100));
    await new Promise(res => setTimeout(res, 200));
  }

  setStatus(`Done — ${pushed}/${TOTAL} records pushed.`);
  setBar(100);
  document.getElementById('runBtn').disabled = false;
}
</script>
