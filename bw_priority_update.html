function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

async function fetchAll() {
  let records = [], offset = null;
  do {
    let url = `https://api.airtable.com/v0/${BASE}/${TABLE}?fields[]=Biomarker&pageSize=100`;
    if (offset) url += '&offset=' + offset;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` }});
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    records.push(...(d.records||[]));
    offset = d.offset;
  } while(offset);
  return records;
}

async function runUpdate() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';
  document.getElementById('status').textContent = 'Fetching...';
  try {
    const all = await fetchAll();
    log(`Fetched ${all.length} records`);
    const toUpdate = [], unmapped = new Set();
    all.forEach(r => {
      const b = r.fields['Biomarker'];
      const m = MAP[b];
      if (!m) { unmapped.add(b); return; }
      toUpdate.push({ id: r.id, fields: { [PRIORITY_FLD]: m.priority, [GROUP_FLD]: m.group }});
    });
    if (unmapped.size) log(`Still unmapped (${unmapped.size}): ${[...unmapped].join(', ')}`);
    log(`Updating ${toUpdate.length} records in batches of 25...`);
    for (let i = 0; i < toUpdate.length; i += 25) {
      const batch = toUpdate.slice(i, i+25);
      const r = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ records: batch })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      log(`Batch done: ${i+1}–${Math.min(i+25,toUpdate.length)}`);
    }
    document.getElementById('status').textContent = `✓ Done — ${toUpdate.length} updated, ${unmapped.size} still unmapped`;
    log('All done.');
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
    log('Error: ' + e.message);
  }
  btn.disabled = false;
}
