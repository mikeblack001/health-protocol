<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sets_PDFExtract Full Push</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:20px;margin:0;}
.ok{color:#4caf50}.err{color:#f44336}.info{color:#aaa}.warn{color:#ff9800}
#log{font-size:13px;line-height:1.6;}
</style></head><body>
<div id="log"></div>
<script>
const AT = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE = 'appmHDG4TGT1xy6R6';
const TABLE = 'tbltiBtgBAIcKEjRu';

function log(msg,cls){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className=cls||'info';
  d.textContent='['+new Date().toLocaleTimeString()+'] '+msg;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function atGet(path){
  const r=await fetch('https://api.airtable.com'+path,{headers:{'Authorization':'Bearer '+AT}});
  return r.json();
}
async function atPost(path,body){
  const r=await fetch('https://api.airtable.com'+path,{method:'POST',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify(body)});
  return{ok:r.ok,status:r.status,data:await r.json()};
}
async function atDelete(path,ids){
  const qs=ids.map(id=>'records[]='+id).join('&');
  const r=await fetch('https://api.airtable.com'+path+'?'+qs,{method:'DELETE',headers:{'Authorization':'Bearer '+AT}});
  return r.ok;
}

async function addFields(){
  const schema=await atGet('/v0/meta/bases/'+BASE+'/tables');
  const tbl=(schema.tables||[]).find(t=>t.id===TABLE);
  if(!tbl){log('Table not found','err');return;}
  const existing=new Set((tbl.fields||[]).map(f=>f.name));
  for(const [name,type,opts] of [['Source_PDF','singleLineText',null],['Source_Page','number',{precision:0}]]){
    if(!existing.has(name)){
      await fetch('https://api.airtable.com/v0/meta/bases/'+BASE+'/tables/'+TABLE+'/fields',{
        method:'POST',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},
        body:JSON.stringify(opts?{name,type,options:opts}:{name,type})
      });
      log('Added field: '+name,'ok');
    }
  }
}

async function clearTable(){
  log('Clearing existing records...','info');
  let deleted=0;
  while(true){
    const res=await atGet('/v0/'+BASE+'/'+TABLE+'?pageSize=50&fields[]=SetID');
    const recs=res.records||[];
    if(!recs.length) break;
    const ids=recs.map(r=>r.id);
    for(let i=0;i<ids.length;i+=10){
      await atDelete('/v0/'+BASE+'/'+TABLE,ids.slice(i,i+10));
      deleted+=Math.min(10,ids.length-i);
      await sleep(100);
    }
    if(!res.offset) break;
    await sleep(200);
  }
  log('Cleared '+deleted+' records','ok');
}

async function pushRecords(records){
  log('Pushing '+records.length+' records...','info');
  let pushed=0,errors=0;
  for(let i=0;i<records.length;i+=25){
    const batch=records.slice(i,i+25);
    const res=await atPost('/v0/'+BASE+'/'+TABLE,{records:batch,typecast:true});
    if(res.ok&&res.data.records){
      pushed+=res.data.records.length;
    } else {
      errors++;
      const msg=res.data.error?(res.data.error.type+': '+res.data.error.message):JSON.stringify(res.data).substring(0,150);
      if(errors<=3) log('Batch '+(Math.floor(i/25)+1)+': '+msg,'err');
      if(res.status===429){log('Rate limited 30s','warn');await sleep(30000);i-=25;continue;}
    }
    if(i%500===0&&i>0) log(pushed+' pushed, '+errors+' errors','info');
    await sleep(150);
  }
  log('DONE — Pushed: '+pushed+'/'+records.length+' | Errors: '+errors,errors===0?'ok':'warn');
}

async function run(){
  log('Loading records from same-domain JSON...','info');
  const r=await fetch('/health-protocol/records_clean.json');
  if(!r.ok){log('Failed to load records: HTTP '+r.status,'err');return;}
  const records=await r.json();
  log('Loaded '+records.length+' records','info');
  await addFields();
  await clearTable();
  await pushRecords(records);
}
window.addEventListener('load',run);
</script></body></html>
