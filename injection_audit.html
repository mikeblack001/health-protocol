<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999}
.spinner{width:36px;height:36px;border:3px solid #e0e3e8;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-msg{font-size:15px;font-weight:600;color:#374151}
#loader-err{color:#dc2626;font-size:13px;max-width:400px;text-align:center}
#loader-retry{padding:8px 20px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}

/* HEADER */
#hdr{background:#fff;border-bottom:2px solid #e0e3e8;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.b-blue{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.b-green{background:#dcfce7;border-color:#86efac;color:#166534}
.b-red{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
.b-amber{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.b-purple{background:#ede9fe;border-color:#c4b5fd;color:#5b21b6}
.b-gray{background:#f3f4f6;border-color:#d1d5db;color:#374151}
#hdr-status{font-size:11px;color:#6b7280;margin-left:auto;white-space:nowrap}

/* DATE NAV */
#dnav{background:#fff;border-bottom:1px solid #e0e3e8;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.nav-btn{padding:5px 12px;border:1px solid #d1d5db;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.nav-btn:hover{background:#f3f4f6}
.nav-btn.primary{background:#2563eb;color:#fff;border-color:#2563eb}
#date-sel{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;min-width:200px}
#match-tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:12px}

/* MAIN LAYOUT */
#main{display:grid;grid-template-columns:380px 1fr;flex:1;overflow:hidden}

/* PDF PANEL */

#pdf-sources label{font-size:11px;font-weight:700;color:#374151;margin-bottom:2px;display:block}
.src-row{display:flex;gap:6px;align-items:center}
.src-row input[type=text]{flex:1;padding:5px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:12px}
.src-row input[type=file]{font-size:11px;flex:1}
.src-btn{padding:5px 10px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;background:#fff}
.src-btn.gdrive{background:#4285f4;color:#fff;border-color:#4285f4}

#pdf-viewer-area{flex:1;overflow-y:auto;background:#e5e7eb;display:flex;align-items:flex-start;justify-content:center;padding:10px}
#pdf-canvas{max-width:100%;border:1px solid #ccc;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#pdf-empty{padding:30px;text-align:center;color:#9ca3af;font-size:12px}
#pdf-nav{display:flex;align-items:center;gap:8px;padding:7px 12px;border-top:1px solid #e0e3e8;background:#f8f9fa;flex-shrink:0}
#pdf-nav button{padding:4px 10px;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;font-size:12px;background:#fff}
#pdf-pg{font-size:11px;color:#6b7280;flex:1;text-align:center}

/* RIGHT PANEL */
#right-panel{display:flex;flex-direction:column;overflow:hidden}

/* TAB BAR */
#tabs{display:flex;background:#fff;border-bottom:2px solid #e0e3e8;flex-shrink:0}
.tab{padding:9px 18px;cursor:pointer;font-weight:700;font-size:12px;border-bottom:3px solid transparent;margin-bottom:-2px;color:#6b7280;white-space:nowrap}
.tab.on{border-bottom-color:#2563eb;color:#2563eb}
.tab:hover{color:#374151}

/* COMPARE VIEW */
#compare-view{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.rec-col{padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.rec-col:first-child{border-right:1px solid #e0e3e8}
.col-hdr{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-shrink:0}
.col-hdr span{background:#f0f2f5;border:1px solid #e0e3e8;border-radius:20px;padding:1px 7px;font-size:10px}

.rcard{background:#fff;border:1px solid #e0e3e8;border-radius:8px;padding:10px;position:relative}
.rcard.at-ok{border-left:4px solid #16a34a}
.rcard.at-diff{border-left:4px solid #d97706}
.rcard.at-miss{border-left:4px solid #dc2626;background:#fff8f8}

.frow{display:flex;gap:6px;margin-bottom:5px;align-items:flex-start}

.card-btns{position:absolute;top:7px;right:7px;display:flex;gap:4px}
.cbtn{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}

.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fgrid.wide{grid-template-columns:1fr}
.fg label{font-size:11px;font-weight:700;color:#374151;display:block;margin-bottom:3px}

.abtn.save{background:#2563eb;border-color:#2563eb;color:#fff}

.abtn.cancel{background:#fff;border-color:#d1d5db;color:#374151}
.abtn.delbtn{background:#fee2e2;border-color:#fca5a5;color:#dc2626}

/* BOTTOM */

#p-file-input{font-size:11px}
.p-drive-row{display:flex;gap:6px;align-items:center}

/* MODAL */

#modal-box h3{font-size:14px;font-weight:700;display:flex;justify-content:space-between}

#date-list{overflow-y:auto;flex:1}
.dli{padding:7px 10px;cursor:pointer;border-bottom:1px solid #f0f2f5;display:flex;align-items:center;gap:8px;font-size:12px}
.dli:hover{background:#f8f9fa}
.dli.cur{background:#dbeafe;font-weight:700}

/* RECENTS DROPDOWN */
.recent-wrap{position:relative;display:inline-block}
.recent-btn{padding:4px 8px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;background:#fff;cursor:pointer;white-space:nowrap}
.recent-btn:hover{background:#f3f4f6}
.recent-menu{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid #e0e3e8;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:50;min-width:260px;max-height:200px;overflow-y:auto;margin-top:2px}
.recent-wrap:hover .recent-menu,.recent-menu:hover{display:block}
.recent-item{padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid #f0f2f5;display:flex;justify-content:space-between;align-items:center;gap:8px}
.recent-item:hover{background:#f8f9fa}
.recent-item .ri-name{font-weight:600;color:#1a1a2e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-item .ri-id{font-size:10px;color:#9ca3af;font-family:monospace}
.recent-item .ri-del{color:#dc2626;font-size:11px;cursor:pointer;padding:0 4px;flex-shrink:0}
.recent-empty{padding:12px;font-size:12px;color:#9ca3af;text-align:center}
</style>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CONFIG ────────────────────────────────────────────────────────────────
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE  = 'appmHDG4TGT1xy6R6';
const AT_TBL   = 'tblBvEaLkGGipnOFc';
const GCL_ID   = '478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const F = {
  name:'fldt9vYT8Tm37Gf3k', date:'fldhYEtLEGA4VxvvO',
  compound:'fldwVFyizH4mBANBa', site:'fldHDlJY8FpAvK018',
  timing:'fldIdzew4Jd0qO4Uc', dose:'fld8d8mtRapfaIyqL',
  notes:'fldAbczu73mINwLmx', status:'fldD9kegiwk6mINV8'
};

// ── STATE ─────────────────────────────────────────────────────────────────
let atRecs=[], atByDate={}, parseurRows=[], parseurByDate={};
let allDates=[], curDate=null, editId=null;
let pdfDoc=null, pdfPage=1;
let gToken=null; // Google OAuth token

// ── AIRTABLE ──────────────────────────────────────────────────────────────
async function atFetch(path, opts={}) {
  const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${path}`, {
    ...opts,
    headers: { 'Authorization':'Bearer '+AT_TOKEN, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });
  if (!r.ok) { const e = await r.json().catch(()=>({error:{message:r.status}})); throw new Error(e.error?.message || r.status); }
  return r.json();
}

async function loadAllAT() {
  let recs=[], offset=null;
  do {
    let url = `${AT_TBL}?pageSize=100`;
    if (offset) url += `&offset=${offset}`;
    const d = await atFetch(url);
    recs = recs.concat(d.records);
    offset = d.offset;
    setHdrStatus(`Loading AT... ${recs.length}`);
  } while(offset);
  return recs;
}

async function loadATSchema() {
  const d = await fetch(`https://api.airtable.com/v0/meta/bases/${AT_BASE}/tables`, {
    headers:{'Authorization':'Bearer '+AT_TOKEN}
  }).then(r=>r.json());
  const tbl = d.tables?.find(t=>t.id===AT_TBL);
  if (!tbl) return;
  const map = {[F.compound]:'ef-compound',[F.site]:'ef-site',[F.timing]:'ef-timing',[F.status]:'ef-status'};
  tbl.fields.forEach(f => {
    const selId = map[f.id];
    if (!selId || !f.options?.choices) return;
    const sel = document.getElementById(selId);
    f.options.choices.forEach(c => {
      const o = document.createElement('option');
      o.value = o.textContent = c.name;
      sel.appendChild(o);
    });
  });
}

function indexAT() {
  atByDate = {};
  atRecs.forEach(r => {
    const d = r.fields[F.date]; if (!d) return;
    (atByDate[d] = atByDate[d]||[]).push(r);
  });
}

async function saveToAT(fields, id=null) {
  const method = id ? 'PATCH' : 'POST';
  const url = id ? `${AT_TBL}/${id}` : AT_TBL;
  return atFetch(url, { method, body: JSON.stringify({fields}) });
}

async function deleteFromAT(id) {
  return atFetch(`${AT_TBL}/${id}`, { method:'DELETE' });
}

// ── GOOGLE DRIVE ──────────────────────────────────────────────────────────
function getGoogleToken(cb) {
  if (gToken) { cb(gToken); return; }
  // Use popup OAuth
  const scope = encodeURIComponent('https://www.googleapis.com/auth/drive.readonly');
  const redirect = encodeURIComponent(location.origin + location.pathname);
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCL_ID}&redirect_uri=${redirect}&response_type=token&scope=${scope}`;
  const w = window.open(url, 'gauth', 'width=500,height=600');
  const check = setInterval(() => {
    try {
      if (w.closed) { clearInterval(check); return; }
      const hash = w.location.hash;
      if (hash && hash.includes('access_token')) {
        clearInterval(check);
        w.close();
        const params = new URLSearchParams(hash.substring(1));
        gToken = params.get('access_token');
        cb(gToken);
      }
    } catch(e) {}
  }, 200);
}

async function fetchDriveFile(fileId, isBinary=false) {
  return new Promise((res, rej) => {
    getGoogleToken(async token => {
      try {
        const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!r.ok) { rej(new Error('Drive fetch failed: ' + r.status)); return; }
        if (isBinary) res(await r.arrayBuffer());
        else res(await r.text());
      } catch(e) { rej(e); }
    });
  });
}

// ── PDF ───────────────────────────────────────────────────────────────────
async function loadPDFLocal(input) {
  const file = input.files[0]; if (!file) return;
  const buf = await file.arrayBuffer();
  await renderPDFFromBuffer(buf);
}


// ── DRIVE RECENTS ─────────────────────────────────────────────────────────
const RECENTS_KEY = 'drive_recents';
function getRecents() { try { return JSON.parse(localStorage.getItem(RECENTS_KEY)||'[]'); } catch(e){return[];} }
function saveRecent(id, name, type) {
  let recents = getRecents().filter(r => r.id !== id);
  recents.unshift({id, name, type, ts: Date.now()});
  if (recents.length > 10) recents = recents.slice(0,10);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
  renderRecents();
}
function removeRecent(id) {
  const recents = getRecents().filter(r => r.id !== id);
  localStorage.setItem(RECENTS_KEY, JSON.stringify(recents));
  renderRecents();
}
function renderRecents() {
  const recents = getRecents();
  ['pdf','p'].forEach(type => {
    const menu = document.getElementById(type+'-recents-menu');
    if (!menu) return;
    const filtered = recents.filter(r => r.type === type || r.type === 'any');
    if (!filtered.length) { menu.innerHTML = '<div class="recent-empty">No saved files yet</div>'; return; }
    menu.innerHTML = filtered.map(r =>
      `<div class="recent-item">
        <span class="ri-name" title="${r.id}">${r.name||r.id}</span>
        <span class="ri-id">${r.id.substring(0,12)}...</span>
        <span class="ri-del" onclick="event.stopPropagation();removeRecent('${r.id}')" title="Remove">✕</span>
        <button class="cbtn edit" style="font-size:10px;padding:2px 6px" onclick="selectRecent('${type}','${r.id}')">Use</button>
      </div>`
    ).join('');
  });
}
function selectRecent(type, id) {
  if (type==='pdf') {
    document.getElementById('pdf-drive-id').value = id;
    loadPDFDrive();
  } else {
    document.getElementById('p-drive-id').value = id;
    loadParseurDrive();
  }
}

async function getDriveFileName(id, token) {
  try {
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?fields=name`, {
      headers:{Authorization:'Bearer '+token}
    });
    if (r.ok) { const d = await r.json(); return d.name||id; }
  } catch(e){}
  return id;
}

async function loadPDFDrive() {
  const id = document.getElementById('pdf-drive-id').value.trim();
  if (!id) { alert('Enter a Drive file ID'); return; }
  setHdrStatus('Loading PDF from Drive...');
  try {
    const buf = await fetchDriveFile(id, true);
    await renderPDFFromBuffer(buf);
    getGoogleToken(async tok => {
      const name = await getDriveFileName(id, tok);
      saveRecent(id, name, 'pdf');
    });
  } catch(e) { alert('Drive load failed: ' + e.message); }
}

async function renderPDFFromBuffer(buf) {
  pdfDoc = await pdfjsLib.getDocument({data: buf}).promise;
  pdfPage = 1;
  document.getElementById('pdf-empty').style.display = 'none';
  document.getElementById('pdf-canvas').style.display = '';
  await renderPage(pdfPage);
}

async function renderPage(n) {
  if (!pdfDoc) return;
  n = Math.max(1, Math.min(n, pdfDoc.numPages));
  pdfPage = n;
  const page = await pdfDoc.getPage(n);
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const vp = page.getViewport({scale: 1.3});
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({canvasContext: ctx, viewport: vp}).promise;
  document.getElementById('pdf-pg').textContent = `${n} / ${pdfDoc.numPages}`;
}
function pdfNext() { if (pdfDoc) renderPage(pdfPage+1); }
function pdfPrev() { if (pdfDoc) renderPage(pdfPage-1); }
function jumpPage(v) { const n=parseInt(v); if (!isNaN(n)) renderPage(n); }

// ── PARSEUR ───────────────────────────────────────────────────────────────
async function loadParseurFile(input) {
  const file = input.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'json') {
    const txt = await file.text();
    parseParseurJSON(JSON.parse(txt));
  } else if (ext === 'csv') {
    parseParseurCSV(await file.text());
  } else {
    parseParseurExcel(await file.arrayBuffer());
  }
}

async function loadParseurDrive() {
  const id = document.getElementById('p-drive-id').value.trim();
  if (!id) { alert('Enter Drive file ID'); return; }
  setHdrStatus('Loading Parseur from Drive...');
  try {
    const txt = await fetchDriveFile(id, false);
    if (txt.trim().startsWith('[') || txt.trim().startsWith('{')) parseParseurJSON(JSON.parse(txt));
    else parseParseurCSV(txt);
    getGoogleToken(async tok => {
      const name = await getDriveFileName(id, tok);
      saveRecent(id, name, 'p');
    });
  } catch(e) {
    try {
      const buf = await fetchDriveFile(id, true);
      parseParseurExcel(buf);
      getGoogleToken(async tok => {
        const name = await getDriveFileName(id, tok);
        saveRecent(id, name, 'p');
      });
    } catch(e2) { alert('Drive Parseur load failed: ' + e2.message); }
  }
}

function parseParseurJSON(data) {
  const arr = Array.isArray(data) ? data : (data.records||data.data||Object.values(data));
  parseurRows = arr.filter(r => typeof r === 'object');
  indexParseur();
}

function parseParseurCSV(text) {
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (!lines.length) return;
  const headers = parseCSVLine(lines[0]);
  parseurRows = lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v=>v));
  indexParseur();
}

function parseCSVLine(line) {
  const vals=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){vals.push(cur.replace(/^"|"$/g,'').trim());cur='';}
    else cur+=c;
  }
  vals.push(cur.replace(/^"|"$/g,'').trim());
  return vals;
}

function parseParseurExcel(buf) {
  const wb = XLSX.read(buf, {type:'arraybuffer'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  parseurRows = XLSX.utils.sheet_to_json(ws);
  indexParseur();
}

function indexParseur() {
  parseurByDate = {};
  const dateKeys = ['date','Date','DATE','injection_date','Date/Time','datetime','log_date'];
  parseurRows.forEach(row => {
    let dv = null;
    for(const k of dateKeys) { if (row[k]) { dv = row[k]; break; } }
    if (!dv) { const k = Object.keys(row).find(k=>k.toLowerCase().includes('date')); if(k) dv=row[k]; }
    if (!dv) return;
    let d = String(dv).trim();
    if (/^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(d)) {
      const [m,dd,y] = d.split('/');
      const yr = y.length===2?'20'+y:y;
      d = `${yr}-${m.padStart(2,'0')}-${dd.padStart(2,'0')}`;
    }
    if (!/^\d{4}-\d{2}-\d{2}/.test(d)) return;
    d = d.substring(0,10);
    (parseurByDate[d] = parseurByDate[d]||[]).push(row);
  });
  document.getElementById('p-status').textContent = `✓ ${parseurRows.length} rows`;
  rebuildDates();
  if (curDate) renderDate(curDate);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function rebuildDates() {
  const s = new Set([...Object.keys(atByDate), ...Object.keys(parseurByDate)]);
  allDates = [...s].sort();
  const sel = document.getElementById('date-sel');
  sel.innerHTML = '<option value="">— Select Date —</option>';
  allDates.forEach(d => {
    const an = (atByDate[d]||[]).length, pn = (parseurByDate[d]||[]).length;
    const st = !an?'✗AT':!pn?'○':an===pn?'✓':'△';
    const o = document.createElement('option');
    o.value = d;
    o.textContent = `${d}  AT:${an} P:${pn} ${st}`;
    sel.appendChild(o);
  });
  updateBadges();
}

function updateBadges() {
  let match=0,diff=0,missAT=0,extra=0;
  allDates.forEach(d => {
    const an=(atByDate[d]||[]).length, pn=(parseurByDate[d]||[]).length;
    if (!an&&pn) missAT++;
    else if (an&&!pn) extra++;
    else if (an&&pn) an===pn?match++:diff++;
  });
  document.getElementById('b-at').textContent    = `AT: ${atRecs.length}`;
  document.getElementById('b-p').textContent     = `Parseur: ${parseurRows.length}`;
  document.getElementById('b-ok').textContent    = `✓ ${match}`;
  document.getElementById('b-diff').textContent  = `⚠ ${diff}`;
  document.getElementById('b-miss').textContent  = `✗ ${missAT}`;
  document.getElementById('b-extra').textContent = `+ ${extra}`;
}

function renderDate(d) {
  curDate = d;
  document.getElementById('date-sel').value = d;
  const atList = atByDate[d]||[], pList = parseurByDate[d]||[];
  document.getElementById('at-cnt').textContent = atList.length;
  document.getElementById('p-cnt').textContent  = pList.length;

  // AT col
  const atBody = document.getElementById('at-body');
  if (!atList.length) {
    atBody.innerHTML = '<div class="empty-col">No AT record<br><em style="font-size:11px;color:#9ca3af">Use "Edit / Add" tab to add</em></div>';
  } else {
    atBody.innerHTML = atList.map(r => renderATCard(r, pList)).join('');
  }

  // Parseur col
  const pBody = document.getElementById('p-body');
  if (!parseurRows.length) {
    pBody.innerHTML = '<div class="empty-col">Load Parseur file from bottom bar</div>';
  } else if (!pList.length) {
    pBody.innerHTML = '<div class="empty-col">No Parseur data for this date</div>';
  } else {
    pBody.innerHTML = pList.map((r,i)=>renderParseurCard(r,i)).join('');
  }

  // Match tag
  const tag = document.getElementById('match-tag');
  if (!atList.length && !pList.length) { tag.textContent=''; tag.style.cssText=''; }
  else if (!atList.length) { tag.textContent='✗ Missing in AT'; tag.style.cssText='background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:12px'; }
  else if (!pList.length)  { tag.textContent='○ AT only'; tag.style.cssText='background:#ede9fe;color:#5b21b6;padding:3px 10px;border-radius:12px'; }
  else if (atList.length===pList.length) { tag.textContent='✓ Counts match'; tag.style.cssText='background:#dcfce7;color:#166534;padding:3px 10px;border-radius:12px'; }
  else { tag.textContent='⚠ Count mismatch'; tag.style.cssText='background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:12px'; }

  // Pre-fill date in edit form
  document.getElementById('ef-date').value = d;
}

function renderATCard(rec, pList) {
  const f = rec.fields;
  const compound = f[F.compound]||'—', dose=f[F.dose]||'—', site=f[F.site]||'—',
        timing=f[F.timing]||'—', status=f[F.status]||'—', notes=f[F.notes]||'', name=f[F.name]||'';
  // diff check against first parseur row
  const p0 = pList[0]||{};
  const pCompound = findParseurVal(p0,'compound','drug','medication','compound_name');
  const cdiff = pCompound && pCompound.toLowerCase()!==compound.toLowerCase();
  return `<div class="rcard at-ok">
    <div class="card-btns">
      <button class="cbtn edit" onclick="editRecord('${rec.id}')">Edit</button>
      <button class="cbtn del" onclick="confirmDel('${rec.id}')">Del</button>
    </div>
    <div class="frow"><span class="flbl">ID</span><span class="fval" style="font-size:10px;color:#9ca3af">${rec.id}</span></div>
    ${name?`<div class="frow"><span class="flbl">Name</span><span class="fval">${name}</span></div>`:''}
    <div class="frow"><span class="flbl">Compound</span><span class="fval ${cdiff?'hi':''}">${compound}</span></div>
    <div class="frow"><span class="flbl">Dose</span><span class="fval">${dose}</span></div>
    <div class="frow"><span class="flbl">Site</span><span class="fval">${site}</span></div>
    <div class="frow"><span class="flbl">Timing</span><span class="fval">${timing}</span></div>
    <div class="frow"><span class="flbl">Status</span><span class="fval">${status}</span></div>
    ${notes?`<div class="frow"><span class="flbl">Notes</span><span class="fval">${notes}</span></div>`:''}
  </div>`;
}

function renderParseurCard(row, idx) {
  const entries = Object.entries(row).filter(([k])=>k!=='_dk');
  const rows = entries.map(([k,v])=>`<div class="frow"><span class="flbl">${k}</span><span class="fval">${v||'—'}</span></div>`).join('');
  return `<div class="rcard p-row">
    <div class="card-btns">
      <button class="cbtn fill" onclick="fillFromParseur(${idx})">→ Fill Form</button>
    </div>
    ${rows}
  </div>`;
}

function findParseurVal(row,...keys) {
  for (const k of keys) {
    const match = Object.keys(row).find(rk => rk.toLowerCase() === k.toLowerCase());
    if (match && row[match]) return String(row[match]);
  }
  return null;
}

// ── EDIT FORM ─────────────────────────────────────────────────────────────
function editRecord(id) {
  const rec = atRecs.find(r=>r.id===id); if (!rec) return;
  editId = id;
  const f = rec.fields;
  document.getElementById('ef-date').value     = f[F.date]||'';
  document.getElementById('ef-compound').value = f[F.compound]||'';
  document.getElementById('ef-dose').value     = f[F.dose]||'';
  document.getElementById('ef-site').value     = f[F.site]||'';
  document.getElementById('ef-timing').value   = f[F.timing]||'';
  document.getElementById('ef-status').value   = f[F.status]||'';
  document.getElementById('ef-name').value     = f[F.name]||'';
  document.getElementById('ef-notes').value    = f[F.notes]||'';
  document.getElementById('ef-title').textContent = 'Edit Record';
  document.getElementById('ef-id').textContent = 'ID: '+id;
  document.getElementById('ef-del').style.display = '';
  toggleView('edit');
}

function newRecord() {
  editId = null;
  clearForm();
  if (curDate) document.getElementById('ef-date').value = curDate;
  document.getElementById('ef-title').textContent = 'New Injection Record';
  document.getElementById('ef-id').textContent = '';
  document.getElementById('ef-del').style.display = 'none';
  toggleView('edit');
}

function clearForm() {
  ['ef-dose','ef-name','ef-notes'].forEach(id=>document.getElementById(id).value='');
  ['ef-compound','ef-site','ef-timing','ef-status'].forEach(id=>{document.getElementById(id).selectedIndex=0;});
  if (!editId) document.getElementById('ef-date').value = curDate||'';
  editId = null;
  document.getElementById('ef-del').style.display='none';
  document.getElementById('ef-title').textContent='New Injection Record';
  document.getElementById('ef-id').textContent='';
}

function fillFromParseur(idx) {
  const rows = parseurByDate[curDate]||[];
  const row = rows[idx]; if (!row) return;
  const mp = {
    'date':'ef-date','compound':'ef-compound','dose':'ef-dose','site':'ef-site',
    'timing':'ef-timing','status':'ef-status','notes':'ef-notes','name':'ef-name',
    'drug':'ef-compound','medication':'ef-compound','amount':'ef-dose','location':'ef-site',
    'injection site':'ef-site','compound name':'ef-compound','dose amount':'ef-dose'
  };
  Object.entries(row).forEach(([k,v]) => {
    const id = mp[k.toLowerCase().trim()];
    if (id && v) document.getElementById(id).value = v;
  });
  toggleView('edit');
}

async function saveRecord() {
  const date = document.getElementById('ef-date').value;
  if (!date) { alert('Date is required.'); return; }
  const fields = { [F.date]: date };
  const compound=document.getElementById('ef-compound').value;  if(compound) fields[F.compound]=compound;
  const dose=document.getElementById('ef-dose').value;          if(dose) fields[F.dose]=dose;
  const site=document.getElementById('ef-site').value;          if(site) fields[F.site]=site;
  const timing=document.getElementById('ef-timing').value;      if(timing) fields[F.timing]=timing;
  const status=document.getElementById('ef-status').value;      if(status) fields[F.status]=status;
  const name=document.getElementById('ef-name').value;          if(name) fields[F.name]=name;
  const notes=document.getElementById('ef-notes').value;        if(notes) fields[F.notes]=notes;
  setSaveInd('saving');
  try {
    const result = await saveToAT(fields, editId||null);
    if (editId) {
      const idx = atRecs.findIndex(r=>r.id===editId);
      if (idx>=0) atRecs[idx]=result;
    } else {
      atRecs.push(result);
    }
    indexAT(); rebuildDates(); renderDate(date);
    clearForm(); toggleView('compare');
    setSaveInd('ok');
    saveStateToGH();
  } catch(e) { alert('Save failed: '+e.message); setSaveInd('err'); }
}

async function deleteRecord() {
  if (!editId) return;
  if (!confirm('Delete record '+editId+' from Airtable?')) return;
  setSaveInd('saving');
  try {
    await deleteFromAT(editId);
    atRecs = atRecs.filter(r=>r.id!==editId);
    indexAT(); rebuildDates();
    if (curDate) renderDate(curDate);
    clearForm(); toggleView('compare');
    setSaveInd('ok');
    saveStateToGH();
  } catch(e) { alert('Delete failed: '+e.message); setSaveInd('err'); }
}

async function confirmDel(id) {
  if (!confirm('Delete this record?')) return;
  setSaveInd('saving');
  try {
    await deleteFromAT(id);
    atRecs = atRecs.filter(r=>r.id!==id);
    indexAT(); rebuildDates();
    if (curDate) renderDate(curDate);
    setSaveInd('ok');
    saveStateToGH();
  } catch(e) { alert('Delete failed: '+e.message); setSaveInd('err'); }
}

// ── GITHUB STATE SAVE ─────────────────────────────────────────────────────
function saveStateToGH() {
  try {
    const state = { saved: new Date().toISOString(), atCount: atRecs.length, parseurCount: parseurRows.length, curDate };
    localStorage.setItem('injection_audit_state', JSON.stringify(state));
    setSaveInd('ok');
  } catch(e) { console.warn('State save failed', e); }
}

// ── UI HELPERS ────────────────────────────────────────────────────────────
function toggleView(v) {
  const ce = v==='compare';
  document.getElementById('compare-view').style.display = ce ? '' : 'none';
  document.getElementById('edit-view').style.display    = ce ? 'none' : '';
  document.getElementById('tab-compare').className = 'tab'+(ce?' on':'');
  document.getElementById('tab-edit').className    = 'tab'+(ce?'':' on');
}
function goDate(d) { if (d) renderDate(d); }
function prevDate() {
  if (!curDate||!allDates.length) return;
  const i = allDates.indexOf(curDate);
  if (i>0) renderDate(allDates[i-1]);
}
function nextDate() {
  if (!curDate||!allDates.length) return;
  const i = allDates.indexOf(curDate);
  if (i<allDates.length-1) renderDate(allDates[i+1]);
}
function openModal() {
  const list = document.getElementById('date-list');
  list.innerHTML = allDates.map(d => {
    const an=(atByDate[d]||[]).length, pn=(parseurByDate[d]||[]).length;
    const icon = !an?'🔴':!pn?'🟣':an===pn?'🟢':'🟡';
    return `<div class="dli ${d===curDate?'cur':''}" onclick="closeModal();renderDate('${d}')">${icon} ${d} — AT:${an} P:${pn}</div>`;
  }).join('');
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function setHdrStatus(msg) { document.getElementById('hdr-status').textContent=msg; }
function setSaveInd(state) {
  const el=document.getElementById('save-ind');
  if(state==='saving'){el.textContent='⏳ Saving...';el.className='si-saving';}
  else if(state==='ok'){el.textContent='✓ Saved '+new Date().toLocaleTimeString();el.className='si-ok';}
  else{el.textContent='⚠ Error';el.className='si-err';}
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function initLoad() {
  document.getElementById('loader-err').textContent = '';
  document.getElementById('loader-retry').style.display = 'none';
  document.getElementById('loader').style.display = 'flex';
  try {
    document.getElementById('loader-msg').textContent = 'Loading dropdown options...';
    await loadATSchema();
    document.getElementById('loader-msg').textContent = 'Loading injection records...';
    atRecs = await loadAllAT();
    indexAT();
    rebuildDates();
    document.getElementById('loader').style.display = 'none';
    renderRecents();
    setHdrStatus(`Ready — ${atRecs.length} AT records | ${allDates.length} dates`);
    if (allDates.length) renderDate(allDates[allDates.length-1]);
  } catch(e) {
    document.getElementById('loader-msg').textContent = 'Failed to load Airtable';
    document.getElementById('loader-err').textContent = 'Error: '+e.message+' — Check your network connection and try again.';
    document.getElementById('loader-retry').style.display = 'inline-block';
  }
}

window.onload = initLoad;
