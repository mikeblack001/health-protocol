<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Injection Audit — Build 2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f3f6;color:#1a1a2e;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* LOADER */
#loader{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:999}
.spin{width:32px;height:32px;border:3px solid #e2e5ea;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loader-msg{font-size:14px;font-weight:600;color:#374151}
#loader-err{color:#dc2626;font-size:12px;max-width:360px;text-align:center;display:none}
#loader-retry{display:none;padding:7px 18px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px}

/* HEADER */
#hdr{background:#1e2433;color:#fff;padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;min-height:44px}
#hdr h1{font-size:14px;font-weight:800;letter-spacing:-.2px;white-space:nowrap;color:#fff}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.b-blue{background:#1e3a8a;border-color:#3b82f6;color:#93c5fd}
.b-green{background:#14532d;border-color:#22c55e;color:#86efac}
.b-amber{background:#78350f;border-color:#f59e0b;color:#fcd34d}
.b-gray{background:#374151;border-color:#6b7280;color:#d1d5db}
#hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#save-ind{font-size:11px;color:#9ca3af}
#save-ind.ok{color:#4ade80}
#save-ind.err{color:#f87171}

/* BODY LAYOUT */
#body{display:flex;flex:1;overflow:hidden}

/* PDF PANEL */
#pdf-panel{width:360px;min-width:280px;background:#fff;border-right:2px solid #e2e5ea;display:flex;flex-direction:column;flex-shrink:0}
#pdf-hdr{padding:8px 10px;border-bottom:1px solid #e2e5ea;background:#f8f9fa}
#pdf-hdr label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;display:block;margin-bottom:5px}
.pdf-row{display:flex;gap:5px;align-items:center}
#pdf-drive-id{flex:1;padding:5px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;min-width:0}
.btn{padding:5px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}
.btn-blue{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-blue:hover{background:#1d4ed8}
.btn-gray{background:#fff;border-color:#d1d5db;color:#374151}
.btn-gray:hover{background:#f3f4f6}
.btn-sm{padding:3px 8px;font-size:10px}
#pdf-file-input{display:none}
#pdf-local-label{cursor:pointer}
#pdf-status{font-size:10px;color:#9ca3af;margin-top:4px}
#pdf-viewer{flex:1;overflow-y:auto;background:#e5e7eb;display:flex;align-items:flex-start;justify-content:center;padding:8px}
#pdf-canvas{max-width:100%;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none}
#pdf-empty{color:#9ca3af;font-size:12px;text-align:center;padding:30px;width:100%}
#pdf-nav{display:flex;align-items:center;gap:6px;padding:6px 10px;border-top:1px solid #e2e5ea;background:#f8f9fa;flex-shrink:0}
#pdf-nav button{padding:4px 10px;border:1px solid #d1d5db;border-radius:4px;cursor:pointer;font-size:11px;background:#fff}
#pdf-pg{font-size:11px;color:#6b7280;flex:1;text-align:center}
#pdf-jump{width:50px;padding:3px 5px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;text-align:center}

/* AUDIT PANEL */
#audit-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* DATE NAV */
#date-nav{background:#fff;border-bottom:2px solid #e2e5ea;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.nav-btn{padding:5px 12px;border:1px solid #d1d5db;background:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700}
.nav-btn:hover{background:#f3f4f6}
.nav-btn.primary{background:#2563eb;color:#fff;border-color:#2563eb}
#date-sel{padding:5px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;min-width:180px}
#date-count{font-size:11px;color:#9ca3af;margin-left:auto}
#btn-add-date{margin-left:auto}

/* RECORDS AREA */
#records-area{flex:1;overflow-y:auto;padding:10px}
#records-empty{color:#9ca3af;font-size:13px;text-align:center;padding:40px}

/* RECORD CARD */
.rcard{background:#fff;border:1px solid #e2e5ea;border-left:4px solid #93c5fd;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative}
.rcard.status-done{border-left-color:#4ade80}
.rcard.status-todo{border-left-color:#f59e0b}
.rcard-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.rcard-compound{font-weight:800;font-size:13px;color:#1e2433}
.rcard-dose{background:#dbeafe;color:#1d4ed8;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:700}
.rcard-timing{color:#6b7280;font-size:11px}
.rcard-site{background:#f3f4f6;color:#374151;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600}
.rcard-notes{font-size:11px;color:#6b7280;margin-top:4px;font-style:italic}
.rcard-status{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:#f3f4f6;color:#6b7280}
.rcard-status.done{background:#dcfce7;color:#166534}
.rcard-status.todo{background:#fef3c7;color:#92400e}
.card-edit-btn{position:absolute;top:8px;right:8px;padding:3px 8px;font-size:10px;font-weight:700;border:1px solid #bfdbfe;background:#eff6ff;color:#2563eb;border-radius:4px;cursor:pointer}
.card-edit-btn:hover{background:#dbeafe}

/* EDIT MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
#modal-overlay.show{display:flex}
#modal{background:#fff;border-radius:10px;padding:20px;width:420px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
#modal h2{font-size:15px;font-weight:800;margin-bottom:14px;color:#1e2433}
.ef-row{margin-bottom:10px}
.ef-row label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;margin-bottom:4px}
.ef-row input,.ef-row select,.ef-row textarea{width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit}
.ef-row textarea{min-height:60px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal-btns button{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid}
#btn-save{background:#2563eb;color:#fff;border-color:#2563eb}
#btn-cancel{background:#fff;color:#374151;border-color:#d1d5db}
#btn-delete{background:#fee2e2;color:#991b1b;border-color:#fca5a5;margin-left:auto}
#modal-id{font-size:10px;color:#9ca3af;margin-top:8px}
</style>
</head>
<body>

<div id="loader">
  <div class="spin"></div>
  <div id="loader-msg">Loading injection records…</div>
  <div id="loader-err"></div>
  <button id="loader-retry" onclick="init()">Retry</button>
</div>

<!-- HEADER -->
<div id="hdr">
  <h1>💉 Injection Audit</h1>
  <span class="badge b-blue" id="b-at">AT: 0</span>
  <span class="badge b-green" id="b-dates">0 dates</span>
  <span class="badge b-amber" id="b-cur">—</span>
  <div id="hdr-right">
    <span id="save-ind"></span>
  </div>
</div>

<!-- BODY -->
<div id="body">

  <!-- PDF PANEL -->
  <div id="pdf-panel">
    <div id="pdf-hdr">
      <label>PDF — Injections Log</label>
      <div class="pdf-row">
        <input id="pdf-drive-id" type="text" placeholder="Google Drive file ID" value="1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6">
        <button class="btn btn-blue" onclick="loadPDFFromDrive()">📂 Load</button>
      </div>
      <div class="pdf-row" style="margin-top:5px">
        <label id="pdf-local-label" class="btn btn-gray btn-sm" style="cursor:pointer">Local File
          <input id="pdf-file-input" type="file" accept=".pdf" onchange="loadPDFLocal(this)">

</div>

<!-- EDIT / ADD MODAL -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <h2 id="modal-title">Edit Record</h2>
    <div class="ef-row">

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CONFIG ─────────────────────────────────────────────────────────────────
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE  = 'appmHDG4TGT1xy6R6';
const AT_TBL   = 'tblBvEaLkGGipnOFc';
const GCL_ID   = '478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const F = {
  name:     'fldt9vYT8Tm37Gf3k',
  date:     'fldhYEtLEGA4VxvvO',
  compound: 'fldwVFyizH4mBANBa',
  site:     'fldHDlJY8FpAvK018',
  timing:   'fldIdzew4Jd0qO4Uc',
  dose:     'fld8d8mtRapfaIyqL',
  notes:    'fldAbczu73mINwLmx',
  status:   'fldD9kegiwk6mINV8'
};

// ── STATE ──────────────────────────────────────────────────────────────────
let atRecs = [], byDate = {}, allDates = [], curDate = null;
let editId = null, pdfDoc = null, pdfPage = 1, gToken = null;

// ── AIRTABLE ───────────────────────────────────────────────────────────────
async function atFetch(path, opts={}) {
  const r = await fetch(`https://api.airtable.com/v0/${AT_BASE}/${path}`, {
    ...opts,
    headers: { 'Authorization':'Bearer '+AT_TOKEN, 'Content-Type':'application/json', ...(opts.headers||{}) }
  });
  if (!r.ok) { const e = await r.json().catch(()=>({error:{message:r.status}})); throw new Error(e.error?.message||r.status); }
  return r.json();
}

async function loadAllAT() {
  let recs=[], offset=null;
  do {
    // CRITICAL: returnFieldsByFieldId=true so fields are keyed by ID, not name
    let url = `${AT_TBL}?pageSize=100&returnFieldsByFieldId=true`;
    if (offset) url += '&offset='+offset;
    setMsg('Loading… ' + recs.length + ' records');
    const d = await atFetch(url);
    recs = recs.concat(d.records);
    offset = d.offset;
  } while(offset);
  return recs;
}

function indexAT() {
  byDate = {};
  atRecs.forEach(r => {
    const d = r.fields[F.date];
    if (!d) return;
    const key = d.substring(0,10); // normalize to YYYY-MM-DD
    (byDate[key] = byDate[key]||[]).push(r);
  });
  allDates = Object.keys(byDate).sort();
  buildDateSel();
  updateBadges();
}

function buildDateSel() {
  const sel = document.getElementById('date-sel');
  sel.innerHTML = '<option value="">— Select Date —</option>';
  allDates.forEach(d => {
    const n = (byDate[d]||[]).length;
    const o = document.createElement('option');
    o.value = d;
    o.textContent = `${d}  (${n} record${n!==1?'s':''})`;
    sel.appendChild(o);
  });
}

function updateBadges() {
  document.getElementById('b-at').textContent    = 'AT: ' + atRecs.length;
  document.getElementById('b-dates').textContent  = allDates.length + ' dates';
  document.getElementById('date-count').textContent = `${allDates.length} dates`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function goDate(d) {
  curDate = d;
  document.getElementById('date-sel').value = d;
  document.getElementById('b-cur').textContent = d || '—';
  renderRecords();
}
function prevDate() {
  if (!curDate || !allDates.length) return;
  const i = allDates.indexOf(curDate);
  if (i > 0) goDate(allDates[i-1]);
}
function nextDate() {
  if (!curDate || !allDates.length) return;
  const i = allDates.indexOf(curDate);
  if (i < allDates.length-1) goDate(allDates[i+1]);
}

function renderRecords() {
  const area = document.getElementById('records-area');
  const recs = byDate[curDate] || [];
  if (!curDate) { area.innerHTML = '<div id="records-empty">Select a date to view records</div>'; return; }
  if (!recs.length) {
    area.innerHTML = '<div id="records-empty">No records for this date — use + Add Record to create one</div>';
    return;
  }
  // Sort by timing: Morning → Evening → Night → Daily → blank
  const order = {'Morning':0,'Evening':1,'Night':2,'Daily':3};
  const sorted = [...recs].sort((a,b) => {
    const ta = order[a.fields[F.timing]]??9, tb = order[b.fields[F.timing]]??9;
    if (ta!==tb) return ta-tb;
    return (a.fields[F.compound]||'').localeCompare(b.fields[F.compound]||'');
  });
  area.innerHTML = sorted.map(r => buildCard(r)).join('');
}

function buildCard(r) {
  const f = r.fields;
  const compound = f[F.compound] || '?';
  const dose     = f[F.dose]     || '';
  const site     = f[F.site]     || '';
  const timing   = f[F.timing]   || '';
  const notes    = f[F.notes]    || '';
  const status   = f[F.status]   || '';
  const statusClass = status==='Done'?'done':status==='Todo'?'todo':'';
  const cardClass   = status==='Done'?'status-done':status==='Todo'?'status-todo':'';
  return `<div class="rcard ${cardClass}">
    <button class="card-edit-btn" onclick="openEdit('${r.id}')">✎ Edit</button>
    <div class="rcard-top">
      <span class="rcard-compound">${compound}</span>
      ${dose?`<span class="rcard-dose">${dose}</span>`:''}
      ${timing?`<span class="rcard-timing">${timing}</span>`:''}
      ${site?`<span class="rcard-site">${site}</span>`:''}
      ${status?`<span class="rcard-status ${statusClass}">${status}</span>`:''}
    </div>
    ${notes?`<div class="rcard-notes">${notes}</div>`:''}
  </div>`;
}

// ── EDIT / ADD ─────────────────────────────────────────────────────────────
function openAdd() {
  editId = null;
  clearForm();
  if (curDate) document.getElementById('ef-date').value = curDate;
  document.getElementById('modal-title').textContent = 'New Injection Record';
  document.getElementById('btn-delete').style.display = 'none';
  document.getElementById('modal-id').textContent = '';
  showModal();
}

function openEdit(id) {
  const rec = atRecs.find(r=>r.id===id);
  if (!rec) return;
  editId = id;
  const f = rec.fields;
  document.getElementById('ef-date').value     = f[F.date]||'';
  document.getElementById('ef-compound').value = f[F.compound]||'';
  document.getElementById('ef-dose').value     = f[F.dose]||'';
  document.getElementById('ef-site').value     = f[F.site]||'';
  document.getElementById('ef-timing').value   = f[F.timing]||'';
  document.getElementById('ef-status').value   = f[F.status]||'';
  document.getElementById('ef-notes').value    = f[F.notes]||'';
  document.getElementById('modal-title').textContent = 'Edit Record';
  document.getElementById('btn-delete').style.display = '';
  document.getElementById('modal-id').textContent = 'ID: '+id;
  showModal();
}

function clearForm() {
  ['ef-dose','ef-notes'].forEach(id=>document.getElementById(id).value='');
  ['ef-compound','ef-site','ef-timing','ef-status'].forEach(id=>document.getElementById(id).selectedIndex=0);
  document.getElementById('ef-date').value = curDate||'';
}

async function saveRecord() {
  const date = document.getElementById('ef-date').value;
  if (!date) { alert('Date is required.'); return; }
  const fields = { [F.date]: date };
  const compound = document.getElementById('ef-compound').value; if(compound) fields[F.compound]=compound;
  const dose     = document.getElementById('ef-dose').value;     if(dose)     fields[F.dose]=dose;
  const site     = document.getElementById('ef-site').value;     if(site)     fields[F.site]=site;
  const timing   = document.getElementById('ef-timing').value;   if(timing)   fields[F.timing]=timing;
  const status   = document.getElementById('ef-status').value;   if(status)   fields[F.status]=status;
  const notes    = document.getElementById('ef-notes').value;    if(notes)    fields[F.notes]=notes;
  if(compound) fields[F.name] = compound; // keep name field in sync
  setSave('saving');
  try {
    let result;
    if (editId) {
      result = await atFetch(AT_TBL+'/'+editId+'?returnFieldsByFieldId=true', {method:'PATCH',body:JSON.stringify({fields})});
      const idx = atRecs.findIndex(r=>r.id===editId);
      if (idx>=0) atRecs[idx] = result;
    } else {
      result = await atFetch(AT_TBL+'?returnFieldsByFieldId=true', {method:'POST',body:JSON.stringify({fields})});
      atRecs.push(result);
    }
    indexAT();
    closeModal();
    goDate(date);
    setSave('ok');
  } catch(e) { alert('Save failed: '+e.message); setSave('err'); }
}

async function deleteRecord() {
  if (!editId) return;
  if (!confirm('Delete this record from Airtable?')) return;
  setSave('saving');
  try {
    await atFetch(AT_TBL+'/'+editId, {method:'DELETE'});
    atRecs = atRecs.filter(r=>r.id!==editId);
    indexAT();
    closeModal();
    if (curDate) renderRecords();
    setSave('ok');
  } catch(e) { alert('Delete failed: '+e.message); setSave('err'); }
}

function showModal() { document.getElementById('modal-overlay').classList.add('show'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); editId=null; }
function setSave(s) {
  const el=document.getElementById('save-ind');
  if(s==='saving'){el.textContent='⏳ Saving…';el.className='';}
  else if(s==='ok'){el.textContent='✓ Saved';el.className='ok';}
  else{el.textContent='⚠ Error';el.className='err';}
}

// ── PDF ────────────────────────────────────────────────────────────────────
function getGoogleToken(cb) {
  if (gToken) { cb(gToken); return; }
  const scope = encodeURIComponent('https://www.googleapis.com/auth/drive.readonly');
  const redirect = encodeURIComponent(location.origin + location.pathname);
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCL_ID}&redirect_uri=${redirect}&response_type=token&scope=${scope}`;
  const w = window.open(url,'gauth','width=500,height=600');
  if (!w) { alert('Pop-up blocked — allow pop-ups for this site'); return; }
  const chk = setInterval(()=>{
    try {
      if(w.closed){clearInterval(chk);return;}
      const hash=w.location.hash;
      if(hash&&hash.includes('access_token')){
        clearInterval(chk); w.close();
        gToken=new URLSearchParams(hash.substring(1)).get('access_token');
        cb(gToken);
      }
    } catch(e){}
  },300);
}

function loadPDFFromDrive() {
  const id = document.getElementById('pdf-drive-id').value.trim();
  if (!id) { document.getElementById('pdf-status').textContent='Enter a Drive file ID first'; return; }
  document.getElementById('pdf-status').textContent='Authenticating with Google…';
  getGoogleToken(async token => {
    try {
      document.getElementById('pdf-status').textContent='Downloading PDF…';
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:{Authorization:'Bearer '+token}});
      if (!r.ok) throw new Error('Drive error '+r.status);
      const buf = await r.arrayBuffer();
      await renderPDFBuffer(buf);
      document.getElementById('pdf-status').textContent='Injections.pdf loaded ✓';
    } catch(e) { document.getElementById('pdf-status').textContent='Error: '+e.message; }
  });
}

function loadPDFLocal(input) {
  const file = input.files[0]; if (!file) return;
  file.arrayBuffer().then(renderPDFBuffer);
}

async function renderPDFBuffer(buf) {
  pdfDoc = await pdfjsLib.getDocument({data:buf}).promise;
  pdfPage = 1;
  document.getElementById('pdf-empty').style.display='none';
  document.getElementById('pdf-canvas').style.display='';
  await renderPage(1);
}

async function renderPage(n) {
  if (!pdfDoc) return;
  n = Math.max(1,Math.min(n,pdfDoc.numPages));
  pdfPage = n;
  const page = await pdfDoc.getPage(n);
  const canvas = document.getElementById('pdf-canvas');
  const vp = page.getViewport({scale:1.3});
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('pdf-pg').textContent=`${n} / ${pdfDoc.numPages}`;
  document.getElementById('pdf-jump').value=n;
}
function pdfPrev(){if(pdfDoc)renderPage(pdfPage-1);}
function pdfNext(){if(pdfDoc)renderPage(pdfPage+1);}

// ── INIT ───────────────────────────────────────────────────────────────────
function setMsg(m){ document.getElementById('loader-msg').textContent=m; }

async function init() {
  document.getElementById('loader-err').style.display='none';
  document.getElementById('loader-retry').style.display='none';
  document.getElementById('loader').style.display='flex';
  try {
    setMsg('Loading injection records…');
    atRecs = await loadAllAT();
    indexAT();
    document.getElementById('loader').style.display='none';
    // Jump to most recent date
    if (allDates.length) goDate(allDates[allDates.length-1]);
  } catch(e) {
    setMsg('Failed to load Airtable');
    const err = document.getElementById('loader-err');
    err.textContent = 'Error: '+e.message;
    err.style.display='block';
    document.getElementById('loader-retry').style.display='inline-block';
  }
}

window.onload = init;
</script>
