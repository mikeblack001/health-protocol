<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout Auto-Extractor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080810; color: #ccc; font-family: 'Courier New', monospace; padding: 20px; font-size: 12px; }
h1 { color: #00ff88; font-size: 15px; margin-bottom: 16px; letter-spacing: 3px; border-bottom: 1px solid #1a1a30; padding-bottom: 8px; }
.card { background: #0e0e1c; border: 1px solid #1e1e38; padding: 14px; margin-bottom: 12px; border-radius: 2px; }
h2 { color: #00cc66; font-size: 11px; margin-bottom: 10px; letter-spacing: 2px; }
.pbar-wrap { background: #0a0a16; height: 14px; border-radius: 2px; overflow: hidden; margin: 6px 0; }
.pbar { height: 100%; background: linear-gradient(90deg,#006633,#00ff88); transition: width 0.3s; width: 0%; }
.pct { font-size: 10px; color: #555; margin-bottom: 6px; }
.log { background: #050509; border: 1px solid #111120; padding: 8px; max-height: 260px; overflow-y: auto; font-size: 10px; line-height: 1.7; }
.lk{color:#777} .lok{color:#00cc66} .lerr{color:#ff4444} .li{color:#4488ff} .lw{color:#ffaa00}
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 12px; }
.stat { background: #0a0a18; padding: 12px; text-align: center; border: 1px solid #1a1a30; }
.sv { color: #00ff88; font-size: 26px; font-weight: bold; }
.sl { color: #555; font-size: 10px; margin-top: 3px; letter-spacing: 1px; }
.btn { background: #00cc66; color: #000; border: none; padding: 8px 16px; cursor: pointer; font-family: monospace; font-weight: bold; font-size: 11px; }
.btn:hover { background: #00ff88; }
.btn-r { background: #cc3300; color: #fff; }
.btn-r:hover { background: #ff4400; }
.status-line { color: #00ff88; font-size: 12px; margin-bottom: 6px; }
</style>
</head>
<body>
<h1>⚡ WORKOUT AUTO-EXTRACTOR</h1>

<div id="ph-proc" class="card">
  <h2>EXTRACTING — 152 PAGES</h2>
  <div class="status-line" id="proc-status">Starting...</div>
  <div class="pbar-wrap"><div class="pbar" id="proc-bar"></div></div>
  <div class="pct" id="proc-pct"></div>
  <div class="log" id="proc-log"></div>
</div>

<div id="ph-results" class="card" style="display:none">
  <h2>RESULTS</h2>
  <div class="stats">
    <div class="stat"><div class="sv" id="s-pages">0</div><div class="sl">PAGES</div></div>
    <div class="stat"><div class="sv" id="s-sessions">0</div><div class="sl">SESSIONS</div></div>
    <div class="stat"><div class="sv" id="s-sets">0</div><div class="sl">SETS</div></div>
    <div class="stat"><div class="sv" id="s-errors">0</div><div class="sl">ERRORS</div></div>
  </div>
  <button class="btn" onclick="dlJSON()" style="margin-right:8px">⬇ DOWNLOAD JSON</button>
  <button class="btn btn-r" onclick="wipeAndPush()">🗑 WIPE AT + PUSH ALL</button>
</div>

<div id="ph-push" class="card" style="display:none">
  <h2>AIRTABLE WIPE + REIMPORT</h2>
  <div class="status-line" id="push-status">Starting...</div>
  <div class="pbar-wrap"><div class="pbar" id="push-bar"></div></div>
  <div class="pct" id="push-pct"></div>
  <div class="log" id="push-log"></div>
</div>

<script>
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE  = 'appmHDG4TGT1xy6R6';
const TBL_SETS = 'tblKDqjy5RzqaJvjr';
const TBL_SESS = 'tblk9tTYIcIY4tWjF';

const SF = {
  SetID:'fld4hUpEzC9IqN0xh', Date:'fld75zYXknF0RtCWH', Session:'fldBChNmPkNg61oTN',
  Exercise:'fldZ93A1t7fGjjsSS', Variation:'fld2TZdmCOloH0gAK', SetNum:'fldNm9Ao0rmcwwDXo',
  Reps:'fldelUngWHRTm48m1', Weight:'fldmrbBmfgSMtREMt', Day:'fldypzlwqw9AzWrEE', Notes:'fldfR4vyBtj2VWB2b'
};
const SESSF = { Session:'fldtyX5g2302mdKRM', Date:'fld0NOLsoRvUklsUx', Day:'fldCOlVjVlkvg7xQ6' };

const ABBREVS = {
  'Bench Press':'BP','Incline Press':'IP','Decline Press':'DP','Incline Fly':'IF',
  'Lateral Raises':'LR','Seated Shoulder Press':'SSP','Tricep Pushdowns':'TPD',
  'Overhead Tricep Ext':'OTE','High Cable Fly':'HCF','Cable Cross Overs':'CCO','Wrist Twist':'WT',
  'Lat Pulldown':'LPD','Bent Over Rows':'BOR','Cable Rows':'CR','Face Pulls':'FP',
  'Rear Delt Raises':'RDR','Bicep Curls - Preacher':'BCP','Hammer Curls':'HC',
  'Cable Shrugs':'CSH','Cable Curls':'CCU','Barbell Shrugs':'BSH',
  'Leg Press':'LGP','Leg Extensions':'LEX','Leg Curls':'LCU','Hip Thrust':'HT',
  'Nordic Curl':'NC','Reverse Hyper':'RH','DB Calf Raises':'DCR','Smith Mach Calf Raises':'SCR',
  'Back Extension':'BE','Forward Back Stretch':'FBS','Cable Press':'CP','Low Cable Fly':'LCF',
  'Incline Curls':'IC','Overhead Tricep Press':'OTP','Curls (Standing)':'CUS',
  'Tricep Ext Down':'TED','Tricep Ext Up':'TEU','Forearm Raise - Cable':'FRC'
};
const DAY_TYPES = {
  'Mon':'Push','Monday':'Push','Monday - Push':'Push',
  'Tues':'Pull','Tuesday':'Pull','Tuesday - Pull':'Pull',
  'Wed':'Legs / Core','Wednesday':'Legs / Core','Wednesday - Legs / Core':'Legs / Core',
  'Thurs':'Arms / Chest','Thursday':'Arms / Chest','Thursday - Arms / Chest':'Arms / Chest',
  'Fri':'Shoulders','Friday':'Shoulders','Friday - Shoulders':'Shoulders',
  'Sat':'Cardio','Saturday':'Cardio'
};
// Week 1 = Oct 28, 2024
const WEEK1 = new Date('2024-10-28T00:00:00');
const DAY_OFF = {Mon:0,Tues:1,Wed:2,Thurs:3,Fri:4,Sat:5};

const IMAGES = [];
for(let n=1;n<=48;n++) IMAGES.push({src:'zip1',n,key:`zip1_${n}.jpeg`});
for(let n=1;n<=64;n++) IMAGES.push({src:'zip2',n,key:`zip2_${n}.jpeg`});
for(let n=1;n<=40;n++) IMAGES.push({src:'zip3',n,key:`zip3_${n}.jpeg`});

const PROMPT = `Extract workout data from this gym log page. Return ONLY valid JSON, no markdown.

FORMAT A: Handwritten 2024 notebook. Page header shows week number + date (e.g. "4 - Nov 18"). Session headers like "Mon 3" or "Tues 4". Exercises inline: "Bench Press 40x20 50x15" (weight x reps). Left margin notes: Cable/DB/lat cable etc = implement type.

FORMAT B: Printed 2025 template. Session header "Monday - Push". Date field M/D. Grid: Exercise | S1 Reps | S1 Weight | S2 Reps | S2 Weight | S3 Reps | S3 Weight | S4 Reps | S4 Weight.

FORMAT C: Printed 2026 template. Session header "Monday - Push". Date M/D. Sleep + Duration fields. Grid: Exercise | Variation | Set Reps Weight x3. Notes row.

CANONICAL EXERCISES — use EXACTLY these names:
Push: Bench Press, Incline Press, Decline Press, Incline Fly, Lateral Raises, Seated Shoulder Press, Tricep Pushdowns, Overhead Tricep Ext, High Cable Fly, Cable Cross Overs, Wrist Twist
Pull: Lat Pulldown, Bent Over Rows, Cable Rows, Face Pulls, Rear Delt Raises, Bicep Curls - Preacher, Hammer Curls, Cable Shrugs, Cable Curls, Barbell Shrugs
Legs: Leg Press, Leg Extensions, Leg Curls, Hip Thrust, Nordic Curl, Reverse Hyper, DB Calf Raises, Smith Mach Calf Raises, Back Extension, Forward Back Stretch
Arms/Chest: Cable Press, Low Cable Fly, Incline Curls, Overhead Tricep Press, Curls (Standing), Tricep Ext Down, Tricep Ext Up, Forearm Raise - Cable

VARIATION: implement or style (Rope 1/2, Bar 1/2, V-Bar, EZ-Bar, DBs, DBs ea, Cable - 2 Hand, Lat Machine, Smith Machine, etc.). For 2026 format use the Variation column value.

PAGE HEADER DATE (Format A only): extract the week start date from the header (e.g. "4 - Nov 18" → page_date = "Nov 18, 2024") so I can derive exact session dates.

Return JSON:
{"format":"A","page_date":null,"sessions":[{"label":"Mon 3","date_explicit":null,"sleep_hrs":null,"duration_min":null,"exercises":[{"canonical":"Incline Press","variation":"DBs","sets":[{"set":1,"weight":40,"reps":20},{"set":2,"weight":45,"reps":20},{"set":3,"weight":50,"reps":10}]}]}]}

Rules: skip sets where reps=0 or blank. Handwritten: weight x reps. Printed: use Weight column as-is. Corrections: use final written value. Blank/note pages: {"format":"A","page_date":null,"sessions":[]}`;

let rawPages = [], allSets = [], allSessions = [], errCnt = 0;

function plog(msg,cls='lk'){
  const l=document.getElementById('proc-log');
  const d=document.createElement('div');d.className=cls;d.textContent=msg;
  l.appendChild(d);l.scrollTop=l.scrollHeight;
}
function pushlog(msg,cls='lk'){
  const l=document.getElementById('push-log');
  const d=document.createElement('div');d.className=cls;d.textContent=msg;
  l.appendChild(d);l.scrollTop=l.scrollHeight;
}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function fetchImage(key){
  const url=`https://mikeblack001.github.io/health-protocol/workout-images/${key}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error(`Fetch ${r.status}: ${key}`);
  const blob=await r.blob();
  return new Promise((res,rej)=>{
    const rd=new FileReader();
    rd.onload=()=>res(rd.result.split(',')[1]);
    rd.onerror=rej;
    rd.readAsDataURL(blob);
  });
}

async function callClaude(b64){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:4096,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
        {type:'text',text:PROMPT}
      ]}]
    })
  });
  if(!r.ok) throw new Error(`Claude ${r.status}: ${(await r.text()).slice(0,100)}`);
  const d=await r.json();
  let t=d.content[0].text.trim().replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
  return JSON.parse(t);
}

function getDate(session, pageDate){
  if(session.date_explicit){
    const [m,d]=session.date_explicit.split('/').map(Number);
    const y=session._src==='zip3'?2026:2025;
    return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  // Format A: use page_date + day offset from label
  if(pageDate){
    const dt=new Date(pageDate);
    // Find Monday of that week
    const dow=dt.getDay(); // 0=Sun
    const mon=new Date(dt);
    mon.setDate(dt.getDate()-(dow===0?6:dow-1));
    const m=(session.label||'').match(/^(Mon|Tues|Wed|Thurs|Fri|Sat)/i);
    if(m){
      const off=DAY_OFF[m[1]]??0;
      const d2=new Date(mon);
      d2.setDate(mon.getDate()+off);
      return d2.toISOString().split('T')[0];
    }
    return mon.toISOString().split('T')[0];
  }
  // Fallback: week number logic
  const m=(session.label||'').match(/^(Mon|Tues|Wed|Thurs|Fri|Sat)\s+(\d+)/i);
  if(m){
    const off=DAY_OFF[m[1]]??0,wk=parseInt(m[2]);
    const d=new Date(WEEK1);
    d.setDate(d.getDate()+(wk-1)*7+off);
    return d.toISOString().split('T')[0];
  }
  return null;
}

function getDayType(label){
  if(!label)return'Unknown';
  if(DAY_TYPES[label])return DAY_TYPES[label];
  for(const k of Object.keys(DAY_TYPES))if(label.startsWith(k))return DAY_TYPES[k];
  const m=label.match(/^(Mon|Tues|Wed|Thurs|Fri|Sat)/i);
  return m?(DAY_TYPES[m[1]]||'Unknown'):'Unknown';
}

function parsePageDate(pd){
  if(!pd)return null;
  // e.g. "Nov 18, 2024" or "Nov 18" or "11/18"
  try{
    const d=new Date(pd+(pd.includes('202')?'':' 2024'));
    if(!isNaN(d))return d;
  }catch(e){}
  return null;
}

async function run(){
  plog(`Starting: ${IMAGES.length} images from GitHub...`,'li');
  
  for(let i=0;i<IMAGES.length;i++){
    const img=IMAGES[i];
    const pct=((i+1)/IMAGES.length*100).toFixed(1);
    document.getElementById('proc-bar').style.width=pct+'%';
    document.getElementById('proc-pct').textContent=`${i+1}/${IMAGES.length} (${pct}%)`;
    document.getElementById('proc-status').textContent=`Processing ${img.src} page ${img.n}...`;
    
    try{
      const b64=await fetchImage(img.key);
      const result=await callClaude(b64);
      result._src=img.src;result._page=img.n;
      rawPages.push(result);
      const ns=(result.sessions||[]).length;
      const nx=(result.sessions||[]).reduce((a,s)=>a+(s.exercises||[]).length,0);
      const nset=(result.sessions||[]).reduce((a,s)=>a+(s.exercises||[]).reduce((b,e)=>b+(e.sets||[]).length,0),0);
      if(ns>0)plog(`[${img.src} p${img.n}] ${ns} sess · ${nx} ex · ${nset} sets`,'lok');
      else plog(`[${img.src} p${img.n}] blank`,'lk');
    }catch(e){
      plog(`[${img.src} p${img.n}] ERROR: ${e.message}`,'lerr');
      errCnt++;
      rawPages.push({_src:img.src,_page:img.n,sessions:[],error:e.message});
    }
    if(i<IMAGES.length-1)await sleep(1600);
  }
  
  plog('── DONE ──','li');
  buildData();
}

function buildData(){
  const sets=[],sessMap=new Map();
  for(const pg of rawPages){
    if(!pg.sessions)continue;
    const pd=parsePageDate(pg.page_date);
    for(const sess of pg.sessions){
      sess._src=pg._src;
      const date=getDate(sess,pd);
      if(!date)continue;
      const day=getDayType(sess.label);
      const sessionStr=`${date} ${day}`;
      const key=`${date}|${day}`;
      if(!sessMap.has(key))sessMap.set(key,{session:sessionStr,date,day});
      for(const ex of(sess.exercises||[])){
        const canon=ex.canonical||'Unknown';
        const ab=ABBREVS[canon]||canon.replace(/[^A-Za-z]/g,'').slice(0,5).toUpperCase();
        for(const s of(ex.sets||[])){
          if(!s.reps||s.reps===0)continue;
          sets.push({
            [SF.SetID]:`${date}-${ab}-${s.set}`,
            [SF.Date]:date,[SF.Session]:sessionStr,
            [SF.Exercise]:canon,[SF.Variation]:ex.variation||'',
            [SF.SetNum]:s.set,[SF.Reps]:s.reps,[SF.Weight]:s.weight||0,[SF.Day]:day
          });
        }
      }
    }
  }
  allSets=sets;allSessions=Array.from(sessMap.values());
  document.getElementById('ph-proc').style.display='none';
  document.getElementById('ph-results').style.display='block';
  document.getElementById('s-pages').textContent=rawPages.length;
  document.getElementById('s-sessions').textContent=allSessions.length;
  document.getElementById('s-sets').textContent=allSets.length;
  document.getElementById('s-errors').textContent=errCnt;
}

function dlJSON(){
  const b=new Blob([JSON.stringify({sessions:allSessions,sets:allSets,raw:rawPages},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='workout_extracted.json';a.click();
}

async function atFetch(path,opts={}){
  const r=await fetch(`https://api.airtable.com/v0${path}`,{
    ...opts,headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json',...(opts.headers||{})}
  });
  if(!r.ok)throw new Error(`AT ${r.status}: ${(await r.text()).slice(0,120)}`);
  return r.json();
}

async function wipeTable(tid,name,fid){
  pushlog(`Fetching ${name} IDs...`,'li');
  let offset=null,ids=[];
  do{
    let url=`/${AT_BASE}/${tid}?pageSize=100&fields[]=${fid}`;
    if(offset)url+=`&offset=${offset}`;
    const d=await atFetch(url);
    ids.push(...d.records.map(r=>r.id));
    offset=d.offset||null;
    if(ids.length%500===0||!offset)pushlog(`  ${name}: ${ids.length} IDs`,'lk');
    await sleep(80);
  }while(offset);
  pushlog(`Deleting ${ids.length} ${name}...`,'lw');
  for(let i=0;i<ids.length;i+=10){
    const qs=ids.slice(i,i+10).map(id=>`records[]=${id}`).join('&');
    await atFetch(`/${AT_BASE}/${tid}?${qs}`,{method:'DELETE'});
    if((i+10)%500===0||i+10>=ids.length)pushlog(`  Deleted ${Math.min(i+10,ids.length)}/${ids.length}`,'lk');
    await sleep(80);
  }
  pushlog(`✓ ${name} wiped`,'lok');
}

async function pushBatch(tid,records,name){
  const sz=50;let pushed=0;
  for(let i=0;i<records.length;i+=sz){
    const batch=records.slice(i,i+sz);
    await atFetch(`/${AT_BASE}/${tid}`,{method:'POST',body:JSON.stringify({records:batch,typecast:true})});
    pushed+=batch.length;
    const pct=(pushed/records.length*100).toFixed(0);
    document.getElementById('push-bar').style.width=pct+'%';
    document.getElementById('push-pct').textContent=`${name}: ${pushed}/${records.length} (${pct}%)`;
    if(pushed%500===0||pushed===records.length)pushlog(`  ${name}: ${pushed}/${records.length}`,'lok');
    await sleep(120);
  }
}

async function wipeAndPush(){
  document.getElementById('ph-results').style.display='none';
  document.getElementById('ph-push').style.display='block';
  try{
    document.getElementById('push-status').textContent='Wiping Sets...';
    await wipeTable(TBL_SETS,'Sets',SF.Weight);
    document.getElementById('push-status').textContent='Wiping Sessions...';
    await wipeTable(TBL_SESS,'Sessions',SESSF.Day);
    document.getElementById('push-status').textContent='Pushing Sessions...';
    await pushBatch(TBL_SESS,allSessions.map(s=>({fields:{[SESSF.Session]:s.session,[SESSF.Date]:s.date,[SESSF.Day]:s.day}})),'Sessions');
    document.getElementById('push-status').textContent='Pushing Sets...';
    await pushBatch(TBL_SETS,allSets.map(s=>({fields:s})),'Sets');
    document.getElementById('push-status').textContent='✅ COMPLETE';
    pushlog(`Done! ${allSessions.length} sessions + ${allSets.length} sets pushed to Airtable.`,'lok');
  }catch(e){
    pushlog(`FATAL: ${e.message}`,'lerr');
    document.getElementById('push-status').textContent='❌ ERROR';
  }
}

// Auto-run on load
window.onload = () => run();
</script>
</body>
</html>
