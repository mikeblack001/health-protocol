<!-- ADD RECORD MODAL -->

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const AT_TOK='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6';

// Sets table field IDs
const LOG={
  tbl:'tblKDqjy5RzqaJvjr',
  date:'fld75zYXknF0RtCWH',
  ex:'fldZ93A1t7fGjjsSS',
  var:'fld2TZdmCOloH0gAK',
  setN:'fldNm9Ao0rmcwwDXo',
  reps:'fldelUngWHRTm48m1',
  wt:'fldmrbBmfgSMtREMt',
  day:'fldypzlwqw9AzWrEE',
  sess:'fldBChNmPkNg61oTN',
  verified:'fldEks3PPooSZ1j38'
};

const GCL_ID='478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const GSCOPE='https://www.googleapis.com/auth/drive.readonly';
const QUICK_PDF=[
  {n:'📋 Workouts 2024-25',id:'1eYtQT3c14psKbxRkKtbLoNtiLFEnOFhF'},
  {n:'📋 Workouts 2025',id:'1VgIqXOQUc5qLzzAaWQ1FQZxIMBAacGP9'},
  {n:'📋 Workouts 2026',id:'1u7wc9rGFZD_n7e0L2hbwnEhRciVwxykvwcp5MVNeYIaYn0dDE'}
];
const CMPS=['Back Extension','Barbell Shrugs','Bench Press','Bent Over Rows','Bicep Curls-Preacher','Cable Cross Overs 1/2 ea','Cable Curls 1/2 ea','Cable Press 1/2 ea','Cable Rows','Cable Shrugs 1/2','Curls (Standing)','DB Calf Raises','Decline Press','Face Pulls','Forearm Raise - Cable 1/2','Forward Back Stretch','Hammer Curls','High Cable Fly 1/2 ea','Hip Thrust','Incline Curls','Incline Fly','Incline Press','Lat Pulldown','Lateral Raises','Leg Curls','Leg Extensions','Leg Press','Low Cable Fly 1/2 ea','Nordic Curl','Overhead Tricep Ext','Overhead Tricep Press','Rear Delt Raises','Reverse Hyper','Seated Shoulder Press','Smith Mach Calf Raises','Tricep Ext Down 1/2','Tricep Ext Up','Tricep Pushdowns 1/2','Wrist Twist'];

const LS={get:k=>localStorage.getItem('mba_vs_'+k),set:(k,v)=>localStorage.setItem('mba_vs_'+k,v)};
let curDate=null,logRecs=[],allDates=[],gTok=null;
window.pg=1;window.pdfDoc=null;window.pdfInitLoad=true;let pickerFiles=[],pickerStack=[{id:'root',name:'My Drive'}];

// ── AUTH ──────────────────────────────────────────────────────────────
function initAuth(){setDriveBtn();}
function setDriveBtn(){
  const b=document.getElementById('drive-btn');
  if(gTok){b.textContent='🟢 Drive';b.className='ok';}
  else{b.textContent='🔴 Drive';b.className='no';}
}
function getGoogleToken(cb){
  if(gTok){cb(gTok);return;}
  const scope=encodeURIComponent('https://www.googleapis.com/auth/drive.readonly');
  const redirect=encodeURIComponent(location.origin+location.pathname);
  const url=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${GCL_ID}&redirect_uri=${redirect}&response_type=token&scope=${scope}`;
  const w=window.open(url,'gauth','width=500,height=600');
  if(!w){alert('Pop-up blocked — allow pop-ups for this site');return;}
  const chk=setInterval(()=>{
    try{
      if(w.closed){clearInterval(chk);return;}
      const hash=w.location.hash;
      if(hash&&hash.includes('access_token')){
        clearInterval(chk);w.close();
        gTok=new URLSearchParams(hash.substring(1)).get('access_token');
        cb(gTok);
        setDriveBtn();
      }
    }catch(e){}
  },300);
}
function signIn(){getGoogleToken(()=>{setSt('Drive connected');});}

// ── UTILITIES ─────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSt(m){document.getElementById('st').textContent=m;}

function getWkDates(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));
  const dates=[];
  for(let i=0;i<7;i++){const x=new Date(mon);x.setDate(mon.getDate()+i);dates.push(x.toISOString().split('T')[0]);}
  return dates;
}

function getRowOrder(dateStr){
  const mon=getWkDates(dateStr)[0];
  const raw=LS.get('row_order_'+mon);
  try{return raw?JSON.parse(raw):[];}catch{return[];}
}
function saveRowOrder(arr,dateStr){
  const mon=getWkDates(dateStr)[0];
  LS.set('row_order_'+mon,JSON.stringify(arr));
}

// ── AIRTABLE ──────────────────────────────────────────────────────────
async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

// ── DATE LOADING ──────────────────────────────────────────────────────
async function loadDates(){
  setSt('Loading dates…');
  const flds='fields%5B%5D='+LOG.date+'&fields%5B%5D='+LOG.verified;
  let recs=[],off=null;
  do{const d=await atFetch(LOG.tbl+'?'+flds+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
  allDates=[...new Set(recs.map(r=>r.fields[LOG.date]).filter(Boolean))].sort();
  document.getElementById('d-cnt').textContent=allDates.length+' dates';
  buildDateSel();
  buildWeekSel();
  // Auto-select most recent unverified date
  const byDate={};
  allDates.forEach(d=>{byDate[d]={total:0,verified:0};});
  recs.forEach(r=>{
    const dt=(r.fields[LOG.date]||'').slice(0,10);
    if(!byDate[dt])return;
    byDate[dt].total++;
    if(r.fields[LOG.verified]===true)byDate[dt].verified++;
  });
  const firstUnverified=allDates.slice().reverse().find(d=>byDate[d]&&byDate[d].verified<byDate[d].total);
  if(firstUnverified)setDate(firstUnverified);
  else if(allDates.length)setDate(allDates[allDates.length-1]);
  setSt('');
}

function buildWeekSel(){
  const sel=document.getElementById('w-sel');
  sel.innerHTML='<option value="">— Week —</option>';
  const monSet=new Set();
  allDates.forEach(d=>{
    const dt=new Date(d+'T12:00:00'),dow=dt.getDay();

  });
  [...monSet].sort().forEach(mon=>{

function selDate(){const d=document.getElementById('d-sel').value;if(d)setDate(d);}
function selWeek(){
  const mon=document.getElementById('w-sel').value;if(!mon)return;
  const wkDates=getWkDates(mon);
  const first=wkDates.find(d=>allDates.includes(d));
  if(first)setDate(first);
}

function navD(dir){
  if(!curDate){if(allDates.length)setDate(allDates[0]);return;}
  const i=allDates.indexOf(curDate);
  const next=allDates[i+dir];
  if(next)setDate(next);
}
function navW(dir){
  if(!curDate)return;
  const days=getWkDates(curDate);
  const boundary=dir<0?days[0]:days[6];
  const target=new Date(boundary+'T12:00:00');
  target.setDate(target.getDate()+dir*7);
  const tgt=target.toISOString().split('T')[0];
  const wkDates=getWkDates(tgt);
  const first=dir>0?wkDates.find(d=>allDates.includes(d)):wkDates.slice().reverse().find(d=>allDates.includes(d));
  if(first)setDate(first);
}

// ── SET DATE / LOAD RECORDS ───────────────────────────────────────────
async function setDate(date){
  curDate=date;
  document.getElementById('d-sel').value=date;
  const dt=new Date(date+'T12:00:00'),dow=dt.getDay();
  const mon=new Date(dt);mon.setDate(dt.getDate()-((dow+6)%7));
  document.getElementById('w-sel').value=mon.toISOString().split('T')[0];
  setSt('Loading…');
  try{
    const q=encodeURIComponent('IS_SAME({'+LOG.date+'},"'+date+'","day")');
    let recs=[],off=null;
    do{const d=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true&filterByFormula='+q+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
    logRecs=recs;
    document.getElementById('b-total').textContent=recs.length+' sets';
    loadWeekGrid(date);
    const allVerified=recs.length>0&&recs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allVerified);
    renderRecords();setSt('');
  }catch(e){setSt('Error: '+e.message);}
}
async function reloadLog(){if(curDate)await setDate(curDate);}

// ── VERIFY ────────────────────────────────────────────────────────────
let dateVerified=false;
function updateVerifyBtn(verified){
  dateVerified=verified;
  const btn=document.getElementById('verify-date-btn');
  if(!btn)return;
  if(verified){btn.textContent='✓ Date Verified';btn.style.background='#15803d';btn.style.borderColor='#15803d';}
  else{btn.textContent='○ Mark Date Verified';btn.style.background='#eab308';btn.style.borderColor='#eab308';}
}

async function toggleDateVerified(){
  if(!logRecs.length){setSt('No records to verify');return;}
  const newVal=!dateVerified;
  setSt('Saving…');
  try{
    for(let i=0;i<logRecs.length;i+=10){
      const batch=logRecs.slice(i,i+10);
      const records=batch.map(r=>({id:r.id,fields:{[LOG.verified]:newVal}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records,returnFieldsByFieldId:true})});
    }
    logRecs.forEach(r=>r.fields[LOG.verified]=newVal);
    updateVerifyBtn(newVal);
    setSt(newVal?'✓ Date verified':'✓ Date unverified');
    renderRecords();
    loadWeekGrid(curDate);
    if(newVal){
      const i=allDates.indexOf(curDate);
      if(i>=0&&i+1<allDates.length)setTimeout(()=>setDate(allDates[i+1]),400);
    }
  }catch(e){setSt('Error: '+e.message);}
}

async function verifyWeek(){
  if(!curDate){setSt('Select a date first');return;}
  const days=getWkDates(curDate);
  setSt('Verifying week…');
  const orParts=days.map(d=>`IS_SAME({${LOG.date}},"${d}","day")`).join(',');
  const q=encodeURIComponent(`AND(OR(${orParts}),{${LOG.verified}}=FALSE())`);
  let recs=[],off=null;
  try{
    do{
      const d=await atFetch(LOG.tbl+'?filterByFormula='+q+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));
      recs=recs.concat(d.records);off=d.offset;
    }while(off);
    if(!recs.length){setSt('Week already verified');return;}
    for(let i=0;i<recs.length;i+=10){
      const batch=recs.slice(i,i+10).map(r=>({id:r.id,fields:{[LOG.verified]:true}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records:batch,returnFieldsByFieldId:true})});
    }
    setSt('✓ Week verified ('+recs.length+' sets)');
    const wBtn=document.getElementById('verify-week-btn');
    if(wBtn){wBtn.style.background='#16a34a';wBtn.style.borderColor='#16a34a';wBtn.textContent='✓ Verified!';}
    const lastDayOfWeek=days[days.length-1];
    const nextDate=allDates.find(d=>d>lastDayOfWeek);
    if(nextDate)setTimeout(()=>setDate(nextDate),1200);
    else await setDate(curDate);
  }catch(e){setSt('Error: '+e.message);}
}

// ── WEEK GRID ─────────────────────────────────────────────────────────
async function loadWeekGrid(date){
  const wg=document.getElementById('wgrid'),ws=document.getElementById('wg-status');
  if(!wg)return;

  // Daily view — use logRecs already loaded for this date
  // Also fetch rest of week for verify week button count
  const days=getWkDates(date);
  ws.textContent='Building…';

  // Build exercise → sets map from logRecs (current date only)
  const data={};    // key → {ex, sets:[{setN,reps,wt,verified,id}]}
  const keyOrder=[];
  logRecs.forEach(r=>{
    const f=r.fields,ex=f[LOG.ex]||'';
    if(!ex)return;
    const key=ex+'||';
    if(!data[key]){data[key]={ex,sets:[]};keyOrder.push(key);}
    data[key].sets.push({setN:f[LOG.setN]||0,reps:f[LOG.reps]||0,wt:f[LOG.wt]||0,verified:f[LOG.verified]===true,id:r.id});
  });
  // Sort sets within each exercise by set number
  Object.values(data).forEach(d=>d.sets.sort((a,b)=>a.setN-b.setN));

  // Apply saved row order
  const saved=getRowOrder(date).filter(s=>keyOrder.includes(s));
  const orderedKeys=[];
  saved.forEach(s=>{if(!orderedKeys.includes(s))orderedKeys.push(s);});
  keyOrder.forEach(k=>{if(!orderedKeys.includes(k))orderedKeys.push(k);});

  // Find max sets across all exercises for column count
  const maxSets=Math.max(1,...Object.values(data).map(d=>d.sets.length));

  const curDt=new Date(date+'T12:00:00');
  const DN2=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayLabel=DN2[curDt.getDay()]+' '+date.slice(5);
  let h='<thead><tr><th style="min-width:160px">Exercise<br><span style="font-size:10px;font-weight:400;color:#9ca3af">'+dayLabel+'</span></th>';
  for(let i=0;i<maxSets;i++){
    h+=`<th style="text-align:center;min-width:90px;font-size:10px">S${i+1}</th>`;
  }
  h+='</tr></thead><tbody>';

  orderedKeys.forEach(key=>{
    const {ex,sets}=data[key];
    const allVerified=sets.length>0&&sets.every(s=>s.verified);
    const rowBg=allVerified?'#f0fdf4':'';
    h+=`<tr data-cmp="${esc(ex)}" data-key="${esc(key)}" style="background:${rowBg}">`;
    h+=`<td onclick="gridCellClick('${date}','${esc(ex)}')" style="cursor:pointer;font-weight:700;font-size:12px"><span class="drag-handle">⠿</span>${esc(ex)}</td>`;
    for(let i=0;i<maxSets;i++){
      const s=sets[i];
      if(!s){
        h+=`<td></td>`;
      } else {
        const bg=s.verified?'#dcfce7':'#dbeafe';
        const fg=s.verified?'#15803d':'#1e40af';
        const label=s.wt?`<b>${s.reps}</b><span style="font-size:9px;color:#6b7280">×</span><b>${s.wt}</b><span style="font-size:9px">lb</span>`
          :`<b>${s.reps}</b><span style="font-size:9px">reps</span>`;
        h+=`<td onclick="scrollToCard('${s.id}')" style="cursor:pointer;background:${bg};color:${fg};text-align:center;padding:4px 3px;font-size:12px;white-space:nowrap">${label}</td>`;
      }
    }
    h+=`</tr>`;
  });

  if(!orderedKeys.length){
    h+=`<tr><td colspan="${maxSets+1}" style="padding:16px;color:#9ca3af;font-style:italic">No sets for this date</td></tr>`;
  }
  h+='</tbody>';
  wg.innerHTML=h;
  ws.textContent=orderedKeys.length+' exercises · '+logRecs.length+' sets';

  // Update Verify Week button — fetch week total async in background
  const wBtn=document.getElementById('verify-week-btn');
  if(wBtn){
    const totalDay=logRecs.length;
    const verifiedDay=logRecs.filter(r=>r.fields[LOG.verified]===true).length;
    const dayDone=totalDay>0&&verifiedDay===totalDay;
    wBtn.style.background=dayDone?'#16a34a':'#eab308';
    wBtn.style.borderColor=dayDone?'#16a34a':'#eab308';
    wBtn.textContent=dayDone?'✓ Week Verified':'✓ Verify Week';
  }
  initGridDrag();
  renderRecordsOrdered(orderedKeys);
}

function scrollToCard(id){
  const card=document.getElementById('card_'+id);
  if(card){
    document.querySelectorAll('.card').forEach(c=>c.style.outline='');
    card.scrollIntoView({behavior:'smooth',block:'center'});
    card.style.outline='3px solid #2563eb';
    setTimeout(()=>card.style.outline='',2000);
  }
}

function initGridDrag(){
  const tbody=document.querySelector('#wgrid tbody');
  if(!tbody)return;
  let src=null,lastOver=null;
  tbody.addEventListener('mousedown',e=>{
    const row=e.target.closest('tr[data-key]');if(!row)return;
    src=row;row.classList.add('wg-dragging');document.body.style.userSelect='none';
  });
  tbody.addEventListener('mouseover',e=>{
    if(!src)return;
    const target=e.target.closest('tr[data-key]');
    if(target===lastOver)return;
    if(lastOver)lastOver.classList.remove('wg-drop-above');
    lastOver=null;
    if(!target||target===src)return;
    target.classList.add('wg-drop-above');lastOver=target;
  });
  document.addEventListener('mouseup',e=>{
    if(!src)return;
    const target=e.target.closest('tr[data-key]');
    tbody.querySelectorAll('.wg-dragging').forEach(r=>r.classList.remove('wg-dragging'));
    tbody.querySelectorAll('.wg-drop-above').forEach(r=>r.classList.remove('wg-drop-above'));
    document.body.style.userSelect='';lastOver=null;
    if(target&&target!==src){
      const rows=[...tbody.querySelectorAll('tr[data-key]')];
      if(rows.indexOf(target)>rows.indexOf(src))tbody.insertBefore(src,target.nextSibling);
      else tbody.insertBefore(src,target);
      const visibleOrder=[...tbody.querySelectorAll('tr[data-key]')].map(r=>r.dataset.key);
      saveRowOrder(visibleOrder,curDate);
      renderRecordsOrdered(visibleOrder);
      setSt('Order saved');
    }
    src=null;
  });
}

// ── RENDER RECORDS ────────────────────────────────────────────────────
function renderRecordsOrdered(order){
  if(!logRecs.length){document.getElementById('records').innerHTML='<div class="empty">No sets for this date</div>';return;}
  const sorted=[...logRecs].filter(r=>r.fields[LOG.ex]).sort((a,b)=>{
    const ak=(a.fields[LOG.ex]||'')+'||';
    const bk=(b.fields[LOG.ex]||'')+'||';
    const ai=order.indexOf(ak),bi=order.indexOf(bk);
    const aPos=ai===-1?order.findIndex(k=>k.split('||')[0]===(a.fields[LOG.ex]||'')):ai;
    const bPos=bi===-1?order.findIndex(k=>k.split('||')[0]===(b.fields[LOG.ex]||'')):bi;
    if(aPos!==bPos)return(aPos===-1?999:aPos)-(bPos===-1?999:bPos);
    return(a.fields[LOG.setN]||0)-(b.fields[LOG.setN]||0);
  });
  renderGroupedTable(sorted);
  if(window._highlightedCard){
    const el=document.getElementById('card_'+window._highlightedCard.id);
    if(el){el.style.outline='3px solid #2563eb';el.scrollIntoView({behavior:'smooth',block:'center'});}
  }
}
function renderRecords(){
  if(!logRecs.length){document.getElementById('records').innerHTML='<div class="empty">No sets for this date</div>';return;}
  // Sort by minimum set# per exercise — preserves original log order (matches PDF order)
  const exFirstSet={};
  logRecs.forEach(r=>{
    const ex=r.fields[LOG.ex]||'';
    const n=r.fields[LOG.setN]||999;
    if(!exFirstSet[ex]||n<exFirstSet[ex])exFirstSet[ex]=n;
  });
  const sorted=[...logRecs].filter(r=>r.fields[LOG.ex]).sort((a,b)=>{
    const ea=a.fields[LOG.ex]||'',eb=b.fields[LOG.ex]||'';
    if(ea!==eb)return (exFirstSet[ea]||999)-(exFirstSet[eb]||999);
    return(a.fields[LOG.setN]||0)-(b.fields[LOG.setN]||0);
  });
  renderGroupedTable(sorted);
}
function renderGroupedTable(sorted){
  // Group by exercise, preserve order
  const groups={};const groupOrder=[];
  sorted.forEach(r=>{
    const ex=r.fields[LOG.ex]||'?';
    if(!groups[ex]){groups[ex]=[];groupOrder.push(ex);}
    groups[ex].push(r);
  });
  // Max sets across all exercises
  const maxSets=Math.max(1,...Object.values(groups).map(g=>g.length));

  // Header: Exercise | S1 | Reps | Weight | S2 | Reps | Weight | ...
  let html='<table style="border-collapse:collapse;width:100%;font-size:12px">';
  html+='<thead><tr style="background:#1e2433;color:#fff">';
  html+='<th style="padding:6px 10px;text-align:left;font-size:11px;min-width:160px;position:sticky;left:0;background:#1e2433">Exercise</th>';
  for(let i=0;i<maxSets;i++){
    html+=`<th style="padding:4px 8px;text-align:center;font-size:10px;font-weight:700;border-left:2px solid #374151;white-space:nowrap">S${i+1}</th>`;
    html+=`<th style="padding:4px 6px;text-align:center;font-size:10px;color:#93c5fd">Reps</th>`;
    html+=`<th style="padding:4px 6px;text-align:center;font-size:10px;color:#fcd34d">Wt</th>`;
  }
  html+='<th style="padding:4px 8px;font-size:10px">✓</th>';
  html+='</tr></thead><tbody>';

  groupOrder.forEach(ex=>{
    const recs=groups[ex];
    const allVerified=recs.every(r=>r.fields[LOG.verified]===true);
    const rowBg=allVerified?'#f0fdf4':'#fff';
    html+=`<tr style="background:${rowBg};border-bottom:1px solid #e5e7eb">`;
    html+=`<td style="padding:5px 10px;font-weight:700;font-size:12px;border-right:2px solid #e2e5ea;background:${allVerified?'#dcfce7':'#f8fafc'};position:sticky;left:0">${esc(ex)}</td>`;
    for(let i=0;i<maxSets;i++){
      const r=recs[i];
      if(!r){
        html+=`<td colspan="3" style="border-left:2px solid #f3f4f6"></td>`;
      } else {
        const f=r.fields;
        const reps=f[LOG.reps]||'';
        const wt=f[LOG.wt]||'';
        const verified=f[LOG.verified]===true;
        const setN=f[LOG.setN]||i+1;
        html+=`<td style="padding:3px 4px;text-align:center;border-left:2px solid #e5e7eb;font-size:10px;color:#6b7280">S${esc(setN)}</td>`;
        html+=`<td id="card_${r.id}" style="padding:2px 3px;text-align:center">
          <input value="${esc(reps)}" placeholder="—" type="number" style="width:48px;padding:2px 4px;border:1px solid #bfdbfe;border-radius:4px;font-size:12px;font-weight:700;background:#dbeafe;color:#1d4ed8;text-align:center"
            onblur="saveField('${r.id}','${LOG.reps}',parseFloat(this.value)||null)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </td>`;
        html+=`<td style="padding:2px 3px;text-align:center">
          <input value="${esc(wt)}" placeholder="—" type="number" style="width:54px;padding:2px 4px;border:1px solid #fde68a;border-radius:4px;font-size:12px;font-weight:700;background:#fef3c7;color:#92400e;text-align:center"
            onblur="saveField('${r.id}','${LOG.wt}',parseFloat(this.value)||null)"
            onkeydown="if(event.key==='Enter')this.blur()">
        </td>`;
      }
    }
    // Verify button — one per exercise row
    const anyId=recs[0]?.id;
    const allV=recs.every(r=>r.fields[LOG.verified]===true);
    html+=`<td style="padding:3px 6px;text-align:center;white-space:nowrap">
      <button class="abtn ${allV?'a-verified':'a-verify'}" onclick="toggleExVerify('${ex}',${allV})" title="${allV?'Unverify all':'Verify all'}">${allV?'✓':'○'}</button>
    </td>`;
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('records').innerHTML=html;
}

// ── INLINE SAVE ───────────────────────────────────────────────────────
async function saveField(id,field,value){
  const fields={};fields[field]=value===''||value===null?null:value;
  try{
    const res=await atFetch(LOG.tbl+'/'+id+'?returnFieldsByFieldId=true',{method:'PATCH',body:JSON.stringify({fields})});
    const i=logRecs.findIndex(r=>r.id===id);
    if(i>=0){logRecs[i]={...logRecs[i],fields:{...logRecs[i].fields,...res.fields}};refreshCard(logRecs[i]);}
    flashSaved(id);
    const allV2=logRecs.length>0&&logRecs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allV2);
    loadWeekGrid(curDate);
  }catch(e){setSt('Save error: '+e.message);}
}

  const el=document.getElementById('card_'+r.id);
  if(!el)return;
  const f=r.fields;
  const repsEl=el.querySelector('.fe-reps');
  const wtEl=el.querySelector('.fe-wt');

  if(repsEl)repsEl.value=f[LOG.reps]||'';
  if(wtEl)wtEl.value=f[LOG.wt]||'';
  if(varEl)varEl.value=f[LOG.var]||'';

}

function flashSaved(id){

}

async function toggleVerify(id,currentVerified){
  await saveField(id,LOG.verified,currentVerified!==true);
}

// ── GRID CELL CLICK ───────────────────────────────────────────────────
async function gridCellClick(date,ex){
  if(date!==curDate)await setDate(date);
  const cards=[...document.querySelectorAll('.card')];
  const found=cards.find(card=>{const s=card.querySelector('select.fe-ex');return s&&s.value===ex;});
  if(found){
    document.querySelectorAll('.card').forEach(c=>c.style.outline='');
    found.scrollIntoView({behavior:'smooth',block:'center'});
    found.style.outline='3px solid #2563eb';
    window._highlightedCard={ex};
  } else {
    openAddModalForEx(date,ex);
  }
}

// ── ADD MODAL ─────────────────────────────────────────────────────────
let cmDate=null,cmEx=null;
function openAddModal(){
  if(!curDate){setSt('Select a date first');return;}
  cmDate=curDate;cmEx=null;
  document.getElementById('cm-title').textContent='Add Set — '+curDate;
  document.getElementById('cm-set').value='';
  document.getElementById('cm-reps').value='';
  document.getElementById('cm-wt').value='';
  document.getElementById('cm-var').value='';
  document.getElementById('cm-existing').innerHTML='';
  document.getElementById('cm').style.display='flex';
}
async function openAddModalForEx(date,ex){
  cmDate=date;cmEx=ex;
  document.getElementById('cm-title').textContent=ex+' — '+date;
  const existingSets=logRecs.filter(r=>r.fields[LOG.ex]===ex);
  document.getElementById('cm-set').value=existingSets.length+1;
  document.getElementById('cm-reps').value='';
  document.getElementById('cm-wt').value='';
  document.getElementById('cm-var').value='';
  document.getElementById('cm-existing').innerHTML='<i>Loading last set…</i>';
  document.getElementById('cm').style.display='flex';
  try{
    const filter=encodeURIComponent('{Exercise}="'+ex+'"');
    const d=await atFetch(LOG.tbl+'?filterByFormula='+filter+'&sort%5B0%5D%5Bfield%5D='+LOG.date+'&sort%5B0%5D%5Bdirection%5D=desc&returnFieldsByFieldId=true&fields%5B%5D='+LOG.wt+'&fields%5B%5D='+LOG.reps+'&fields%5B%5D='+LOG.date+'&pageSize=1');
    const rec=d.records?.[0];
    if(rec){
      const f=rec.fields;
      if(f[LOG.wt])document.getElementById('cm-wt').value=f[LOG.wt];
      if(f[LOG.reps])document.getElementById('cm-reps').value=f[LOG.reps];
      document.getElementById('cm-existing').innerHTML=`<i>Last: ${(f[LOG.date]||'').slice(0,10)} — ${f[LOG.reps]||'?'} reps @ ${f[LOG.wt]||'?'} lbs</i>`;
    } else {
      document.getElementById('cm-existing').innerHTML='<i>No prior sets found</i>';
    }
  }catch(e){document.getElementById('cm-existing').innerHTML='<i>Could not load prior sets</i>';}
}
function closeCM(){document.getElementById('cm').style.display='none';}
async function cmSave(){
  const ex=cmEx||(document.getElementById('q-cmp').value||'');
  if(!ex){setSt('Select an exercise');return;}
  const fields={};
  fields[LOG.date]=cmDate;
  fields[LOG.ex]=ex;
  const setN=document.getElementById('cm-set').value;if(setN)fields[LOG.setN]=parseInt(setN);
  const reps=document.getElementById('cm-reps').value;if(reps)fields[LOG.reps]=parseInt(reps);
  const wt=document.getElementById('cm-wt').value;if(wt)fields[LOG.wt]=parseFloat(wt);
  const variation=document.getElementById('cm-var').value;if(variation)fields[LOG.var]=variation;
  // Day/Session
  const dow=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][(new Date(cmDate+'T12:00:00').getDay()+6)%7];
  fields[LOG.day]=dow;fields[LOG.sess]=cmDate+' '+dow;
  try{
    const res=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true',{method:'POST',body:JSON.stringify({records:[{fields}],typecast:true})});
    setSt('✓ Added '+ex+' to '+cmDate);
    closeCM();
    if(cmDate===curDate){logRecs.push(res.records[0]);document.getElementById('b-total').textContent=logRecs.length+' sets';renderRecords();}
    if(!allDates.includes(cmDate)){allDates.push(cmDate);allDates.sort();buildDateSel();}
    loadWeekGrid(curDate);
  }catch(e){setSt('Error: '+e.message);}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCM();});

// ── QUICK ADD ─────────────────────────────────────────────────────────
async function quickAdd(){
  const ex=document.getElementById('q-cmp').value;
  if(!ex||!curDate){setSt('Select exercise and date');return;}
  const fields={};
  fields[LOG.date]=curDate;fields[LOG.ex]=ex;
  const setN=document.getElementById('q-set').value;if(setN)fields[LOG.setN]=parseInt(setN);
  const reps=document.getElementById('q-reps').value;if(reps)fields[LOG.reps]=parseInt(reps);
  const wt=document.getElementById('q-wt').value;if(wt)fields[LOG.wt]=parseFloat(wt);
  const variation=document.getElementById('q-var').value;if(variation)fields[LOG.var]=variation;
  const dow=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][(new Date(curDate+'T12:00:00').getDay()+6)%7];
  fields[LOG.day]=dow;fields[LOG.sess]=curDate+' '+dow;
  try{
    const res=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true',{method:'POST',body:JSON.stringify({records:[{fields}],typecast:true})});
    logRecs.push(res.records[0]);
    renderRecords();
    document.getElementById('b-total').textContent=logRecs.length+' sets';
    ['q-set','q-reps','q-wt','q-var'].forEach(id=>{document.getElementById(id).value='';});
    setSt('✓ Added');
    loadWeekGrid(curDate);
  }catch(e){setSt('Error: '+e.message);}
}

// ── DELETE ────────────────────────────────────────────────────────────
async function delRec(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  card.style.opacity='0.3';card.style.pointerEvents='none';
  setSt('Deleted — <a href="#" onclick="undoDel(event,\''+id+'\')">Undo</a>');
  window._pendingDel=setTimeout(async()=>{
    try{
      await atFetch(LOG.tbl+'/'+id,{method:'DELETE'});
      logRecs=logRecs.filter(r=>r.id!==id);
      card.remove();
      document.getElementById('b-total').textContent=logRecs.length+' sets';
      setSt('✓ Deleted');
      loadWeekGrid(curDate);
    }catch(e){card.style.opacity='';card.style.pointerEvents='';setSt('Error: '+e.message);}
  },3000);
}
function undoDel(e,id){
  e.preventDefault();
  clearTimeout(window._pendingDel);
  const card=document.getElementById('card_'+id);
  if(card){card.style.opacity='';card.style.pointerEvents='';}
  setSt('Undo — record kept');
}

// ── WEEK GRID TOGGLE ──────────────────────────────────────────────────
function toggleWGrid(){
  const body=document.getElementById('wgrid-body');
  const tog=document.getElementById('wg-tog');
  const hidden=body.style.display==='none';
  body.style.display=hidden?'':'none';
  tog.textContent=hidden?'▲ Hide':'▼ Show';
}

// ── PDF ENGINE ────────────────────────────────────────────────────────
let _zoom=1.0,_fitW=true;
function pdfLoad(){
  const id=document.getElementById('pp-id').value.trim();
  if(!id){pmsg('Enter a Drive file ID');return;}
  if(!gTok){pmsg('Sign in to Drive first');signIn();return;}
  LS.set('pdf',id);
  pmsg('Loading…');
  const url=`https://www.googleapis.com/drive/v3/files/${id}?alt=media`;
  pdfjsLib.getDocument({url,httpHeaders:{Authorization:'Bearer '+gTok}}).promise.then(doc=>{
    window.pdfDoc=doc;window.pg=1;
    document.getElementById('btn-prev').disabled=true;
    document.getElementById('btn-next').disabled=doc.numPages<=1;
    renderPg(1);pmsg('');
  }).catch(e=>{pmsg('Error: '+e.message);});
}
function pdfLocal(input){
  const file=input.files[0];if(!file)return;
  pmsg('Loading local file…');
  const reader=new FileReader();
  reader.onload=e=>{
    pdfjsLib.getDocument({data:e.target.result}).promise.then(doc=>{
      window.pdfDoc=doc;window.pg=1;
      document.getElementById('btn-prev').disabled=true;
      document.getElementById('btn-next').disabled=doc.numPages<=1;
      renderPg(1);pmsg('');
    }).catch(err=>{pmsg('Error: '+err.message);});
  };
  reader.readAsArrayBuffer(file);
}
function renderPg(n){
  if(!window.pdfDoc)return;
  window.pdfDoc.getPage(n).then(page=>{
    const area=document.getElementById('pp-area');
    const vw=_fitW?area.clientWidth-12:area.clientWidth;
    const vp0=page.getViewport({scale:1});
    const scale=_fitW?vw/vp0.width:_zoom;
    const vp=page.getViewport({scale});
    const canvas=document.getElementById('pp-canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=vp.width;canvas.height=vp.height;
    page.render({canvasContext:ctx,viewport:vp});
    window.pg=n;
    document.getElementById('pp-pg').textContent=n+' / '+window.pdfDoc.numPages;
    document.getElementById('pp-jp').value=n;
    document.getElementById('btn-prev').disabled=n<=1;
    document.getElementById('btn-next').disabled=n>=window.pdfDoc.numPages;
    const lbl=document.getElementById('pp-zoom-lbl');if(lbl)lbl.textContent=Math.round(scale*100)+'%';
  });
}
function pdfPrev(){if(window.pg>1)renderPg(window.pg-1);}
function pdfNext(){if(window.pdfDoc&&window.pg<window.pdfDoc.numPages)renderPg(window.pg+1);}
function pgGo(n){if(window.pdfDoc&&n>=1&&n<=window.pdfDoc.numPages)renderPg(n);}
function pdfZoom(dir){
  _fitW=false;
  if(dir===0){_fitW=true;if(window.pdfDoc)renderPg(window.pg);return;}
  _zoom=Math.max(0.3,Math.min(4,_zoom+(dir*0.2)));
  if(window.pdfDoc)renderPg(window.pg);
}
function pmsg(m){document.getElementById('pp-msg').textContent=m;}

// ── DRIVE PICKER ──────────────────────────────────────────────────────
async function openPicker(){
  if(!gTok){signIn();return;}
  pickerStack=[{id:'root',name:'My Drive'}];
  document.getElementById('dp-qi').value='';
  renderQuick();renderBC();
  document.getElementById('dpbg').style.display='flex';
  await loadFolder('root');
}
function closePicker(){document.getElementById('dpbg').style.display='none';}
function renderQuick(){
  const el=document.getElementById('dp-sc');
  el.innerHTML='<span style="font-size:10px;font-weight:800;color:#9ca3af">QUICK: </span>';
  QUICK_PDF.forEach(s=>{
    const b=document.createElement('button');
    b.style='padding:3px 10px;border:1px solid #fcd34d;background:#fef9c3;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e';
    b.textContent=s.n;
    b.onclick=()=>{closePicker();document.getElementById('pp-id').value=s.id;LS.set('pdf',s.id);pdfLoad();};
    el.appendChild(b);
  });
}
function renderBC(){
  const el=document.getElementById('dp-bc');el.innerHTML='';
  pickerStack.forEach((f,i)=>{
    if(i>0){const s=document.createElement('span');s.style='color:#9ca3af';s.textContent=' › ';el.appendChild(s);}
    const sp=document.createElement('span');
    sp.style='font-size:11px;font-weight:700;cursor:pointer;color:#2563eb;padding:2px 4px;border-radius:3px';
    if(i===pickerStack.length-1){sp.style.color='#374151';sp.style.cursor='default';}
    else sp.onclick=()=>popTo(i);
    sp.textContent='📁 '+f.name;el.appendChild(sp);
  });
}
async function loadFolder(fid){
  document.getElementById('dp-list').innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px">Loading…</div>';
  if(!gTok){document.getElementById('dp-list').innerHTML='<div style="padding:20px;color:#dc2626;font-size:12px">Not signed in</div>';return;}
  try{
    let q=`'${fid}' in parents and trashed=false`;
    const url=`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType)&orderBy=name&pageSize=100`;
    const r=await fetch(url,{headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();
    pickerFiles=d.files||[];
    renderPickerList(pickerFiles);
  }catch(e){document.getElementById('dp-list').innerHTML='<div style="padding:20px;color:#dc2626;font-size:12px">Error: '+e.message+'</div>';}
}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px">No files</div>';return;}
  el.innerHTML='';
  files.forEach(f=>{
    const div=document.createElement('div');
    div.style='padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:8px';
    div.onmouseover=()=>div.style.background='#f3f4f6';
    div.onmouseout=()=>div.style.background='';
    const isFolder=f.mimeType==='application/vnd.google-apps.folder';
    div.innerHTML=`<span>${isFolder?'📁':'📄'}</span><span>${f.name}</span>`;
    if(isFolder){
      div.onclick=()=>{pickerStack.push({id:f.id,name:f.name});renderBC();loadFolder(f.id);};
    } else {
      div.onclick=()=>{closePicker();document.getElementById('pp-id').value=f.id;LS.set('pdf',f.id);pdfLoad();};
    }
    el.appendChild(div);
  });
}
function filterPicker(){
  const q=document.getElementById('dp-qi').value.toLowerCase();
  renderPickerList(q?pickerFiles.filter(f=>f.name.toLowerCase().includes(q)):pickerFiles);
}
function popTo(i){pickerStack=pickerStack.slice(0,i+1);renderBC();loadFolder(pickerStack[i].id);}

// ── INIT ──────────────────────────────────────────────────────────────
initAuth();
const savedPdf=LS.get('pdf');
if(savedPdf)document.getElementById('pp-id').value=savedPdf;
loadDates();
</script>
