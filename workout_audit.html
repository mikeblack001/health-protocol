<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Audit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1e2433;font-size:13px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#1e2433;color:#fff;flex-shrink:0;flex-wrap:wrap}
#topbar button{padding:4px 10px;border-radius:4px;border:1px solid #374151;background:#2d3748;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
#topbar button:hover{background:#374151}
#date-sel{padding:4px 8px;border-radius:4px;border:1px solid #374151;background:#2d3748;color:#fff;font-size:12px;font-weight:700;max-width:160px}
#week-sel{padding:4px 8px;border-radius:4px;border:1px solid #374151;background:#2d3748;color:#fff;font-size:11px;max-width:120px}
#date-input{padding:4px 8px;border-radius:4px;border:1px solid #374151;background:#2d3748;color:#fff;font-size:11px;width:110px}
#date-input::placeholder{color:#6b7280}
#topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
#b-total{font-size:10px;color:#9ca3af}
#st{font-size:10px;color:#9ca3af;min-width:80px}
#verify-date-btn{padding:4px 12px;border-radius:4px;border:none;background:#eab308;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
#verify-date-btn.verified{background:#16a34a}

/* QUICK ADD */
#qadd{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f8fafc;border-bottom:1px solid #e5e7eb;flex-shrink:0;flex-wrap:wrap}
#qadd select,#qadd input{padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;background:#fff}
#qadd input{width:80px}
#q-save{padding:4px 14px;background:#16a34a;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer}
#q-save:hover{background:#15803d}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT PANEL */
#left{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* SESSION INFO */
#sess-info{padding:8px 12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sess-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1d4ed8}
.sess-badge.night{background:#ede9fe;color:#6d28d9}
.sess-badge.legs{background:#dcfce7;color:#15803d}
.sess-badge.arms{background:#fef9c3;color:#854d0e}
.sess-badge.pull{background:#ffedd5;color:#c2410c}
.sess-stat{font-size:11px;color:#6b7280}
.sess-stat span{font-weight:700;color:#1e2433}
#sess-notes-input{flex:1;padding:3px 8px;border:1px solid #e5e7eb;border-radius:4px;font-size:11px;min-width:0}
#sess-notes-input:focus{outline:none;border-color:#2563eb}

/* SETS AREA */
#sets-wrap{flex:1;overflow-y:auto;padding:10px}
.ex-group{background:#fff;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ex-header{padding:8px 12px;background:#1e2433;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;gap:8px}
.ex-header .ex-count{font-size:10px;font-weight:500;color:#9ca3af}
.set-row{display:flex;align-items:center;gap:0;border-bottom:1px solid #f3f4f6;padding:0}
.set-row:last-child{border-bottom:none}
.set-row:hover{background:#f9fafb}
.set-num{width:32px;text-align:center;font-size:11px;font-weight:700;color:#6b7280;flex-shrink:0;padding:8px 0}
.fe{padding:5px 8px;border:1px solid transparent;border-radius:4px;font-size:12px;background:transparent;cursor:pointer;color:#1e2433}
.fe:hover{border-color:#d1d5db;background:#f9fafb}
.fe:focus{border-color:#2563eb;background:#fff;outline:none}
.fe-var{min-width:90px;color:#6b7280;font-size:11px}
.fe-reps{width:52px;text-align:center;font-weight:700;color:#1d4ed8;background:#dbeafe;border-radius:4px}
.fe-reps:hover{background:#bfdbfe}
.fe-weight{width:68px;text-align:center;font-weight:700;color:#15803d;background:#dcfce7;border-radius:4px}
.fe-weight:hover{background:#bbf7d0}
.fe-notes{flex:1;font-size:11px;color:#6b7280;min-width:0}
.set-del{padding:4px 8px;border:none;background:none;color:#d1d5db;cursor:pointer;font-size:14px;flex-shrink:0}
.set-del:hover{color:#ef4444}
.set-add-row{padding:6px 12px;border-top:1px dashed #e5e7eb}
.set-add-row button{font-size:10px;padding:2px 8px;border:1px solid #d1d5db;border-radius:4px;background:#f9fafb;cursor:pointer;color:#6b7280}
.set-add-row button:hover{background:#f3f4f6;color:#374151}

/* EMPTY STATE */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:#6b7280;gap:8px}
#empty-state .big{font-size:32px}

/* PDF PANEL */
#pp{width:520px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;border-left:1px solid #e5e7eb}
#pp-hdr{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f8fafc;border-bottom:1px solid #e5e7eb;flex-shrink:0}
#pp-hdr b{font-size:11px;font-weight:800;color:#374151}
#pp-load{padding:3px 10px;background:#2563eb;color:#fff;border:none;border-radius:4px;font-size:10px;cursor:pointer;font-weight:700}
#pp-msg{font-size:10px;color:#ef4444;padding:2px 6px}
#pp-frame{flex:1;border:none;width:100%;background:#e5e7eb}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <button onclick="navDate(-1)">◄ Prev</button>
  <select id="date-sel" onchange="selDate()"><option value="">— Select Date —</option></select>
  <select id="week-sel" onchange="selWeek()"><option value="">— Week —</option></select>
  <input id="date-input" placeholder="MMDDYYYY" maxlength="10" onkeydown="if(event.key==='Enter')jumpDateInput()">
  <button onclick="navDate(1)">Next ►</button>
  <div id="topbar-right">
    <span id="b-total"></span>
    <span id="st"></span>
    <button id="verify-date-btn" onclick="toggleVerifySession()">○ Verify Session</button>
  </div>
</div>

<!-- QUICK ADD -->
<div id="qadd">
  <select id="q-ex"><option value="">Exercise…</option></select>
  <input id="q-var" placeholder="Variation" style="width:100px">
  <input id="q-reps" placeholder="Reps" type="number" style="width:60px">
  <input id="q-weight" placeholder="Weight" type="number" style="width:70px">
  <input id="q-notes" placeholder="Notes" style="width:100px">
  <button id="q-save" onclick="quickAddSet()">+ Add Set</button>
  <span style="font-size:10px;color:#9ca3af">Quick add to current session</span>
</div>

<!-- MAIN -->
<div id="main">
  <div id="left">
    <!-- SESSION INFO -->
    <div id="sess-info" style="display:none">
      <span id="sess-day-badge" class="sess-badge"></span>
      <span class="sess-stat">Duration: <span id="sess-dur">—</span> min</span>
      <span class="sess-stat">Sleep: <span id="sess-sleep">—</span> hrs</span>
      <span class="sess-stat">Deep: <span id="sess-deep">—</span> min</span>
      <input id="sess-notes-input" placeholder="Session notes…" onblur="saveSessNotes()">
    </div>

    <!-- SETS -->
    <div id="sets-wrap">
      <div id="empty-state">
        <div class="big">🏋️</div>
        <div>Loading sessions…</div>
      </div>
    </div>
  </div>

  <!-- PDF PANEL -->
  <div id="pp">
    <div id="pp-hdr">
      <b>📄 PDF</b>
      <select id="pp-sel" onchange="pdfSelChange()" style="padding:3px 6px;border:1px solid #374151;border-radius:4px;font-size:10px;background:#2d3748;color:#fff;max-width:130px">
        <option value="">— Select PDF —</option>
        <option value="1eYtQT3c14psKbxRkKtbLoNtiLFEnOFhF">2024-25 Workouts</option>
        <option value="1VgIqXOQUc5qLzzAaWQ1FQZxIMBAacGP9">2025 Workouts</option>
        <option value="1u7wc9rGFZD_n7e0L2hbwnEhRciVwxykvwcp5MVNeYIaYn0dDE">2026 Workouts</option>
        <option value="custom">Custom ID…</option>
      </select>
      <input id="pp-id" placeholder="Drive File ID" style="display:none;padding:3px 6px;border:1px solid #374151;border-radius:4px;font-size:10px;background:#2d3748;color:#fff;width:160px">
      <button id="pp-load" onclick="loadPDF()">Load</button>
      <span id="pp-msg"></span>
    </div>
    <iframe id="pp-frame" src="about:blank" allowfullscreen></iframe>
  </div>
</div>

<script>
const AT_TOK='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6';
const SESS={
  tbl:'tblk9tTYIcIY4tWjF',
  session:'fldtyX5g2302mdKRM',
  date:'fld0NOLsoRvUklsUx',
  day:'fldCOlVjVlkvg7xQ6',
  sleep:'flduCm2fVfbj9fhIE',
  deepSleep:'fldhIwgdnwSN3qSCk',
  duration:'flddFOAaEqasewACu',
  notes:'fldHoMvfrVusyffXP'
};
const SETS={
  tbl:'tblKDqjy5RzqaJvjr',
  setId:'fld4hUpEzC9IqN0xh',
  date:'fld75zYXknF0RtCWH',
  session:'fldBChNmPkNg61oTN',
  exercise:'fldZ93A1t7fGjjsSS',
  variation:'fld2TZdmCOloH0gAK',
  setNum:'fldNm9Ao0rmcwwDXo',
  reps:'fldelUngWHRTm48m1',
  weight:'fldmrbBmfgSMtREMt',
  day:'fldypzlwqw9AzWrEE',
  notes:'fldfR4vyBtj2VWB2b'
};
const LS={get:k=>localStorage.getItem(k),set:(k,v)=>localStorage.setItem(k,v)};
const VERIFIED_KEY='wa_verified_dates';

let allDates=[],curDate=null,sessRecs={},curSets=[],curSessRec=null;


function setSt(m){document.getElementById('st').innerHTML=m;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getVerified(){try{return JSON.parse(LS.get(VERIFIED_KEY)||'[]');}catch{return[];}}
function isVerified(d){return getVerified().includes(d);}
function setVerified(d,v){
  let arr=getVerified();
  if(v&&!arr.includes(d))arr.push(d);
  else if(!v)arr=arr.filter(x=>x!==d);
  LS.set(VERIFIED_KEY,JSON.stringify(arr));
}

async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

async function loadSessions(){
  setSt('Loading…');
  const flds='fields%5B%5D='+SESS.date+'&fields%5B%5D='+SESS.day+'&fields%5B%5D='+SESS.duration+'&fields%5B%5D='+SESS.sleep+'&fields%5B%5D='+SESS.deepSleep+'&fields%5B%5D='+SESS.notes+'&fields%5B%5D='+SESS.session;
  let recs=[],off=null;
  do{
    const d=await atFetch(SESS.tbl+'?'+flds+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  sessRecs={};
  recs.forEach(r=>{
    const dt=(r.fields[SESS.date]||'').slice(0,10);
    if(dt)sessRecs[dt]=r;
  });
  allDates=[...new Set(recs.map(r=>(r.fields[SESS.date]||'').slice(0,10)).filter(Boolean))].sort();
  document.getElementById('b-total').textContent=allDates.length+' sessions';
  buildDateSel();
  buildWeekSel();
  populateExList();
  setSt('');
  // Go to first unverified
  const firstUnverified=allDates.find(d=>!isVerified(d));
  if(firstUnverified)setDate(firstUnverified);
  else if(allDates.length)setDate(allDates[allDates.length-1]);
}

function buildDateSel(){
  const sel=document.getElementById('date-sel');
  sel.innerHTML='<option value="">— Session —</option>';
  allDates.forEach(d=>{
    const v=isVerified(d);
    const day=sessRecs[d]?.fields[SESS.day]||'';
    const opt=document.createElement('option');
    opt.value=d;
    opt.textContent=(v?'✓ ':'')+d+(day?' ('+day+')':'');
    if(v)opt.style.color='#16a34a';
    sel.appendChild(opt);
  });
  if(curDate)sel.value=curDate;
}

function buildWeekSel(){
  const sel=document.getElementById('week-sel');
  const weeks={};
  allDates.forEach(d=>{
    const dt=new Date(d+'T12:00:00');
    const diff=dt.getDay()===0?-6:1-dt.getDay();
    const mon=new Date(dt);mon.setDate(dt.getDate()+diff);
    const wk=mon.toISOString().slice(0,10);
    if(!weeks[wk])weeks[wk]=[];
    weeks[wk].push(d);
  });
  sel.innerHTML='<option value="">— Week —</option>';
  Object.keys(weeks).sort().forEach(wk=>{
    const dates=weeks[wk];
    const allV=dates.every(d=>isVerified(d));
    const d=new Date(wk+'T12:00:00');
    const e=new Date(d);e.setDate(d.getDate()+6);
    const label=(allV?'✓ ':'')+`${(d.getMonth()+1)}/${d.getDate()} – ${(e.getMonth()+1)}/${e.getDate()}`;
    const opt=document.createElement('option');
    opt.value=dates[0];opt.textContent=label;
    if(allV)opt.style.color='#16a34a';
    sel.appendChild(opt);
  });
}

function populateExList(){
  // Will be populated dynamically from sets data
  const canonical=[
    'Bench Press','Incline Press','Decline Press','Incline Fly','Lateral Raises',
    'Seated Shoulder Press','Tricep Pushdowns 1/2','Overhead Tricep Ext','High Cable Fly 1/2 ea',
    'Cable Cross Overs 1/2 ea','Wrist Twist','Lat Pulldown','Bent Over Rows','Cable Rows',
    'Face Pulls','Rear Delt Raises','Bicep Curls-Preacher','Hammer Curls','Cable Shrugs 1/2',
    'Cable Curls 1/2 ea','Barbell Shrugs','Leg Press','Leg Extensions','Leg Curls',
    'Hip Thrust','Nordic Curl','Reverse Hyper','DB Calf Raises','Smith Mach Calf Raises',
    'Back Extension','Forward Back Stretch','Cable Press 1/2 ea','Low Cable Fly 1/2 ea',
    'Incline Curls','Overhead Tricep Press','Curls (Standing)','Tricep Ext Down 1/2',
    'Tricep Ext Up','Forearm Raise - Cable 1/2'
  ].sort();
  const sel=document.getElementById('q-ex');
  sel.innerHTML='<option value="">Exercise…</option>'+canonical.map(c=>`<option>${esc(c)}</option>`).join('');
}

function selDate(){
  const v=document.getElementById('date-sel').value;
  if(v)setDate(v);
}
function selWeek(){
  const v=document.getElementById('week-sel').value;
  if(v)setDate(v);
  document.getElementById('week-sel').value='';
}
function navDate(dir){
  if(!curDate){if(allDates.length)setDate(allDates[0]);return;}
  const i=allDates.indexOf(curDate);
  const ni=i+dir;
  if(ni>=0&&ni<allDates.length)setDate(allDates[ni]);
}
function jumpDateInput(){
  let v=document.getElementById('date-input').value.replace(/\D/g,'');
  if(v.length===8){
    const d=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
    const [mm,dd,yyyy]=d.split('/');
    const iso=`${yyyy}-${mm}-${dd}`;
    if(allDates.includes(iso)){setDate(iso);document.getElementById('date-input').value='';}
    else setSt('Date not found');
  }
}
// Auto-format date input
document.getElementById('date-input').addEventListener('input',function(){
  let v=this.value.replace(/\D/g,'');
  if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
  if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
  this.value=v.slice(0,10);
});

async function setDate(d){
  curDate=d;
  document.getElementById('date-sel').value=d;
  curSessRec=sessRecs[d]||null;
  renderSessInfo();
  updateVerifyBtn();
  autoSelectPDFForDate(d);
  await loadSets(d);
}

function renderSessInfo(){
  const info=document.getElementById('sess-info');
  if(!curSessRec){info.style.display='none';return;}
  const f=curSessRec.fields;
  const day=f[SESS.day]||'';
  const dur=f[SESS.duration]||'';
  const slp=f[SESS.sleep]||'';
  const deep=f[SESS.deepSleep]||'';
  const notes=f[SESS.notes]||'';
  info.style.display='flex';
  const badge=document.getElementById('sess-day-badge');
  badge.textContent=day||curDate;
  // Color badge by day type
  const dl=day.toLowerCase();
  const badgeType=dl.includes('leg')||dl.includes('wed')?'legs':dl.includes('pull')||dl.includes('tue')||dl.includes('fri')?'pull':dl.includes('arm')||dl.includes('thu')?'arms':'';
  badge.className='sess-badge'+(badgeType?' '+badgeType:'');
  document.getElementById('sess-dur').textContent=dur||'—';
  document.getElementById('sess-sleep').textContent=slp||'—';
  document.getElementById('sess-deep').textContent=deep||'—';
  document.getElementById('sess-notes-input').value=notes;
}

async function saveSessNotes(){
  if(!curSessRec)return;
  const val=document.getElementById('sess-notes-input').value;
  const fields={};fields[SESS.notes]=val||null;
  try{
    const res=await atFetch(SESS.tbl+'/'+curSessRec.id+'?returnFieldsByFieldId=true',{method:'PATCH',body:JSON.stringify({fields})});
    curSessRec={...curSessRec,fields:{...curSessRec.fields,...res.fields}};
    sessRecs[curDate]=curSessRec;
    setSt('✓ Saved');setTimeout(()=>setSt(''),1200);
  }catch(e){setSt('Error: '+e.message);}
}

async function loadSets(d){
  setSt('Loading sets…');
  document.getElementById('sets-wrap').innerHTML='<div id="empty-state"><div class="big">⏳</div><div>Loading…</div></div>';
  try{
    const filter=encodeURIComponent('IS_SAME({Date},"'+d+'","day")');
    const flds=['setId','date','session','exercise','variation','setNum','reps','weight','day','notes'].map(k=>'fields%5B%5D='+SETS[k]).join('&');
    let recs=[],off=null;
    do{
      const res=await atFetch(SETS.tbl+'?filterByFormula='+filter+'&'+flds+'&returnFieldsByFieldId=true&pageSize=100&sort%5B0%5D%5Bfield%5D='+SETS.setNum+'&sort%5B0%5D%5Bdirection%5D=asc'+(off?'&offset='+off:''));
      recs=recs.concat(res.records);off=res.offset;
    }while(off);
    curSets=recs;
    setSt('');
    renderSets(recs);
  }catch(e){setSt('Error: '+e.message);document.getElementById('sets-wrap').innerHTML='<div id="empty-state"><div class="big">⚠️</div><div>'+esc(e.message)+'</div></div>';}
}

function renderSets(recs){
  const wrap=document.getElementById('sets-wrap');
  if(!recs.length){
    wrap.innerHTML='<div id="empty-state"><div class="big">🏋️</div><div>No sets found for '+esc(curDate||'')+'</div></div>';
    return;
  }
  // Group by exercise
  const groups={};const order=[];
  recs.forEach(r=>{
    const ex=r.fields[SETS.exercise]||'Unknown';
    if(!groups[ex]){groups[ex]=[];order.push(ex);}
    groups[ex].push(r);
  });
  let html='';
  order.forEach(ex=>{
    const sets=groups[ex];
    html+=`<div class="ex-group" id="exg_${CSS.escape(ex)}">
      <div class="ex-header">${esc(ex)}<span class="ex-count">${sets.length} set${sets.length!==1?'s':''}</span></div>`;
    sets.forEach(r=>{
      html+=setRowHTML(r);
    });
    html+=`<div class="set-add-row"><button onclick="quickAddToEx('${esc(ex)}')">+ set</button></div>`;
    html+='</div>';
  });
  wrap.innerHTML=html;
}

function setRowHTML(r){
  const f=r.fields;
  const sn=f[SETS.setNum]||'';
  const va=f[SETS.variation]||'';
  const rp=f[SETS.reps]||'';
  const wt=f[SETS.weight]||'';
  const nt=f[SETS.notes]||'';
  return`<div class="set-row" id="setr_${r.id}">
    <div class="set-num">${esc(sn)}</div>
    <input class="fe fe-var" value="${esc(va)}" placeholder="Variation"
      onblur="saveSetField('${r.id}','${SETS.variation}',this.value)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <input class="fe fe-reps" value="${esc(rp)}" placeholder="Reps" type="number"
      onblur="saveSetField('${r.id}','${SETS.reps}',this.value?+this.value:null)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <input class="fe fe-weight" value="${esc(wt)}" placeholder="Wt" type="number"
      onblur="saveSetField('${r.id}','${SETS.weight}',this.value?+this.value:null)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <input class="fe fe-notes" value="${esc(nt)}" placeholder="Notes"
      onblur="saveSetField('${r.id}','${SETS.notes}',this.value)"
      onkeydown="if(event.key==='Enter')this.blur()">
    <button class="set-del" onclick="delSet('${r.id}')">✕</button>
  </div>`;
}

async function saveSetField(id,field,value){
  const fields={};fields[field]=value===''||value===null?null:value;
  try{
    const res=await atFetch(SETS.tbl+'/'+id+'?returnFieldsByFieldId=true',{method:'PATCH',body:JSON.stringify({fields})});
    const i=curSets.findIndex(r=>r.id===id);
    if(i>=0){curSets[i]={...curSets[i],fields:{...curSets[i].fields,...res.fields}};}
    flashRow(id);
    setSt('✓ Saved');setTimeout(()=>setSt(''),1200);
  }catch(e){setSt('Error: '+e.message);}
}

function flashRow(id){
  const el=document.getElementById('setr_'+id);
  if(!el)return;
  el.style.background='#f0fdf4';
  setTimeout(()=>el.style.background='',800);
}

async function delSet(id){
  const el=document.getElementById('setr_'+id);
  if(!el)return;
  el.style.opacity='0.3';el.style.pointerEvents='none';
  setSt('Deleted — <a href="#" onclick="undoDelSet(event,\''+id+'\')">Undo</a>');
  window._pendingSetDel=setTimeout(async()=>{
    try{
      await atFetch(SETS.tbl+'/'+id,{method:'DELETE'});
      curSets=curSets.filter(r=>r.id!==id);
      el.remove();
      setSt('✓ Deleted');
    }catch(e){el.style.opacity='';el.style.pointerEvents='';setSt('Error: '+e.message);}
  },3000);
}
function undoDelSet(e,id){
  e.preventDefault();
  clearTimeout(window._pendingSetDel);
  const el=document.getElementById('setr_'+id);
  if(el){el.style.opacity='';el.style.pointerEvents='';}
  setSt('Undo — kept');
}

async function quickAddSet(){
  const ex=document.getElementById('q-ex').value;
  if(!ex||!curDate){alert('Select an exercise and session first');return;}
  const sessRec=sessRecs[curDate];
  const fields={};
  fields[SETS.date]=curDate;
  fields[SETS.exercise]=ex;
  fields[SETS.day]=sessRec?.fields[SESS.day]||'';
  if(sessRec)fields[SETS.session]=[sessRec.id];
  const va=document.getElementById('q-var').value;if(va)fields[SETS.variation]=va;
  const rp=document.getElementById('q-reps').value;if(rp)fields[SETS.reps]=+rp;
  const wt=document.getElementById('q-weight').value;if(wt)fields[SETS.weight]=+wt;
  const nt=document.getElementById('q-notes').value;if(nt)fields[SETS.notes]=nt;
  // Auto set number
  const existing=curSets.filter(r=>r.fields[SETS.exercise]===ex);
  fields[SETS.setNum]=existing.length+1;
  // SetID format: YYYY-MM-DD-ABBREV-SETNUM
  const abbrev=ex.replace(/[^A-Za-z0-9]/g,'').slice(0,6).toUpperCase();
  fields[SETS.setId]=curDate+'-'+abbrev+'-'+fields[SETS.setNum];
  try{
    const res=await atFetch(SETS.tbl+'?returnFieldsByFieldId=true',{method:'POST',body:JSON.stringify({fields,typecast:true})});
    curSets.push(res);
    // Add row to existing exercise group or re-render
    const exg=document.getElementById('exg_'+CSS.escape(ex));
    if(exg){
      const addRow=exg.querySelector('.set-add-row');
      addRow.insertAdjacentHTML('beforebegin',setRowHTML(res));
      const cnt=exg.querySelector('.ex-count');
      if(cnt){const n=exg.querySelectorAll('.set-row').length;cnt.textContent=n+' set'+(n!==1?'s':'');}
    }else{
      renderSets(curSets);
    }
    // Clear fields
    document.getElementById('q-ex').selectedIndex=0;
    document.getElementById('q-var').value='';
    document.getElementById('q-reps').value='';
    document.getElementById('q-weight').value='';
    document.getElementById('q-notes').value='';
    setSt('✓ Added');
  }catch(e){setSt('Error: '+e.message);}
}

function quickAddToEx(ex){
  document.getElementById('q-ex').value=ex;
  document.getElementById('q-reps').focus();
}

function toggleVerifySession(){
  if(!curDate)return;
  const v=!isVerified(curDate);
  setVerified(curDate,v);
  updateVerifyBtn();
  buildDateSel();
  buildWeekSel();
  setSt(v?'✓ Session verified':'Session unverified');
  setTimeout(()=>setSt(''),1500);
  if(v){
    // Auto-advance to next unverified
    const next=allDates.find(d=>d>curDate&&!isVerified(d));
    if(next)setTimeout(()=>setDate(next),600);
  }
}

function updateVerifyBtn(){
  const btn=document.getElementById('verify-date-btn');
  const v=curDate&&isVerified(curDate);
  btn.textContent=v?'✓ Verified':'○ Verify Session';
  btn.className=v?'verified':'';
}

const PDF_BOOKS=[
  {id:'1eYtQT3c14psKbxRkKtbLoNtiLFEnOFhF', label:'2024-25', from:'2024-10-28', to:'2025-04-30'},
  {id:'1VgIqXOQUc5qLzzAaWQ1FQZxIMBAacGP9', label:'2025',    from:'2025-05-01', to:'2025-12-31'},
  {id:'1u7wc9rGFZD_n7e0L2hbwnEhRciVwxykvwcp5MVNeYIaYn0dDE', label:'2026', from:'2026-01-01', to:'2099-12-31'}
];

function autoSelectPDFForDate(d){
  if(!d)return;
  const book=PDF_BOOKS.find(b=>d>=b.from&&d<=b.to);
  if(!book)return;
  const sel=document.getElementById('pp-sel');
  if(sel.value!==book.id){
    sel.value=book.id;
    document.getElementById('pp-id').style.display='none';
    loadPDF();
  }
}

function pdfSelChange(){
  const sel=document.getElementById('pp-sel');
  const customInput=document.getElementById('pp-id');
  if(sel.value==='custom'){
    customInput.style.display='';
    customInput.focus();
  } else {
    customInput.style.display='none';
    if(sel.value)loadPDF();
  }
}

function pmsg(m){document.getElementById('pp-msg').textContent=m;}

function loadPDF(){
  const sel=document.getElementById('pp-sel');
  const customInput=document.getElementById('pp-id');
  const id=(sel.value&&sel.value!=='custom')?sel.value:customInput.value.trim();
  if(!id){pmsg('Select a PDF');return;}
  LS.set('wa_pdf_sel',sel.value);
  if(sel.value==='custom')LS.set('wa_pdf_custom',customInput.value.trim());
  pmsg('');
  const url='https://drive.google.com/file/d/'+id+'/preview';
  document.getElementById('pp-frame').src=url;
}

window.onload=()=>{
  // Restore PDF selection
  const savedSel=LS.get('wa_pdf_sel');
  const savedCustom=LS.get('wa_pdf_custom');
  const sel=document.getElementById('pp-sel');
  const customInput=document.getElementById('pp-id');
  if(savedSel&&savedSel!=='custom'&&sel.querySelector('option[value="'+savedSel+'"]')){
    sel.value=savedSel;
    loadPDF();
  } else if(savedSel==='custom'&&savedCustom){
    sel.value='custom';
    customInput.style.display='';
    customInput.value=savedCustom;
    loadPDF();
  }
  loadSessions();
};
</script>
