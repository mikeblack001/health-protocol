// VARIATION MAPPING
const VAR_MAP = {
  'rope': 'Rope 1/2', 'rope 1/2': 'Rope 1/2', 'v': 'V-Bar', 'v-bar': 'V-Bar', 'vbar': 'V-Bar',
  'bar': 'Bar', 'straight bar': 'Bar', 'uclip': 'UClip', 'u clip': 'UClip',
  'dbs': 'DBs', 'db': 'DBs', 'cables': 'Cables', 'cable': 'Cables',
  'cable - 2 hand': 'Cable - 2 Hand', '2 hand': 'Cable - 2 Hand',
  'lat machine': 'Lat Machine', 'ez bar': 'EZ-Bar', 'ez-bar': 'EZ-Bar',
};

let pdfBase64 = null;
let pdfPageCount = 0;

function log(msg, cls='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function status(msg) {
  document.getElementById('status').textContent = msg;
}

function prog(val, max) {
  const p = document.getElementById('prog');
  p.style.display = 'block';
  p.value = val; p.max = max;
}

async function onPdf(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('pdf-name').textContent = file.name;
  pdfBase64 = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
  // Count pages using basic PDF parsing
  const text = atob(pdfBase64.slice(0, 10000));
  const match = text.match(/\/N\s+(\d+)/);
  document.getElementById('pdf-name').textContent += ' (loaded)';
  document.getElementById('run-btn').disabled = false;
  status('PDF loaded. Click Run to start.');
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function atFetch(path, opts={}) {
  const r = await fetch('https://api.airtable.com/v0/' + AT_BASE + '/' + path, {
    ...opts,
    headers: { Authorization: 'Bearer ' + AT_TOK, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (!r.ok) { const e = await r.json().catch(()=>({error:{message:r.status}})); throw new Error(e.error?.message||r.status); }
  return r.json();
}

async function claudeVision(base64, prompt) {
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 2000,
    messages: [{
      role: 'user',
      content: [
        { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
        { type: 'text', text: prompt }
      ]
    }]
  };
  const r = await fetch(CF_WORKER, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': ANT_KEY, 'anthropic-version': '2023-06-01' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Claude API ' + r.status);
  const d = await r.json();
  return d.content?.[0]?.text || '';
}

function mapExercise(raw) {
  const k = raw.toLowerCase().trim().replace(/\s+/g,' ');
  if (EX_MAP[k]) return EX_MAP[k];
  for (const [key, val] of Object.entries(EX_MAP)) {
    if (k.includes(key) || key.includes(k)) return val;
  }
  // Title case fallback
  return raw.trim().replace(/\b\w/g, c => c.toUpperCase());
}

function mapVariation(raw) {
  if (!raw) return '';
  const k = raw.toLowerCase().trim();
  return VAR_MAP[k] || raw.trim();
}

function parsePageData(text) {
  // Returns array of {date, dayName, exercises:[{name, variation, sets:[{wt, reps}]}]}
  const workouts = [];
  let current = null;

  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  for (const line of lines) {
    // Date line: "2024-10-28 Monday" or "10/28/2024 Mon" or "Mon 10/28"
    const dateMatch = line.match(/(\d{4}-\d{2}-\d{2})|(\d{1,2}\/\d{1,2}\/\d{4})|(\d{1,2}\/\d{1,2}\/\d{2})/);
    const dayMatch = line.match(/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday|Mon|Tue|Wed|Thu|Fri|Sat|Sun)\b/i);

    if (dateMatch && dayMatch) {
      let dateStr = dateMatch[0];
      if (dateStr.includes('/')) {
        const parts = dateStr.split('/');
        const yr = parts[2].length === 2 ? '20' + parts[2] : parts[2];
        dateStr = yr + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0');
      }
      current = { date: dateStr, dayName: dayMatch[0], exercises: [] };
      workouts.push(current);
      continue;
    }

    if (!current) continue;

    // Exercise line with sets: "Incline DB 35x20 40x20 50x12" or "Rope 1/2: 45x20 50x20 60x20"
    const setMatches = [...line.matchAll(/(\d+(?:\.\d+)?)\s*[xX×]\s*(\d+)/g)];
    if (setMatches.length > 0) {
      // Extract exercise name (everything before first NNxNN)
      const firstSetIdx = line.search(/\d+\s*[xX×]\s*\d+/);
      let exPart = line.slice(0, firstSetIdx).trim().replace(/[:\-,]+$/, '').trim();

      // Check for variation in parens or after colon
      let variation = '';
      const varMatch = exPart.match(/\(([^)]+)\)$/);
      if (varMatch) { variation = varMatch[1]; exPart = exPart.replace(varMatch[0], '').trim(); }

      const exName = mapExercise(exPart);
      const sets = setMatches.map(m => ({ wt: parseFloat(m[1]), reps: parseInt(m[2]) }));

      current.exercises.push({ name: exName, variation: mapVariation(variation), sets });
    }
  }

  return workouts;
}

async function fetchATRecordsForDate(date) {
  const formula = encodeURIComponent(`{Date}='${date}'`);
  const flds = `fields[]=${F.ex}&fields[]=${F.var}&fields[]=${F.setN}&fields[]=${F.reps}&fields[]=${F.wt}&fields[]=${F.date}`;
  let recs = [], off = null;
  do {
    const d = await atFetch(`${AT_TBL}?filterByFormula=${formula}&${flds}&returnFieldsByFieldId=true&pageSize=100${off?'&offset='+off:''}`);
    recs = recs.concat(d.records);
    off = d.offset;
  } while (off);
  return recs;
}

async function patchRecord(id, fields) {
  await atFetch(`${AT_TBL}/${id}`, {
    method: 'PATCH',
    body: JSON.stringify({ fields })
  });
}

async function deleteRecords(ids) {
  // Max 10 per request
  for (let i = 0; i < ids.length; i += 10) {
    const batch = ids.slice(i, i + 10);
    const qs = batch.map(id => `records[]=${id}`).join('&');
    await atFetch(`${AT_TBL}?${qs}`, { method: 'DELETE', headers: { 'Content-Type': '' } });
    if (i + 10 < ids.length) await sleep(150);
  }
}

async function createRecords(records) {
  // Max 10 per request
  for (let i = 0; i < records.length; i += 10) {
    const batch = records.slice(i, i + 10);
    await atFetch(AT_TBL, {
      method: 'POST',
      body: JSON.stringify({ records: batch.map(r => ({ fields: r })), typecast: true })
    });
    if (i + 10 < records.length) await sleep(200);
  }
}

async function reconcileDate(date, dayName, exercises) {
  if (!exercises || exercises.length === 0) return;

  // Fetch all AT records for this date
  const atRecs = await fetchATRecordsForDate(date);
  log(`  AT has ${atRecs.length} records for ${date}`, 'info');

  // Build AT lookup: exercise → [records sorted by setN]
  const atByEx = {};
  atRecs.forEach(r => {
    const ex = r.fields[F.ex] || '';
    if (!atByEx[ex]) atByEx[ex] = [];
    atByEx[ex].push(r);
  });
  Object.values(atByEx).forEach(arr => arr.sort((a,b) => (a.fields[F.setN]||0)-(b.fields[F.setN]||0)));

  const dowMap = {Monday:'Monday',Tuesday:'Tuesday',Wednesday:'Wednesday',Thursday:'Thursday',Friday:'Friday',Saturday:'Saturday',Sunday:'Sunday',Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
  const dayFull = dowMap[dayName] || dayName;
  const sessionId = date + ' ' + dayFull;

  let patched = 0, deleted = 0, created = 0;
  const handledExercises = new Set();

  for (const exData of exercises) {
    const exName = exData.name;
    handledExercises.add(exName);
    const pdfSets = exData.sets; // [{wt, reps}, ...]
    const atExRecs = atByEx[exName] || [];

    if (atExRecs.length === 0 && pdfSets.length > 0) {
      // All missing — create
      const toCreate = pdfSets.map((s, i) => ({
        [F.date]: date,
        [F.ex]: exName,
        [F.var]: exData.variation || null,
        [F.setN]: i + 1,
        [F.reps]: s.reps,
        [F.wt]: s.wt,
        [F.day]: dayFull,
        [F.sess]: sessionId,
      }));
      await createRecords(toCreate);
      created += toCreate.length;
      log(`    CREATE ${exName}: ${pdfSets.map(s=>s.wt+'x'+s.reps).join(', ')}`, 'ok');
    } else {
      // Compare set by set
      // Delete extra AT records beyond what PDF shows
      if (atExRecs.length > pdfSets.length) {
        const toDelete = atExRecs.slice(pdfSets.length).map(r => r.id);
        await deleteRecords(toDelete);
        deleted += toDelete.length;
        log(`    DELETE ${exName} extra sets (${toDelete.length})`, 'warn');
      }

      // Patch each set that exists
      for (let i = 0; i < pdfSets.length; i++) {
        const pdfSet = pdfSets[i];
        const atRec = atExRecs[i];

        if (!atRec) {
          // Need to create this set
          await createRecords([{
            [F.date]: date,
            [F.ex]: exName,
            [F.var]: exData.variation || null,
            [F.setN]: i + 1,
            [F.reps]: pdfSet.reps,
            [F.wt]: pdfSet.wt,
            [F.day]: dayFull,
            [F.sess]: sessionId,
          }]);
          created++;
          log(`    CREATE ${exName} S${i+1}: ${pdfSet.wt}x${pdfSet.reps}`, 'ok');
        } else {
          const curWt = atRec.fields[F.wt] || 0;
          const curReps = atRec.fields[F.reps] || 0;
          const curSetN = atRec.fields[F.setN] || 0;

          const needsPatch = Math.abs(curWt - pdfSet.wt) > 0.01 ||
                            Math.abs(curReps - pdfSet.reps) > 0.01 ||
                            curSetN !== i + 1;

          if (needsPatch) {
            await patchRecord(atRec.id, {
              [F.reps]: pdfSet.reps,
              [F.wt]: pdfSet.wt,
              [F.setN]: i + 1,
              [F.day]: dayFull,
              [F.sess]: sessionId,
            });
            patched++;
            log(`    PATCH ${exName} S${i+1}: AT=${curWt}x${curReps} → PDF=${pdfSet.wt}x${pdfSet.reps}`, 'warn');
          }
        }
      }
    }
    await sleep(100);
  }

  // Delete AT records for exercises NOT in PDF (genuinely removed/wrong)
  // Only delete if exercise has zero PDF sets AND was in AT
  for (const [exName, recs] of Object.entries(atByEx)) {
    if (!handledExercises.has(exName) && recs.length > 0) {
      // Don't auto-delete unknown exercises — flag them for review
      log(`    REVIEW: "${exName}" in AT but not in PDF for ${date}`, 'err');
    }
  }

  log(`  ${date} done: ${patched} patched, ${deleted} deleted, ${created} created`, 'ok');
}

async function runFix() {
  ANT_KEY = document.getElementById('ant-key').value.trim();
  if (!ANT_KEY) { alert('Enter Anthropic API key'); return; }
  if (!pdfBase64) { alert('Upload PDF first'); return; }
  document.getElementById('run-btn').disabled = true;
  status('Starting...');

  // Send full PDF to Claude with structured extraction prompt
  const PROMPT = `You are extracting workout data from handwritten PDF pages.

CRITICAL RULES:
- Format is always WEIGHT x REPS (e.g. 35x20 = 35 lbs, 20 reps)
- Each page has one or more workout sessions labeled Mon/Tues/Wed/Thu/Fri/Sat
- The notebook number and date appear at top of each session group (e.g. "1 - Oct 28" or "2 - Nov 4")
- Crossed-out numbers: use the FINAL written number (the correction), not the crossed-out one
- Small superscript numbers are corrections to the weight or reps

Extract ALL sessions from ALL pages. Return ONLY valid JSON, no markdown, no explanation:
{
  "sessions": [
    {
      "date": "YYYY-MM-DD",
      "day": "Monday",
      "exercises": [
        {
          "name": "exercise name exactly as written",
          "variation": "rope/bar/dbs/cables/etc or empty string",
          "sets": [
            {"wt": 35, "reps": 20},
            {"wt": 40, "reps": 20}
          ]
        }
      ]
    }
  ]
}

The first session starts Oct 28 2024. Sessions are sequential by week.
Day order within each week: Mon, Tue, Wed, Thu, Fri (Sat/cardio sometimes).
Week numbers increment sequentially — use this to derive dates for sessions without explicit dates.`;

  try {
    log('Sending PDF to Claude for extraction...', 'info');
    status('Extracting data from PDF via Claude vision...');

    const raw = await claudeVision(pdfBase64, PROMPT);
    log('Claude response received. Parsing...', 'info');

    let jsonStr = raw;
    // Strip markdown if present
    jsonStr = jsonStr.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();

    let data;
    try {
      data = JSON.parse(jsonStr);
    } catch(e) {
      log('JSON parse error: ' + e.message, 'err');
      log('Raw response (first 2000 chars):', 'err');
      log(raw.slice(0, 2000), 'err');
      status('Parse error — see log');
      document.getElementById('run-btn').disabled = false;
      return;
    }

    const sessions = data.sessions || [];
    log(`Extracted ${sessions.length} sessions from PDF`, 'ok');
    status(`Processing ${sessions.length} sessions...`);
    prog(0, sessions.length);

    for (let i = 0; i < sessions.length; i++) {
      const s = sessions[i];
      log(`\n[${i+1}/${sessions.length}] ${s.date} ${s.day} (${s.exercises?.length||0} exercises)`);
      prog(i+1, sessions.length);
      status(`Processing ${s.date} ${s.day}...`);

      if (!s.date || !s.exercises || s.exercises.length === 0) {
        log('  Skipping — no date or exercises', 'warn');
        continue;
      }

      // Map exercise names
      s.exercises.forEach(ex => {
        ex.name = mapExercise(ex.name);
        ex.variation = mapVariation(ex.variation);
      });

      try {
        await reconcileDate(s.date, s.day, s.exercises);
      } catch(e) {
        log('  ERROR: ' + e.message, 'err');
      }
      await sleep(300);
    }

    status('DONE. Check log for summary.');
    log('\n=== COMPLETE ===', 'ok');

  } catch(e) {
    log('FATAL: ' + e.message, 'err');
    status('Error: ' + e.message);
    document.getElementById('run-btn').disabled = false;
  }
}
</script>
