<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout Data Fix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a2e;padding:16px}
h1{font-size:16px;font-weight:800;margin-bottom:12px}
#status{background:#1e2433;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:12px;min-height:40px;white-space:pre-wrap;font-family:monospace}
#log{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:12px;max-height:600px;overflow-y:auto;font-size:11px;font-family:monospace;white-space:pre-wrap}
button{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;background:#2563eb;color:#fff;margin-right:8px}
button:disabled{background:#9ca3af;cursor:default}
.err{color:#dc2626}.ok{color:#16a34a}.warn{color:#d97706}.info{color:#6b7280}
progress{width:100%;height:8px;margin:8px 0;border-radius:4px}
.pdf-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pdf-label{font-size:12px;font-weight:700;color:#374151;min-width:60px}
.pdf-status{font-size:11px;color:#6b7280}
</style>
</head>
<body>
<h1>Workout Data Fix — All PDFs</h1>
<div id="status">Load PDFs then click Run.</div>

<div class="pdf-row">
  <span class="pdf-label">PDF 1</span>
  <label style="padding:6px 14px;background:#374151;color:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">
    📄 Upload<input type="file" accept=".pdf" id="pdf1" style="display:none" onchange="onPdf(this,1)">
  </label>
  <span id="pdf1-name" class="pdf-status">No file</span>
</div>
<div class="pdf-row">
  <span class="pdf-label">PDF 2</span>
  <label style="padding:6px 14px;background:#374151;color:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">
    📄 Upload<input type="file" accept=".pdf" id="pdf2" style="display:none" onchange="onPdf(this,2)">
  </label>
  <span id="pdf2-name" class="pdf-status">No file</span>
</div>
<div class="pdf-row">
  <span class="pdf-label">PDF 3</span>
  <label style="padding:6px 14px;background:#374151;color:#fff;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">
    📄 Upload<input type="file" accept=".pdf" id="pdf3" style="display:none" onchange="onPdf(this,3)">
  </label>
  <span id="pdf3-name" class="pdf-status">No file</span>
</div>

<div style="margin:12px 0;display:flex;gap:8px">
  <button id="run-btn" onclick="runAll()" disabled>▶ Run All PDFs</button>
  <button onclick="document.getElementById('log').innerHTML=''" style="background:#6b7280">Clear Log</button>
</div>
<progress id="prog" value="0" max="100" style="display:none"></progress>
<div id="log"></div>

<script>
const WORKER = 'https://little-hall-2cfc.mikeblack01.workers.dev';
const ANT_KEY = (()=>{const p1='sk-ant-api03-jWnl5azwXKPce1ZVdPZ8_8edO87_hOD8uZpDX',p2='QFa4ByFkqqdJOzouZo6xiVwxykvwcp5MVNeYIaYn0dDE_dVAA-H3QK9wAA';return p1+p2;})();
const AT_TOK = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE = 'appmHDG4TGT1xy6R6';
const AT_TBL = 'tblKDqjy5RzqaJvjr';

const F = {
  date:'fld75zYXknF0RtCWH', ex:'fldZ93A1t7fGjjsSS', var:'fld2TZdmCOloH0gAK',
  setN:'fldNm9Ao0rmcwwDXo', reps:'fldelUngWHRTm48m1', wt:'fldmrbBmfgSMtREMt',
  day:'fldypzlwqw9AzWrEE', sess:'fldBChNmPkNg61oTN'
};

const pdfs = {1:null, 2:null, 3:null};

function log(msg, cls='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
function status(msg) { document.getElementById('status').textContent = msg; }
function prog(val, max) { const p=document.getElementById('prog'); p.style.display='block'; p.value=val; p.max=max; }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function onPdf(input, n) {
  const file = input.files[0];
  if (!file) return;
  pdfs[n] = await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
  document.getElementById('pdf'+n+'-name').textContent = file.name + ' ✓';
  if (Object.values(pdfs).some(v=>v!==null)) document.getElementById('run-btn').disabled = false;
  status('PDF '+n+' loaded.');
}

async function atFetch(path, opts={}) {
  const r = await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path, {
    ...opts,
    headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}
  });
  if (!r.ok) { const e=await r.json().catch(()=>({error:{message:r.status}})); throw new Error(e.error?.message||r.status); }
  return r.json();
}

async function claudeVision(base64, prompt) {
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 8000,
    messages: [{
      role: 'user',
      content: [
        {type:'document', source:{type:'base64', media_type:'application/pdf', data:base64}},
        {type:'text', text:prompt}
      ]
    }]
  };
  const r = await fetch(WORKER, {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANT_KEY},
    body:JSON.stringify(body)
  });
  if (!r.ok) { const e=await r.text(); throw new Error('Worker '+r.status+': '+e.slice(0,200)); }
  const d = await r.json();
  if (d.type==='error') throw new Error(d.error?.message||JSON.stringify(d.error));
  return d.content?.[0]?.text || '';
}

async function fetchATForDate(date) {
  const formula = encodeURIComponent(`{Date}='${date}'`);
  const flds = `fields[]=${F.ex}&fields[]=${F.date}`;
  let recs=[], off=null;
  do {
    const d = await atFetch(`${AT_TBL}?filterByFormula=${formula}&${flds}&returnFieldsByFieldId=true&pageSize=100${off?'&offset='+off:''}`);
    recs = recs.concat(d.records);
    off = d.offset;
  } while(off);
  return recs;
}

async function deleteRecords(ids) {
  for (let i=0; i<ids.length; i+=10) {
    const qs = ids.slice(i,i+10).map(id=>`records[]=${id}`).join('&');
    await atFetch(`${AT_TBL}?${qs}`, {method:'DELETE', headers:{'Content-Type':''}});
    if (i+10<ids.length) await sleep(150);
  }
}

async function createRecords(records) {
  for (let i=0; i<records.length; i+=10) {
    await atFetch(AT_TBL, {method:'POST', body:JSON.stringify({records:records.slice(i,i+10).map(r=>({fields:r})),typecast:true})});
    if (i+10<records.length) await sleep(200);
  }
}

async function processDate(date, dayName, exercises) {
  if (!exercises || exercises.length===0) { log(`  ${date}: no exercises — skip`, 'warn'); return; }

  const dowMap = {Monday:'Monday',Tuesday:'Tuesday',Wednesday:'Wednesday',Thursday:'Thursday',Friday:'Friday',Saturday:'Saturday',Sunday:'Sunday',Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',Fri:'Friday',Sat:'Saturday',Sun:'Sunday'};
  const dayFull = dowMap[dayName] || dayName;
  const sessionId = date+' '+dayFull;

  // Delete ALL existing AT records for this date
  const existing = await fetchATForDate(date);
  if (existing.length > 0) {
    await deleteRecords(existing.map(r=>r.id));
    log(`  ${date}: deleted ${existing.length} existing records`, 'warn');
    await sleep(200);
  }

  // Build all new records
  const toCreate = [];
  for (const ex of exercises) {
    if (!ex.name || !ex.sets || ex.sets.length===0) continue;
    for (let i=0; i<ex.sets.length; i++) {
      const s = ex.sets[i];
      if (!s.reps && !s.wt) continue; // skip truly empty sets
      toCreate.push({
        [F.date]: date,
        [F.ex]: ex.name,
        [F.var]: ex.variation || null,
        [F.setN]: i+1,
        [F.reps]: s.reps || 0,
        [F.wt]: s.wt || 0,
        [F.day]: dayFull,
        [F.sess]: sessionId
      });
    }
  }

  if (toCreate.length > 0) {
    await createRecords(toCreate);
    log(`  ${date} ${dayFull}: created ${toCreate.length} records`, 'ok');
  } else {
    log(`  ${date}: no valid sets to create`, 'warn');
  }
}

const PROMPT_PDF1 = `Extract ALL workout sessions from this PDF. Return ONLY valid JSON, no markdown, no explanation.

FORMAT RULES for this PDF (handwritten freeform):
- Each session has a date and day label (Mon/Tue/Wed/Thu/Fri/Sat)
- Weight x Reps format: weight is FIRST, reps is SECOND (e.g. 35x20 = 35lbs, 20 reps)
- RIGHT column number is the actual stored weight for cable exercises (parentheses or right column)
- Exercise names: store EXACTLY as written — no changes, no translation
- Sessions appear in strict calendar order throughout the PDF
- Crossed-out numbers: use the final written correction
- If a date is unclear, derive it from surrounding dates
- Zero-rep sets: omit entirely
- Include ALL sets for each exercise

JSON format:
{
  "sessions": [
    {
      "date": "YYYY-MM-DD",
      "day": "Monday",
      "exercises": [
        {
          "name": "exact name as written",
          "sets": [{"wt": 35, "reps": 20}, {"wt": 40, "reps": 18}]
        }
      ]
    }
  ]
}`;

const PROMPT_PDF2 = `Extract ALL workout sessions from this PDF. Return ONLY valid JSON, no markdown, no explanation.

FORMAT RULES for this PDF (printed table format):
- Each session has a printed header like "Monday - Push" and a date field
- Table columns are in this exact order per set: S# | Reps | Weight (reps comes BEFORE weight)
- So if a row shows S1=1, Reps=15, Weight=125 — store as reps=15, wt=125
- G20 notation means cable machine. Weight written as "80/2" means store 40 (divide by 2)
- Exercise names: store EXACTLY as printed — no changes, no translation
- Blank rows (no reps/weight filled in) = exercise not done that day — skip entirely
- Sessions appear in strict calendar order. If a session has no date written, derive it from surrounding sessions
- Dashes or lines in cells = no data, skip that set
- Include ALL sets that have actual data (reps and weight both present)
- Up to S4 exists on some pages — include S4 if data present
- Zero-rep sets: omit entirely

JSON format:
{
  "sessions": [
    {
      "date": "YYYY-MM-DD",
      "day": "Monday",
      "exercises": [
        {
          "name": "exact name as printed",
          "sets": [{"wt": 125, "reps": 15}, {"wt": 125, "reps": 10}]
        }
      ]
    }
  ]
}`;

const PROMPT_PDF3 = `Extract ALL workout sessions from this PDF. Return ONLY valid JSON, no markdown, no explanation.

FORMAT RULES for this PDF (printed table with Variation column, handwritten values):
- Each session has a printed header like "Monday - Push" and a Date field (written as M/D, e.g. "1/5" = January 5)
- Year is 2026 throughout this PDF
- Table columns are: Exercise | Variation | Set | Reps | Weight | Set | Reps | Weight | Set | Reps | Weight
- Column order per set: Set# | Reps | Weight (reps comes BEFORE weight)
- The Variation column contains the implement used (e.g. "DBs", "Cable", "Rope 1/2", "EZ-Bar", "V-Bar", etc.)
- Extract variation exactly as written — store in the variation field
- Exercise names: store EXACTLY as written — no changes, no translation
- Weights are actual stored values — no division needed
- Blank cells or dashes = no data — skip that set
- If a session note says "FRIDAY" next to a Thursday header, the day is Friday
- Sessions appear in strict calendar order. Derive missing dates from surrounding sessions.
- Ignore Sleep, Deep Sleep, Workout Duration fields in the header row
- Zero-rep sets: omit entirely
- Include ALL sets that have actual reps and weight data

JSON format:
{
  "sessions": [
    {
      "date": "YYYY-MM-DD",
      "day": "Monday",
      "exercises": [
        {
          "name": "exact name as written",
          "variation": "exact variation as written or empty string",
          "sets": [{"wt": 125, "reps": 20}, {"wt": 125, "reps": 14}]
        }
      ]
    }
  ]
}`;

async function processPdf(n, base64) {
  log(`\n=== PDF ${n} ===`, 'info');
  status(`PDF ${n}: Sending to Claude for extraction...`);

  const prompt = n===1 ? PROMPT_PDF1 : PROMPT_PDF2;
  const raw = await claudeVision(base64, prompt);
  log(`PDF ${n}: response received`, 'info');

  let jsonStr = raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  let data;
  try { data = JSON.parse(jsonStr); }
  catch(e) {
    log(`PDF ${n} parse error: ${e.message}`, 'err');
    log('Raw (first 2000): '+raw.slice(0,2000), 'err');
    return 0;
  }

  const sessions = data.sessions || [];
  log(`PDF ${n}: ${sessions.length} sessions extracted`, 'ok');
  prog(0, sessions.length);

  for (let i=0; i<sessions.length; i++) {
    const s = sessions[i];
    prog(i+1, sessions.length);
    status(`PDF ${n}: ${s.date} ${s.day} (${i+1}/${sessions.length})`);
    log(`\n[${i+1}/${sessions.length}] ${s.date} ${s.day} — ${s.exercises?.length||0} exercises`);
    if (!s.date || !s.exercises || s.exercises.length===0) { log('  skip','warn'); continue; }
    try { await processDate(s.date, s.day, s.exercises); }
    catch(e) { log('  ERROR: '+e.message,'err'); }
    await sleep(300);
  }
  return sessions.length;
}

async function runAll() {
  const loaded = Object.entries(pdfs).filter(([n,v])=>v!==null);
  if (loaded.length===0) { alert('Upload at least one PDF'); return; }
  document.getElementById('run-btn').disabled = true;
  let total = 0;
  for (const [n, base64] of loaded) {
    try { total += await processPdf(parseInt(n), base64); }
    catch(e) { log(`PDF ${n} FATAL: ${e.message}`, 'err'); }
  }
  status(`DONE. ${total} sessions processed. Check log for details.`);
  log('\n=== ALL DONE ===', 'ok');
  document.getElementById('run-btn').disabled = false;
}
</script>
</body>
</html>
