function log(msg, cls='info') {
  const d = document.getElementById('log');
  d.innerHTML += `<div class="${cls}">${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}

function status(msg) {
  document.getElementById('status').textContent = msg;
}

async function pushBatch(batch, idx) {
  const r = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({records: batch, typecast: true})
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error?.message || JSON.stringify(j));
  return j.records?.length || 0;
}

async function main() {
  let total = 0, errors = 0;
  log(`Starting push: ${BATCHES.length} batches, ${BATCHES.reduce((a,b)=>a+b.length,0)} records`);
  
  for (let i = 0; i < BATCHES.length; i++) {
    try {
      status(`Pushing batch ${i+1}/${BATCHES.length}...`);
      const pushed = await pushBatch(BATCHES[i], i);
      total += pushed;
      log(`✓ Batch ${i+1}: ${pushed} records pushed (total: ${total})`, 'ok');
    } catch(e) {
      errors++;
      log(`✗ Batch ${i+1} ERROR: ${e.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 200)); // small delay between batches
  }
  
  const msg = `DONE: ${total} pushed, ${errors} errors`;
  status(msg);
  log(msg, errors > 0 ? 'err' : 'ok');
}

main();
