<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>Schema Check</title>
<style>
body{font-family:monospace;background:#0a0a0a;color:#e0e0e0;padding:20px;font-size:12px;}
h2{color:#00ff88;}
.field{padding:3px 0;border-bottom:1px solid #1a1a1a;}
.fid{color:#666;}
.fname{color:#00aaff;margin-left:10px;}
.ftype{color:#ffaa00;margin-left:10px;}
pre{color:#888;font-size:10px;white-space:pre-wrap;}
</style>
</head>
<body>
<h2>Sets Table Schema</h2>
<div id="out">Loading...</div>
<script>
const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE = 'appmHDG4TGT1xy6R6';
const TABLE = 'tblKDqjy5RzqaJvjr';

async function run(){
  // Get schema via meta endpoint
  const r = await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables`, {
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  const data = await r.json();
  const table = data.tables.find(t => t.id === TABLE);
  if(!table){ document.getElementById('out').textContent = 'Table not found. Tables: ' + data.tables.map(t=>t.id+' '+t.name).join(', '); return; }
  
  let html = `<b style="color:#fff">Table: ${table.name} (${table.id})</b><br><br>`;
  html += `<b style="color:#00aaff">FIELDS:</b><br>`;
  table.fields.forEach(f => {
    html += `<div class="field"><span class="fid">${f.id}</span><span class="fname">${f.name}</span><span class="ftype">[${f.type}]</span></div>`;
  });
  
  // Also grab 1 sample record to see what fields have data
  const r2 = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}?pageSize=1`, {
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  const d2 = await r2.json();
  if(d2.records && d2.records[0]){
    html += `<br><b style="color:#ffaa00">SAMPLE RECORD FIELDS (keys with data):</b><br>`;
    const fields = d2.records[0].fields;
    Object.entries(fields).forEach(([k,v]) => {
      html += `<div class="field"><span class="fid">${k}</span><span class="fname"> = </span><span style="color:#ccc">${JSON.stringify(v).substring(0,80)}</span></div>`;
    });
  }
  
  document.getElementById('out').innerHTML = html;
}
run();
</script>
</body></html>
