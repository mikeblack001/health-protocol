<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Health — Data QA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border-bright: #3a3a3a;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-dimmer: #555;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.1);
    --warn: #ffaa00;
    --warn-dim: rgba(255,170,0,0.1);
    --danger: #ff4444;
    --danger-dim: rgba(255,68,68,0.1);
    --info: #4488ff;
    --info-dim: rgba(68,136,255,0.1);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    min-height: 100vh;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-sep { color: var(--border-bright); }
  .header-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dimmer);
  }
  .status-dot.green { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-dot.red { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
  .status-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

  /* LAYOUT */
  .main { display: flex; height: calc(100vh - 49px); }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .table-list { display: flex; flex-direction: column; gap: 4px; }
  .table-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .table-item:hover { background: var(--surface2); border-color: var(--border); }
  .table-item.selected { background: var(--accent-dim); border-color: var(--accent); }
  .table-item input[type=checkbox] {
    accent-color: var(--accent);
    cursor: pointer;
  }
  .table-item-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    flex: 1;
  }
  .table-item-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dimmer);
  }
  .table-item .issue-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid var(--danger);
    display: none;
  }
  .table-item.has-issues .issue-badge { display: block; }

  /* BUTTONS */
  .btn {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 16px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover { background: #00cc6e; box-shadow: 0 0 16px rgba(0,255,136,0.3); }
  .btn-primary:disabled { background: var(--border); color: var(--text-dimmer); border-color: var(--border); cursor: not-allowed; box-shadow: none; }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }
  .btn-danger:hover { background: var(--danger-dim); }
  .btn-danger:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }
  .btn-full { width: 100%; justify-content: center; }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* EMPTY STATE */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dimmer);
    text-align: center;
  }
  .empty-icon { font-size: 40px; opacity: 0.4; }
  .empty-title { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
  .empty-sub { font-size: 12px; max-width: 300px; line-height: 1.6; }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .summary-card.danger { border-color: var(--danger); background: var(--danger-dim); }
  .summary-card.warn { border-color: var(--warn); background: var(--warn-dim); }
  .summary-card.ok { border-color: var(--accent); background: var(--accent-dim); }
  .summary-card.info { border-color: var(--info); background: var(--info-dim); }
  .card-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }
  .danger .card-value { color: var(--danger); }
  .warn .card-value { color: var(--warn); }
  .ok .card-value { color: var(--accent); }
  .info .card-value { color: var(--info); }
  .card-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* SECTION */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
  }
  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    flex: 1;
  }
  .section-title.danger { color: var(--danger); }
  .section-title.warn { color: var(--warn); }
  .section-title.info { color: var(--info); }
  .section-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    background: var(--border);
    padding: 2px 7px;
    border-radius: 10px;
  }

  /* TABLE */
  .data-table-wrap { overflow-x: auto; }
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .data-table th {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dimmer);
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }
  .data-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    vertical-align: top;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table tr.selected td { background: var(--danger-dim); }
  .data-table td.dim { color: var(--text-dimmer); }
  .data-table td.danger { color: var(--danger); }
  .data-table td.warn { color: var(--warn); }
  .data-table td.ok { color: var(--accent); }

  .select-all-wrap {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
  }
  .select-all-wrap label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .select-all-wrap input { accent-color: var(--danger); cursor: pointer; }

  .delete-bar {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
  }
  .delete-bar-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    flex: 1;
  }

  /* PROGRESS */
  .progress-wrap {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }
  .progress-bar-outer {
    width: 100%;
    max-width: 400px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    box-shadow: 0 0 10px var(--accent);
  }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 999;
  }
  .toast {
    font-family: var(--mono);
    font-size: 11px;
    padding: 10px 16px;
    border-radius: 4px;
    border: 1px solid;
    backdrop-filter: blur(8px);
    animation: toastIn 0.2s ease;
  }
  .toast.success { background: rgba(0,255,136,0.1); border-color: var(--accent); color: var(--accent); }
  .toast.error { background: rgba(255,68,68,0.1); border-color: var(--danger); color: var(--danger); }
  .toast.info { background: rgba(68,136,255,0.1); border-color: var(--info); color: var(--info); }
  @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }

  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(4,end) infinite;
  }
  @keyframes dots {
    0%,20%{content:''}
    40%{content:'.'}
    60%{content:'..'}
    80%,100%{content:'...'}
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-logo">MB</span>
  <span class="header-sep">—</span>
  <span class="header-title">Data QA Audit</span>
  <div class="header-right">
    <div class="status-dot" id="connDot"></div>
    <span class="status-label" id="connLabel">CONNECTING</span>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="sidebar-section-label">Tables</div>
      <div class="table-list" id="tableList">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-dimmer);padding:8px 0" class="loading-dots">Loading tables</div>
      </div>
    </div>

    <div>
      <div class="sidebar-section-label">Options</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="optDupes" checked style="accent-color:var(--accent)">
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">Duplicate detection</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="optEmpty" checked style="accent-color:var(--accent)">
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">Empty key fields</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="optZero" checked style="accent-color:var(--accent)">
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">Zero-value records</span>
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
          <input type="checkbox" id="optFormat" checked style="accent-color:var(--accent)">
          <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">Format validation</span>
        </label>
      </div>
    </div>

    <div style="margin-top:auto;display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-primary btn-full" id="runBtn" onclick="runAudit()" disabled>
        ▶ Run Audit
      </button>
      <button class="btn btn-ghost btn-full" id="clearBtn" onclick="clearResults()" style="display:none;">
        Clear Results
      </button>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⬡</div>
      <div class="empty-title">Select tables to audit</div>
      <div class="empty-sub">Check one or more tables in the sidebar, then click Run Audit to scan for duplicates, missing data, and format errors.</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const BASE_ID = 'appmHDG4TGT1xy6R6';
const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const API = 'https://api.airtable.com/v0';
const META_API = 'https://api.airtable.com/v0/meta/bases';

let allTables = [];
let selectedTables = new Set();
let auditResults = {};
let tableRecords = {};

// ─── HELPERS ───────────────────────────────────────────────────────────────

function toast(msg, type='info', duration=3000) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function setConn(ok, label) {
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  dot.className = 'status-dot ' + (ok ? 'green' : 'red');
  lbl.textContent = label;
}

async function airtableFetch(url, opts={}) {
  const res = await fetch(url, {
    ...opts,
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json', ...opts.headers }
  });
  if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
  return res.json();
}

async function fetchAllRecords(tableId) {
  let records = [], offset;
  do {
    const url = `${API}/${BASE_ID}/${tableId}?pageSize=100${offset ? '&offset=' + offset : ''}`;
    const data = await airtableFetch(url);
    records.push(...data.records);
    offset = data.offset;
  } while (offset);
  return records;
}

async function deleteRecord(tableId, recordId) {
  await airtableFetch(`${API}/${BASE_ID}/${tableId}/${recordId}`, { method: 'DELETE' });
}

// ─── INIT ──────────────────────────────────────────────────────────────────

async function init() {
  try {
    const data = await airtableFetch(`${META_API}/${BASE_ID}/tables`);
    allTables = data.tables;
    setConn(true, 'CONNECTED');
    renderTableList();
  } catch(e) {
    setConn(false, 'ERROR');
    toast('Failed to connect to Airtable: ' + e.message, 'error', 6000);
  }
}

function renderTableList() {
  const list = document.getElementById('tableList');
  list.innerHTML = '';
  allTables.forEach(t => {
    const item = document.createElement('div');
    item.className = 'table-item';
    item.id = 'titem_' + t.id;
    item.innerHTML = `
      <input type="checkbox" id="chk_${t.id}" onchange="toggleTable('${t.id}')">
      <label for="chk_${t.id}" class="table-item-name" style="cursor:pointer">${t.name}</label>
      <span class="table-item-count" id="cnt_${t.id}"></span>
      <span class="issue-badge" id="badge_${t.id}">!</span>
    `;
    list.appendChild(item);
  });
}

function toggleTable(id) {
  if (selectedTables.has(id)) selectedTables.delete(id);
  else selectedTables.add(id);
  const item = document.getElementById('titem_' + id);
  if (selectedTables.has(id)) item.classList.add('selected');
  else item.classList.remove('selected');
  document.getElementById('runBtn').disabled = selectedTables.size === 0;
}

// ─── AUDIT ENGINE ──────────────────────────────────────────────────────────

function getKeyFields(tableName, fields) {
  // Smart key field detection for duplicate fingerprinting
  const fn = tableName.toLowerCase();
  const fieldNames = fields.map(f => f.name.toLowerCase());

  if (fn.includes('set')) {
    // Sets: SetID is primary unique key; fallback: date+exercise+set#
    const setid = fields.find(f => f.name.toLowerCase() === 'setid');
    if (setid) return [setid.name];
    const candidates = ['date','exercise','set#'];
    return fields.filter(f => candidates.some(c => f.name.toLowerCase().includes(c))).map(f => f.name);
  }
  if (fn.includes('session')) {
    const candidates = ['date','day'];
    return fields.filter(f => candidates.some(c => f.name.toLowerCase().includes(c))).map(f => f.name);
  }
  if (fn.includes('injection') || fn.includes('peptide')) {
    const candidates = ['date','name','peptide','compound'];
    return fields.filter(f => candidates.some(c => f.name.toLowerCase().includes(c))).map(f => f.name);
  }
  if (fn.includes('dailylog') || fn.includes('daily')) {
    return fields.filter(f => f.name.toLowerCase().includes('date')).map(f => f.name);
  }
  if (fn.includes('supplement')) {
    const candidates = ['date','name','supplement'];
    return fields.filter(f => candidates.some(c => f.name.toLowerCase().includes(c))).map(f => f.name);
  }
  if (fn.includes('bloodwork') || fn.includes('lab')) {
    const candidates = ['date','marker','test'];
    return fields.filter(f => candidates.some(c => f.name.toLowerCase().includes(c))).map(f => f.name);
  }
  // Generic: use all non-formula, non-computed text/number fields
  const skip = ['formula','rollup','lookup','count','autoNumber','createdTime','lastModifiedTime'];
  const usable = fields.filter(f => !skip.includes(f.type)).map(f => f.name);
  return usable.slice(0, Math.min(5, usable.length));
}

function fingerprint(record, keyFields) {
  return keyFields.map(f => {
    const val = record.fields[f];
    if (val === undefined || val === null) return '__null__';
    if (Array.isArray(val)) return val.join(',');
    return String(val).trim().toLowerCase();
  }).join('|');
}

function detectZeroValueFields(record, fields) {
  const zeroFields = [];
  const numericTypes = ['number','currency','percent','rating','duration'];
  fields.forEach(f => {
    if (numericTypes.includes(f.type)) {
      const val = record.fields[f.name];
      if (val === 0 || val === '0') zeroFields.push(f.name);
    }
  });
  return zeroFields;
}

function detectEmptyKeyFields(record, keyFields) {
  return keyFields.filter(f => {
    const val = record.fields[f];
    return val === undefined || val === null || val === '';
  });
}

function detectFormatIssues(record, fields, tableName) {
  const issues = [];
  const fn = tableName.toLowerCase();

  // SetID format check for Sets table
  if (fn.includes('set')) {
    const setId = record.fields['SetID'];
    if (setId && typeof setId === 'string') {
      const pattern = /^\d{4}-\d{2}-\d{2}-[A-Z0-9\-]+$/i;
      if (!pattern.test(setId)) issues.push(`SetID format: "${setId}"`);
    }
  }

  // Date format check for any date field
  fields.forEach(f => {
    if (f.type === 'date' || f.name.toLowerCase().includes('date')) {
      const val = record.fields[f.name];
      if (val && typeof val === 'string' && val.length > 0) {
        const d = new Date(val);
        if (isNaN(d.getTime())) issues.push(`Invalid date in "${f.name}": "${val}"`);
        // Future date check
        if (d > new Date(Date.now() + 86400000)) issues.push(`Future date in "${f.name}": "${val}"`);
      }
    }
  });

  return issues;
}

async function auditTable(table, progressCb) {
  const records = await fetchAllRecords(table.id);
  tableRecords[table.id] = records;

  const cnt = document.getElementById('cnt_' + table.id);
  if (cnt) cnt.textContent = records.length.toLocaleString();
  if (progressCb) progressCb(records.length);

  const opts = {
    dupes: document.getElementById('optDupes').checked,
    empty: document.getElementById('optEmpty').checked,
    zero: document.getElementById('optZero').checked,
    format: document.getElementById('optFormat').checked,
  };

  const keyFields = getKeyFields(table.name, table.fields);
  const dupeMap = {};
  const emptyRecords = [];
  const zeroRecords = [];
  const formatIssues = [];

  records.forEach(r => {
    if (opts.dupes && keyFields.length > 0) {
      const fp = fingerprint(r, keyFields);
      if (!dupeMap[fp]) dupeMap[fp] = [];
      dupeMap[fp].push(r);
    }
    if (opts.empty && keyFields.length > 0) {
      const empty = detectEmptyKeyFields(r, keyFields);
      if (empty.length > 0) emptyRecords.push({ record: r, fields: empty });
    }
    if (opts.zero) {
      const zeros = detectZeroValueFields(r, table.fields);
      if (zeros.length > 0) zeroRecords.push({ record: r, fields: zeros });
    }
    if (opts.format) {
      const issues = detectFormatIssues(r, table.fields, table.name);
      if (issues.length > 0) formatIssues.push({ record: r, issues });
    }
  });

  // Collapse dupes — only return groups with >1 record
  const dupeGroups = Object.values(dupeMap).filter(g => g.length > 1);
  const dupeRecords = dupeGroups.flat(); // all records involved in duplication

  return {
    tableId: table.id,
    tableName: table.name,
    totalRecords: records.length,
    keyFields,
    dupeGroups,
    dupeRecords,
    emptyRecords,
    zeroRecords,
    formatIssues,
    totalIssues: dupeGroups.length + emptyRecords.length + zeroRecords.length + formatIssues.length
  };
}

// ─── RUN AUDIT ─────────────────────────────────────────────────────────────

async function runAudit() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-dots">Scanning</span>';
  auditResults = {};

  const content = document.getElementById('content');
  content.innerHTML = '';

  const tables = allTables.filter(t => selectedTables.has(t.id));

  // Progress display
  const progDiv = document.createElement('div');
  progDiv.className = 'section';
  progDiv.innerHTML = `
    <div class="section-header"><span class="section-title info">Scanning ${tables.length} table${tables.length>1?'s':''}...</span></div>
    <div class="progress-wrap">
      <div class="progress-label" id="progLabel">Fetching records...</div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progBar" style="width:0%"></div></div>
    </div>
  `;
  content.appendChild(progDiv);

  for (let i = 0; i < tables.length; i++) {
    const t = tables[i];
    document.getElementById('progLabel').textContent = `Auditing: ${t.name} (${i+1}/${tables.length})`;
    document.getElementById('progBar').style.width = Math.round(((i) / tables.length) * 100) + '%';

    try {
      const result = await auditTable(t, () => {});
      auditResults[t.id] = result;
    } catch(e) {
      toast(`Error auditing ${t.name}: ${e.message}`, 'error', 6000);
    }
  }

  document.getElementById('progBar').style.width = '100%';
  setTimeout(() => renderResults(), 300);
}

// ─── RENDER RESULTS ────────────────────────────────────────────────────────

function renderResults() {
  const btn = document.getElementById('runBtn');
  btn.disabled = false;
  btn.innerHTML = '▶ Run Audit';
  document.getElementById('clearBtn').style.display = '';

  const content = document.getElementById('content');
  content.innerHTML = '';

  const results = Object.values(auditResults);
  if (results.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">⬡</div><div class="empty-title">No results</div></div>';
    return;
  }

  // Grand total summary
  const totalRecords = results.reduce((s,r) => s + r.totalRecords, 0);
  const totalDupeGroups = results.reduce((s,r) => s + r.dupeGroups.length, 0);
  const totalDupeRecords = results.reduce((s,r) => s + r.dupeRecords.length, 0);
  const totalEmpty = results.reduce((s,r) => s + r.emptyRecords.length, 0);
  const totalZero = results.reduce((s,r) => s + r.zeroRecords.length, 0);
  const totalFormat = results.reduce((s,r) => s + r.formatIssues.length, 0);
  const totalIssues = totalDupeGroups + totalEmpty + totalZero + totalFormat;

  const summary = document.createElement('div');
  summary.className = 'summary-grid';
  summary.innerHTML = `
    <div class="summary-card info"><div class="card-value">${totalRecords.toLocaleString()}</div><div class="card-label">Total Records</div></div>
    <div class="summary-card ${totalDupeGroups>0?'danger':'ok'}"><div class="card-value">${totalDupeGroups}</div><div class="card-label">Dupe Groups</div></div>
    <div class="summary-card ${totalDupeRecords>0?'danger':'ok'}"><div class="card-value">${totalDupeRecords}</div><div class="card-label">Dupe Records</div></div>
    <div class="summary-card ${totalEmpty>0?'warn':'ok'}"><div class="card-value">${totalEmpty}</div><div class="card-label">Empty Key Fields</div></div>
    <div class="summary-card ${totalZero>0?'warn':'ok'}"><div class="card-value">${totalZero}</div><div class="card-label">Zero-Value Records</div></div>
    <div class="summary-card ${totalFormat>0?'warn':'ok'}"><div class="card-value">${totalFormat}</div><div class="card-label">Format Errors</div></div>
  `;
  content.appendChild(summary);

  // Per-table results
  results.forEach(r => {
    renderTableResults(content, r);
    // Update sidebar badge
    const badge = document.getElementById('badge_' + r.tableId);
    const item = document.getElementById('titem_' + r.tableId);
    if (r.totalIssues > 0) {
      badge.textContent = r.totalIssues;
      item.classList.add('has-issues');
    } else {
      item.classList.remove('has-issues');
    }
  });
}

function renderTableResults(container, r) {
  // Table header
  const tableHeader = document.createElement('div');
  tableHeader.style.cssText = 'margin-top:8px;';
  tableHeader.innerHTML = `
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;">
      ${r.tableName} — ${r.totalRecords.toLocaleString()} records · Key fields: ${r.keyFields.join(', ') || 'none detected'}
    </div>
  `;
  container.appendChild(tableHeader);

  if (r.totalIssues === 0) {
    const ok = document.createElement('div');
    ok.className = 'section';
    ok.innerHTML = `<div class="section-header"><span class="section-title ok">✓ ${r.tableName} — No issues found</span></div>`;
    container.appendChild(ok);
    return;
  }

  // DUPLICATES
  if (r.dupeGroups.length > 0) {
    renderDupeSection(container, r);
  }

  // EMPTY KEY FIELDS
  if (r.emptyRecords.length > 0) {
    renderEmptySection(container, r);
  }

  // ZERO VALUE
  if (r.zeroRecords.length > 0) {
    renderZeroSection(container, r);
  }

  // FORMAT ISSUES
  if (r.formatIssues.length > 0) {
    renderFormatSection(container, r);
  }
}

function getDisplayFields(tableId) {
  const t = allTables.find(t => t.id === tableId);
  if (!t) return [];
  const skip = ['formula','rollup','lookup','count'];
  return t.fields.filter(f => !skip.includes(f.type)).slice(0, 6).map(f => f.name);
}

function renderDupeSection(container, r) {
  const section = document.createElement('div');
  section.className = 'section';
  const displayFields = getDisplayFields(r.tableId);
  const sectionId = `dupes_${r.tableId}`;

  // All records involved in duplicate groups (excluding first of each group = keep)
  const toDelete = r.dupeGroups.map(g => g.slice(1)).flat();

  section.innerHTML = `
    <div class="section-header">
      <span class="section-title danger">⚠ Duplicates — ${r.tableName}</span>
      <span class="section-count">${r.dupeGroups.length} groups / ${r.dupeRecords.length} records</span>
    </div>
    <div style="padding:10px 16px;font-family:var(--mono);font-size:10px;color:var(--text-dim);border-bottom:1px solid var(--border);">
      Grouped by: <span style="color:var(--warn)">${r.keyFields.join(' + ')}</span> · 
      First record in each group shown in green (KEEP) · Subsequent records shown in red (SUGGESTED DELETE)
    </div>
    <div class="data-table-wrap">
      <table class="data-table" id="${sectionId}">
        <thead><tr>
          <th><input type="checkbox" id="chkAll_${sectionId}" style="accent-color:var(--danger)" onchange="toggleAllDupes('${sectionId}','${r.tableId}')"></th>
          <th>Status</th>
          ${displayFields.map(f => `<th>${f}</th>`).join('')}
        </tr></thead>
        <tbody id="tbody_${sectionId}">
        </tbody>
      </table>
    </div>
    <div class="delete-bar">
      <span class="delete-bar-label" id="dbar_${sectionId}">Select records to delete</span>
      <button class="btn btn-ghost" onclick="autoSelectDupes('${sectionId}','${r.tableId}')">Auto-select duplicates</button>
      <button class="btn btn-danger" id="delBtn_${sectionId}" onclick="deleteSelected('${sectionId}','${r.tableId}')" disabled>Delete Selected</button>
    </div>
  `;
  container.appendChild(section);

  const tbody = document.getElementById(`tbody_${sectionId}`);
  r.dupeGroups.forEach((group, gi) => {
    group.forEach((rec, idx) => {
      const tr = document.createElement('tr');
      tr.id = `row_${rec.id}`;
      const isKeep = idx === 0;
      tr.innerHTML = `
        <td><input type="checkbox" class="dupe-chk" data-tableid="${r.tableId}" data-recid="${rec.id}" data-section="${sectionId}" style="accent-color:var(--danger)"></td>
        <td class="${isKeep ? 'ok' : 'danger'}">${isKeep ? 'KEEP' : 'DUPE'}</td>
        ${displayFields.map(f => {
          const val = rec.fields[f];
          const display = val === undefined ? '' : Array.isArray(val) ? val.join(', ') : String(val);
          return `<td title="${display}">${display}</td>`;
        }).join('')}
      `;
      tbody.appendChild(tr);
    });
    // Separator between groups
    if (gi < r.dupeGroups.length - 1) {
      const sep = document.createElement('tr');
      sep.innerHTML = `<td colspan="${displayFields.length + 2}" style="background:var(--border);height:1px;padding:0;"></td>`;
      tbody.appendChild(sep);
    }
  });

  updateDeleteBar(sectionId);
}

function renderEmptySection(container, r) {
  const section = document.createElement('div');
  section.className = 'section';
  const displayFields = getDisplayFields(r.tableId);
  const sectionId = `empty_${r.tableId}`;

  section.innerHTML = `
    <div class="section-header">
      <span class="section-title warn">⚡ Empty Key Fields — ${r.tableName}</span>
      <span class="section-count">${r.emptyRecords.length} records</span>
    </div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Empty Fields</th>
          ${displayFields.map(f => `<th>${f}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${r.emptyRecords.map(({record, fields}) => `
            <tr>
              <td class="warn">${fields.join(', ')}</td>
              ${displayFields.map(f => {
                const val = record.fields[f];
                const display = val === undefined ? '' : Array.isArray(val) ? val.join(', ') : String(val);
                return `<td class="${display===''?'dim':''}" title="${display}">${display || '—'}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  container.appendChild(section);
}

function renderZeroSection(container, r) {
  const section = document.createElement('div');
  section.className = 'section';
  const displayFields = getDisplayFields(r.tableId);

  section.innerHTML = `
    <div class="section-header">
      <span class="section-title warn">⚡ Zero-Value Records — ${r.tableName}</span>
      <span class="section-count">${r.zeroRecords.length} records</span>
    </div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Zero Fields</th>
          ${displayFields.map(f => `<th>${f}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${r.zeroRecords.map(({record, fields}) => `
            <tr>
              <td class="warn">${fields.join(', ')}</td>
              ${displayFields.map(f => {
                const val = record.fields[f];
                const display = val === undefined ? '' : Array.isArray(val) ? val.join(', ') : String(val);
                return `<td class="${val===0||val==='0'?'warn':''}" title="${display}">${display}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  container.appendChild(section);
}

function renderFormatSection(container, r) {
  const section = document.createElement('div');
  section.className = 'section';
  const displayFields = getDisplayFields(r.tableId);

  section.innerHTML = `
    <div class="section-header">
      <span class="section-title warn">⚡ Format Errors — ${r.tableName}</span>
      <span class="section-count">${r.formatIssues.length} records</span>
    </div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th>Issue</th>
          ${displayFields.map(f => `<th>${f}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${r.formatIssues.map(({record, issues}) => `
            <tr>
              <td class="warn" style="max-width:200px;white-space:normal">${issues.join('; ')}</td>
              ${displayFields.map(f => {
                const val = record.fields[f];
                const display = val === undefined ? '' : Array.isArray(val) ? val.join(', ') : String(val);
                return `<td title="${display}">${display}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  container.appendChild(section);
}

// ─── DUPE SELECTION / DELETION ─────────────────────────────────────────────

function updateDeleteBar(sectionId) {
  const checked = document.querySelectorAll(`.dupe-chk[data-section="${sectionId}"]:checked`);
  const btn = document.getElementById(`delBtn_${sectionId}`);
  const lbl = document.getElementById(`dbar_${sectionId}`);
  if (btn) btn.disabled = checked.length === 0;
  if (lbl) lbl.textContent = checked.length > 0 ? `${checked.length} record${checked.length>1?'s':''} selected` : 'Select records to delete';
}

function toggleAllDupes(sectionId, tableId) {
  const all = document.getElementById(`chkAll_${sectionId}`).checked;
  document.querySelectorAll(`.dupe-chk[data-section="${sectionId}"]`).forEach(c => c.checked = all);
  updateDeleteBar(sectionId);
}

function autoSelectDupes(sectionId, tableId) {
  // Select all DUPE (not KEEP) rows automatically
  document.querySelectorAll(`.dupe-chk[data-section="${sectionId}"]`).forEach(c => {
    const row = document.getElementById('row_' + c.dataset.recid);
    if (row) {
      const statusCell = row.cells[1];
      c.checked = statusCell && statusCell.textContent === 'DUPE';
    }
  });
  updateDeleteBar(sectionId);
}

// Attach change events dynamically
document.addEventListener('change', e => {
  if (e.target.classList.contains('dupe-chk')) {
    updateDeleteBar(e.target.dataset.section);
  }
});

async function deleteSelected(sectionId, tableId) {
  const checkboxes = document.querySelectorAll(`.dupe-chk[data-section="${sectionId}"]:checked`);
  const ids = Array.from(checkboxes).map(c => c.dataset.recid);
  if (ids.length === 0) return;

  const confirmed = confirm(`Delete ${ids.length} record${ids.length>1?'s':''}? This cannot be undone.`);
  if (!confirmed) return;

  const btn = document.getElementById(`delBtn_${sectionId}`);
  btn.disabled = true;
  btn.textContent = 'Deleting...';

  let deleted = 0, failed = 0;
  for (const id of ids) {
    try {
      await deleteRecord(tableId, id);
      deleted++;
      const row = document.getElementById('row_' + id);
      if (row) row.remove();
    } catch(e) {
      failed++;
    }
  }

  btn.textContent = 'Delete Selected';
  if (deleted > 0) toast(`Deleted ${deleted} record${deleted>1?'s':''}`, 'success');
  if (failed > 0) toast(`${failed} deletions failed`, 'error');

  updateDeleteBar(sectionId);
}

function clearResults() {
  auditResults = {};
  tableRecords = {};
  allTables.forEach(t => {
    const badge = document.getElementById('badge_' + t.id);
    const item = document.getElementById('titem_' + t.id);
    const cnt = document.getElementById('cnt_' + t.id);
    if (badge) badge.textContent = '!';
    if (item) item.classList.remove('has-issues');
    if (cnt) cnt.textContent = '';
  });
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state" id="emptyState"><div class="empty-icon">⬡</div><div class="empty-title">Results cleared</div><div class="empty-sub">Select tables and run audit again.</div></div>';
  document.getElementById('clearBtn').style.display = 'none';
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
init();
</script>
