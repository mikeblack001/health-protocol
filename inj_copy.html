<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>InjectionLog Copy</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px;}.ok{color:#4caf50}.err{color:#f44336}.info{color:#aaa}.warn{color:#ff9800}</style>
</head><body><div id="log"></div>
<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const SRC='tblBvEaLkGGipnOFc';  // current AT injection log
const DST='tbl7NO5G6QeCPuFzA';  // InjectionLog_PDFExtract

function log(m,c){const e=document.getElementById('log');const d=document.createElement('div');d.className=c||'info';d.textContent='['+new Date().toLocaleTimeString()+'] '+m;e.appendChild(d);e.scrollTop=e.scrollHeight;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function fetchAll(){
  let all=[],offset=null;
  while(true){
    let url='https://api.airtable.com/v0/'+BASE+'/'+SRC+'?pageSize=100';
    if(offset) url+='&offset='+offset;
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+AT}});
    const data=await r.json();
    all=all.concat(data.records||[]);
    if(all.length%500===0&&all.length>0) log('Fetched '+all.length+'...','info');
    offset=data.offset;
    if(!offset) break;
    await sleep(100);
  }
  return all;
}

function mapRecord(r){
  const f=r.fields||{};
  const rec={};
  // Name field = compound + date for uniqueness
  const compound=typeof f['Compound']==='object'?f['Compound'].name:(f['Compound']||'');
  const date=f['Date']||'';
  rec['Name']=compound+' '+date;
  if(date) rec['Date']=date;
  if(compound) rec['Compound']=compound;
  if(f['Dose']) rec['Dose']=String(f['Dose']);
  if(f['Site']) rec['Site']=typeof f['Site']==='object'?f['Site'].name:f['Site'];
  if(f['Timing']) rec['Timing']=typeof f['Timing']==='object'?f['Timing'].name:f['Timing'];
  if(f['Status']) rec['Status']=typeof f['Status']==='object'?f['Status'].name:f['Status'];
  if(f['Notes']) rec['Notes']=f['Notes'];
  return {fields:rec};
}

async function run(){
  log('Fetching all records from current AT Injection Log...','info');
  const records=await fetchAll();
  log('Fetched '+records.length+' records','info');
  const mapped=records.map(mapRecord);
  log('Pushing to InjectionLog_PDFExtract...','info');
  let pushed=0,errors=0;
  for(let i=0;i<mapped.length;i+=25){
    const batch=mapped.slice(i,i+25);
    const res=await fetch('https://api.airtable.com/v0/'+BASE+'/'+DST,{method:'POST',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({records:batch,typecast:true})});
    const data=await res.json();
    if(res.ok&&data.records){pushed+=data.records.length;}
    else{errors++;const msg=data.error?(data.error.type+': '+data.error.message):JSON.stringify(data).substring(0,150);if(errors<=3)log('Batch '+(Math.floor(i/25)+1)+': '+msg,'err');if(res.status===429){await sleep(30000);i-=25;continue;}}
    if(i%250===0&&i>0) log(pushed+' pushed...','info');
    await sleep(150);
  }
  log('DONE — Pushed: '+pushed+'/'+mapped.length+' | Errors: '+errors,errors===0?'ok':'warn');
}
window.addEventListener('load',run);
</script></body></html>
