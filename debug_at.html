<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug AT</title>
<style>body{font-family:-apple-system,sans-serif;font-size:13px;padding:20px;background:#f4f5f7}
h2{font-size:14px;font-weight:800;margin:16px 0 6px}
pre{background:#1e2433;color:#a3e635;padding:12px;border-radius:6px;font-size:11px;overflow:auto;max-height:300px;white-space:pre-wrap}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;margin:4px}
</style></head><body>
<h1 style="font-weight:900;font-size:16px;margin-bottom:12px">AT Debug Tool</h1>
<button class="btn" style="background:#7c3aed;color:#fff" onclick="test1()">1. Load 3 Parseur Records (no filter)</button>
<button class="btn" style="background:#2563eb;color:#fff" onclick="test2()">2. Load 3 Log Records (no filter)</button>
<button class="btn" style="background:#16a34a;color:#fff" onclick="test3()">3. Filter Parseur by most recent date</button>
<button class="btn" style="background:#dc2626;color:#fff" onclick="test4()">4. Filter Log by 2026-04-27</button>
<div id="out"><pre id="pre" style="margin-top:12px">Click a button to debug.</pre></div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const PAR_TBL='tblCTOGIrF3NjdyTE';
const LOG_TBL='tblBvEaLkGGipnOFc';
const LOG_DATE_ID='fldhYEtLEGA4VxvvO';

async function get(url){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+url,{headers:{Authorization:'Bearer '+AT}});
  const d=await r.json();
  return {status:r.status, data:d};
}
function show(obj){document.getElementById('pre').textContent=JSON.stringify(obj,null,2);}

async function test1(){
  show('Loading 3 Parseur records...');
  const r=await get(PAR_TBL+'?pageSize=3');
  show({url:PAR_TBL+'?pageSize=3', status:r.status, recordCount:r.data.records?.length, fields:r.data.records?.[0]?.fields});
}
async function test2(){
  show('Loading 3 Log records...');
  const r=await get(LOG_TBL+'?pageSize=3&returnFieldsByFieldId=true');
  show({url:'...Log?pageSize=3', status:r.status, recordCount:r.data.records?.length, fields:r.data.records?.[0]?.fields});
}
async function test3(){
  // First get most recent date from Parseur
  show('Getting dates from Parseur...');
  let recs=[],off=null;
  do{
    const r=await get(PAR_TBL+'?fields[]=Date&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(r.data.records||[]);off=r.data.offset;
  }while(off);
  const dates=[...new Set(recs.map(r=>r.fields?.Date||r.fields?.date).filter(Boolean))].sort();
  const latest=dates[dates.length-1];
  // Now filter
  const q=encodeURIComponent('{Date}="'+latest+'"');
  const r2=await get(PAR_TBL+'?filterByFormula='+q+'&pageSize=10');
  show({mostRecentDate:latest, allDates:dates.slice(-10), filterResult:{status:r2.status, count:r2.data.records?.length, sample:r2.data.records?.[0]?.fields, error:r2.data.error}});
}
async function test4(){
  const date='2026-04-27';
  const q=encodeURIComponent('{'+LOG_DATE_ID+'}="'+date+'"');
  const r=await get(LOG_TBL+'?filterByFormula='+q+'&returnFieldsByFieldId=true&pageSize=10');
  show({date, filterResult:{status:r.status, count:r.data.records?.length, sample:r.data.records?.[0]?.fields, error:r.data.error}});
}
</script>
</body></html>
