<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Date Gap Analysis</title>
<style>
body{font-family:-apple-system,sans-serif;font-size:13px;padding:24px;max-width:1000px;background:#f4f5f7}
h1{font-size:17px;font-weight:900;margin-bottom:4px}
p{color:#6b7280;font-size:12px;margin-bottom:16px}
.btn{display:inline-block;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;margin-right:6px;margin-bottom:8px}
#out{background:#fff;border:2px solid #e2e5ea;border-radius:10px;padding:14px;margin-top:12px;font-size:12px;min-height:40px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{background:#1e2433;color:#fff;padding:7px 10px;text-align:left;font-weight:700}
td{padding:6px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:hover td{background:#f8f9fa}
.ok{color:#166534;font-weight:700}.err{color:#dc2626;font-weight:700}.warn{color:#92400e;font-weight:700}
select{padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px}
#bar-wrap{background:#e2e5ea;border-radius:6px;height:20px;margin-top:10px;display:none}
#bar{background:#2563eb;height:20px;border-radius:6px;width:0%;font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:20px;transition:width .1s}
</style></head><body>
<h1>Date Gap Analysis — Parseur vs Injection Log</h1>
<p>Finds dates in the Log with no matching Parseur records. Assigns blank Parseur records to those gap dates.</p>

<button class="btn" style="background:#2563eb;color:#fff" onclick="analyze()">Analyze Gaps</button>
<button class="btn" style="background:#16a34a;color:#fff" onclick="applyAssignments()">Apply Assignments</button>

<div id="out">Click Analyze Gaps.</div>
<div id="bar-wrap"><div id="bar">Loading…</div></div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6',PAR='tblCTOGIrF3NjdyTE',LOG='tblBvEaLkGGipnOFc';

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function atGet(url){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+url,{headers:{Authorization:'Bearer '+AT}});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;
}
async function atPatch(tbl,records){
  const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+tbl+'?typecast=true',{
    method:'PATCH',headers:{Authorization:'Bearer '+AT,'Content-Type':'application/json'},
    body:JSON.stringify({records})});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;
}
async function loadAll(tbl,qs){
  let recs=[],off=null;
  do{const d=await atGet(tbl+'?'+qs+'&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  return recs;
}

let blankRecs=[], assignments=[];

async function analyze(){
  out('Loading…');
  document.getElementById('bar-wrap').style.display='';
  document.getElementById('bar').style.width='10%';document.getElementById('bar').textContent='Loading Parseur…';

  // Load all Parseur: get dates + compounds
  const parAll=await loadAll(PAR,'fields%5B%5D=Date&fields%5B%5D=Compound&fields%5B%5D=Medication&fields%5B%5D=Day+of+Week');
  blankRecs=parAll.filter(r=>!r.fields['Date']||String(r.fields['Date']).trim()==='');
  const parDates=new Set(parAll.filter(r=>r.fields['Date']).map(r=>r.fields['Date']));

  document.getElementById('bar').style.width='50%';document.getElementById('bar').textContent='Loading Log…';

  // Load Log with field IDs
  const logAll=await loadAll(LOG,'returnFieldsByFieldId=true&fields%5B%5D=fldhYEtLEGA4VxvvO&fields%5B%5D=fldwVFyizH4mBANBa');
  
  // Group log by date
  const logByDate={};
  logAll.forEach(r=>{
    const date=r.fields['fldhYEtLEGA4VxvvO']||'';
    const cmp=r.fields['fldwVFyizH4mBANBa']||'';
    if(!date)return;
    if(!logByDate[date])logByDate[date]=[];
    logByDate[date].push(cmp);
  });

  // Group Parseur by date
  const parByDate={};
  parAll.filter(r=>r.fields['Date']).forEach(r=>{
    const date=r.fields['Date'];
    if(!parByDate[date])parByDate[date]=[];
    parByDate[date].push(r.fields['Compound']||r.fields['Medication']||'');
  });

  // Find Log dates NOT in Parseur
  const logOnlyDates=Object.keys(logByDate).filter(d=>!parDates.has(d)).sort();
  
  document.getElementById('bar').style.width='80%';document.getElementById('bar').textContent='Analyzing…';

  // Group blank records by compound for easier assignment
  const blankByCmp={};
  blankRecs.forEach(r=>{
    const cmp=r.fields['Compound']||r.fields['Medication']||'?';
    if(!blankByCmp[cmp])blankByCmp[cmp]=[];
    blankByCmp[cmp].push(r);
  });

  document.getElementById('bar').style.width='100%';document.getElementById('bar').style.background='#16a34a';
  document.getElementById('bar').textContent='Done';

  assignments=[];

  let html=`<b>Summary:</b><br>
  • Parseur: ${parAll.length} total records, ${parAll.length-blankRecs.length} dated, ${blankRecs.length} blank dates<br>
  • Injection Log: ${logAll.length} records across ${Object.keys(logByDate).length} dates<br>
  • <span class="warn">Log dates with NO Parseur records: ${logOnlyDates.length}</span><br><br>`;

  if(logOnlyDates.length===0){
    html+='<span class="ok">No gaps — every Log date has Parseur records.</span>';
    out(html);return;
  }

  html+=`<b>Log dates missing from Parseur (${logOnlyDates.length}) — these are likely where the ${blankRecs.length} blank records belong:</b>`;
  html+='<table><tr><th>Gap Date</th><th>Log has these compounds</th><th>Parseur blanks to assign</th><th>Assign blanks to this date?</th></tr>';

  logOnlyDates.forEach((date,i)=>{
    const logCmps=logByDate[date]||[];
    // Find blank Parseur records whose compound matches something in Log for this date
    const matchingBlanks=blankRecs.filter(r=>{
      const cmp=(r.fields['Compound']||r.fields['Medication']||'').toLowerCase();
      return logCmps.some(lc=>lc.toLowerCase().includes(cmp.replace(/[^a-z]/g,'').substring(0,4))||
        cmp.includes(lc.toLowerCase().replace(/[^a-z]/g,'').substring(0,4)));
    });
    const asgId='asg_'+i;
    assignments.push({date,matchingBlanks,asgId});
    html+=`<tr>
      <td><b>${date}</b></td>
      <td style="font-size:11px">${logCmps.join('<br>')}</td>
      <td style="font-size:11px">${matchingBlanks.length>0?matchingBlanks.map(r=>r.fields['Compound']||r.fields['Medication']||'?').join('<br>'):'<span class="err">No matching blanks</span>'}</td>
      <td>${matchingBlanks.length>0?`<label><input type="checkbox" id="${asgId}" checked> Assign ${matchingBlanks.length} blank(s) → ${date}</label>`:'—'}</td>
    </tr>`;
  });
  html+='</table>';
  out(html);
}

async function applyAssignments(){
  const toApply=assignments.filter(a=>{
    const cb=document.getElementById(a.asgId);
    return cb&&cb.checked&&a.matchingBlanks.length>0;
  });
  if(!toApply.length){alert('No assignments selected');return;}
  const total=toApply.reduce((s,a)=>s+a.matchingBlanks.length,0);
  if(!confirm('Assign dates to '+total+' blank Parseur records across '+toApply.length+' dates?'))return;
  document.getElementById('bar').style.background='#2563eb';
  document.getElementById('bar').style.width='5%';
  let done=0,errs=0;
  const updates=[];
  toApply.forEach(a=>a.matchingBlanks.forEach(r=>updates.push({id:r.id,fields:{Date:a.date}})));
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    try{await atPatch(PAR,batch);done+=batch.length;}catch(e){errs+=batch.length;}
    document.getElementById('bar').style.width=Math.max(Math.round((i+batch.length)/updates.length*100),2)+'%';
    document.getElementById('bar').textContent=done+'/'+updates.length;
    await sleep(300);
  }
  document.getElementById('bar').style.background=errs?'#f59e0b':'#16a34a';
  out(`<span class="ok">✓ ${done} blank records assigned dates.</span>${errs?' <span class="err">'+errs+' errors</span>':''}`);
}

function out(h){document.getElementById('out').innerHTML=h;}
</script>
</body></html>
