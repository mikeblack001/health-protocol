<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Fix Remaining Blanks</title>
<style>
body{font-family:-apple-system,sans-serif;font-size:13px;padding:24px;max-width:1000px;background:#f4f5f7}
h1{font-size:17px;font-weight:900;margin-bottom:4px}
p{color:#6b7280;font-size:12px;margin-bottom:16px}
.btn{display:inline-block;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;margin-right:6px;margin-bottom:8px}
.box{background:#fff;border:1px solid #e2e5ea;border-radius:10px;padding:14px;margin-bottom:14px}
.box h2{font-size:13px;font-weight:800;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e2433;color:#fff;padding:6px 9px;text-align:left;font-weight:700}
td{padding:5px 9px;border-bottom:1px solid #f3f4f6}
tr:hover td{background:#f8f9fa}
select{padding:3px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px}
.ok{color:#166534;font-weight:700}.err{color:#dc2626;font-weight:700}.warn{color:#92400e;font-weight:700}
#bar-wrap{background:#e2e5ea;border-radius:6px;height:18px;margin-bottom:12px;display:none}
#bar{background:#2563eb;height:18px;border-radius:6px;width:0%;font-size:11px;font-weight:700;color:#fff;text-align:center;line-height:18px;transition:width .1s}
</style></head><body>
<h1>Fix Remaining Blanks + Full Comparison</h1>
<p>Updated mappings: 10/10A S = Ipamorelin, CJC = CJC-1295, 2.5 dose = CJC-1295 No DAC, BPC = BPC-157. Targets Dec 2025 gap dates.</p>
<button class="btn" style="background:#2563eb;color:#fff" onclick="run()">Run Analysis</button>
<button class="btn" style="background:#7c3aed;color:#fff" onclick="fixNano()">Fix Nano → Deca</button>
<button class="btn" style="background:#6b7280;color:#fff" onclick="deleteNonInjections()">🗑 Delete Weights/Training/Cardio/Sauna</button>
<button class="btn" style="background:#f59e0b;color:#fff" onclick="fixCompoundNames()">Fix Compound Names</button>
<button class="btn" style="background:#16a34a;color:#fff" id="apply-btn" onclick="applyAll()" style="display:none">Apply Assignments</button>
<button class="btn" style="background:#dc2626;color:#fff" id="del-dup-btn" onclick="deleteDups()" style="display:none">Delete Duplicates</button>
<div id="bar-wrap"><div id="bar">Loading…</div></div>
<div id="out"></div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6',PAR='tblCTOGIrF3NjdyTE',LOG='tblBvEaLkGGipnOFc';
const DOW_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Updated compound map
function resolveCompound(rawCmp, dose){
  const c=(rawCmp||'').toLowerCase().trim();
  const d=(dose||'').toLowerCase().trim();
  // 10A S or just "10" = Ipamorelin (dosed at ~10 units SubQ)
  if(c==='10a s'||c==='10a'||c==='10 a s')return'Ipamorelin';
  // 2.5 dose = CJC-1295 No DAC
  if((d==='2.5'||d==='2,5')&&(c.includes('cjc')||c===''))return'CJC-1295 No DAC';
  const map={
    'cjc':'CJC-1295','cjc-1295':'CJC-1295','cjc 1295':'CJC-1295',
    'cjc no dac':'CJC-1295 No DAC','cjc-1295 no dac':'CJC-1295 No DAC',
    'bpc':'BPC-157','bpc-157':'BPC-157','bpc157':'BPC-157',
    'tb500':'TB-500','tb-500':'TB-500','tb':'TB-500',
    'tesa':'Tesamorelin','tesamorelin':'Tesamorelin',
    'ipa':'Ipamorelin','ipamorelin':'Ipamorelin',
    'nad':'NAD+','nad+':'NAD+',
    '10a s':'Ipamorelin','10as':'Ipamorelin',
    'testosterone':'Testosterone','trt':'Testosterone',
    'deca':'Deca (Nandrolone)','deca (nandrolone)':'Deca (Nandrolone)','deca (nano)':'Deca (Nandrolone)',
    'anavar':'Anavar (Oxandrolone)','anavar (oxandrolone)':'Anavar (Oxandrolone)',
    'ghk':'GHK-Cu','ghk-cu':'GHK-Cu',
    'lipo':'LipoMinoMix','lipominomix':'LipoMinoMix',
    'ss31':'SS-31','ss-31':'SS-31','ss 31':'SS-31',
    'dsip':'DSIP','kpv':'KPV','selank':'Selank','semax':'Semax',
    'retatrutide':'Retatrutide','tirzepatide':'Tirzepatide','epitalon':'Epitalon',
    'mots-c':'Mots-C','motsc':'Mots-C',
    'winstrol':'Winstrol (Stanozolol)','stanozolol':'Winstrol (Stanozolol)'
  };
  return map[c]||rawCmp||'';
}

function fuzzy(a,b){
  const n=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const na=n(a||''),nb=n(b||'');
  if(!na||!nb)return false;
  if(na===nb)return true;
  if(na.length>=3&&nb.includes(na))return true;
  if(nb.length>=3&&na.includes(nb))return true;
  return false;
}
function dateDow(iso){return new Date(iso+'T12:00:00Z').getUTCDay();}
function parseDow(s){
  const c=(s||'').replace(/\s*(am|pm|AM|PM)\s*$/i,'').trim().toLowerCase();
  return{sun:0,sunday:0,mon:1,monday:1,tue:2,tues:2,tuesday:2,
    wed:3,wednesday:3,thu:4,thur:4,thurs:4,thursday:3,fri:5,friday:5,sat:6,saturday:6}[c];
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function atGet(url){const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+url,{headers:{Authorization:'Bearer '+AT}});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;}
async function atPatch(tbl,records){const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+tbl+'?typecast=true',{method:'PATCH',headers:{Authorization:'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({records})});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;}
async function loadAll(tbl,qs){let recs=[],off=null;do{const d=await atGet(tbl+'?'+qs+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);return recs;}

let dupIds=[], planRows=[], allBlanks=[];

async function fixNano(){
  // Find all Parseur records where Medication contains "nano" but Compound is wrong
  out2('Scanning for Nano records…');
  let recs=[],off=null;
  do{
    const d=await atGet(PAR+'?fields%5B%5D=Medication&fields%5B%5D=Compound&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  const toFix=recs.filter(r=>{
    const med=(r.fields['Medication']||'').toLowerCase();
    const cmp=(r.fields['Compound']||'').toLowerCase();
    // Medication contains "nano" but compound is NOT already Deca
    return med.includes('nano')&&!cmp.includes('deca')&&!cmp.includes('nandrolone');
  });
  if(!toFix.length){out2('<span class="ok">No Nano→wrong records found.</span>');return;}
  out2(`Found ${toFix.length} records with Nano in Medication but wrong Compound. Fixing…`);
  let done=0;
  for(let i=0;i<toFix.length;i+=10){
    const batch=toFix.slice(i,i+10);
    try{
      await atPatch(PAR,batch.map(r=>({id:r.id,fields:{Compound:'Deca (Nandrolone)'}})));
      done+=batch.length;
    }catch(e){out2('Error: '+e.message);return;}
    await sleep(250);
  }
  out2(`<span class="ok">✓ Fixed ${done} records: Compound set to Deca (Nandrolone). Run Analysis to verify.</span>`);
}

function out2(h){
  let el=document.getElementById('out2');
  if(!el){el=document.createElement('div');el.id='out2';el.style='background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:12px;margin-bottom:12px;font-size:12px';document.getElementById('out').before(el);}
  el.innerHTML=h;
}

async function fixCompoundNames(){
  // Canonical map for non-canonical compound names still in the table
  const FIX={
    'BPC':'BPC-157','BPC157':'BPC-157','BPC 157':'BPC-157','S IPA':'Ipamorelin','S Ipa':'Ipamorelin','S ipa':'Ipamorelin',
    'CJC':'CJC-1295','CJC 1295':'CJC-1295',
    'CJC No DAC':'CJC-1295 No DAC','CJC-No-DAC':'CJC-1295 No DAC',
    'SS 31':'SS-31','SS31':'SS-31',
    'NAD':'NAD+',
    'Tesa':'Tesamorelin',
    'Ipa':'Ipamorelin',
    'Deca':'Deca (Nandrolone)','Deca (Nano)':'Deca (Nandrolone)','Nandrolone':'Deca (Nandrolone)',
    'GHK':'GHK-Cu',
    'TB500':'TB-500','TB 500':'TB-500',
    'Lipo':'LipoMinoMix','Lipo Mino Mix':'LipoMinoMix',
    'Anavar':'Anavar (Oxandrolone)',
    'Winstrol':'Winstrol (Stanozolol)','Stanozolol':'Winstrol (Stanozolol)',
    'Mots C':'Mots-C','MOTS-C':'Mots-C',
    'Tesamorelin (Night)':'Tesamorelin','Tesamorelin (Morning)':'Tesamorelin',
    'TRT (Testosterone)':'Testosterone','TRT':'Testosterone'
  };
  out2('Scanning compound names…');
  let recs=[],off=null;
  do{
    const d=await atGet(PAR+'?fields%5B%5D=Compound&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  const toFix=recs.filter(r=>{
    const c=r.fields['Compound']||'';
    return FIX[c]!==undefined;
  });
  if(!toFix.length){out2('<span class="ok">✓ All compound names are canonical.</span>');return;}
  const preview=[...new Set(toFix.map(r=>r.fields['Compound']+'→'+FIX[r.fields['Compound']]))].join(', ');
  out2(`Found <b>${toFix.length} records</b> to rename:<br>${preview}<br><br>Fixing…`);
  let done=0;
  for(let i=0;i<toFix.length;i+=10){
    const batch=toFix.slice(i,i+10);
    try{
      await atPatch(PAR,batch.map(r=>({id:r.id,fields:{Compound:FIX[r.fields['Compound']]}})));
      done+=batch.length;
    }catch(e){out2('Error: '+e.message);return;}
    await sleep(200);
  }
  out2(`<span class="ok">✓ Fixed ${done} compound names. Run Analysis to recheck duplicates.</span>`);
}

async function deleteNonInjections(){
  const JUNK=['weight','training','cardio','sauna','tanning','exercise','workout','gym'];
  out2('Scanning for non-injection records…');
  let recs=[],off=null;
  do{
    const d=await atGet(PAR+'?fields%5B%5D=Medication&fields%5B%5D=Compound&fields%5B%5D=Name&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  const toDelete=recs.filter(r=>{
    const med=(r.fields['Medication']||r.fields['Compound']||r.fields['Name']||'').toLowerCase();
    return JUNK.some(j=>med.includes(j));
  });
  if(!toDelete.length){out2('<span class="ok">No non-injection records found.</span>');return;}
  // Show preview
  const preview=toDelete.slice(0,20).map(r=>r.fields['Medication']||r.fields['Compound']||r.fields['Name']||'?').join('<br>');
  out2(`Found <b>${toDelete.length} records</b> to delete:<br>${preview}${toDelete.length>20?'<br>...and '+(toDelete.length-20)+' more':''}`);
  if(!confirm('Delete '+toDelete.length+' non-injection records (weights/training/cardio/sauna/tanning)?'))return;
  let done=0;
  for(let i=0;i<toDelete.length;i+=10){
    const qs=toDelete.slice(i,i+10).map(r=>'records%5B%5D='+r.id).join('&');
    try{await fetch('https://api.airtable.com/v0/'+BASE+'/'+PAR+'?'+qs,{method:'DELETE',headers:{Authorization:'Bearer '+AT}});done+=10;}catch(e){}
    await sleep(200);
  }
  out2(`<span class="ok">✓ Deleted ${done} non-injection records.</span>`);
}

async function run(){
  document.getElementById('bar-wrap').style.display='';
  document.getElementById('bar').style.width='5%';document.getElementById('bar').textContent='Loading…';

  const parAll=await loadAll(PAR,'fields%5B%5D=Date&fields%5B%5D=Compound&fields%5B%5D=Medication&fields%5B%5D=Dose&fields%5B%5D=Day+of+Week');
  document.getElementById('bar').style.width='40%';document.getElementById('bar').textContent='Loading Log…';
  const logAll=await loadAll(LOG,'returnFieldsByFieldId=true&fields%5B%5D=fldhYEtLEGA4VxvvO&fields%5B%5D=fldwVFyizH4mBANBa');
  document.getElementById('bar').style.width='75%';document.getElementById('bar').textContent='Analyzing…';

  // Resolve compounds for blank records using updated map
  allBlanks=parAll.filter(r=>!r.fields['Date']||!String(r.fields['Date']).trim()).map(r=>{
    const rawCmp=r.fields['Compound']||r.fields['Medication']||'';
    const dose=r.fields['Dose']||'';
    const resolved=resolveCompound(rawCmp,dose);
    return{...r,_resolved:resolved};
  });

  // Build Log index
  const logByDate={};
  logAll.forEach(r=>{
    const d=r.fields['fldhYEtLEGA4VxvvO']||'',c=r.fields['fldwVFyizH4mBANBa']||'';
    if(!d||!c)return;
    if(!logByDate[d])logByDate[d]=new Set();
    logByDate[d].add(c);
  });
  Object.keys(logByDate).forEach(d=>logByDate[d]=[...logByDate[d]]);

  const parDates=new Set(parAll.filter(r=>r.fields['Date']).map(r=>r.fields['Date']));
  const gapDates=Object.keys(logByDate).filter(d=>!parDates.has(d)).sort();

  // Duplicates
  const seen={};dupIds=[];const dups=[];
  parAll.filter(r=>r.fields['Date']).forEach(r=>{
    const key=(r.fields['Compound']||r.fields['Medication']||'')+'|'+r.fields['Date'];
    if(!seen[key])seen[key]=r.id;
    else{dupIds.push(r.id);dups.push({cmp:r.fields['Compound']||r.fields['Medication']||'?',date:r.fields['Date']});}
  });

  // Match blanks to gap dates using updated compound resolution
  const usedBlanks=new Set();
  planRows=[];
  gapDates.forEach(date=>{
    const dow=dateDow(date);
    const logCmps=[...new Set(logByDate[date])];
    const assigned=[];
    logCmps.forEach(logCmp=>{
      const match=allBlanks.find(r=>{
        if(usedBlanks.has(r.id))return false;
        if(!fuzzy(r._resolved,logCmp))return false;
        const bDow=parseDow(r.fields['Day of Week']||'');
        return bDow===undefined||bDow===dow;
      });
      if(match){usedBlanks.add(match.id);assigned.push({id:match.id,cmp:match._resolved,rawCmp:match.fields['Compound']||match.fields['Medication']||'',dow:match.fields['Day of Week']||''});}
    });
    if(assigned.length||logCmps.length)planRows.push({date,dow,dowName:DOW_NAMES[dow],logCmps,assigned});
  });

  const totalMatched=planRows.reduce((s,r)=>s+r.assigned.length,0);
  const unmatched=allBlanks.length-totalMatched;

  document.getElementById('bar').style.width='100%';document.getElementById('bar').style.background='#16a34a';document.getElementById('bar').textContent='Done';
  if(totalMatched>0)document.getElementById('apply-btn').style.display='inline-block';
  if(dupIds.length>0)document.getElementById('del-dup-btn').style.display='inline-block';

  let html='';

  // Summary
  html+=`<div class="box"><h2>Summary</h2>
    ${allBlanks.length} blanks remaining &nbsp;|&nbsp; 
    <span class="${totalMatched?'ok':'err'}">${totalMatched} matched</span> &nbsp;|&nbsp; 
    <span class="${unmatched?'warn':'ok'}">${unmatched} still unmatched</span> &nbsp;|&nbsp; 
    <span class="${dups.length?'err':'ok'}">${dups.length} duplicates</span>
  </div>`;

  // Blank compound breakdown
  if(allBlanks.length){
    const byCmp={};
    allBlanks.forEach(r=>{const k=r._resolved||'?';byCmp[k]=(byCmp[k]||0)+1;});
    html+=`<div class="box"><h2>Remaining Blanks by Compound (${allBlanks.length} total)</h2>
    <table><tr><th>Resolved Compound</th><th>Count</th></tr>`;
    Object.entries(byCmp).sort((a,b)=>b[1]-a[1]).forEach(([c,n])=>html+=`<tr><td>${c}</td><td>${n}</td></tr>`);
    html+='</table></div>';
  }

  // Gap matches
  const withMatches=planRows.filter(r=>r.assigned.length>0);
  if(withMatches.length){
    html+=`<div class="box"><h2>Gap Dates with Matches (${totalMatched} blanks to assign)</h2>
    <table><tr><th>Date</th><th>Day</th><th>Log Compounds</th><th>Assign Blanks</th></tr>`;
    withMatches.forEach((row,i)=>{
      html+=`<tr><td><b>${row.date}</b></td><td>${row.dowName}</td>
      <td style="font-size:11px">${row.logCmps.join(', ')}</td>
      <td style="font-size:11px">${row.assigned.map(a=>`${a.rawCmp}→<b>${a.cmp}</b> (${a.dow})`).join('<br>')}</td></tr>`;
    });
    html+='</table></div>';
  }

  // Duplicates
  if(dups.length){
    html+=`<div class="box"><h2>Duplicates in Parseur (${dups.length}) — click Delete Duplicates to remove</h2>
    <table><tr><th>Compound</th><th>Date</th></tr>`;
    dups.forEach(d=>html+=`<tr><td>${d.cmp}</td><td>${d.date}</td></tr>`);
    html+='</table></div>';
  }

  document.getElementById('out').innerHTML=html;
}

async function applyAll(){
  const updates=[];
  planRows.forEach(row=>row.assigned.forEach(a=>updates.push({id:a.id,fields:{Date:row.date,Compound:a.cmp}})));
  if(!updates.length){alert('Nothing to apply');return;}
  if(!confirm('Apply '+updates.length+' date+compound assignments?'))return;
  document.getElementById('bar').style.background='#2563eb';document.getElementById('bar').style.width='5%';
  let done=0;
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    try{await atPatch(PAR,batch);done+=batch.length;}catch(e){}
    document.getElementById('bar').style.width=Math.max(Math.round((i+batch.length)/updates.length*100),2)+'%';
    document.getElementById('bar').textContent=done+'/'+updates.length;
    await sleep(300);
  }
  document.getElementById('bar').style.background='#16a34a';
  alert('✓ '+done+' records updated. Run Analysis again.');
}

async function deleteDups(){
  if(!dupIds.length){alert('None');return;}
  if(!confirm('Delete '+dupIds.length+' duplicates?'))return;
  let done=0;
  for(let i=0;i<dupIds.length;i+=10){
    const qs=dupIds.slice(i,i+10).map(id=>'records%5B%5D='+id).join('&');
    try{await fetch('https://api.airtable.com/v0/'+BASE+'/'+PAR+'?'+qs,{method:'DELETE',headers:{Authorization:'Bearer '+AT}});done+=10;}catch(e){}
    await sleep(200);
  }
  alert('✓ Deleted '+done);
}
</script>
</body></html>
