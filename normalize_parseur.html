<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Date Gap Analysis</title>
<style>
body{font-family:-apple-system,sans-serif;font-size:13px;padding:24px;max-width:1000px;background:#f4f5f7}
h1{font-size:17px;font-weight:900;margin-bottom:4px}
p{color:#6b7280;font-size:12px;margin-bottom:16px}
.btn{display:inline-block;padding:9px 18px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:none;margin-right:6px;margin-bottom:8px}
#out{background:#fff;border:2px solid #e2e5ea;border-radius:10px;padding:14px;margin-top:12px;font-size:12px;min-height:40px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{background:#1e2433;color:#fff;padding:7px 10px;text-align:left;font-weight:700}
td{padding:5px 9px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:hover td{background:#f8f9fa}
.ok{color:#166534;font-weight:700}.err{color:#dc2626;font-weight:700}.warn{color:#92400e;font-weight:700}
#bar-wrap{background:#e2e5ea;border-radius:6px;height:20px;margin-top:10px;display:none}
#bar{background:#2563eb;height:20px;border-radius:6px;width:0%;font-size:12px;font-weight:700;color:#fff;text-align:center;line-height:20px;transition:width .1s}
</style></head><body>
<h1>Date Gap Analysis — Parseur vs Injection Log</h1>
<p>Matches blank Parseur records to gap dates using compound + day of week. One blank per compound per date max.</p>

<button class="btn" style="background:#2563eb;color:#fff" onclick="analyze()">Analyze Gaps</button>
<button class="btn" style="background:#16a34a;color:#fff" onclick="applyAll()">Apply All Checked</button>

<div id="out">Click Analyze Gaps.</div>
<div id="bar-wrap"><div id="bar">Loading…</div></div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6',PAR='tblCTOGIrF3NjdyTE',LOG='tblBvEaLkGGipnOFc';
const DOW_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function dateDow(iso){return new Date(iso+'T12:00:00Z').getUTCDay();}
function parseDow(s){
  const c=(s||'').replace(/\s*(am|pm|AM|PM)\s*$/i,'').trim().toLowerCase();
  return{sun:0,sunday:0,mon:1,monday:1,tue:2,tues:2,tuesday:2,
    wed:3,wednesday:3,thu:4,thur:4,thurs:4,thursday:4,fri:5,friday:5,sat:6,saturday:6}[c];
}
function fuzzy(a,b){
  const n=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const na=n(a||''),nb=n(b||'');
  if(!na||!nb)return false;
  if(na===nb)return true;
  if(na.length>=3&&nb.includes(na))return true;
  if(nb.length>=3&&na.includes(nb))return true;
  return false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function atGet(url){const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+url,{headers:{Authorization:'Bearer '+AT}});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;}
async function atPatch(records){const r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+PAR+'?typecast=true',{method:'PATCH',headers:{Authorization:'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({records})});const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;}
async function loadAll(tbl,qs){let recs=[],off=null;do{const d=await atGet(tbl+'?'+qs+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);return recs;}

let planRows=[];

async function analyze(){
  out('Loading…');
  document.getElementById('bar-wrap').style.display='';
  document.getElementById('bar').style.width='10%';document.getElementById('bar').textContent='Parseur…';

  const parAll=await loadAll(PAR,'fields%5B%5D=Date&fields%5B%5D=Compound&fields%5B%5D=Medication&fields%5B%5D=Day+of+Week');
  const blanks=parAll.filter(r=>!r.fields['Date']||!r.fields['Date'].trim());
  const parDates=new Set(parAll.filter(r=>r.fields['Date']).map(r=>r.fields['Date']));

  document.getElementById('bar').style.width='45%';document.getElementById('bar').textContent='Log…';
  const logAll=await loadAll(LOG,'returnFieldsByFieldId=true&fields%5B%5D=fldhYEtLEGA4VxvvO&fields%5B%5D=fldwVFyizH4mBANBa');

  // Group log by date→compounds
  const logByDate={};
  logAll.forEach(r=>{
    const d=r.fields['fldhYEtLEGA4VxvvO']||'',c=r.fields['fldwVFyizH4mBANBa']||'';
    if(!d||!c)return;
    if(!logByDate[d])logByDate[d]=[];
    logByDate[d].push(c);
  });

  const gapDates=Object.keys(logByDate).filter(d=>!parDates.has(d)).sort();
  document.getElementById('bar').style.width='80%';document.getElementById('bar').textContent='Matching…';

  // Track which blanks have been assigned (avoid double-assignment)
  const usedBlanks=new Set();
  planRows=[];

  gapDates.forEach(date=>{
    const dow=dateDow(date); // 0=Sun
    const logCmps=logByDate[date];
    const assigned=[];

    // For each compound in Log on this date, find ONE matching blank
    // that has correct DOW and hasn't been used yet
    logCmps.forEach(logCmp=>{
      // Find unassigned blank with matching compound AND matching DOW
      const match=blanks.find(r=>{
        if(usedBlanks.has(r.id))return false;
        const cmp=r.fields['Compound']||r.fields['Medication']||'';
        if(!fuzzy(cmp,logCmp))return false;
        const bDow=parseDow(r.fields['Day of Week']||'');
        // DOW must match OR be undefined (can't determine)
        return bDow===undefined||bDow===dow;
      });
      if(match){
        usedBlanks.add(match.id);
        assigned.push({id:match.id,cmp:match.fields['Compound']||match.fields['Medication']||'',dow:match.fields['Day of Week']||''});
      }
    });

    planRows.push({date,dow,dowName:DOW_NAMES[dow],logCmps,assigned,noMatch:logCmps.filter(lc=>!assigned.some(a=>fuzzy(a.cmp,lc)))});
  });

  const totalAssigned=planRows.reduce((s,r)=>s+r.assigned.length,0);
  const unmatched=blanks.length-totalAssigned;

  document.getElementById('bar').style.width='100%';document.getElementById('bar').style.background='#16a34a';
  document.getElementById('bar').textContent='Done';

  let html=`<b>Summary:</b> ${blanks.length} blanks, ${gapDates.length} gap dates, <span class="ok">${totalAssigned} matched</span>, <span class="err">${unmatched} blanks unmatched</span><br><br>`;
  html+='<table><tr><th>Gap Date</th><th>Day</th><th>Log Compounds</th><th>Blanks to Assign</th><th>Apply?</th></tr>';

  planRows.forEach((row,i)=>{
    const hasBlanks=row.assigned.length>0;
    const bg=hasBlanks?'':'background:#fff8f8';
    html+=`<tr style="${bg}">
      <td><b>${row.date}</b></td>
      <td>${row.dowName}</td>
      <td style="font-size:11px">${row.logCmps.join('<br>')}</td>
      <td style="font-size:11px">${hasBlanks?row.assigned.map(a=>`${a.cmp} <span style="color:#9ca3af">(${a.dow})</span>`).join('<br>'):'<span class="err">No matching blanks</span>'}</td>
      <td>${hasBlanks?`<label><input type="checkbox" id="chk_${i}" checked> ${row.assigned.length} record(s)</label>`:'—'}</td>
    </tr>`;
  });
  html+='</table>';
  out(html);
}

async function applyAll(){
  const toApply=planRows.filter((row,i)=>{const cb=document.getElementById('chk_'+i);return cb&&cb.checked&&row.assigned.length>0;});
  if(!toApply.length){alert('Nothing checked');return;}
  const updates=[];
  toApply.forEach(row=>row.assigned.forEach(a=>updates.push({id:a.id,fields:{Date:row.date}})));
  if(!confirm('Assign dates to '+updates.length+' blank records across '+toApply.length+' dates?'))return;
  document.getElementById('bar').style.background='#2563eb';document.getElementById('bar').style.width='5%';
  let done=0,errs=0;
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    try{await atPatch(batch);done+=batch.length;}catch(e){errs+=batch.length;}
    document.getElementById('bar').style.width=Math.max(Math.round((i+batch.length)/updates.length*100),2)+'%';
    document.getElementById('bar').textContent=done+'/'+updates.length;
    await sleep(300);
  }
  document.getElementById('bar').style.background=errs?'#f59e0b':'#16a34a';
  out(`<span class="ok">✓ ${done} blanks assigned dates.</span>${errs?' <span class="err">'+errs+' errors</span>':''}<br>Run Analyze again to confirm remaining blanks.`);
}

function out(h){document.getElementById('out').innerHTML=h;}
</script>
</body></html>
