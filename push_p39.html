  return{[FID]:`${date}-${abbr}${va?'-'+va:''}-${num}`,[FDT]:date,[FSS]:sess,
         [FEX]:ex,[FVR]:vari,[FNM]:num,[FRP]:reps,[FWT]:wt,[FDY]:day};
}

const PD='2025-03-17',PS='2025-03-17 PUSH',PY='PUSH';

const allSets=[

  // ── PULL 3/18 ──
  s(TD,TS,TY,'Wide Pull','Lat Machine',1,25,110),

const TOTAL=sessions.length+allSets.length;
let pushed=0;
function log(msg,cls='info'){const d=document.getElementById('log');const el=document.createElement('div');el.className=cls;el.textContent=msg;d.appendChild(el);d.scrollTop=d.scrollHeight;}
function setBar(p){document.getElementById('bar').style.width=p+'%';}
function setStatus(m){document.getElementById('status').textContent=m;}
async function push(table,records){
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${table}`,{
    method:'POST',headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},
    body:JSON.stringify({records:records.map(f=>({fields:f})),typecast:true})});
  return res.json();}
async function run(){
  document.getElementById('runBtn').disabled=true;pushed=0;
  setStatus('Pushing 2 sessions...');
  const sr=await push(SESS_TBL,sessions);
  if(sr.records){pushed+=sr.records.length;log(`✓ Sessions: ${sr.records.length} created`,'ok');}
  else{log(`✗ Sessions FAILED: ${JSON.stringify(sr.error||sr)}`,'err');}
  setBar(Math.round(pushed/TOTAL*100));
  for(let i=0;i<allSets.length;i+=10){
    const batch=allSets.slice(i,i+10);
    setStatus(`Pushing sets ${i+1}–${Math.min(i+10,allSets.length)} of ${allSets.length}...`);
    const r=await push(SETS_TBL,batch);
    if(r.records){pushed+=r.records.length;log(`✓ Sets ${i+1}–${i+r.records.length} OK`,'ok');}
    else{log(`✗ Batch ${i+1} FAILED: ${JSON.stringify(r.error||r)}`,'err');break;}
    setBar(Math.round(pushed/TOTAL*100));
    await new Promise(res=>setTimeout(res,200));}
  setStatus(`Done — ${pushed}/${TOTAL} records pushed.`);setBar(100);
  document.getElementById('runBtn').disabled=false;}
</script>
