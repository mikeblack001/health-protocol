let pushed = 0, errors = 0;

function log(msg, cls='dim') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  const box = document.getElementById('log');
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

async function pushBatch(batch) {
  const url = `https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
  const body = {
    records: batch.map(([date, totalHrs, deepMin]) => ({
      fields: { [DATE_FLD]: date, [SLEEP_FLD]: totalHrs, [DEEP_FLD]: deepMin }
    })),
    performUpsert: { fieldsToMergeOn: [DATE_FLD] },
    typecast: true
  };
  const r = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`AT ${r.status}: ${await r.text()}`);

}
