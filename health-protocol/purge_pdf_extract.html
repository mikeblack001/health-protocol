<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Purge Sets_PDFExtract</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  #log { white-space: pre-wrap; font-size: 13px; line-height: 1.6; }
  .ok { color: #0f0; }
  .err { color: #f44; }
  .info { color: #aaa; }
  .done { color: #ff0; font-size: 18px; font-weight: bold; }
</style>
</head>
<body>
<div id="log">Starting purge of Sets_PDFExtract...\n</div>
<script>
const TOKEN = "pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a";
const BASE  = "appmHDG4TGT1xy6R6";
const TABLE = "tbltiBtgBAIcKEjRu";
const log   = document.getElementById("log");

function print(msg, cls = "") {
  const span = document.createElement("span");
  span.className = cls;
  span.textContent = msg + "\n";
  log.appendChild(span);
}

async function fetchPage(offset) {
  let url = `https://api.airtable.com/v0/${BASE}/${TABLE}?fields[]=fld11inoyzB0OU3qM&pageSize=100`;
  if (offset) url += `&offset=${encodeURIComponent(offset)}`;
  const r = await fetch(url, { headers: { Authorization: `Bearer ${TOKEN}` } });
  return r.json();
}

async function deleteBatch(ids) {
  const params = ids.map(id => `records[]=${id}`).join("&");
  const r = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}?${params}`, {
    method: "DELETE",
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  return r.json();
}

async function run() {
  let totalFetched = 0;
  let totalDeleted = 0;
  let offset = null;
  let round = 0;

  while (true) {
    round++;
    print(`[Round ${round}] Fetching up to 100 records...`, "info");
    const data = await fetchPage(offset);

    if (data.error) {
      print(`API error: ${JSON.stringify(data.error)}`, "err");
      break;
    }

    const records = data.records || [];
    if (records.length === 0) {
      print("No records returned — table is empty!", "done");
      break;
    }

    totalFetched += records.length;
    const ids = records.map(r => r.id);
    print(`  Fetched ${records.length} records. Deleting...`, "info");

    // Delete in chunks of 10 (Airtable DELETE limit via query params)
    for (let i = 0; i < ids.length; i += 10) {
      const chunk = ids.slice(i, i + 10);
      const result = await deleteBatch(chunk);
      if (result.records) {
        totalDeleted += result.records.length;
        print(`  ✓ Deleted ${result.records.length} (total: ${totalDeleted})`, "ok");
      } else {
        print(`  ✗ Delete error: ${JSON.stringify(result)}`, "err");
      }
      await new Promise(res => setTimeout(res, 150)); // rate limit buffer
    }

    offset = data.offset;
    if (!offset) {
      print(`\nAll pages exhausted. Deleted ${totalDeleted} records total.`, "done");
      // Verify
      print("Running verification fetch...", "info");
      const verify = await fetchPage(null);
      const remaining = (verify.records || []).length;
      if (remaining === 0) {
        print("✓ VERIFIED: Table is empty.", "done");
      } else {
        print(`⚠ ${remaining} records still remain — re-run if needed.`, "err");
      }
      break;
    }
  }
}

run().catch(e => print("Fatal error: " + e.message, "err"));
</script>
</body>
</html>
