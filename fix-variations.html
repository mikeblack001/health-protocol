<!DOCTYPE html>
<html>
<head><title>Fix AT Variations</title>
<style>body{font-family:monospace;padding:20px;background:#111;color:#eee}button{padding:8px 16px;margin:4px;cursor:pointer;background:#333;color:#eee;border:1px solid #555;border-radius:6px}button.go{background:#1a5c2a;border-color:#2d8a42}#log{background:#1a1a1a;padding:16px;border-radius:8px;margin-top:16px;font-size:12px;max-height:500px;overflow:auto}.ok{color:#4caf50}.err{color:#f44}.info{color:#aaa}</style>
</head>
<body>
<h2>AT Variation Cleanup</h2>
<p>Updates Variation = "Cables" or "Cable" → "Cables (2:1)"</p>
<button onclick="dryRun(true)">1. Dry Run</button>
<button class="go" onclick="dryRun(false)">2. Run Fix</button>
<div id="log"></div>
<script>
const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE = 'appmHDG4TGT1xy6R6';
const TABLE = 'tblKDqjy5RzqaJvjr';
const VAR_FIELD = 'fld2TZdmCOloH0gAK';

function log(msg) { const el = document.getElementById('log'); el.innerHTML += msg + '<br>'; el.scrollTop = el.scrollHeight; }

async function dryRun(dry) {
  document.getElementById('log').innerHTML = '';
  let toFix = [], offset = null, page = 0;

  do {
    // Use filterByFormula to find only records with Cables or Cable variation
    const formula = encodeURIComponent("OR({Variation}='Cables', {Variation}='Cable')");
    const url = `https://api.airtable.com/v0/${BASE}/${TABLE}?pageSize=100&filterByFormula=${formula}` + (offset ? `&offset=${offset}` : '');
    const res = await fetch(url, {headers:{Authorization:'Bearer '+TOKEN}});
    const d = await res.json();
    if (d.error) { log(`<span class="err">Error: ${JSON.stringify(d.error)}</span>`); return; }
    toFix.push(...(d.records||[]));
    offset = d.offset;
    page++;
    log(`<span class="info">Page ${page}: found ${toFix.length} records so far...</span>`);
  } while (offset);

  log(`<br><span class="ok">${dry?'DRY RUN':'FIXING'}: ${toFix.length} records to update</span>`);
  // Show sample
  toFix.slice(0,5).forEach(r => {
    const v = r.fields[VAR_FIELD];
    log(`  ${r.id}: ${JSON.stringify(v)}`);
  });

  if (dry || !toFix.length) return;

  // Batch update 10 at a time
  let done = 0;
  for (let i = 0; i < toFix.length; i += 10) {
    const batch = toFix.slice(i, i+10);
    const records = batch.map(r => {
      const current = (r.fields[VAR_FIELD] || []);
      // Replace Cables/Cable with Cables (2:1), keep others
      const cleaned = current.filter(v => v !== 'Cables' && v !== 'Cable');
      if (!cleaned.includes('Cables (2:1)')) cleaned.push('Cables (2:1)');
      return {id: r.id, fields: {[VAR_FIELD]: cleaned}};
    });
    const res = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}`, {
      method: 'PATCH',
      headers: {Authorization:'Bearer '+TOKEN, 'Content-Type':'application/json'},
      body: JSON.stringify({records})
    });
    const d = await res.json();
    if (d.error) log(`<span class="err">Batch error: ${JSON.stringify(d.error)}</span>`);
    else done += batch.length;
    log(`<span class="info">Progress: ${done}/${toFix.length}</span>`);
    await new Promise(r => setTimeout(r, 200));
  }
  log(`<br><span class="ok">Done! Updated ${done} records.</span>`);
}
</script>
</body>
</html>
