<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#hdr{background:#1e2433;padding:0 14px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#hdr h1{font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
#drive-btn{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;border:none}
#drive-btn.ok{background:#16a34a;color:#fff}
#drive-btn.no{background:#dc2626;color:#fff}
#st{font-size:11px;color:#9ca3af;margin-left:4px}
#hdr-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.hbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #374151;background:#374151;color:#d1d5db}
.hbtn:hover{background:#4b5563}
#body{display:flex;flex:1;overflow:hidden}
#pp{width:380px;flex-shrink:0;background:#fff;border-right:2px solid #e2e5ea;display:flex;flex-direction:column;overflow:hidden}
#pp-top{padding:14px;border-bottom:1px solid #e2e5ea;flex-shrink:0;background:#fafafa}
#pp-top label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;display:block;margin-bottom:8px}
#pp-id-row{display:flex;gap:6px;margin-bottom:10px}
#pp-id{flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;min-width:0}
.pb{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:#2563eb;color:#fff}
.pb:hover{background:#1d4ed8}
.pg{background:#374151;color:#fff}.pg:hover{background:#1f2937}
#pp-msg{font-size:12px;color:#9ca3af}
#pp-area{flex:1;overflow:auto;background:#cbd5e1;padding:6px;min-height:0;contain:strict}
#pp-canvas{display:block;box-shadow:0 2px 8px rgba(0,0,0,.3)}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#dnav{background:#fff;border-bottom:2px solid #e2e5ea;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#dnav button{padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;background:#fff}
#dnav button:hover{background:#f3f4f6}
#d-sel{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-weight:700;flex:1;max-width:260px}
#d-cnt{font-size:11px;color:#9ca3af}
#w-sel{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-weight:700;background:#fff;color:#374151;cursor:pointer}
#dnav-r{margin-left:auto;display:flex;gap:6px;align-items:center}
#records{flex:1;overflow-y:auto;padding:10px 14px}
.card{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:0;margin-bottom:6px;display:flex;align-items:stretch;overflow:hidden}
.card.ok{border-left:4px solid #4ade80}
.card.missing{border-left:4px solid #fca5a5}
.card.extra{border-left:4px solid #c4b5fd}
.card.wrong{border-left:4px solid #fcd34d}
.card-body{flex:1;padding:9px 12px;display:flex;align-items:center;gap:8px;min-width:0;flex-wrap:wrap}
.card-actions{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:6px 8px;border-left:1px solid #f3f4f6;background:#fafafa;flex-shrink:0}
.fe{padding:3px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-weight:700;background:transparent;cursor:pointer;color:#1e2433}
.fe:hover{border-color:#d1d5db;background:#f9fafb}
.fe:focus{border-color:#2563eb;background:#fff;outline:none;cursor:text}
.fe-ex{font-size:13px;font-weight:800;color:#1e2433;min-width:120px}
.fe-reps{background:#dbeafe;color:#1d4ed8;width:60px}
.fe-reps:hover{background:#bfdbfe}
.fe-wt{background:#fef3c7;color:#92400e;width:70px}
.fe-wt:hover{background:#fde68a}
.fe-set{background:#f3f4f6;color:#374151;width:50px}
.abtn{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}
.a-add{background:#dcfce7;border-color:#86efac;color:#166534}.a-add:hover{background:#bbf7d0}
.a-del{background:#fff1f2;border-color:#fecdd3;color:#9f1239}.a-del:hover{background:#fecdd3}
.a-fix{background:#fefce8;border-color:#fde047;color:#713f12}.a-fix:hover{background:#fde047}
.empty{color:#9ca3af;text-align:center;padding:40px;font-style:italic}
.sc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px}
.sc-badge.ok{background:#dcfce7;color:#16a34a}
.sc-badge.missing{background:#fee2e2;color:#dc2626}
.sc-badge.extra{background:#ede9fe;color:#7c3aed}
.sc-badge.wrong{background:#fef9c3;color:#92400e}
#wgrid-wrap{background:#fff;border-bottom:2px solid #e2e5ea;flex-shrink:0}
#wgrid-hdr{padding:5px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f2f5;background:#f8fafc}
#wgrid-hdr b{font-size:11px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.5px}
#wgrid-body{overflow:auto;max-height:220px}

#wg-status{font-size:10px;color:#9ca3af}
#wgrid{width:100%;border-collapse:collapse;font-size:11px}
#wgrid thead th{background:#1e2433;color:#fff;padding:4px 6px;font-size:10px;font-weight:700;text-align:center;position:sticky;top:0;z-index:2;white-space:nowrap}
#wgrid thead th:first-child{text-align:left;min-width:160px;padding-left:10px}
#wgrid thead th.wg-today{background:#2563eb}
#wgrid thead th.wg-day{cursor:pointer}
#wgrid thead th.wg-day:hover{background:#374151}
#wgrid td{border:1px solid #e2e5ea;padding:3px 4px;text-align:center;white-space:nowrap}
#wgrid td:first-child{text-align:left;padding:3px 8px;font-weight:700;color:#1e2433;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.wg-sets{font-size:10px;font-weight:700}
.ex-hdr{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#374151;padding:8px 0 4px;border-bottom:2px solid #e2e5ea;margin-bottom:5px;margin-top:10px;display:flex;justify-content:space-between}
.ex-hdr:first-child{margin-top:0}
</style>
</head>
<body>
<div id="hdr">
  <h1>🏋️ Workout Audit</h1>
  <button id="drive-btn" class="no" onclick="signIn()">🔴 Drive</button>
  <span id="st"></span>
  <div id="hdr-r">
    <span id="b-total" style="font-size:11px;color:#9ca3af"></span>
    <button class="hbtn" onclick="reloadDate()">↻</button>
    <button class="hbtn" style="background:#dc2626;border-color:#dc2626;color:#fff" onclick="runScan()">⚡ Scan Page</button>
  </div>
</div>

<div id="body">
  <div id="pp">
    <div id="pp-top">
      <label>📄 PDF Reference</label>
      <div id="pp-id-row">
        <input id="pp-id" type="text" placeholder="Drive file ID">
        <button class="pb" onclick="pdfLoad()">Load</button>
        <button class="pb pg" onclick="openPicker()" title="Browse">📂</button>
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        <label class="pb pg" style="cursor:pointer;padding:4px 8px;font-size:10px">⬆ Local<input type="file" accept=".pdf" style="display:none" onchange="pdfLocal(this)"></label>
        <span id="pp-msg" style="font-size:10px;color:#9ca3af">No PDF</span>
      </div>
    </div>
    <div id="pp-area"><canvas id="pp-canvas"></canvas></div>
    <div id="pp-nav">
      <button id="btn-prev" onclick="pdfPrev()" disabled>◀</button>
      <input id="pp-jp" type="number" min="1" onchange="pdfPage(+this.value)">
      <span id="pp-pg">— / —</span>
      <button id="btn-next" onclick="pdfNext()" disabled>▶</button>
      <span style="margin-left:6px;border-left:1px solid #d1d5db;padding-left:6px;display:flex;align-items:center;gap:4px">
        <button onclick="pdfZoom(-1)" style="padding:4px 8px;font-size:13px;font-weight:700;background:#e2e5ea;color:#374151;border:none;border-radius:4px;cursor:pointer">−</button>
        <button onclick="pdfZoom(1)" style="padding:4px 8px;font-size:13px;font-weight:700;background:#e2e5ea;color:#374151;border:none;border-radius:4px;cursor:pointer">+</button>
        <button onclick="pdfZoom(0)" style="padding:4px 7px;font-size:11px;background:#e2e5ea;color:#374151;border:none;border-radius:4px;cursor:pointer">⊡</button>
      </span>
    </div>
  </div>

  <div id="main">
    <div id="dnav">
      <button onclick="navD(-1)">◀ Prev</button>
      <select id="d-sel" onchange="selDate()"><option value="">— Select Date —</option></select>
      <button onclick="navD(1)">Next ▶</button>
      <span style="color:#d1d5db;margin:0 4px">|</span>
      <button onclick="navW(-1)">◀ Prev</button>
      <select id="w-sel" onchange="selWeek()"><option value="">— Week —</option></select>
      <button onclick="navW(1)">Next ▶</button>
      <span id="d-cnt"></span>
      <div id="dnav-r">
        <button class="hbtn" style="background:#16a34a;border-color:#16a34a;color:#fff" onclick="addAllMissing()">+ Add Missing</button>
        <button class="hbtn" style="background:#7c3aed;border-color:#7c3aed;color:#fff" onclick="deleteAllExtra()">✕ Del Extra</button>
      </div>
    </div>

    <div id="wgrid-wrap">
      <div id="wgrid-hdr">
        <b>📅 Week Overview</b>
        <span id="wg-status"></span>
        <button id="wg-tog" onclick="toggleWGrid()">▲ Hide</button>
      </div>
      <div id="wgrid-body">
        <table id="wgrid"><tr><td class="empty" style="padding:12px 14px;font-size:11px">Select a date to load week</td></tr></table>
      </div>
    </div>

    <div id="records"><div class="empty">Select a date to load records</div></div>
  </div>
</div>

<!-- Drive picker -->
<div id="dpbg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center" onclick="if(event.target===this)closePicker()">
  <div style="background:#fff;border-radius:10px;width:500px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)">
    <div style="padding:12px 16px;border-bottom:1px solid #e2e5ea;display:flex;align-items:center;justify-content:space-between">
      <b>Select PDF from Drive</b>
      <button onclick="closePicker()" style="padding:3px 10px;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;background:#fff">✕</button>
    </div>
    <div id="dp-sc" style="padding:6px 12px;border-bottom:1px solid #e2e5ea;background:#fffbeb;display:flex;gap:6px;flex-wrap:wrap;min-height:36px;align-items:center"></div>
    <div id="dp-bc" style="padding:5px 14px;border-bottom:1px solid #e2e5ea;background:#f8f9fa;font-size:11px;min-height:28px;display:flex;align-items:center;gap:4px;flex-wrap:wrap"></div>
    <div style="padding:6px 14px;border-bottom:1px solid #e2e5ea">
      <input id="dp-qi" type="text" placeholder="Search…" oninput="filterPicker()" style="width:100%;padding:6px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:13px">
    </div>
    <div id="dp-list" style="flex:1;overflow-y:auto;padding:8px"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const AT_TOK='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6';
const SETS_TBL='tblKDqjy5RzqaJvjr';
const S={date:'fld75zYXknF0RtCWH',session:'fldBChNmPkNg61oTN',ex:'fldZ93A1t7fGjjsSS',var:'fld2TZdmCOloH0gAK',setN:'fldNm9Ao0rmcwwDXo',reps:'fldelUngWHRTm48m1',wt:'fldmrbBmfgSMtREMt',day:'fldypzlwqw9AzWrEE'};
const WORKER='https://anthropic-proxy.mikeblack01.workers.dev';
const GCL_ID='478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const PDF_QA='https://mikeblack001.github.io/health-protocol/pdf_qa.html';
const GSCOPE='https://www.googleapis.com/auth/drive.readonly';
const QUICK_PDF=[
  {n:'📋 Workouts 2024-25',id:'1eYtQT3c14psKbxRkKtbLoNtiLFEnOFhF'},
  {n:'📋 Workouts 2025',id:'1VgIqXOQUc5qLzzAaWQ1FQZxIMBAacGP9'},
  {n:'📋 Workouts 2026',id:'1u7wc9rGFZD_n7e0L2hbwnEhRciVwxykvwcp5MVNeYIaYn0dDE'}
];

const PROMPT=`Extract ALL workout sets from this handwritten gym log page. Multiple sessions may appear separated by day headers.

RULES:
- date: YYYY-MM-DD from page header
- session: 'YYYY-MM-DD Day' e.g. '2025-01-15 Push'
- day: session type (Push/Pull/Legs/Arms/Shoulders/Cardio)
- exercise: exact canonical exercise name
- variation: implement (Rope 1/2, DBs, EZ-Bar, Cable - 2 Hand, V-Bar, Bar, Lat Machine) — omit if none
- set_number: 1,2,3...
- reps: integer
- weight: RIGHT column number always — use as-is
- Cable/pulley: divide stack by 2 UNLESS right column already shows stored value
- Smith machine: add 35 lbs to plate weight
- Olympic bar no plates: 45 lbs
- Pages in strict calendar order
- Extract EVERY set, zero-rep sets excluded

Return ONLY a JSON array. No markdown.`;

let gTok=null,pdfDoc=null,pg=1,pdfScale=1.4,scanInProgress=false;
let allDates=[],curDate=null,setRecs=[],diffRows=[];
let pickerStack=[{id:'root',name:'My Drive'}],pickerFiles=[];
const LS={get:k=>localStorage.getItem(k),set:(k,v)=>localStorage.setItem(k,v)};

function setSt(m){document.getElementById('st').textContent=m;}
function pmsg(m){document.getElementById('pp-msg').textContent=m;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── AUTH ──────────────────────────────────────────────────────────────
function initAuth(){
  const h=location.hash;
  if(h.includes('access_token')){
    const p=new URLSearchParams(h.slice(1));
    const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||3600);
    if(tok){gTok=tok;LS.set('mb_wa_tok',tok);LS.set('mb_wa_exp',Date.now()+(exp-60)*1000);history.replaceState(null,'',location.pathname);setDriveOK();return;}
  }
  const t=LS.get('mb_wa_tok'),e=parseInt(LS.get('mb_wa_exp')||0);
  if(t&&Date.now()<e){gTok=t;setDriveOK();return;}
  setDriveNo();
}
function signIn(){location.href='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(GCL_ID)+'&redirect_uri='+encodeURIComponent(PDF_QA)+'&response_type=token&scope='+encodeURIComponent(GSCOPE);}
function setDriveOK(){const b=document.getElementById('drive-btn');b.textContent='🟢 Drive';b.className='ok';b.onclick=null;}
function setDriveNo(){const b=document.getElementById('drive-btn');b.textContent='🔴 Drive';b.className='no';b.onclick=signIn;}

// ── PDF ───────────────────────────────────────────────────────────────
function pdfLocal(inp){if(!inp.files[0])return;pmsg('Loading…');inp.files[0].arrayBuffer().then(b=>pdfRender(b));}
async function pdfLoad(){
  const id=document.getElementById('pp-id').value.trim();
  if(!id){pmsg('Enter a Drive file ID');return;}
  if(!gTok){signIn();return;}
  pmsg('Downloading…');LS.set('mb_wa_pdf',id);
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+gTok}});
    if(!r.ok){if(r.status===401||r.status===403){LS.removeItem('mb_wa_tok');gTok=null;setDriveNo();signIn();}else pmsg('Drive '+r.status);return;}
    pdfRender(await r.arrayBuffer());
  }catch(e){pmsg('Error: '+e.message);}
}
async function pdfRender(buf){
  try{
    pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise;
    pg=1;
    document.getElementById('btn-prev').disabled=true;
    document.getElementById('btn-next').disabled=pdfDoc.numPages<=1;
    pmsg('');await pdfRenderPage();
    setSt('📄 '+pdfDoc.numPages+' pages');
  }catch(e){pmsg('PDF error: '+e.message);}
}
async function pdfRenderPage(){
  if(!pdfDoc)return;
  const page=await pdfDoc.getPage(pg);
  const vp=page.getViewport({scale:pdfScale});
  const canvas=document.getElementById('pp-canvas');
  canvas.width=vp.width;canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('pp-pg').textContent=pg+' / '+pdfDoc.numPages;
  document.getElementById('pp-jp').value='';
  document.getElementById('btn-prev').disabled=pg<=1;
  document.getElementById('btn-next').disabled=pg>=pdfDoc.numPages;
  if(!scanInProgress)setTimeout(()=>runScan(),400);
}
function pdfPrev(){if(pg>1){pg--;pdfRenderPage();}}
function pdfNext(){if(pdfDoc&&pg<pdfDoc.numPages){pg++;pdfRenderPage();}}
function pdfPage(n){if(n>=1&&pdfDoc&&n<=pdfDoc.numPages){pg=n;pdfRenderPage();}}
function pdfZoom(dir){if(dir===0)pdfScale=1.4;else pdfScale=Math.max(0.5,Math.min(4,pdfScale+(dir*0.3)));if(pdfDoc)pdfRenderPage();}

// ── SCAN ──────────────────────────────────────────────────────────────
async function runScan(){
  if(!pdfDoc){setSt('Load a PDF first');return;}
  if(scanInProgress)return;
  scanInProgress=true;
  setSt('⚡ Scanning page '+pg+'…');
  try{
    const canvas=document.getElementById('pp-canvas');
    const b64=canvas.toDataURL('image/jpeg',0.9).split(',')[1];
    const resp=await fetch(WORKER,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:8192,
        messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:PROMPT}]}]})});
    if(!resp.ok)throw new Error('Worker HTTP '+resp.status);
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    let raw=((data.content||[]).find(x=>x.type==='text')||{text:'[]'}).text.replace(/```json\n?|```\n?/g,'').trim();
    let sets=[];
    try{sets=JSON.parse(raw);}catch(e){try{const t=raw.replace(/,\s*$/,'').replace(/^\s*\[?/,'[');sets=JSON.parse(t.endsWith(']')?t:t+']');}catch(e2){sets=[];}}
    sets=sets.filter(s=>s.date&&/^\d{4}-\d{2}-\d{2}$/.test(s.date)&&s.exercise&&parseInt(s.reps||0)>0);
    if(!sets.length){setSt('No sets found on page '+pg);scanInProgress=false;return;}
    setSt('Found '+sets.length+' sets, comparing to AT…');
    const dates=[...new Set(sets.map(s=>s.date))].sort();
    const atRecs=await fetchAtSets(dates[0],dates[dates.length-1]);
    const newRows=buildDiff(sets,atRecs);
    // Merge — replace covered dates
    const scanDates=new Set(dates);
    diffRows=diffRows.filter(r=>!scanDates.has(r.date)).concat(newRows);
    diffRows.sort((a,b)=>(a.date+(a.exercise||'')+(a.set||'')).localeCompare(b.date+(b.exercise||'')+(b.set||'')));
    dates.forEach(d=>{if(!allDates.includes(d))allDates.push(d);});
    allDates.sort();buildDateSel();
    const issues=newRows.filter(r=>r.status!=='ok').length;
    setSt('✓ '+sets.length+' PDF · '+atRecs.length+' AT · '+issues+' issues');
    if(dates[0]){setDate(dates[0]);}
  }catch(e){setSt('Scan error: '+e.message);}
  scanInProgress=false;
}

// ── AT ────────────────────────────────────────────────────────────────
async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}
async function fetchAtSets(s,e){
  const f=encodeURIComponent('AND({'+S.date+'}>=\''+s+'\',{'+S.date+'}<=\''+e+'\')');
  const flds=Object.values(S).map(f=>'fields%5B%5D='+f).join('&');
  let recs=[],off=null;
  do{const d=await atFetch(SETS_TBL+'?returnFieldsByFieldId=true&filterByFormula='+f+'&'+flds+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
  return recs;
}
async function loadDates(){
  try{
    setSt('Loading…');
    let recs=[],off=null;
    do{const d=await atFetch(SETS_TBL+'?fields%5B%5D='+S.date+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
    allDates=[...new Set(recs.map(r=>r.fields[S.date]).filter(Boolean))].sort();
    document.getElementById('d-cnt').textContent=allDates.length+' dates';
    buildDateSel();buildWeekSel();setSt('');
  }catch(e){setSt('AT error: '+e.message);}
}

// ── DIFF ──────────────────────────────────────────────────────────────
function buildDiff(pdfSets,atRecs){
  const atMap={};
  atRecs.forEach(rec=>{
    const f=rec.fields;
    const k=(f[S.date]||'')+'|'+(f[S.ex]||'').toLowerCase().trim()+'|'+String(f[S.setN]||'');
    atMap[k]=rec;
  });
  const usedIds={};const rows=[];
  pdfSets.forEach(p=>{
    if(!p.date||!p.exercise)return;
    const k=p.date+'|'+(p.exercise||'').toLowerCase().trim()+'|'+String(p.set_number||'');
    const at=atMap[k];
    if(!at){
      rows.push({status:'missing',date:p.date,exercise:p.exercise,set:p.set_number,
        pdf:{reps:parseInt(p.reps)||0,weight:parseFloat(p.weight)||0,variation:p.variation||'',day:p.day||'',session:p.session||''},at:null,issues:['Missing in AT']});
    }else{
      usedIds[at.id]=true;
      const pW=parseFloat(p.weight)||0,aW=parseFloat(at.fields[S.wt]||0);
      const pR=parseInt(p.reps)||0,aR=parseInt(at.fields[S.reps]||0);
      const issues=[];
      if(Math.abs(pW-aW)>0.5&&pW>0&&aW>0)issues.push('Wt PDF='+pW+' AT='+aW);
      if(pR!==aR&&pR>0&&aR>0)issues.push('Reps PDF='+pR+' AT='+aR);
      rows.push({status:issues.length?'wrong':'ok',date:p.date,exercise:p.exercise,set:p.set_number,
        pdf:{reps:pR,weight:pW,variation:p.variation||'',day:p.day||'',session:p.session||''},
        at:{id:at.id,reps:aR,weight:aW,variation:at.fields[S.var]||''},issues});
    }
  });
  atRecs.forEach(rec=>{
    if(!usedIds[rec.id]){
      const f=rec.fields;
      rows.push({status:'extra',date:f[S.date]||'',exercise:f[S.ex]||'',set:f[S.setN]||'',
        pdf:null,at:{id:rec.id,reps:f[S.reps]||0,weight:f[S.wt]||0,variation:f[S.var]||''},issues:['In AT, not in PDF']});
    }
  });
  return rows;
}

// ── WEEK GRID ─────────────────────────────────────────────────────────
let wgVisible=true;
function toggleWGrid(){
  wgVisible=!wgVisible;
  document.getElementById('wgrid-body').style.display=wgVisible?'':'none';
  document.getElementById('wg-tog').textContent=wgVisible?'▲ Hide':'▼ Show';
}

function getWkDates(dateStr){
  const [yr,mo,dy]=dateStr.split('-').map(Number);
  const d=new Date(yr,mo-1,dy),dow=d.getDay(),diff=(dow+6)%7;
  const mon=new Date(yr,mo-1,dy-diff);
  return Array.from({length:7},(_,i)=>{
    const dd=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i);
    return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
  });
}

async function loadWeekGrid(date){
  const wg=document.getElementById('wgrid'),ws=document.getElementById('wg-status');
  const days=getWkDates(date);
  ws.textContent='Loading…';
  // Fetch all AT sets for the week
  const atRecs=await fetchAtSets(days[0],days[6]).catch(e=>{ws.textContent='Error';return[];});
  // Get PDF diff rows for week too
  const weekDiffRows=diffRows.filter(r=>days.includes(r.date));
  // Build exercise × date map from AT
  const exMap={};
  atRecs.forEach(rec=>{
    const f=rec.fields;
    const ex=f[S.ex]||'',dt=(f[S.date]||'').slice(0,10);
    if(!ex||!dt)return;
    if(!exMap[ex])exMap[ex]={};
    if(!exMap[ex][dt])exMap[ex][dt]=0;
    exMap[ex][dt]++;
  });
  // Also add exercises from PDF scan that are missing in AT
  weekDiffRows.filter(r=>r.status==='missing').forEach(r=>{
    if(!exMap[r.exercise])exMap[r.exercise]={};
    // Mark as missing (negative = not in AT)
    if(!exMap[r.exercise][r.date])exMap[r.exercise][r.date]=-1;
  });
  const exercises=Object.keys(exMap).sort();
  ws.textContent=exercises.length+' exercises';
  if(!exercises.length){wg.innerHTML='<tr><td class="empty" style="padding:10px 14px;font-size:11px">No sets this week</td></tr>';return;}
  const DN=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today=new Date().toISOString().slice(0,10);
  let h=`<thead><tr><th style="text-align:left;min-width:160px;padding-left:10px">Exercise</th>`;
  days.forEach((d,i)=>{
    const isToday=d===today,isCur=d===date;
    h+=`<th class="wg-day${isToday?' wg-today':''}" onclick="setDate('${d}')" title="${d}">${DN[i]}<br><span style="font-weight:400;font-size:9px">${d.slice(5)}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;
  exercises.forEach(ex=>{
    h+=`<tr onclick="highlightEx('${esc(ex)}')" style="cursor:pointer"><td title="${esc(ex)}">${esc(ex)}</td>`;
    days.forEach(d=>{
      const n=exMap[ex][d];
      if(!n){h+=`<td></td>`;}
      else if(n<0){h+=`<td style="background:#fee2e2;color:#dc2626;font-weight:800;font-size:10px">!</td>`;}
      else{
        // Check if this date has issues for this exercise
        const hasIssue=weekDiffRows.some(r=>r.date===d&&r.exercise===ex&&r.status!=='ok');
        const bg=hasIssue?'#fef9c3':d===date?'#dbeafe':'#f0fdf4';
        const fg=hasIssue?'#92400e':d===date?'#1d4ed8':'#15803d';
        h+=`<td style="background:${bg};color:${fg};font-weight:800" class="wg-sets">${n}</td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody>`;
  wg.innerHTML=h;
}

function highlightEx(ex){
  // Scroll to first card matching this exercise
  const cards=[...document.querySelectorAll('.card')];
  const card=cards.find(c=>c.dataset.ex===ex);
  if(card){card.scrollIntoView({behavior:'smooth',block:'center'});card.style.outline='3px solid #2563eb';setTimeout(()=>card.style.outline='',1200);}
}

// ── NAV ───────────────────────────────────────────────────────────────
function buildDateSel(){
  const sel=document.getElementById('d-sel'),cur=sel.value;
  sel.innerHTML='<option value="">— Select Date —</option>';
  allDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  if(cur)sel.value=cur;
}
function buildWeekSel(){
  const sel=document.getElementById('w-sel');sel.innerHTML='<option value="">— Week —</option>';
  const seen=new Set();
  allDates.forEach(d=>{
    const [yr,mo,dy]=d.split('-').map(Number);
    const dt=new Date(yr,mo-1,dy),dow=dt.getDay(),mon=new Date(yr,mo-1,dy-((dow+6)%7));
    const monISO=mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
    if(seen.has(monISO))return;seen.add(monISO);
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const fmt=x=>`${String(x.getMonth()+1).padStart(2,'0')}/${String(x.getDate()).padStart(2,'0')}`;
    const o=document.createElement('option');o.value=monISO;o.textContent=fmt(mon)+' – '+fmt(sun);sel.appendChild(o);
  });
}
function selDate(){const d=document.getElementById('d-sel').value;if(d)setDate(d);}
function selWeek(){
  const monISO=document.getElementById('w-sel').value;if(!monISO)return;
  const mon=new Date(monISO+'T12:00:00'),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const target=allDates.find(d=>{const dt=new Date(d+'T12:00:00');return dt>=mon&&dt<=sun;});
  if(target)setDate(target);
}
function navD(dir){if(!allDates.length)return;const i=curDate?allDates.indexOf(curDate):-1;const d=allDates[Math.max(0,Math.min(allDates.length-1,i+dir))];if(d)setDate(d);}
function navW(dir){const sel=document.getElementById('w-sel');const opts=[...sel.options].filter(o=>o.value);if(!opts.length)return;const i=opts.findIndex(o=>o.value===sel.value);const next=opts[Math.max(0,Math.min(opts.length-1,i+dir))];if(next){sel.value=next.value;selWeek();}}

function setDate(date){
  curDate=date;
  document.getElementById('d-sel').value=date;
  const dt=new Date(date+'T12:00:00'),dow=dt.getDay(),mon=new Date(dt);mon.setDate(dt.getDate()-((dow+6)%7));
  document.getElementById('w-sel').value=mon.toISOString().slice(0,10);
  renderRecords();
  loadWeekGrid(date);
}

async function reloadDate(){
  if(!curDate)return;setSt('Reloading…');
  try{
    const atRecs=await fetchAtSets(curDate,curDate);
    const pdfRows=diffRows.filter(r=>r.date===curDate&&r.pdf);
    const pdfSets=pdfRows.map(r=>({date:r.date,exercise:r.exercise,set_number:r.set,...r.pdf}));
    if(pdfSets.length){
      const newRows=buildDiff(pdfSets,atRecs);
      diffRows=diffRows.filter(r=>r.date!==curDate).concat(newRows);
    }
    renderRecords();loadWeekGrid(curDate);setSt('');
  }catch(e){setSt('Error: '+e.message);}
}

// ── RENDER RECORDS ────────────────────────────────────────────────────
function renderRecords(){
  const el=document.getElementById('records');
  const dateRows=diffRows.filter(r=>r.date===curDate);
  if(!dateRows.length){
    el.innerHTML='<div class="empty">'+(curDate?'No scan data for '+curDate+'.<br>Scan a PDF page with this date.':'Select a date to load records.')+'</div>';
    document.getElementById('b-total').textContent='';return;
  }
  const ok=dateRows.filter(r=>r.status==='ok').length;
  const issues=dateRows.length-ok;
  document.getElementById('b-total').textContent=dateRows.length+' sets · '+(issues?issues+' issues':'✓ all match');
  // Group by exercise
  const exMap={};
  dateRows.forEach(r=>{if(!exMap[r.exercise])exMap[r.exercise]=[];exMap[r.exercise].push(r);});
  let html='';
  Object.keys(exMap).sort().forEach(ex=>{
    const sets=exMap[ex],issueCount=sets.filter(r=>r.status!=='ok').length;
    html+=`<div class="ex-hdr">${esc(ex)}<span style="font-size:11px;font-weight:400;color:${issueCount?'#dc2626':'#16a34a'}">${issueCount?issueCount+' issue'+(issueCount>1?'s':''):'✓ match'}</span></div>`;
    sets.forEach(r=>html+=cardHTML(r,diffRows.indexOf(r)));
  });
  el.innerHTML=html;
}

function cardHTML(r,idx){
  const badge=`<span class="sc-badge ${r.status}">${r.status==='ok'?'✓':r.status}</span>`;
  let details='';
  if(r.status==='missing'){
    details=`<span class="fe fe-set">S${r.set}</span><span class="fe fe-reps">${r.pdf.reps}r</span><span class="fe fe-wt">${r.pdf.weight}lbs</span>${r.pdf.variation?`<span class="fe" style="color:#6b7280;font-style:italic">${esc(r.pdf.variation)}</span>`:''}<span style="font-size:10px;color:#dc2626">PDF only</span>`;
  }else if(r.status==='extra'){
    details=`<span class="fe fe-set">S${r.set}</span><span class="fe fe-reps">${r.at.reps}r</span><span class="fe fe-wt">${r.at.weight}lbs</span>${r.at.variation?`<span class="fe" style="color:#6b7280;font-style:italic">${esc(r.at.variation)}</span>`:''}<span style="font-size:10px;color:#7c3aed">AT only</span>`;
  }else{
    const wOk=!r.issues.find(i=>i.startsWith('Wt')),rOk=!r.issues.find(i=>i.startsWith('Reps'));
    details=`<span class="fe fe-set">S${r.set}</span>
      <span class="fe fe-reps" style="${rOk?'':'background:#fef3c7;color:#92400e'}">${r.pdf?r.pdf.reps:r.at.reps}r${r.pdf&&r.at&&r.pdf.reps!==r.at.reps?' →'+r.at.reps+'r':''}</span>
      <span class="fe fe-wt" style="${wOk?'':'background:#fef3c7;color:#92400e'}">${r.pdf?r.pdf.weight:r.at.weight}lbs${r.pdf&&r.at&&Math.abs(r.pdf.weight-r.at.weight)>0.5?' →'+r.at.weight+'lbs':''}</span>
      ${r.pdf&&r.pdf.variation?`<span class="fe" style="color:#6b7280;font-style:italic">${esc(r.pdf.variation)}</span>`:''}
      ${r.issues.length?`<span style="font-size:10px;color:#d97706;font-weight:700">⚠ ${esc(r.issues.join(' | '))}</span>`:''}`;
  }
  const actions=r.status==='missing'?`<button class="abtn a-add" onclick="addSet(${idx})">+ Add</button>`:r.status==='extra'?`<button class="abtn a-del" onclick="delSet(${idx})">✕ Del</button>`:r.status==='wrong'?`<button class="abtn a-fix" onclick="fixSet(${idx})">Fix</button>`:'';
  return`<div class="card ${r.status}" data-ex="${esc(r.exercise)}"><div class="card-body">${details}${badge}</div><div class="card-actions">${actions}</div></div>`;
}

// ── PUSH / FIX ────────────────────────────────────────────────────────
async function addSet(idx){
  const r=diffRows[idx];if(!r||r.status!=='missing')return;
  setSt('Adding…');
  try{
    const f={};f[S.date]=r.date;f[S.ex]=r.exercise;f[S.setN]=r.set;f[S.reps]=r.pdf.reps;f[S.wt]=r.pdf.weight;
    if(r.pdf.variation)f[S.var]=r.pdf.variation;if(r.pdf.day)f[S.day]=r.pdf.day;if(r.pdf.session)f[S.session]=r.pdf.session;
    await atFetch(SETS_TBL,{method:'POST',body:JSON.stringify({fields:f,typecast:true})});
    diffRows[idx]={...r,status:'ok'};renderRecords();loadWeekGrid(curDate);setSt('✓ Added');
  }catch(e){setSt('Error: '+e.message);}
}
async function delSet(idx){
  const r=diffRows[idx];if(!r||r.status!=='extra'||!r.at?.id)return;
  if(!confirm('Delete: '+r.exercise+' S'+r.set+' on '+r.date+'?'))return;
  try{await atFetch(SETS_TBL+'/'+r.at.id,{method:'DELETE'});diffRows.splice(idx,1);renderRecords();loadWeekGrid(curDate);setSt('✓ Deleted');}
  catch(e){setSt('Error: '+e.message);}
}
async function fixSet(idx){
  const r=diffRows[idx];if(!r||r.status!=='wrong'||!r.at?.id)return;
  setSt('Fixing…');
  try{
    const f={};
    if(r.issues.find(i=>i.startsWith('Wt')))f[S.wt]=r.pdf.weight;
    if(r.issues.find(i=>i.startsWith('Reps')))f[S.reps]=r.pdf.reps;
    await atFetch(SETS_TBL+'/'+r.at.id,{method:'PATCH',body:JSON.stringify({fields:f})});
    diffRows[idx]={...r,status:'ok',issues:[]};renderRecords();loadWeekGrid(curDate);setSt('✓ Fixed');
  }catch(e){setSt('Error: '+e.message);}
}
async function addAllMissing(){
  const missing=diffRows.filter(r=>r.status==='missing'&&r.date===curDate);
  if(!missing.length){setSt('No missing sets for '+curDate);return;}
  setSt('Adding '+missing.length+'…');
  const recs=missing.map(r=>{const f={};f[S.date]=r.date;f[S.ex]=r.exercise;f[S.setN]=r.set;f[S.reps]=r.pdf.reps;f[S.wt]=r.pdf.weight;if(r.pdf.variation)f[S.var]=r.pdf.variation;if(r.pdf.day)f[S.day]=r.pdf.day;if(r.pdf.session)f[S.session]=r.pdf.session;return{fields:f};});
  try{
    let added=0;
    for(let i=0;i<recs.length;i+=10){await atFetch(SETS_TBL,{method:'POST',body:JSON.stringify({records:recs.slice(i,i+10),typecast:true})});added+=Math.min(10,recs.length-i);setSt('Added '+added+'/'+recs.length+'…');if(i+10<recs.length)await new Promise(r=>setTimeout(r,150));}
    missing.forEach(r=>{const i=diffRows.indexOf(r);if(i>=0)diffRows[i]={...r,status:'ok'};});
    renderRecords();loadWeekGrid(curDate);setSt('✓ Added '+added+' sets');
  }catch(e){setSt('Error: '+e.message);}
}
async function deleteAllExtra(){
  const extra=diffRows.filter(r=>r.status==='extra'&&r.date===curDate&&r.at?.id);
  if(!extra.length){setSt('No extra sets for '+curDate);return;}
  if(!confirm('Delete '+extra.length+' AT-only sets for '+curDate+'?'))return;
  try{
    const ids=extra.map(r=>r.at.id);
    for(let i=0;i<ids.length;i+=10){await atFetch(SETS_TBL+'?'+ids.slice(i,i+10).map(id=>'records[]='+id).join('&'),{method:'DELETE'});if(i+10<ids.length)await new Promise(r=>setTimeout(r,150));}
    extra.forEach(r=>{const i=diffRows.indexOf(r);if(i>=0)diffRows.splice(i,1);});
    renderRecords();loadWeekGrid(curDate);setSt('✓ Deleted');
  }catch(e){setSt('Error: '+e.message);}
}

// ── DRIVE PICKER ──────────────────────────────────────────────────────
async function openPicker(){
  if(!gTok){signIn();return;}
  pickerStack=[{id:'root',name:'My Drive'}];
  document.getElementById('dp-qi').value='';
  renderQuick();renderBC();
  document.getElementById('dpbg').style.display='flex';
  await loadFolder('root');
}
function renderQuick(){
  const el=document.getElementById('dp-sc');
  el.innerHTML='<span style="font-size:10px;font-weight:800;color:#9ca3af">QUICK: </span>';
  QUICK_PDF.forEach(s=>{const b=document.createElement('button');b.style='padding:3px 10px;border:1px solid #fcd34d;background:#fef9c3;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e';b.textContent=s.n;b.onclick=()=>{closePicker();document.getElementById('pp-id').value=s.id;LS.set('mb_wa_pdf',s.id);pdfLoad();};el.appendChild(b);});
}
function renderBC(){
  const el=document.getElementById('dp-bc');el.innerHTML='';
  pickerStack.forEach((f,i)=>{
    if(i>0){const s=document.createElement('span');s.style='color:#9ca3af';s.textContent=' › ';el.appendChild(s);}
    const sp=document.createElement('span');sp.style='font-size:11px;font-weight:700;cursor:pointer;color:#2563eb;padding:2px 4px;border-radius:3px';
    if(i===pickerStack.length-1){sp.style.color='#374151';sp.style.cursor='default';}
    else sp.onclick=()=>popTo(i);
    sp.textContent='📁 '+f.name;el.appendChild(sp);
  });
}
async function loadFolder(fid){
  document.getElementById('dp-list').innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Loading…</div>';
  renderBC();
  try{
    const pq=fid==='root'?"'root' in parents":"'"+fid+"' in parents";
    const mf="(mimeType='application/pdf' or mimeType='application/vnd.google-apps.folder')";
    const q=encodeURIComponent(pq+' and trashed=false and ('+mf+')');
    const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime,size,mimeType)&orderBy=folder,name&pageSize=50',{headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();pickerFiles=d.files||[];renderPickerList(pickerFiles);
  }catch(e){document.getElementById('dp-list').innerHTML='<div style="color:#dc2626;padding:16px">'+e.message+'</div>';}
}
async function navFolder(id,name){pickerStack.push({id,name});document.getElementById('dp-qi').value='';await loadFolder(id);}
async function popTo(i){pickerStack=pickerStack.slice(0,i+1);document.getElementById('dp-qi').value='';await loadFolder(pickerStack[i].id);}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Empty</div>';return;}
  window._dpf=files;
  el.innerHTML=files.map((f,i)=>{
    const isF=f.mimeType==='application/vnd.google-apps.folder';
    return`<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid #e2e5ea;border-radius:7px;margin-bottom:5px;cursor:pointer;background:${isF?'#fffbeb':'#fff'}" onclick="dpClick(${i})">
      <span style="font-size:18px">${isF?'📁':'📄'}</span>
      <span style="flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      ${isF?'<span style="color:#9ca3af">›</span>':`<button style="padding:3px 10px;border:none;background:#2563eb;color:#fff;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer" onclick="event.stopPropagation();dpClick(${i})">Select</button>`}
    </div>`;
  }).join('');
}
function dpClick(i){const f=window._dpf[i];if(!f)return;if(f.mimeType==='application/vnd.google-apps.folder'){navFolder(f.id,f.name);return;}closePicker();document.getElementById('pp-id').value=f.id;LS.set('mb_wa_pdf',f.id);pdfLoad();}
function filterPicker(){const q=document.getElementById('dp-qi').value.toLowerCase().trim();renderPickerList(q?pickerFiles.filter(f=>f.name.toLowerCase().includes(q)):pickerFiles);}
function closePicker(){document.getElementById('dpbg').style.display='none';}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowLeft')navD(-1);if(e.key==='ArrowRight')navD(1);
  if(e.key==='ArrowUp')pdfPrev();if(e.key==='ArrowDown')pdfNext();
});

window.onload=()=>{
  initAuth();
  const lastId=LS.get('mb_wa_pdf');
  if(lastId)document.getElementById('pp-id').value=lastId;
  loadDates();
};
</script>
