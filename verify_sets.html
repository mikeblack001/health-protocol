<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT vs PDF Verification</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; font-size: 13px; }
#header { background: #1a1d2e; padding: 12px 16px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 12px; }
#header h1 { font-size: 15px; font-weight: 600; }
#status { margin-left: auto; font-size: 12px; color: #94a3b8; }
#summary { display: flex; gap: 10px; padding: 12px 16px; background: #13151f; border-bottom: 1px solid #2d3148; flex-wrap: wrap; }
.stat { background: #1e2235; border-radius: 6px; padding: 8px 14px; text-align: center; min-width: 100px; }
.stat .val { font-size: 20px; font-weight: 700; }
.stat .lbl { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.val.ok { color: #22c55e; }
.val.warn { color: #f59e0b; }
.val.err { color: #ef4444; }
#filter-bar { padding: 8px 16px; background: #0f1117; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #2d3148; flex-wrap: wrap; }
#filter-bar select, #filter-bar input { background: #1e2235; border: 1px solid #2d3148; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
#filter-bar button { background: #3b82f6; color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
#table-wrap { overflow-y: auto; height: calc(100vh - 165px); }
table { width: 100%; border-collapse: collapse; }
thead th { position: sticky; top: 0; background: #1a1d2e; padding: 6px 8px; text-align: left; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #2d3148; z-index: 10; }
tbody tr { border-bottom: 1px solid #1e2235; }
tbody tr:hover { background: #1a1d2e; }
td { padding: 5px 8px; }
.row-match { } 
.row-mismatch { background: rgba(239,68,68,0.04); }
.row-missing-at { background: rgba(245,158,11,0.04); }
.row-missing-pdf { background: rgba(167,139,250,0.04); }
.badge { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 600; }
.badge-ok { background: #14532d; color: #4ade80; }
.badge-warn { background: #451a03; color: #fb923c; }
.badge-err { background: #450a0a; color: #f87171; }
.badge-purple { background: #2e1065; color: #c4b5fd; }
.detail-row { background: #12141e !important; }
.detail-inner { padding: 10px 16px 14px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-col h4 { font-size: 11px; font-weight: 600; color: #94a3b8; margin-bottom: 6px; }
.detail-table { width: 100%; border-collapse: collapse; }
.detail-table th { font-size: 10px; color: #64748b; padding: 3px 6px; text-align: left; border-bottom: 1px solid #2d3148; }
.detail-table td { font-size: 11px; padding: 3px 6px; }
.detail-table tr.diff-row td { color: #ef4444; }
.expand-btn { cursor: pointer; color: #3b82f6; font-size: 11px; }
.expand-btn:hover { text-decoration: underline; }
#loading { text-align: center; padding: 60px; color: #64748b; }
.progress-bar { height: 3px; background: #1e2235; border-radius: 2px; overflow: hidden; margin: 8px auto; width: 200px; }
.progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s; }
</style>
</head>
<body>
<div id="header">
  <h1>🔍 AT vs PDF Verification</h1>
  <div id="status">Loading...</div>
</div>
<div id="summary">
  <div class="stat"><div class="val ok" id="s-match">—</div><div class="lbl">Exact Match</div></div>
  <div class="stat"><div class="val warn" id="s-count-diff">—</div><div class="lbl">Count Mismatch</div></div>
  <div class="stat"><div class="val err" id="s-missing-at">—</div><div class="lbl">In PDF, Not AT</div></div>
  <div class="stat"><div class="val" style="color:#a78bfa" id="s-missing-pdf">—</div><div class="lbl">In AT, Not PDF</div></div>
  <div class="stat"><div class="val" id="s-at-total">—</div><div class="lbl">AT Total</div></div>
  <div class="stat"><div class="val" id="s-pdf-total">—</div><div class="lbl">PDF Total</div></div>
</div>
<div id="filter-bar">
  <select id="filter-type" onchange="renderTable()">
    <option value="all">All dates</option>
    <option value="issues">Issues only</option>
    <option value="match">✅ Match</option>
    <option value="mismatch">⚠️ Count diff</option>
    <option value="missing-at">🔴 Missing in AT</option>
    <option value="missing-pdf">🟣 Extra in AT</option>
  </select>
  <input type="text" id="filter-date" placeholder="Filter date..." style="width:110px" oninput="renderTable()">
  <span style="margin-left:auto;color:#64748b;font-size:11px" id="row-count"></span>
</div>
<div id="table-wrap">
  <div id="loading">
    <div style="font-size:14px;margin-bottom:6px">Loading data...</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div id="prog-label" style="font-size:11px;margin-top:4px;color:#94a3b8"></div>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th style="width:100px">Date</th>
        <th style="width:80px">Day</th>
        <th style="width:70px">PDF Sets</th>
        <th style="width:70px">AT Sets</th>
        <th style="width:60px">Diff</th>
        <th style="width:110px">Status</th>
        <th style="width:70px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE = 'appmHDG4TGT1xy6R6';
const SETS_TABLE = 'tblKDqjy5RzqaJvjr';
const PDF_URL = 'https://raw.githubusercontent.com/mikeblack001/health-protocol/main/extract_progress.json';

let pdfByDate = {}, atByDate = {}, allDates = [], atRawByDate = {}, pdfRawByDate = {};

function setStatus(m) { document.getElementById('status').textContent = m; }
function setProg(p, l) {
  document.getElementById('prog').style.width = p + '%';
  document.getElementById('prog-label').textContent = l;
}

async function fetchAT() {
  let all = [], offset = null, page = 0;
  const fields = 'fields[]=fld75zYXknF0RtCWH&fields[]=fldZ93A1t7fGjjsSS&fields[]=fld2TZdmCOloH0gAK&fields[]=fldNm9Ao0rmcwwDXo&fields[]=fldelUngWHRTm48m1&fields[]=fldmrbBmfgSMtREMt&fields[]=fldypzlwqw9AzWrEE';
  do {
    page++;
    setStatus('Fetching AT page ' + page + '...');
    const url = `https://api.airtable.com/v0/${AT_BASE}/${SETS_TABLE}?${fields}&returnFieldsByFieldId=true&pageSize=100${offset ? '&offset=' + encodeURIComponent(offset) : ''}`;
    const r = await fetch(url, { headers: { Authorization: 'Bearer ' + AT_TOKEN } });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
    all = all.concat(d.records);
    offset = d.offset;
    setProg(Math.min(55, page * 2.5), all.length + ' AT records...');
  } while (offset);
  return all;
}

async function fetchPDF() {
  setStatus('Loading PDF data...');
  const r = await fetch(PDF_URL + '?cb=' + Date.now());
  const d = await r.json();
  const sets = Array.isArray(d) ? d : (d.all_sets || []);
  return sets.filter(s => {
    const date = s.date || s.Date || '';
    const reps = parseInt(s.reps || s.Reps || 0);
    return date >= '2024-10-28' && reps > 0;
  });
}

function group(sets, isAT) {
  const byDate = {}, rawByDate = {};
  for (const s of sets) {
    let date, dayType, exercise, variation, setNum, reps, weight;
    if (isAT) {
      date = s.fields['fld75zYXknF0RtCWH'] || '';
      dayType = s.fields['fldypzlwqw9AzWrEE'] || '';
      exercise = s.fields['fldZ93A1t7fGjjsSS'] || '';
      variation = s.fields['fld2TZdmCOloH0gAK'] || '';
      setNum = s.fields['fldNm9Ao0rmcwwDXo'];
      reps = s.fields['fldelUngWHRTm48m1'];
      weight = s.fields['fldmrbBmfgSMtREMt'];
    } else {
      date = s.date || s.Date || '';
      dayType = s.day_type || s.Day || '';
      exercise = s.exercise || s.Exercise || '';
      variation = s.variation || s.Variation || '';
      setNum = s.set_number || s['set#'];
      reps = s.reps || s.Reps;
      weight = s.weight || s.Weight;
    }
    if (!date) continue;
    if (!byDate[date]) { byDate[date] = 0; rawByDate[date] = []; }
    byDate[date]++;
    rawByDate[date].push({ exercise, variation, setNum, reps, weight, dayType });
  }
  return { byDate, rawByDate };
}

function renderTable() {
  const ft = document.getElementById('filter-type').value;
  const fd = document.getElementById('filter-date').value.trim();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let shown = 0;
  for (const date of allDates) {
    const pc = pdfByDate[date] || 0;
    const ac = atByDate[date] || 0;
    const diff = ac - pc;
    let statusClass, statusText, badgeCls;
    if (pc === 0 && ac > 0) { statusClass = 'missing-pdf'; statusText = 'Extra in AT'; badgeCls = 'badge-purple'; }
    else if (ac === 0 && pc > 0) { statusClass = 'missing-at'; statusText = 'Missing in AT'; badgeCls = 'badge-err'; }
    else if (diff !== 0) { statusClass = 'mismatch'; statusText = diff > 0 ? 'AT +' + diff : 'AT ' + diff; badgeCls = 'badge-warn'; }
    else { statusClass = 'match'; statusText = 'Match'; badgeCls = 'badge-ok'; }
    if (ft !== 'all' && ft !== statusClass) continue;
    if (ft === 'issues' && statusClass === 'match') continue;
    if (fd && !date.includes(fd)) continue;
    const pdfSets = pdfRawByDate[date] || [];
    const atSets = atRawByDate[date] || [];
    const dayType = (atSets[0] || pdfSets[0] || {}).dayType || '—';
    const diffColor = diff === 0 ? '#22c55e' : diff > 0 ? '#a78bfa' : '#ef4444';
    const tr = document.createElement('tr');
    tr.className = 'row-' + statusClass;
    tr.innerHTML = `<td style="color:#94a3b8;font-weight:600">${date}</td><td>${dayType}</td><td>${pc}</td><td>${ac}</td><td style="color:${diffColor};font-weight:600">${diff===0?'0':diff>0?'+'+diff:diff}</td><td><span class="badge ${badgeCls}">${statusText}</span></td><td><span class="expand-btn" onclick="toggleDetail(this,'${date}')">▼ Detail</span></td>`;
    tbody.appendChild(tr);
    const dtr = document.createElement('tr');
    dtr.className = 'detail-row';
    dtr.style.display = 'none';
    dtr.dataset.date = date;
    dtr.innerHTML = `<td colspan="7"><div class="detail-inner" id="d-${date}"></div></td>`;
    tbody.appendChild(dtr);
    shown++;
  }
  document.getElementById('row-count').textContent = shown + ' dates';
}

function toggleDetail(btn, date) {
  const dtr = [...document.querySelectorAll('tr.detail-row')].find(r => r.dataset.date === date);
  if (!dtr) return;
  if (dtr.style.display === 'none') {
    dtr.style.display = '';
    btn.textContent = '▲ Detail';
    buildDetail(date);
  } else { dtr.style.display = 'none'; btn.textContent = '▼ Detail'; }
}

function buildDetail(date) {
  const el = document.getElementById('d-' + date);
  const pdf = (pdfRawByDate[date] || []).slice().sort((a,b) => a.exercise < b.exercise ? -1 : a.exercise > b.exercise ? 1 : (a.setNum||0)-(b.setNum||0));
  const at = (atRawByDate[date] || []).slice().sort((a,b) => a.exercise < b.exercise ? -1 : a.exercise > b.exercise ? 1 : (a.setNum||0)-(b.setNum||0));
  const row = r => `<tr><td>${r.exercise||'—'}</td><td>${r.variation||''}</td><td>${r.setNum||'?'}</td><td>${r.reps||0}</td><td>${r.weight||0}</td></tr>`;
  const atRow = r => {
    const m = pdf.find(p => p.exercise===r.exercise && p.setNum==r.setNum && p.reps==r.reps && p.weight==r.weight);
    return `<tr${m?'':' class="diff-row"'}><td>${r.exercise||'—'}</td><td>${r.variation||''}</td><td>${r.setNum||'?'}</td><td>${r.reps||0}</td><td>${r.weight||0}</td></tr>`;
  };
  const th = '<tr><th>Exercise</th><th>Var</th><th>#</th><th>Reps</th><th>Wt</th></tr>';
  el.innerHTML = `<div class="detail-grid">
    <div class="detail-col"><h4>📄 PDF (${pdf.length} sets)</h4><table class="detail-table">${th}<tbody>${pdf.map(row).join('')||'<tr><td colspan="5" style="color:#64748b;text-align:center">No data</td></tr>'}</tbody></table></div>
    <div class="detail-col"><h4>🗄️ Airtable (${at.length} sets) <span style="color:#ef4444;font-size:10px">(red = no PDF match)</span></h4><table class="detail-table">${th}<tbody>${at.map(atRow).join('')||'<tr><td colspan="5" style="color:#64748b;text-align:center">No data</td></tr>'}</tbody></table></div>
  </div>`;
}

async function run() {
  try {
    const [atRecs, pdfSets] = await Promise.all([fetchAT(), fetchPDF()]);
    setProg(80, 'Processing...');
    const ag = group(atRecs, true);
    atByDate = ag.byDate; atRawByDate = ag.rawByDate;
    const pg = group(pdfSets, false);
    pdfByDate = pg.byDate; pdfRawByDate = pg.rawByDate;
    allDates = [...new Set([...Object.keys(pdfByDate),...Object.keys(atByDate)])].sort();
    let matchC=0, countDiff=0, missingAT=0, missingPDF=0;
    for (const d of allDates) {
      const pc=pdfByDate[d]||0, ac=atByDate[d]||0;
      if (pc===0&&ac>0) missingPDF++;
      else if (ac===0&&pc>0) missingAT++;
      else if (pc!==ac) countDiff++;
      else matchC++;
    }
    document.getElementById('s-match').textContent = matchC;
    document.getElementById('s-count-diff').textContent = countDiff;
    document.getElementById('s-missing-at').textContent = missingAT;
    document.getElementById('s-missing-pdf').textContent = missingPDF;
    document.getElementById('s-at-total').textContent = atRecs.length.toLocaleString();
    document.getElementById('s-pdf-total').textContent = pdfSets.length.toLocaleString();
    setProg(100,'Done');
    setStatus(atRecs.length.toLocaleString() + ' AT · ' + pdfSets.length.toLocaleString() + ' PDF · ' + allDates.length + ' dates');
    document.getElementById('loading').style.display='none';
    document.getElementById('main-table').style.display='';
    renderTable();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="color:#ef4444;padding:20px">Error: ${e.message}</div>`;
    setStatus('Error');
  }
}
run();
</script>
</body>
</html>
