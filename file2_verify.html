<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>File 2 — Final Verification</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0a0f1a; color: #e2e8f0; padding: 20px; font-size: 13px; }
h1 { font-size: 15px; font-weight: 700; color: #f8fafc; }
.sub { font-size: 11px; color: #475569; font-family: monospace; margin-top: 2px; margin-bottom: 16px; }
#runBtn { background: #2563eb; color: #fff; border: none; border-radius: 7px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 16px; }
#runBtn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }
#msg { font-size: 11px; color: #64748b; margin-left: 10px; }

.stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.stat { background: #111827; border: 1px solid #1e293b; border-radius: 8px; padding: 9px 14px; }
.stat-num { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-lbl { font-size: 10px; color: #64748b; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.sc-green .stat-num { color: #34d399; }
.sc-red   .stat-num { color: #f87171; }
.sc-amber .stat-num { color: #fbbf24; }
.sc-blue  .stat-num { color: #60a5fa; }
.sc-gray  .stat-num { color: #94a3b8; }

.tbl-wrap { background: #111827; border: 1px solid #1e293b; border-radius: 8px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { padding: 6px 11px; text-align: left; font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; background: #0f172a; border-bottom: 1px solid #1e293b; }
td { padding: 7px 11px; border-bottom: 1px solid #1a2234; font-size: 12px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.mono { font-family: monospace; font-size: 11px; color: #94a3b8; }

.day-tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.tag-push { background: #1e3a5f; color: #93c5fd; }
.tag-pull { background: #064e3b; color: #6ee7b7; }
.tag-legs { background: #3b1f5e; color: #c4b5fd; }
.tag-arms { background: #451a03; color: #fcd34d; }

.cnt-big { font-size: 18px; font-weight: 800; line-height: 1; }
.cnt-zero { color: #ef4444; }
.cnt-low  { color: #fbbf24; }
.cnt-ok   { color: #34d399; }

.status-ok      { color: #34d399; font-size: 11px; font-weight: 600; }
.status-nosets  { color: #ef4444; font-size: 11px; font-weight: 600; }
.status-few     { color: #fbbf24; font-size: 11px; font-weight: 600; }

.sleep-cell { font-size: 11px; color: #94a3b8; }
.blank-cell { font-size: 11px; color: #334155; font-style: italic; }

tr.highlight-new { background: rgba(37, 99, 235, 0.08); }
tr.highlight-bad { background: rgba(127, 29, 29, 0.12); }

.legend { display: flex; gap: 14px; font-size: 11px; color: #64748b; margin-bottom: 12px; flex-wrap: wrap; }
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }
.leg-blue { background: rgba(37,99,235,0.3); }
.leg-red  { background: rgba(127,29,29,0.3); }
</style>
</head>
<body>

<h1>File 2 — Final Verification</h1>
<div class="sub">Jan 5 – May 21 2026 · Sessions: tblk9tTYIcIY4tWjF · Sets: tblKDqjy5RzqaJvjr</div>

<button id="runBtn" onclick="run()">▶ Run Verification</button>
<span id="msg"></span>

<div id="summaryBar" class="stats" style="display:none"></div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot leg-blue"></div> Newly created this session</div>
  <div class="leg-item"><div class="leg-dot leg-red"></div> No set data — needs import</div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Day</th>
        <th>Rec ID</th>
        <th>Sets</th>
        <th>Sleep</th>
        <th>Deep</th>
        <th>Dur</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="body">
      <tr><td colspan="8" style="color:#475569;font-style:italic">Click Run Verification…</td></tr>
    </tbody>
  </table>
</div>

<script>
const TOKEN = "pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a";
const BASE  = "appmHDG4TGT1xy6R6";
const SF = { session:"fldtyX5g2302mdKRM", date:"fld0NOLsoRvUklsUx", day:"fldCOlVjVlkvg7xQ6", sleep:"flduCm2fVfbj9fhIE", deep:"fldhIwgdnwSN3qSCk", duration:"flddFOAaEqasewACu", notes:"fldHoMvfrVusyffXP" };
const XF = { date:"fld75zYXknF0RtCWH", session:"fldBChNmPkNg61oTN" };

// Sessions newly created this chat
const NEW_SESSIONS = new Set([
  "2026-01-07","2026-01-09","2026-01-12","2026-01-13","2026-01-14",
  "2026-01-15","2026-01-19","2026-01-20","2026-04-16","2026-04-23","2026-04-28",
  "2026-02-03","2026-02-04","2026-02-05","2026-02-06","2026-04-08"
]);

const HDR = { "Authorization": `Bearer ${TOKEN}` };

async function fetchAll(url) {
  let records = [], offset = null;
  do {
    const u = offset ? `${url}&offset=${encodeURIComponent(offset)}` : url;
    const r = await fetch(u, { headers: HDR });
    const j = await r.json();
    if (j.error) throw new Error(j.error.message);
    records = records.concat(j.records || []);
    offset = j.offset || null;
  } while (offset);
  return records;
}

function dayTag(day) {
  if (!day) return '<span style="color:#334155">—</span>';
  const cls = day==="Push"?"tag-push":day==="Pull"?"tag-pull":day.startsWith("Legs")?"tag-legs":"tag-arms";
  return `<span class="day-tag ${cls}">${day}</span>`;
}

function fmtNum(v, unit="") {
  if (v === undefined || v === null || v === "") return `<span class="blank-cell">—</span>`;
  return `<span class="sleep-cell">${v}${unit}</span>`;
}

async function run() {
  const btn = document.getElementById("runBtn");
  const msg = document.getElementById("msg");
  btn.disabled = true;

  // Fetch all sessions in File 2 range
  msg.textContent = "Fetching sessions…";
  const sessUrl = `https://api.airtable.com/v0/${BASE}/tblk9tTYIcIY4tWjF?filterByFormula=AND(IS_AFTER({${SF.date}},"2026-01-04"),IS_BEFORE({${SF.date}},"2026-05-22"))&sort[0][field]=${SF.date}&sort[0][direction]=asc`;
  let sessions;
  try { sessions = await fetchAll(sessUrl); }
  catch(e) { msg.textContent = "Error: " + e.message; btn.disabled=false; return; }

  msg.textContent = `${sessions.length} sessions — fetching sets…`;

  // Fetch all sets in File 2 range
  const setsUrl = `https://api.airtable.com/v0/${BASE}/tblKDqjy5RzqaJvjr?filterByFormula=AND(IS_AFTER({Date},"2026-01-04"),IS_BEFORE({Date},"2026-05-22"))&fields[]=${XF.date}&fields[]=${XF.session}`;
  let sets;
  try { sets = await fetchAll(setsUrl); }
  catch(e) { msg.textContent = "Error fetching sets: " + e.message; btn.disabled=false; return; }

  msg.textContent = `Complete — ${sessions.length} sessions, ${sets.length} sets`;

  // Index sets by date
  const setsByDate = {};
  for (const r of sets) {
    const d = (r.fields[XF.date]||"").slice(0,10);
    if (!setsByDate[d]) setsByDate[d] = 0;
    setsByDate[d]++;
  }

  // Also index sets by session name (linked field)
  const setsBySession = {};
  for (const r of sets) {
    const s = r.fields[XF.session];
    if (Array.isArray(s)) {
      s.forEach(sid => {
        if (!setsBySession[sid]) setsBySession[sid] = 0;
        setsBySession[sid]++;
      });
    }
  }

  // Render table
  const body = document.getElementById("body");
  body.innerHTML = "";
  let totalSets = 0, noSetCount = 0, hasSleepCount = 0;

  for (const sess of sessions) {
    const f = sess.fields;
    const date = (f[SF.date]||"").slice(0,10);
    const day  = f[SF.day] || "";
    const recId = sess.id;

    // Set count — try by date first, then by linked rec
    let setCnt = setsByDate[date] || setsBySession[recId] || 0;
    totalSets += setCnt;
    if (setCnt === 0) noSetCount++;
    if (f[SF.sleep]) hasSleepCount++;

    const isNew = NEW_SESSIONS.has(date);
    const isBad = setCnt === 0;

    const cntClass = setCnt === 0 ? "cnt-zero" : setCnt < 10 ? "cnt-low" : "cnt-ok";
    const statusHtml = setCnt === 0
      ? '<span class="status-nosets">⚠ No sets</span>'
      : setCnt < 8
      ? `<span class="status-few">✓ ${setCnt} sets</span>`
      : `<span class="status-ok">✓ ${setCnt} sets</span>`;

    const tr = document.createElement("tr");
    if (isNew) tr.className = "highlight-new";
    else if (isBad) tr.className = "highlight-bad";

    tr.innerHTML = `
      <td style="font-family:monospace;font-size:12px;font-weight:600">${date}</td>
      <td>${dayTag(day)}</td>
      <td class="mono">${recId}</td>
      <td><span class="cnt-big ${cntClass}">${setCnt}</span></td>
      <td>${fmtNum(f[SF.sleep],"hr")}</td>
      <td>${fmtNum(f[SF.deep],"m")}</td>
      <td>${fmtNum(f[SF.duration],"m")}</td>
      <td>${statusHtml}</td>
    `;
    body.appendChild(tr);
  }

  // Summary
  const bar = document.getElementById("summaryBar");
  bar.style.display = "flex";
  bar.innerHTML = `
    <div class="stat sc-gray"><div class="stat-num">${sessions.length}</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat sc-blue"><div class="stat-num">${sets.length}</div><div class="stat-lbl">Total Sets</div></div>
    <div class="stat sc-green"><div class="stat-num">${sessions.length - noSetCount}</div><div class="stat-lbl">Have Sets</div></div>
    <div class="stat sc-red"><div class="stat-num">${noSetCount}</div><div class="stat-lbl">No Sets</div></div>
    <div class="stat sc-amber"><div class="stat-num">${hasSleepCount}</div><div class="stat-lbl">Have Sleep Data</div></div>
  `;

  btn.disabled = false;
}
</script>
</body>
</html>
