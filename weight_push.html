const AT_BASE = 'appmHDG4TGT1xy6R6';
const AT_TABLE = 'tblaYuZjl4Pu4nKxS';
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const DATE_FLD = 'fldSk3hNQJTDKOyfT';

let pushed = 0, errors = 0;
let WEIGHT_FLD = null;

function log(msg, cls='dim') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  const box = document.getElementById('log');
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

async function createWeightField() {
  const url = `https://api.airtable.com/v0/meta/bases/${AT_BASE}/tables/${AT_TABLE}/fields`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: 'Weight (lbs)', type: 'number', options: { precision: 1 } })
  });
  if (!r.ok) {
    const txt = await r.text();
    // If field already exists, try to find it
    if (txt.includes('already exists') || r.status === 422) {
      log('Field already exists — fetching field ID...', 'info');
      return null; // signal to look it up
    }
    throw new Error(`Create field ${r.status}: ${txt.slice(0,200)}`);
  }
  const data = await r.json();
  return data.id;
}

async function getWeightFieldId() {
  const url = `https://api.airtable.com/v0/meta/bases/${AT_BASE}/tables`;
  const r = await fetch(url, { headers: { 'Authorization': `Bearer ${AT_TOKEN}` } });
  const data = await r.json();
  const table = data.tables.find(t => t.id === AT_TABLE);
  if (!table) throw new Error('Table not found');
  const field = table.fields.find(f => f.name === 'Weight (lbs)');
  if (!field) throw new Error('Weight field not found');
  return field.id;
}

async function pushBatch(batch, fieldId) {
  const url = `https://api.airtable.com/v0/${AT_BASE}/${AT_TABLE}`;
  const body = {
    records: batch.map(([date, val]) => ({
      fields: { [DATE_FLD]: date, [fieldId]: val }
    })),
    performUpsert: { fieldsToMergeOn: [DATE_FLD] },
    typecast: true
  };
  const r = await fetch(url, {
    method: 'PATCH',
    headers: { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`AT ${r.status}: ${await r.text()}`);
  return await r.json();
}

async function run() {
  const total = WEIGHT_DATA.length;
  document.getElementById('sTotal').textContent = total;
  log(`Starting: create Weight field + push ${total} days...`, 'info');

  // Step 1: Create field
  try {
    let fid = await createWeightField();
    if (!fid) fid = await getWeightFieldId();
    WEIGHT_FLD = fid;
    document.getElementById('sFieldId').textContent = fid.slice(-6);
    log(`Weight field ID: ${fid}`, 'ok');
  } catch(e) {
    log(`Field error: ${e.message}`, 'err');
    document.getElementById('status').textContent = 'Failed to create/find weight field.';
    return;
  }

  // Step 2: Push data in batches of 10
  const BATCH = 10;
  for (let i = 0; i < total; i += BATCH) {
    const batch = WEIGHT_DATA.slice(i, i + BATCH);
    try {
      await pushBatch(batch, WEIGHT_FLD);
      pushed += batch.length;
      document.getElementById('sPushed').textContent = pushed;
      document.getElementById('fill').style.width = Math.round(pushed/total*100) + '%';
      if (i % 200 === 0) log(`Pushed ${pushed}/${total} (${batch[0][0]} → ${batch[batch.length-1][0]})`, 'ok');
    } catch(e) {
      errors++;
      document.getElementById('sErrors').textContent = errors;
      log(`Error at ${batch[0][0]}: ${e.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 150));
  }

  document.getElementById('status').textContent = `✓ Done. ${pushed} pushed, ${errors} errors. Field: ${WEIGHT_FLD}`;
  document.getElementById('status').className = 'ok';
  log(`Complete. Weight field: ${WEIGHT_FLD}`, 'ok');
}

window.onload = run;
</script>
