<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Sync Compound Colors</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f0f2f5;color:#1a1a2e}
button{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px}
button:disabled{background:#9ca3af}.green{background:#16a34a}
.swatch{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:middle}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;margin-top:12px;font-size:12px}
th{background:#1e2433;color:#fff;padding:6px 10px;text-align:left}
td{padding:5px 10px;border-bottom:1px solid #e2e5ea}
#log{background:#fff;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;margin-top:12px;max-height:180px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h2 style="margin:0 0 4px">Sync Compound Colors Across Tables</h2>
<p style="color:#6b7280;font-size:13px;margin:0 0 12px">Reads compound colors from the Injection Log Compound field and applies the same colors to all other tables with a Compound single-select field.</p>
<button onclick="scan()">1. Scan / Preview</button>
<button id="fix-btn" class="green" onclick="applyFix()" disabled>2. Apply Sync</button>
<div id="log">Ready.</div>
<div id="preview"></div>
<script>
const TOKEN='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
let sourceColors={};
let updates=[];

function log(m){const el=document.getElementById('log');el.textContent+='\n'+m;el.scrollTop=el.scrollHeight;}

async function scan(){
  updates=[];sourceColors={};
  document.getElementById('preview').innerHTML='';
  document.getElementById('fix-btn').disabled=true;
  document.getElementById('log').textContent='Loading base schema...';

  // Get all tables and fields via metadata API
  const r=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables`,{
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  const d=await r.json();
  if(!d.tables){log('Error: '+JSON.stringify(d));return;}
  log(`Found ${d.tables.length} tables.`);

  // Find Injection Log Compound field as source of truth
  const injLog=d.tables.find(t=>t.id==='tblBvEaLkGGipnOFc');
  if(!injLog){log('Could not find Injection Log table.');return;}
  const srcField=injLog.fields.find(f=>f.name==='Compound'&&f.type==='singleSelect');
  if(!srcField){log('Could not find Compound field in Injection Log.');return;}

  srcField.options.choices.forEach(c=>{sourceColors[c.name]={color:c.color,id:c.id};});
  log(`Source: ${Object.keys(sourceColors).length} compound colors from Injection Log.`);

  // Show source colors
  let html='<h3 style="margin:12px 0 6px;font-size:13px;font-weight:700">Source Colors (Injection Log)</h3>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">';
  Object.entries(sourceColors).forEach(([name,{color}])=>{
    html+=`<span style="background:#f3f4f6;border-radius:4px;padding:3px 8px;font-size:11px"><span class="swatch" style="background:${colorHex(color)}"></span>${name}</span>`;
  });
  html+='</div>';

  // Find all other tables with a Compound singleSelect field
  html+='<h3 style="margin:12px 0 6px;font-size:13px;font-weight:700">Fields to Update</h3>';
  html+='<table><thead><tr><th>Table</th><th>Field</th><th>Options to sync</th></tr></thead><tbody>';

  for(const tbl of d.tables){
    if(tbl.id==='tblBvEaLkGGipnOFc') continue; // skip source
    for(const fld of tbl.fields){
      if(fld.type!=='singleSelect') continue;
      const choices=fld.options?.choices||[];
      const compoundChoices=choices.filter(c=>sourceColors[c.name]);
      if(!compoundChoices.length) continue;

      // Find choices that need color update
      const toUpdate=compoundChoices.filter(c=>c.color!==sourceColors[c.name]?.color);
      if(!toUpdate.length) continue;

      updates.push({tableId:tbl.id,tableName:tbl.name,fieldId:fld.id,fieldName:fld.name,choices,toUpdate});
      html+=`<tr><td>${tbl.name}</td><td>${fld.name}</td><td>${toUpdate.map(c=>`<span style="font-size:11px"><span class="swatch" style="background:${colorHex(c.color)}"></span>${c.name} → <span class="swatch" style="background:${colorHex(sourceColors[c.name].color)}"></span></span>`).join(', ')}</td></tr>`;
    }
  }
  html+='</tbody></table>';
  document.getElementById('preview').innerHTML=html;
  log(`${updates.length} fields need updating.`);
  if(updates.length) document.getElementById('fix-btn').disabled=false;
}

// Airtable color names to approximate hex
const COLOR_MAP={
  'redBright':'#ef4444','orangeBright':'#f97316','yellowBright':'#eab308',
  'greenBright':'#22c55e','tealBright':'#14b8a6','blueBright':'#3b82f6',
  'purpleBright':'#a855f7','pinkBright':'#ec4899','grayBright':'#9ca3af',
  'red':'#dc2626','orange':'#ea580c','yellow':'#ca8a04','green':'#16a34a',
  'teal':'#0d9488','blue':'#2563eb','purple':'#9333ea','pink':'#db2777','gray':'#6b7280',
  'redLight':'#fca5a5','orangeLight':'#fdba74','yellowLight':'#fde047',
  'greenLight':'#86efac','tealLight':'#5eead4','blueLight':'#93c5fd',
  'purpleLight':'#d8b4fe','pinkLight':'#f9a8d4','grayLight':'#d1d5db',
};
function colorHex(c){return COLOR_MAP[c]||'#e5e7eb';}

async function applyFix(){
  document.getElementById('fix-btn').disabled=true;
  let done=0,errors=0;
  log(`Applying to ${updates.length} fields...`);
  for(const u of updates){
    // Rebuild choices array with updated colors
    const newChoices=u.choices.map(c=>{
      if(sourceColors[c.name]) return {...c,color:sourceColors[c.name].color};
      return c;
    });
    try{
      const r=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables/${u.tableId}/fields/${u.fieldId}`,{
        method:'PATCH',
        headers:{Authorization:`Bearer ${TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({options:{choices:newChoices}})
      });
      const d=await r.json();
      if(d.id){done++;log(`✓ ${u.tableName} / ${u.fieldName}`);}
      else{errors++;log(`✗ ${u.tableName} / ${u.fieldName}: `+JSON.stringify(d.error));}
    }catch(e){errors++;log('Error: '+e.message);}
    await new Promise(res=>setTimeout(res,200));
  }
  log(`Done. ${done} fields updated, ${errors} errors.`);
}
</script>
</body></html>
