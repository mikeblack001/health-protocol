<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Assign Compound Colors</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f0f2f5;color:#1a1a2e}
button{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px;margin-bottom:8px}
button:disabled{background:#9ca3af}.green{background:#16a34a}
#log{background:#fff;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;margin-top:12px;max-height:180px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h2 style="margin:0 0 4px">Assign Compound Colors</h2>
<p style="color:#6b7280;font-size:13px;margin:0 0 12px">Assigns a distinct color to each compound and syncs across all tables.</p>
<button onclick="run()">Apply Colors to All Tables</button>
<div id="log">Ready.</div>
<script>
const TOKEN='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';

// Airtable's full color palette
const COLORS=[
  'redBright','orangeBright','yellowBright','greenBright','tealBright','cyanBright',
  'blueBright','purpleBright','pinkBright','grayBright',
  'red','orange','yellow','green','teal','cyan','blue','purple','pink',
  'redLight2','orangeLight2','yellowLight2','greenLight2','tealLight2','cyanLight2','blueLight2','purpleLight2','pinkLight2'
];

// Assigned colors per compound — visually distinct
const COMPOUND_COLORS={
  'Testosterone':        'redBright',
  'Deca (Nandrolone)':   'orangeBright',
  'Tirzepatide':         'yellowBright',
  'Retatrutide':         'yellow',
  'Cagrilintide':        'orangeLight2',
  'NAD+':                'greenBright',
  'Tesamorelin':         'tealBright',
  'GHK-Cu':              'cyanBright',
  'CJC-1295 No DAC':     'blueBright',
  'CJC-1295':            'blue',
  'Ipamorelin':          'purpleBright',
  'KPV':                 'pinkBright',
  'DSIP':                'teal',
  'BPC-157':             'greenLight2',
  'TB-500':              'tealLight2',
  'Mots-C':              'cyanLight2',
  'SS-31':               'blueLight2',
  'Melanotan II (MT2)':  'pink',
  'Anavar (Oxandrolone)':'red',
  'Winstrol (Stanozolol)':'orange',
  'LipoMinoMix':         'yellowLight2',
  'Selank':              'purpleLight2',
  'Semax':               'pinkLight2',
  'Sermorelin':          'grayBright',
  'Epitalon':            'purple',
};

function log(m){const el=document.getElementById('log');el.textContent+='\n'+m;el.scrollTop=el.scrollHeight;}

async function run(){
  document.querySelector('button').disabled=true;
  document.getElementById('log').textContent='Loading base schema...';

  const r=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables`,{
    headers:{Authorization:`Bearer ${TOKEN}`}
  });
  const d=await r.json();
  if(!d.tables){log('Error: '+JSON.stringify(d));return;}
  log(`Found ${d.tables.length} tables.`);

  let done=0,errors=0;
  for(const tbl of d.tables){
    for(const fld of tbl.fields){
      if(fld.type!=='singleSelect') continue;
      const choices=fld.options?.choices||[];
      const compoundChoices=choices.filter(c=>COMPOUND_COLORS[c.name]);
      if(!compoundChoices.length) continue;

      // Check if any need updating
      const needsUpdate=compoundChoices.some(c=>c.color!==COMPOUND_COLORS[c.name]);
      if(!needsUpdate) continue;

      const newChoices=choices.map(c=>
        COMPOUND_COLORS[c.name] ? {...c,color:COMPOUND_COLORS[c.name]} : c
      );

      try{
        const res=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables/${tbl.id}/fields/${fld.id}`,{
          method:'PATCH',
          headers:{Authorization:`Bearer ${TOKEN}`,'Content-Type':'application/json'},
          body:JSON.stringify({options:{choices:newChoices}})
        });
        const rd=await res.json();
        if(rd.id){done++;log(`✓ ${tbl.name} / ${fld.name}`);}
        else{errors++;log(`✗ ${tbl.name} / ${fld.name}: `+JSON.stringify(rd.error));}
      }catch(e){errors++;log('Error: '+e.message);}
      await new Promise(res=>setTimeout(res,200));
    }
  }
  log(`\nDone. ${done} fields updated, ${errors} errors.`);
  document.querySelector('button').disabled=false;
}
</script>
</body></html>
