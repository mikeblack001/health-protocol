<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Sync Compound Colors v9</title>
<style>
body{font-family:-apple-system,sans-serif;padding:20px;background:#f0f2f5;color:#1a1a2e}
button{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;margin-right:8px}
button:disabled{background:#9ca3af}.green{background:#16a34a}
#log{background:#fff;border-radius:8px;padding:12px;font-size:12px;font-family:monospace;margin-top:12px;max-height:200px;overflow-y:auto;white-space:pre-wrap}
</style>
</head>
<body>
<h2 style="margin:0 0 4px">Sync Compound Colors <span style="font-size:12px;color:#9ca3af">v9</span></h2>
<p style="color:#6b7280;font-size:13px;margin:0 0 12px">Reads Color Code from Peptides table, maps to Airtable colors, applies to all Compound fields.</p>
<button onclick="scan()">1. Preview</button>
<button id="fix-btn" class="green" onclick="apply()" disabled>2. Apply</button>
<div id="log">Ready.</div>
<script>
const TOKEN='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const PEPTIDES='tblMs6YRdP4wkndUp';
const COLOR_CODE_FLD='fldQ2YK9IYI9B4UA0';
const NAME_FLD='fldVd7mNbNfIc4JOJ'; // Peptide Name

// Map friendly color names → Airtable palette names
const COLOR_MAP={
  'Orange':'orange','Gray':'gray','Navy':'blue','Brown':'orange',
  'Coral':'pink','Mint':'teal','Aqua':'cyan','Pink':'pink',
  'Tan':'yellow','Turquoise':'teal','Green':'green','Blue':'blue',
  'Purple':'purple','Lavender':'purple','Magenta':'pink','Lime':'green',
  'Teal':'teal','Cyan':'cyan','Silver':'gray','Gold':'yellow',
  'Beige':'yellowLight2','Olive':'green','Maroon':'red','Black':'gray',
  'Red':'red','Yellow':'yellow','White':'gray',
  // Bright variants
  'Orange Bright':'orangeBright','Red Bright':'redBright','Blue Bright':'blueBright',
  'Green Bright':'greenBright','Purple Bright':'purpleBright','Pink Bright':'pinkBright',
};

let compoundColors={};
let fieldUpdates=[];

function log(m){const el=document.getElementById('log');el.textContent+='\n'+m;el.scrollTop=el.scrollHeight;}

async function scan(){
  compoundColors={};fieldUpdates=[];
  document.getElementById('log').textContent='Loading Peptides...';
  document.getElementById('fix-btn').disabled=true;

  // Load peptides with Name + Color Code
  let recs=[],offset=null;
  do{
    const url=`https://api.airtable.com/v0/${BASE}/${PEPTIDES}?fields[]=Name&fields[]=${COLOR_CODE_FLD}&pageSize=100`+(offset?`&offset=${offset}`:'');
    const r=await fetch(url,{headers:{Authorization:`Bearer ${TOKEN}`}});
    const d=await r.json();
    if(!d.records){log('Error: '+JSON.stringify(d));return;}
    recs=recs.concat(d.records);
    offset=d.offset;
  }while(offset);

  recs.forEach(r=>{
    const name=(r.fields['Name']||'').trim();
    const colorCode=(r.fields[COLOR_CODE_FLD]||'').trim();
    const atColor=COLOR_MAP[colorCode];
    if(name&&atColor) compoundColors[name]=atColor;
  });
  log(`Loaded ${Object.keys(compoundColors).length} compound→color mappings:`);
  Object.entries(compoundColors).forEach(([n,c])=>log(`  ${n} → ${c}`));

  // Load base schema
  log('\nLoading schema...');
  const sr=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables`,{headers:{Authorization:`Bearer ${TOKEN}`}});
  const sd=await sr.json();

  for(const tbl of sd.tables){
    for(const fld of tbl.fields){
      if(fld.type!=='singleSelect') continue;
      const choices=fld.options?.choices||[];
      const hasCompounds=choices.some(c=>compoundColors[c.name]);
      if(!hasCompounds) continue;
      const needsUpdate=choices.some(c=>compoundColors[c.name]&&c.color!==compoundColors[c.name]);
      if(!needsUpdate) continue;
      fieldUpdates.push({tableId:tbl.id,tableName:tbl.name,fieldId:fld.id,fieldName:fld.name,choices});
      log(`Will update: ${tbl.name} / ${fld.name}`);
    }
  }
  log(`\n${fieldUpdates.length} fields to update.`);
  if(fieldUpdates.length) document.getElementById('fix-btn').disabled=false;
}

async function apply(){
  document.getElementById('fix-btn').disabled=true;
  let done=0,errors=0;
  for(const u of fieldUpdates){
    const newChoices=u.choices.map(c=>({
      id:c.id,name:c.name,
      color:compoundColors[c.name]||c.color
    }));
    const res=await fetch(`https://api.airtable.com/v0/meta/bases/${BASE}/tables/${u.tableId}/fields/${u.fieldId}`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${TOKEN}`,'Content-Type':'application/json'},
      body:JSON.stringify({options:{choices:newChoices}})
    });
    const d=await res.json();
    if(d.id){done++;log(`✓ ${u.tableName} / ${u.fieldName}`);}
    else{errors++;log(`✗ ${u.tableName} / ${u.fieldName}: `+JSON.stringify(d.error||d));}
    await new Promise(r=>setTimeout(r,200));
  }
  log(`\nDone. ${done} updated, ${errors} errors.`);
}
</script>
</body></html>
