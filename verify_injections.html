<!DOCTYPE html>
<html>
<head>
<title>Injection Log Verification — Full</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: monospace; background: #111; color: #e0e0e0; padding: 12px; font-size: 12px; }
  h2 { color: #4ade80; margin-bottom: 4px; font-size: 16px; }
  .sub { color: #888; margin-bottom: 12px; font-size: 11px; }
  button { background: #4ade80; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
  #summary { color: #60a5fa; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 11px; }
  th { background: #1a1a1a; padding: 5px 8px; text-align: left; color: #4ade80; position: sticky; top: 0; white-space: nowrap; }
  td { padding: 4px 8px; border-bottom: 1px solid #1a1a1a; white-space: nowrap; }
  tr:hover td { background: #1e1e1e; }
  .morning { color: #fbbf24; }
  .night { color: #818cf8; }
  .date-header td { background: #222; color: #4ade80; font-weight: bold; padding: 6px 8px; }
</style>
</head>
<body>
<h2>💉 Injection Log — Full Verification</h2>
<div class="sub">All records · Jul 28, 2025 → May 21, 2026 · Grouped by date</div>
<button onclick="load()">Load All Records</button>
<div id="summary"></div>
<div id="out"></div>

<script>
const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE  = 'appmHDG4TGT1xy6R6';
const TABLE = 'tblBvEaLkGGipnOFc';
const F = {
  NAME: 'fldt9vYT8Tm37Gf3k',
  DATE: 'fldhYEtLEGA4VxvvO',
  COMP: 'fldwVFyizH4mBANBa',
  SITE: 'fldHDlJY8FpAvK018',
  TIME: 'fldIdzew4Jd0qO4Uc',
  DOSE: 'fld8d8mtRapfaIyqL'
};

async function load() {
  document.getElementById('summary').textContent = 'Loading...';
  document.getElementById('out').innerHTML = '';
  let all = [], offset = null, page = 0;
  do {
    const params = new URLSearchParams({ pageSize: 100, returnFieldsByFieldId: true });
    params.append('sort[0][field]', F.DATE);
    params.append('sort[0][direction]', 'asc');
    params.append('sort[1][field]', F.TIME);
    params.append('sort[1][direction]', 'asc');
    params.append('sort[2][field]', F.COMP);
    params.append('sort[2][direction]', 'asc');
    if (offset) params.append('offset', offset);
    const r = await fetch(`https://api.airtable.com/v0/${BASE}/${TABLE}?${params}`, {
      headers: { Authorization: `Bearer ${TOKEN}` }
    });
    const d = await r.json();
    if (!d.records) { document.getElementById('summary').textContent = 'Error: ' + JSON.stringify(d.error); return; }
    all = all.concat(d.records);
    offset = d.offset;
    page++;
    document.getElementById('summary').textContent = `Loading... ${all.length} records (page ${page})`;
    await new Promise(r => setTimeout(r, 150));
  } while (offset);

  document.getElementById('summary').textContent = `✓ ${all.length} total records loaded`;

  // Group by date
  const byDate = {};
  for (const rec of all) {
    const f = rec.fields;
    const date = f[F.DATE] || 'no-date';
    if (!byDate[date]) byDate[date] = [];
    byDate[date].push(f);
  }

  let html = '<table><tr><th>#</th><th>Date</th><th>Compound</th><th>Timing</th><th>Site</th><th>Dose</th></tr>';
  let rowNum = 0;
  for (const date of Object.keys(byDate).sort()) {
    html += `<tr class="date-header"><td colspan="6">${date} — ${byDate[date].length} records</td></tr>`;
    for (const f of byDate[date]) {
      rowNum++;
      const timing = f[F.TIME] || '';
      const cls = timing === 'Morning' ? 'morning' : timing === 'Night' ? 'night' : '';
      html += `<tr><td>${rowNum}</td><td>${date}</td><td>${f[F.COMP]||''}</td><td class="${cls}">${timing}</td><td>${f[F.SITE]||''}</td><td>${f[F.DOSE]||''}</td></tr>`;
    }
  }
  html += '</table>';
  document.getElementById('out').innerHTML = html;
}
</script>
</body>
</html>
