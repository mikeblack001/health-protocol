<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Injection Log — Parseur vs AT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;color:#222;font-size:13px}
header{background:#1a1d2e;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
header h1{font-size:16px;font-weight:600}
.badge{background:#2563eb;color:#fff;border-radius:10px;padding:2px 10px;font-size:11px}
.stats{display:flex;gap:12px;padding:12px 20px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:wrap}
.stat{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:8px 14px;min-width:90px}
.stat .val{font-size:22px;font-weight:700;color:#2563eb}
.stat.match .val{color:#16a34a}.stat.diff .val{color:#dc2626}.stat.miss .val{color:#f59e0b}
.stat .lbl{font-size:10px;color:#888;text-transform:uppercase;margin-top:2px}
.toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{padding:6px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.btn-primary{background:#2563eb;color:#fff}.btn-success{background:#16a34a;color:#fff}
.btn-secondary{background:#6b7280;color:#fff}.btn:disabled{opacity:.5;cursor:not-allowed}
.filters{padding:8px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
select,input{border:1px solid #d1d5db;border-radius:4px;padding:4px 8px;font-size:12px}
.table-wrap{padding:16px 20px;overflow:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
th{background:#1a1d2e;color:#ccc;padding:8px 10px;text-align:left;font-size:11px;text-transform:uppercase;white-space:nowrap}
td{padding:6px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#f8fafc}
.row-match td{background:#f0fdf4}.row-diff td{background:#fff7ed}.row-miss td{background:#fef2f2}.row-extra td{background:#faf5ff}
.cell-diff{background:#fde68a;border-radius:3px;padding:1px 5px;font-weight:700}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
.tag-match{background:#dcfce7;color:#16a34a}.tag-diff{background:#fed7aa;color:#c2410c}
.tag-miss{background:#fee2e2;color:#dc2626}.tag-extra{background:#ede9fe;color:#7c3aed}
#loadingMsg{padding:40px;text-align:center;color:#6b7280;font-size:14px}
.pbtn{padding:3px 10px;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;background:#2563eb;color:#fff}
.pbtn:hover{background:#1d4ed8}
#actionStatus{color:#16a34a;font-weight:600;font-size:12px;margin-left:8px}
</style>
</head>
<body>
<header>
  <h1>💉 Injection Log — Parseur vs AT</h1>
  <span class="badge" id="badge">Loading...</span>
</header>

<div id="loadingMsg">Loading Parseur and AT data...</div>

<div id="mainUI" style="display:none">
  <div class="stats">
    <div class="stat match"><div class="val" id="sMatch">0</div><div class="lbl">Match</div></div>
    <div class="stat diff"><div class="val" id="sDiff">0</div><div class="lbl">Differences</div></div>
    <div class="stat miss"><div class="val" id="sMiss">0</div><div class="lbl">Missing in AT</div></div>
    <div class="stat"><div class="val" id="sExtra">0</div><div class="lbl">Extra in AT</div></div>
    <div class="stat"><div class="val" id="sParseur">0</div><div class="lbl">Parseur Total</div></div>
    <div class="stat"><div class="val" id="sAT">0</div><div class="lbl">AT Total</div></div>
  </div>
  <div class="toolbar">
    <button class="btn btn-success" id="btnPushMissing" onclick="pushMissing()" disabled>Push Missing to AT</button>
    <button class="btn btn-primary" id="btnFixDiffs" onclick="fixDiffs()" disabled>Fix Differences in AT</button>
    <button class="btn btn-secondary" onclick="exportCSV()">Export Diff CSV</button>
    <span id="actionStatus"></span>
  </div>
  <div class="filters">
    <label>Show:</label>
    <select id="fStatus" onchange="render()">
      <option value="all">All</option>
      <option value="diff">Differences</option>
      <option value="miss">Missing in AT</option>
      <option value="extra">Extra in AT</option>
      <option value="match">Matches</option>
    </select>
    <label>Compound:</label>
    <select id="fCompound" onchange="render()"><option value="">All</option></select>
    <label>From:</label><input id="fFrom" type="text" placeholder="2025-07-01" style="width:95px" onchange="render()">
    <label>To:</label><input id="fTo" type="text" placeholder="2026-05-31" style="width:95px" onchange="render()">
    <label>Search:</label><input id="fSearch" type="text" placeholder="compound, date..." style="width:140px" oninput="render()">
  </div>
  <div class="table-wrap">
    <table><thead><tr>
      <th>Status</th><th>Date</th>
      <th>Compound (Parseur)</th><th>Compound (AT)</th>
      <th>Dose (Parseur)</th><th>Dose (AT)</th>
      <th>Site (Parseur)</th><th>Site (AT)</th>
      <th>Timing (Parseur)</th><th>Timing (AT)</th>
      <th>Action</th>
    </tr></thead>
    <tbody id="tbody"></tbody></table>
  </div>
</div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const PARSEUR_TBL='tblCTOGIrF3NjdyTE';
const AT_TBL='tblBvEaLkGGipnOFc';
// AT field IDs
const F={date:'fldhYEtLEGA4VxvvO',compound:'fldwVFyizH4mBANBa',dose:'fld8d8mtRapfaIyqL',site:'fldHDlJY8FpAvK018',timing:'fldIdzew4Jd0qO4Uc'};

let parseurRows=[], atRows=[], compared=[];

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function norm(s){return String(s||'').toLowerCase().trim();}

function parseMedication(s){
  s=String(s||'').trim();
  let timing='';
  const tm=s.match(/\(([^)]+)\)/);
  if(tm){timing=tm[1];s=s.slice(0,tm.index).trim();}
  const parts=s.split(' - ',2);
  const compound=parts[0].trim();
  const dose=(parts[1]||'').trim();
  return{compound,dose,timing};
}

async function fetchAll(tableId){
  let all=[],offset=null;
  while(true){
    let url=`https://api.airtable.com/v0/${BASE}/${tableId}?pageSize=100`;
    if(offset) url+='&offset='+offset;
    const r=await fetch(url,{headers:{'Authorization':'Bearer '+AT}});
    const d=await r.json();
    all=all.concat(d.records||[]);
    offset=d.offset; if(!offset) break;
    await sleep(80);
  }
  return all;
}

async function loadData(){
  // Load Parseur table
  const pRecs=await fetchAll(PARSEUR_TBL);
  parseurRows=pRecs.map(r=>{
    const f=r.fields||{};
    const{compound,dose,timing}=parseMedication(f['Medication']||f['Name']||'');
    return{
      _id:r.id,
      date:f['Date']||'',
      compound,
      dose,
      timing,
      site:String(f['Location']||'').toUpperCase(),
      dayOfWeek:f['Day of Week']||''
    };
  });

  // Load AT Injection Log
  const atRecs=await fetchAll(AT_TBL);
  atRows=atRecs.map(r=>{
    const f=r.fields||{};
    return{
      _id:r.id,
      date:f[F.date]||'',
      compound:typeof f[F.compound]==='object'?f[F.compound].name:(f[F.compound]||''),
      dose:String(f[F.dose]||'').trim(),
      site:typeof f[F.site]==='object'?f[F.site].name:(f[F.site]||''),
      timing:typeof f[F.timing]==='object'?f[F.timing].name:(f[F.timing]||'')
    };
  });
}

function makeKey(date,compound){return `${date}__${norm(compound)}`;}

function compare(){
  const atMap=new Map();
  atRows.forEach(r=>{
    const k=makeKey(r.date,r.compound);
    if(!atMap.has(k)) atMap.set(k,[]);
    atMap.get(k).push(r);
  });
  compared=[];
  const used=new Set();
  parseurRows.forEach(p=>{
    const k=makeKey(p.date,p.compound); used.add(k);
    const matches=atMap.get(k)||[];
    if(!matches.length){compared.push({status:'miss',p,at:null,diffs:[]});return;}
    const at=matches.shift();
    const diffs=[];
    if(p.dose&&at.dose&&norm(p.dose)!==norm(at.dose)) diffs.push('dose');
    if(p.site&&at.site&&norm(p.site)!==norm(at.site)) diffs.push('site');
    if(p.timing&&at.timing&&norm(p.timing)!==norm(at.timing)) diffs.push('timing');
    if(norm(p.compound)!==norm(at.compound)) diffs.push('compound');
    compared.push({status:diffs.length?'diff':'match',p,at,diffs});
  });
  atRows.forEach(at=>{
    const k=makeKey(at.date,at.compound);
    if(!used.has(k)) compared.push({status:'extra',p:null,at,diffs:[]});
  });
}

function buildUI(){
  document.getElementById('loadingMsg').style.display='none';
  document.getElementById('mainUI').style.display='block';
  document.getElementById('badge').textContent=`Parseur: ${parseurRows.length} | AT: ${atRows.length}`;
  const compounds=[...new Set(compared.map(r=>(r.p||r.at).compound).filter(Boolean))].sort();
  const sel=document.getElementById('fCompound');
  sel.innerHTML='<option value="">All</option>';
  compounds.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  updateStats(); render();
  document.getElementById('btnPushMissing').disabled=!compared.some(r=>r.status==='miss');
  document.getElementById('btnFixDiffs').disabled=!compared.some(r=>r.status==='diff');
}

function updateStats(){
  const c={match:0,diff:0,miss:0,extra:0};
  compared.forEach(r=>c[r.status]++);
  document.getElementById('sMatch').textContent=c.match;
  document.getElementById('sDiff').textContent=c.diff;
  document.getElementById('sMiss').textContent=c.miss;
  document.getElementById('sExtra').textContent=c.extra;
  document.getElementById('sParseur').textContent=parseurRows.length;
  document.getElementById('sAT').textContent=atRows.length;
}

function render(){
  const status=document.getElementById('fStatus').value;
  const compound=document.getElementById('fCompound').value;
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const search=document.getElementById('fSearch').value.toLowerCase();
  const rows=compared.filter(r=>{
    if(status!=='all'&&r.status!==status) return false;
    const rec=r.p||r.at;
    if(compound&&rec.compound!==compound) return false;
    if(from&&rec.date<from) return false;
    if(to&&rec.date>to) return false;
    if(search&&!JSON.stringify(rec).toLowerCase().includes(search)) return false;
    return true;
  });
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  rows.forEach(r=>{
    const p=r.p||{}; const at=r.at||{};
    const ds=new Set(r.diffs||[]);
    const cell=(field,pv,av)=>{
      const diff=ds.has(field);
      return`<td>${diff?`<span class="cell-diff">${pv||'—'}</span>`:pv||'—'}</td><td>${diff?`<span class="cell-diff">${av||'—'}</span>`:av||'—'}</td>`;
    };
    let action='';
    const idx=compared.indexOf(r);
    if(r.status==='miss') action=`<button class="pbtn" onclick="pushOne(${idx})">Push to AT</button>`;
    else if(r.status==='diff') action=`<button class="pbtn" onclick="fixOne(${idx})">Fix in AT</button>`;
    tbody.innerHTML+=`<tr class="row-${r.status}">
      <td><span class="tag tag-${r.status}">${r.status}</span></td>
      <td>${(r.p||r.at).date||'—'}</td>
      ${cell('compound',p.compound,at.compound)}
      ${cell('dose',p.dose,at.dose)}
      ${cell('site',p.site,at.site)}
      ${cell('timing',p.timing,at.timing)}
      <td>${action}</td>
    </tr>`;
  });
}

function buildFields(p){
  const f={};
  if(p.date) f[F.date]=p.date;
  if(p.compound) f[F.compound]=p.compound;
  if(p.dose) f[F.dose]=p.dose;
  if(p.site) f[F.site]=p.site;
  if(p.timing) f[F.timing]=p.timing;
  return f;
}

async function pushOne(idx){
  const r=compared[idx]; if(!r||r.status!=='miss') return;
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${AT_TBL}`,{method:'POST',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({records:[{fields:buildFields(r.p)}],typecast:true})});
  const d=await res.json();
  if(res.ok){r.status='match';r.at=r.p;render();updateStats();}
  else alert('Error: '+JSON.stringify(d.error));
}

async function fixOne(idx){
  const r=compared[idx]; if(!r||r.status!=='diff'||!r.at._id) return;
  const res=await fetch(`https://api.airtable.com/v0/${BASE}/${AT_TBL}/${r.at._id}`,{method:'PATCH',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({fields:buildFields(r.p),typecast:true})});
  const d=await res.json();
  if(res.ok){r.status='match';r.diffs=[];render();updateStats();}
  else alert('Error: '+JSON.stringify(d.error));
}

async function pushMissing(){
  const miss=compared.filter(r=>r.status==='miss');
  document.getElementById('btnPushMissing').disabled=true;
  let done=0;
  for(let i=0;i<miss.length;i+=25){
    const batch=miss.slice(i,i+25).map(r=>({fields:buildFields(r.p)}));
    const res=await fetch(`https://api.airtable.com/v0/${BASE}/${AT_TBL}`,{method:'POST',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({records:batch,typecast:true})});
    const d=await res.json();
    if(res.ok){done+=d.records.length;miss.slice(i,i+25).forEach(r=>{r.status='match';});}
    await sleep(150);
  }
  document.getElementById('actionStatus').textContent=`✓ Pushed ${done}`;
  updateStats();render();
}

async function fixDiffs(){
  const diffs=compared.filter(r=>r.status==='diff'&&r.at&&r.at._id);
  document.getElementById('btnFixDiffs').disabled=true;
  let done=0;
  for(const r of diffs){
    const res=await fetch(`https://api.airtable.com/v0/${BASE}/${AT_TBL}/${r.at._id}`,{method:'PATCH',headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},body:JSON.stringify({fields:buildFields(r.p),typecast:true})});
    if(res.ok){done++;r.status='match';r.diffs=[];}
    await sleep(100);
  }
  document.getElementById('actionStatus').textContent=`✓ Fixed ${done}`;
  updateStats();render();
}

function exportCSV(){
  const rows=compared.filter(r=>r.status!=='match');
  const lines=[['Status','Date','Parseur_Compound','AT_Compound','Parseur_Dose','AT_Dose','Parseur_Site','AT_Site','Parseur_Timing','AT_Timing'].join(',')];
  rows.forEach(r=>{
    const p=r.p||{};const at=r.at||{};
    lines.push([r.status,p.date||at.date,p.compound,at.compound,p.dose,at.dose,p.site,at.site,p.timing,at.timing].map(v=>`"${v||''}"`).join(','));
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));a.download='injection_diff.csv';a.click();
}

window.addEventListener('load',async()=>{
  try{
    await loadData();
    compare();
    buildUI();
  }catch(e){
    document.getElementById('loadingMsg').textContent='Error: '+e.message;
  }
});
</script>
</body>
</html>
