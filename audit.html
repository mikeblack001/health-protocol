<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Injection Audit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#hdr{background:#1e2433;padding:0 14px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#hdr h1{font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
#drive-btn{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;border:none}
#drive-btn.ok{background:#16a34a;color:#fff}
#drive-btn.no{background:#dc2626;color:#fff}
#st{font-size:11px;color:#9ca3af;margin-left:4px}
#hdr-r{margin-left:auto;display:flex;align-items:center;gap:6px}
.hbtn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #374151;background:#374151;color:#d1d5db}
.hbtn:hover{background:#4b5563}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* PDF */
#pp{width:520px;flex-shrink:0;background:#fff;border-right:2px solid #e2e5ea;display:flex;flex-direction:column;overflow:hidden}
#pp-top{padding:14px 14px;border-bottom:1px solid #e2e5ea;flex-shrink:0;background:#fafafa}
#pp-top label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;display:block;margin-bottom:8px}
#pp-id-row{display:flex;gap:6px;margin-bottom:10px}
#pp-id{flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;min-width:0}
.pb{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:#2563eb;color:#fff}
.pb:hover{background:#1d4ed8}
.pg{background:#374151;color:#fff}.pg:hover{background:#1f2937}
#pp-msg{font-size:12px;color:#9ca3af}
#pp-area{flex:1;overflow-y:auto;background:#cbd5e1;padding:6px}
#pp-canvas{width:100%;display:none;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#pp-nav{display:flex;align-items:center;padding:6px 8px;border-top:2px solid #2563eb;background:#fff;flex-shrink:0;gap:4px}
#pp-nav button{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:13px;font-weight:700;background:#2563eb;color:#fff}
#pp-nav button:hover{background:#1d4ed8}
#pp-nav button:disabled{background:#e2e5ea;color:#9ca3af;cursor:default}
#pp-pg{flex:1;text-align:center;font-size:12px;font-weight:700;color:#374151}
#pp-jp{width:46px;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;text-align:center;font-weight:700}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* DATE NAV */
#dnav{background:#fff;border-bottom:2px solid #e2e5ea;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#dnav button{padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;background:#fff}
#dnav button:hover{background:#f3f4f6}
#d-sel{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-weight:700;flex:1;max-width:260px}
#d-cnt{font-size:11px;color:#9ca3af}
#dnav-r{margin-left:auto;display:flex;gap:6px;align-items:center}

/* QUICK ADD */
#qadd{background:#f0fdf4;border-bottom:1px solid #86efac;padding:8px 14px;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
#qadd select,#qadd input{padding:5px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;background:#fff}
#qadd select{min-width:160px}
#qadd input{width:80px}
#qadd-site{width:70px}
#qadd-timing{width:100px}
#q-save{padding:6px 14px;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;background:#16a34a;color:#fff}
#q-save:hover{background:#15803d}

/* RECORDS */
#records{flex:1;overflow-y:auto;padding:10px 14px}

/* CARD */
.card{background:#fff;border:1px solid #e2e5ea;border-radius:8px;padding:0;margin-bottom:8px;display:flex;align-items:stretch;overflow:hidden}
.card.verified{border-left:4px solid #4ade80}
.card.unverified{border-left:4px solid #e2e5ea}
.card-body{flex:1;padding:10px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-width:0}
.card-actions{display:flex;flex-direction:column;justify-content:center;gap:4px;padding:6px 8px;border-left:1px solid #f3f4f6;background:#fafafa;flex-shrink:0}

/* INLINE EDIT FIELDS */
.fe{padding:3px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;font-weight:700;background:transparent;cursor:pointer;color:#1e2433;max-width:160px}
.fe:hover{border-color:#d1d5db;background:#f9fafb}
.fe:focus{border-color:#2563eb;background:#fff;outline:none;cursor:text}
select.fe{cursor:pointer}
.fe-compound{font-size:14px;font-weight:800;color:#1e2433;min-width:120px}
.fe-dose{background:#dbeafe;color:#1d4ed8;min-width:50px}
.fe-dose:hover{background:#bfdbfe}
.fe-dose:focus{background:#fff;color:#1e2433}
.fe-site{background:#fef3c7;color:#92400e;min-width:50px}
.fe-site:hover{background:#fde68a}
.fe-site:focus{background:#fff;color:#1e2433}
.fe-timing{background:#f3f4f6;color:#374151;min-width:70px}
.fe-status{font-size:10px;padding:2px 6px}

/* ACTION BUTTONS */
.abtn{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}
.a-verify{background:#dcfce7;border-color:#86efac;color:#166534}
.a-verify:hover{background:#bbf7d0}
.a-del{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
.a-del:hover{background:#fecdd3}

.empty{color:#9ca3af;text-align:center;padding:40px;font-style:italic}
</style>
</head>
<body>
<div id="hdr">
  <h1>💉 Injection Audit</h1>
  <button id="drive-btn" class="no" onclick="signIn()">🔴 Drive</button>
  <span id="st"></span>
  <div id="hdr-r">
    <span id="b-total" style="font-size:11px;color:#9ca3af"></span>
    <button class="hbtn" onclick="reloadLog()">↻</button>
  </div>
</div>

<div id="body">
  <!-- PDF -->
  <div id="pp">
    <div id="pp-top">
      <label>📄 PDF Reference</label>
      <div id="pp-id-row">
        <input id="pp-id" type="text" placeholder="Drive file ID">
        <button class="pb" onclick="pdfLoad()">Load</button>
        <button class="pb pg" onclick="openPicker()" title="Browse">📂</button>
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        <label class="pb pg" style="cursor:pointer;padding:4px 8px;font-size:10px">⬆ Local<input type="file" accept=".pdf" style="display:none" onchange="pdfLocal(this)"></label>
        <span id="pp-msg" style="font-size:10px;color:#9ca3af">No PDF</span>
      </div>
    </div>
    <div id="pp-area"><canvas id="pp-canvas"></canvas></div>
    <div id="pp-nav">
      <button id="btn-prev" onclick="pdfPrev()" disabled>◀</button>
      <input id="pp-jp" type="number" min="1" onchange="pgGo(+this.value)">
      <span id="pp-pg">— / —</span>
      <button id="btn-next" onclick="pdfNext()" disabled>▶</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <!-- DATE NAV -->
    <div id="dnav">
      <button onclick="navD(-1)">◀ Prev</button>
      <select id="d-sel" onchange="selDate()"><option value="">— Select Date —</option></select>
      <button onclick="navD(1)">Next ▶</button>
      <span id="d-cnt"></span>
      <div id="dnav-r">
        <button class="hbtn" style="background:#2563eb;border-color:#2563eb;color:#fff" onclick="openAddModal()">+ Add Record</button>
        <button id="verify-date-btn" class="hbtn" style="background:#16a34a;border-color:#16a34a;color:#fff" onclick="toggleDateVerified()">○ Mark Date Verified</button>
      </div>
    </div>

    <!-- QUICK ADD BAR -->
    <div id="qadd">
      <select id="q-cmp">
        <option value="">Compound…</option>
        <option>NAD+</option><option>LipoMinoMix</option><option>Tesamorelin</option>
        <option>Tirzepatide</option><option>Anavar (Oxandrolone)</option><option>BPC-157</option>
        <option>TB-500</option><option>CJC-1295</option><option>CJC-1295 No DAC</option>
        <option>Ipamorelin</option><option>GHK-Cu</option><option>Retatrutide</option>
        <option>Selank</option><option>DSIP</option><option>KPV</option><option>Semax</option>
        <option>Mots-C</option><option>SS-31</option><option>Epitalon</option>
        <option>Melanotan II (MT2)</option><option>Deca (Nandrolone)</option>
        <option>Testosterone</option><option>Winstrol (Stanozolol)</option><option>Cagrilintide</option>
      </select>
      <input id="q-dose" type="text" placeholder="Dose (e.g. 5u)">
      <select id="q-site" style="width:70px">
        <option value="">Site</option><option>L</option><option>R</option>
        <option>Pill</option><option>X</option><option>Nasal</option><option>Abd</option><option>S</option>
      </select>
      <select id="q-timing" style="width:100px">
        <option value="">Timing</option><option>Morning</option><option>Night</option>
        <option>Evening</option><option>Daily</option>
      </select>
      <button id="q-save" onclick="quickAdd()">+ Add</button>
      <span style="font-size:10px;color:#9ca3af">Quick add for current date</span>
    </div>

    <!-- RECORDS -->
    <div id="records"><div class="empty">Select a date to load records</div></div>
  </div>
</div>

<!-- DRIVE PICKER -->
<div id="dpbg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center" onclick="if(event.target===this)closePicker()">
  <div style="background:#fff;border-radius:10px;width:500px;max-width:96vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)">
    <div style="padding:12px 16px;border-bottom:1px solid #e2e5ea;display:flex;align-items:center;justify-content:space-between">
      <b>Select PDF from Drive</b>
      <button onclick="closePicker()" style="padding:3px 10px;border:1px solid #d1d5db;border-radius:5px;cursor:pointer;background:#fff">✕</button>
    </div>
    <div id="dp-sc" style="padding:6px 12px;border-bottom:1px solid #e2e5ea;background:#fffbeb;display:flex;gap:6px;flex-wrap:wrap;min-height:36px;align-items:center"></div>
    <div id="dp-bc" style="padding:5px 14px;border-bottom:1px solid #e2e5ea;background:#f8f9fa;font-size:11px;min-height:28px;display:flex;align-items:center;gap:4px;flex-wrap:wrap"></div>
    <div style="padding:6px 14px;border-bottom:1px solid #e2e5ea">
      <input id="dp-qi" type="text" placeholder="Search…" oninput="filterPicker()" style="width:100%;padding:6px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:13px">
    </div>
    <div id="dp-list" style="flex:1;overflow-y:auto;padding:8px"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const AT_TOK='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6';
const LOG={tbl:'tblBvEaLkGGipnOFc',name:'fldt9vYT8Tm37Gf3k',date:'fldhYEtLEGA4VxvvO',
  compound:'fldwVFyizH4mBANBa',site:'fldHDlJY8FpAvK018',timing:'fldIdzew4Jd0qO4Uc',
  dose:'fld8d8mtRapfaIyqL',notes:'fldAbczu73mINwLmx',status:'fldD9kegiwk6mINV8',
  verified:'fldCUuf2lg4hGwXZV'};
const GCL_ID='478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const GSCOPE='https://www.googleapis.com/auth/drive.readonly';
const PDF_QA='https://mikeblack001.github.io/health-protocol/pdf_qa.html';
const QUICK_PDF=[{n:'📋 Injections PDF',id:'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6'}];
const CMPS=['NAD+','LipoMinoMix','Tesamorelin','Tirzepatide','Anavar (Oxandrolone)','BPC-157','TB-500','CJC-1295','CJC-1295 No DAC','Ipamorelin','GHK-Cu','Retatrutide','Selank','DSIP','KPV','Semax','Mots-C','SS-31','Epitalon','Melanotan II (MT2)','Deca (Nandrolone)','Testosterone','Winstrol (Stanozolol)','Cagrilintide'];
const SITES=['L','R','L+R','Pill','X','Nasal','Abd','S'];
const TIMINGS=['Morning','Night','Evening','Daily'];

const LS={get:k=>localStorage.getItem('mba_'+k),set:(k,v)=>localStorage.setItem('mba_'+k,v)};
let curDate=null,logRecs=[],allDates=[],gTok=null;
window.pg=1;let pdfDoc=null,pickerFiles=[],pickerStack=[{id:'root',name:'My Drive'}];

// ── AUTH ──────────────────────────────────────────────────────────────
function initAuth(){
  if(location.hash&&location.hash.includes('access_token')){
    const p=new URLSearchParams(location.hash.slice(1));
    const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||3600);
    if(tok){gTok=tok;localStorage.setItem('mb_pdfqat',tok);localStorage.setItem('mb_pdfqae',Date.now()+(exp-60)*1000);history.replaceState(null,'',location.pathname);setDriveOK();return;}
  }
  const t=localStorage.getItem('mb_pdfqat'),e=parseInt(localStorage.getItem('mb_pdfqae')||0);
  if(t&&Date.now()<e){gTok=t;setDriveOK();return;}
  setDriveNo();
}
function signIn(){sessionStorage.setItem('mb_oauth_return',location.href.split('#')[0]);location.href='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(GCL_ID)+'&redirect_uri='+encodeURIComponent(PDF_QA)+'&response_type=token&scope='+encodeURIComponent(GSCOPE);}
function setDriveOK(){const b=document.getElementById('drive-btn');b.textContent='🟢 Drive';b.className='ok';b.onclick=null;autoLoadPDF();}
function setDriveNo(){const b=document.getElementById('drive-btn');b.textContent='🔴 Drive';b.className='no';b.onclick=signIn;}
async function autoLoadPDF(){const id=LS.get('pdf')||'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6';document.getElementById('pp-id').value=id;if(!pdfDoc)await pdfLoad();}

// ── PDF ───────────────────────────────────────────────────────────────
async function pdfLoad(){
  const id=document.getElementById('pp-id').value.trim();if(!id)return;
  if(!gTok){signIn();return;}
  pmsg('Loading…');
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+gTok}});
    if(!r.ok){if(r.status===401||r.status===403){localStorage.removeItem('mb_pdfqat');gTok=null;setDriveNo();signIn();}else pmsg('Drive '+r.status);return;}
    await pdfRender(await r.arrayBuffer());LS.set('pdf',id);
  }catch(e){pmsg('Error: '+e.message);}
}
function pdfLocal(inp){if(inp.files[0])inp.files[0].arrayBuffer().then(b=>pdfRender(b));}
async function pdfRender(buf){
  pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;
  window.pg=1;await pdfPage(1);pmsg(pdfDoc.numPages+' pages ✓');
}
async function pdfPage(n){
  if(!pdfDoc)return;
  n=Math.max(1,Math.min(n,pdfDoc.numPages));window.pg=n;
  const page=await pdfDoc.getPage(n);
  const canvas=document.getElementById('pp-canvas');
  const area=document.getElementById('pp-area');
  // Render at 2x scale for crisp display, CSS stretches to fill panel
  const vp=page.getViewport({scale:2.0});
  canvas.width=vp.width;canvas.height=vp.height;
  canvas.style.display='block';
  canvas.style.width='100%';
  canvas.style.height='auto';
  area.scrollTop=0;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('pp-pg').textContent=n+' / '+pdfDoc.numPages;
  document.getElementById('pp-jp').value=n;
  document.getElementById('btn-prev').disabled=(n<=1);
  document.getElementById('btn-next').disabled=(n>=pdfDoc.numPages);
}
function pdfPrev(){pdfPage(window.pg-1);}
function pdfNext(){pdfPage(window.pg+1);}
function pgGo(n){pdfPage(n);}
function pmsg(m){document.getElementById('pp-msg').textContent=m;}

// ── AT ────────────────────────────────────────────────────────────────
async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

async function loadDates(){
  setSt('Loading dates…');
  let recs=[],off=null;
  do{const d=await atFetch(LOG.tbl+'?fields%5B%5D='+LOG.date+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
  allDates=[...new Set(recs.map(r=>r.fields[LOG.date]).filter(Boolean))].sort();
  document.getElementById('d-cnt').textContent=allDates.length+' dates';
  buildDateSel();
  setSt('');
  if(allDates.length)setDate(allDates[allDates.length-1]);
}

function buildDateSel(){
  const sel=document.getElementById('d-sel');
  sel.innerHTML='<option value="">— Select Date —</option>';
  allDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  if(curDate)sel.value=curDate;
}
function selDate(){const d=document.getElementById('d-sel').value;if(d)setDate(d);}
function navD(dir){
  if(!allDates.length)return;
  const i=curDate?allDates.indexOf(curDate):-1;
  const d=allDates[Math.max(0,Math.min(allDates.length-1,i+dir))];
  if(d)setDate(d);
}

async function setDate(date){
  curDate=date;
  document.getElementById('d-sel').value=date;
  setSt('Loading…');
  try{
    const q=encodeURIComponent('IS_SAME({'+LOG.date+'},"'+date+'","day")');
    let recs=[],off=null;
    do{const d=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true&filterByFormula='+q+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
    logRecs=recs;
    document.getElementById('b-total').textContent=recs.length+' records';
    // Check if all records are verified
    const allVerified=recs.length>0&&recs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allVerified);
    renderRecords();setSt('');
  }catch(e){setSt('Error: '+e.message);}
}

async function reloadLog(){if(curDate)await setDate(curDate);}

// Date-level verification — stores one checkbox per date using Injection Verified field
// We mark ALL records for the date as verified (or unverified) at once
let dateVerified=false;

function updateVerifyBtn(verified){
  dateVerified=verified;
  const btn=document.getElementById('verify-date-btn');
  if(!btn)return;
  if(verified){btn.textContent='✓ Date Verified';btn.style.background='#15803d';}
  else{btn.textContent='○ Mark Date Verified';btn.style.background='#16a34a';}
}

async function toggleDateVerified(){
  if(!logRecs.length){setSt('No records to verify');return;}
  const newVal=!dateVerified;
  setSt('Saving…');
  try{
    // Update all records for this date
    for(let i=0;i<logRecs.length;i+=10){
      const batch=logRecs.slice(i,i+10);
      const records=batch.map(r=>({id:r.id,fields:{[LOG.verified]:newVal}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records,returnFieldsByFieldId:true})});
    }
    logRecs.forEach(r=>r.fields[LOG.verified]=newVal);
    updateVerifyBtn(newVal);
    setSt(newVal?'✓ Date verified':'✓ Date unverified');
  }catch(e){setSt('Error: '+e.message);}
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderRecords(){
  const el=document.getElementById('records');
  if(!logRecs.length){el.innerHTML='<div class="empty">No records for '+curDate+'</div>';return;}
  el.innerHTML=logRecs.map(r=>cardHTML(r)).join('');
}

function cardHTML(r){
  const f=r.fields;
  const cmp=f[LOG.compound]||'';
  const dose=f[LOG.dose]||'';
  const site=f[LOG.site]||'';
  const timing=f[LOG.timing]||'';
  const stat=f[LOG.status]||'';
  const verified=stat==='Done';

  const cmpOpts=CMPS.map(c=>`<option ${c===cmp?'selected':''}>${c}</option>`).join('');
  const siteOpts=['','L','R','L+R','Pill','X','Nasal','Abd','S'].map(s=>`<option ${s===site?'selected':''}>${s}</option>`).join('');
  const timingOpts=['','Morning','Night','Evening','Daily'].map(t=>`<option ${t===timing?'selected':''}>${t}</option>`).join('');
  const statOpts=['','Todo','In progress','Done'].map(s=>`<option ${s===stat?'selected':''}>${s}</option>`).join('');

  return`<div class="card ${verified?'verified':'unverified'}" id="card_${r.id}">
    <div class="card-body">
      <select class="fe fe-compound" onchange="saveField('${r.id}','${LOG.compound}',this.value)" title="Compound">
        <option value=""></option>${cmpOpts}
      </select>
      <input class="fe fe-dose" value="${esc(dose)}" placeholder="Dose" title="Dose"
        onblur="saveField('${r.id}','${LOG.dose}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <select class="fe fe-site" onchange="saveField('${r.id}','${LOG.site}',this.value)" title="Site">
        ${siteOpts}
      </select>
      <select class="fe fe-timing" onchange="saveField('${r.id}','${LOG.timing}',this.value)" title="Timing">
        ${timingOpts}
      </select>
      <select class="fe fe-status" onchange="saveField('${r.id}','${LOG.status}',this.value)" title="Status">
        ${statOpts}
      </select>
    </div>
    <div class="card-actions">
      <button class="abtn a-verify" onclick="toggleVerify('${r.id}','${stat}')">${verified?'✓':'○'}</button>
      <button class="abtn a-del" onclick="delRec('${r.id}')">✕</button>
    </div>
  </div>`;
}

// ── INLINE SAVE ───────────────────────────────────────────────────────
async function saveField(id,field,value){
  const fields={};fields[field]=value===''?null:value;
  try{
    const res=await atFetch(LOG.tbl+'/'+id,{method:'PATCH',body:JSON.stringify({fields})});
    const i=logRecs.findIndex(r=>r.id===id);
    if(i>=0){logRecs[i]=res;refreshCard(res);}
    flashSaved(id);
  }catch(e){setSt('Save error: '+e.message);}
}

function flashSaved(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  card.style.outline='2px solid #4ade80';
  setTimeout(()=>card.style.outline='',800);
}

function refreshCard(r){
  const el=document.getElementById('card_'+r.id);
  if(!el)return;
  el.outerHTML=cardHTML(r);
}

async function toggleVerify(id,currentStat){
  const newStat=currentStat==='Done'?'':  'Done';
  await saveField(id,LOG.status,newStat);
}

async function delRec(id){
  if(!confirm('Delete this record?'))return;
  try{
    await atFetch(LOG.tbl+'/'+id,{method:'DELETE'});
    logRecs=logRecs.filter(r=>r.id!==id);
    document.getElementById('card_'+id)?.remove();
    document.getElementById('b-total').textContent=logRecs.length+' records';
    setSt('✓ Deleted');
  }catch(e){setSt('Error: '+e.message);}
}

// ── QUICK ADD ─────────────────────────────────────────────────────────
async function quickAdd(){
  const cmp=document.getElementById('q-cmp').value;
  if(!cmp||!curDate){alert('Select a compound and date first');return;}
  const fields={};
  fields[LOG.date]=curDate;
  fields[LOG.compound]=cmp;fields[LOG.name]=cmp;
  const dose=document.getElementById('q-dose').value;if(dose)fields[LOG.dose]=dose;
  const site=document.getElementById('q-site').value;if(site)fields[LOG.site]=site;
  const timing=document.getElementById('q-timing').value;if(timing)fields[LOG.timing]=timing;
  try{
    const res=await atFetch(LOG.tbl,{method:'POST',body:JSON.stringify({fields})});
    logRecs.push(res);
    document.getElementById('records').insertAdjacentHTML('beforeend',cardHTML(res));
    document.getElementById('b-total').textContent=logRecs.length+' records';
    // Clear fields
    document.getElementById('q-cmp').selectedIndex=0;
    document.getElementById('q-dose').value='';
    document.getElementById('q-site').selectedIndex=0;
    document.getElementById('q-timing').selectedIndex=0;
    setSt('✓ Added');
  }catch(e){setSt('Error: '+e.message);}
}

function openAddModal(){
  // Focus quick add bar
  document.getElementById('q-cmp').focus();
}

// ── DRIVE PICKER ──────────────────────────────────────────────────────
async function openPicker(){
  if(!gTok){signIn();return;}
  pickerStack=[{id:'root',name:'My Drive'}];
  document.getElementById('dp-qi').value='';
  renderQuick();renderBC();
  document.getElementById('dpbg').style.display='flex';
  await loadFolder('root');
}
function renderQuick(){
  const el=document.getElementById('dp-sc');
  el.innerHTML='<span style="font-size:10px;font-weight:800;color:#9ca3af">QUICK: </span>';
  QUICK_PDF.forEach(s=>{const b=document.createElement('button');b.style='padding:3px 10px;border:1px solid #fcd34d;background:#fef9c3;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e';b.textContent=s.n;b.onclick=()=>{closePicker();document.getElementById('pp-id').value=s.id;LS.set('pdf',s.id);pdfLoad();};el.appendChild(b);});
}
function renderBC(){
  const el=document.getElementById('dp-bc');el.innerHTML='';
  pickerStack.forEach((f,i)=>{
    if(i>0){const s=document.createElement('span');s.style='color:#9ca3af';s.textContent=' › ';el.appendChild(s);}
    const sp=document.createElement('span');sp.style='font-size:11px;font-weight:700;cursor:pointer;color:#2563eb;padding:2px 4px;border-radius:3px';
    if(i===pickerStack.length-1){sp.style.color='#374151';sp.style.cursor='default';}
    else sp.onclick=()=>popTo(i);
    sp.textContent='📁 '+f.name;el.appendChild(sp);
  });
}
async function loadFolder(fid){
  document.getElementById('dp-list').innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Loading…</div>';
  renderBC();
  try{
    const pq=fid==='root'?"'root' in parents":"'"+fid+"' in parents";
    const mf="(mimeType='application/pdf' or mimeType='application/vnd.google-apps.folder')";
    const q=encodeURIComponent(pq+' and trashed=false and ('+mf+')');
    const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime,size,mimeType)&orderBy=folder,name&pageSize=50',{headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();pickerFiles=d.files||[];renderPickerList(pickerFiles);
  }catch(e){document.getElementById('dp-list').innerHTML='<div style="color:#dc2626;padding:16px">'+e.message+'</div>';}
}
async function navFolder(id,name){pickerStack.push({id,name});document.getElementById('dp-qi').value='';await loadFolder(id);}
async function popTo(i){pickerStack=pickerStack.slice(0,i+1);document.getElementById('dp-qi').value='';await loadFolder(pickerStack[i].id);}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Empty</div>';return;}
  window._dpf=files;
  el.innerHTML=files.map((f,i)=>{
    const isF=f.mimeType==='application/vnd.google-apps.folder';
    return`<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid #e2e5ea;border-radius:7px;margin-bottom:5px;cursor:pointer;background:${isF?'#fffbeb':'#fff'}" onclick="dpClick(${i})">
      <span style="font-size:18px">${isF?'📁':'📄'}</span>
      <span style="flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      ${isF?'<span style="color:#9ca3af">›</span>':`<button style="padding:3px 10px;border:none;background:#2563eb;color:#fff;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer" onclick="event.stopPropagation();dpClick(${i})">Select</button>`}
    </div>`;
  }).join('');
}
function dpClick(i){
  const f=window._dpf[i];if(!f)return;
  if(f.mimeType==='application/vnd.google-apps.folder'){navFolder(f.id,f.name);return;}
  closePicker();document.getElementById('pp-id').value=f.id;LS.set('pdf',f.id);pdfLoad();
}
function filterPicker(){const q=document.getElementById('dp-qi').value.toLowerCase().trim();renderPickerList(q?pickerFiles.filter(f=>f.name.toLowerCase().includes(q)):pickerFiles);}
function closePicker(){document.getElementById('dpbg').style.display='none';}

// ── KEYBOARD NAV ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')navD(-1);
  if(e.key==='ArrowRight')navD(1);
  if(e.key==='ArrowUp')pdfPrev();
  if(e.key==='ArrowDown')pdfNext();
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSt(m){document.getElementById('st').textContent=m;}

window.onload=()=>{
  initAuth();
  document.getElementById('pp-id').value=LS.get('pdf')||'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6';
  loadDates();
};
</script>
