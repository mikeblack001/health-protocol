<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MB Audit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f4f5f7;color:#1a1a2e;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* HEADER */
#hdr{background:#fff;border-bottom:2px solid #e2e5ea;padding:0 14px;height:46px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#hdr h1{font-size:15px;font-weight:900;color:#1e2433}
.mbtn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:2px solid #e2e5ea;background:#f4f5f7;color:#6b7280}
.mbtn.on{background:#2563eb;color:#fff;border-color:#2563eb}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid}
.bblue{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}
.bgreen{background:#dcfce7;border-color:#86efac;color:#166534}
.bamber{background:#fef3c7;border-color:#fcd34d;color:#92400e}
.bred{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
#hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px}
#drive-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid}
#drive-btn.ok{background:#dcfce7;border-color:#86efac;color:#166534}
#drive-btn.no{background:#fee2e2;border-color:#fca5a5;color:#991b1b}
#st{font-size:11px;color:#9ca3af}
/* BODY */
#body{display:flex;flex:1;overflow:hidden}
/* PDF PANEL */
#pp{width:320px;flex-shrink:0;background:#fff;border-right:2px solid #e2e5ea;display:flex;flex-direction:column;overflow:hidden;height:100%}
.phdr{padding:8px 10px;background:#fafafa;border-bottom:1px solid #e2e5ea;flex-shrink:0}
.plbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;display:block;margin-bottom:5px}
.prow{display:flex;gap:4px;align-items:center;margin-bottom:4px}
#pp-id{flex:1;padding:5px 7px;border:1px solid #d1d5db;border-radius:5px;font-size:11px;min-width:0}
.btn{padding:5px 9px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid;white-space:nowrap}
.bp{background:#2563eb;color:#fff;border-color:#2563eb}.bp:hover{background:#1d4ed8}
.bs{background:#fff;border-color:#d1d5db;color:#374151}.bs:hover{background:#f3f4f6}
.bxs{padding:3px 8px;font-size:10px}
#pp-msg{font-size:10px;color:#9ca3af}
#pp-area{flex:1;overflow-y:auto;background:#e5e7eb;padding:6px}
#pp-canvas{width:100%;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none}
#pp-ph{color:#9ca3af;font-size:12px;text-align:center;padding:30px}
#pp-nav{display:flex;align-items:center;gap:5px;padding:8px 10px;border-top:2px solid #2563eb;background:#fff;flex-shrink:0;min-height:44px}
#pp-nav button{padding:7px 16px;border:2px solid #2563eb;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;background:#2563eb;color:#fff}
#pp-nav button:hover{background:#1d4ed8}
#pp-nav button:disabled{background:#e2e5ea;border-color:#e2e5ea;color:#9ca3af;cursor:default}
#pp-pg{font-size:13px;font-weight:700;color:#374151;flex:1;text-align:center}
#pp-jp{width:52px;padding:5px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;text-align:center;font-weight:700}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
/* DATE NAV */
#dnav{background:#fff;border-bottom:2px solid #e2e5ea;padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#dnav button{padding:5px 12px;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;background:#fff}
#dnav button:hover{background:#f3f4f6}
#d-sel{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-weight:700;min-width:200px}
#d-info{font-size:11px;color:#9ca3af}
#dnav-r{margin-left:auto;display:flex;gap:6px;align-items:center}
/* COLS */
#cols{display:grid;grid-template-columns:1fr 1fr;flex:1;overflow:hidden}
.col{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid #e2e5ea}
.col:last-child{border-right:none}
.chdr{padding:6px 10px;background:#fafafa;border-bottom:1px solid #e2e5ea;flex-shrink:0;display:flex;align-items:center;gap:6px;min-height:32px}
.ctitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#6b7280}
.ccnt{font-size:11px;font-weight:700;background:#e5e7eb;border-radius:10px;padding:2px 8px;color:#374151}
.cbody{flex:1;overflow-y:auto;padding:7px}
.cempty{color:#9ca3af;font-size:12px;text-align:center;padding:30px;font-style:italic}
/* CARDS */
.card{background:#fff;border:1px solid #e2e5ea;border-radius:6px;padding:7px 10px;margin-bottom:5px}
.card.match{border-left:4px solid #4ade80}
.card.diff{border-left:4px solid #fb923c}
.card.only{border-left:4px solid #60a5fa}
.ch{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.cn{font-weight:800;font-size:12px;color:#1e2433}
.pill{padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700}
.pd{background:#dbeafe;color:#1d4ed8}
.pt{background:#f3f4f6;color:#374151}
.ps{background:#fef3c7;color:#92400e}
.pk{background:#dcfce7;color:#166534}
.pn{background:#fee2e2;color:#991b1b}
.mtag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:8px;margin-left:auto;white-space:nowrap}
.tm{background:#dcfce7;color:#166534}
.td{background:#fef3c7;color:#92400e}
.te{background:#dbeafe;color:#1d4ed8}
.dr{font-size:10px;padding:2px 6px;background:#fef9c3;border-radius:3px;color:#92400e;margin-top:3px}
.dr .old{text-decoration:line-through;color:#9ca3af;margin-right:4px}
.dr .nw{color:#166534;font-weight:700}
.cbtns{display:flex;gap:3px;margin-top:4px}
.cbtn{padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid}
.ce{background:#eff6ff;border-color:#bfdbfe;color:#2563eb}
.ca{background:#f0fdf4;border-color:#86efac;color:#166534}
.cd{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
/* DRIVE PICKER */
#dpbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
#dpbg.on{display:flex}
#dp{background:#fff;border-radius:10px;width:520px;max-width:96vw;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(0,0,0,.25)}
#dp-hdr{padding:12px 16px;border-bottom:1px solid #e2e5ea;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#dp-hdr h3{font-size:14px;font-weight:800}
#dp-bc{padding:6px 14px;border-bottom:1px solid #e2e5ea;display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:#f8f9fa;min-height:34px;flex-shrink:0}
.bci{font-size:11px;font-weight:700;color:#2563eb;cursor:pointer;padding:2px 4px;border-radius:3px}.bci:hover{background:#dbeafe}
.bcs{font-size:11px;color:#9ca3af}
.bcc{font-size:11px;font-weight:700;color:#374151}
#dp-sc{padding:6px 10px;border-bottom:1px solid #e2e5ea;display:flex;gap:5px;flex-wrap:wrap;background:#fffbeb;flex-shrink:0;min-height:36px;align-items:center}
.sc-b{padding:3px 10px;border:1px solid #fcd34d;background:#fef9c3;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e}.sc-b:hover{background:#fef3c7}
#dp-qi-wrap{padding:7px 14px;border-bottom:1px solid #e2e5ea;flex-shrink:0}
#dp-qi{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px}
#dp-list{flex:1;overflow-y:auto;padding:10px}
.dpi{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #e2e5ea;border-radius:7px;margin-bottom:5px;cursor:pointer;background:#fff}
.dpi:hover{background:#f0f9ff;border-color:#93c5fd}
.dpf{background:#fffbeb;border-color:#fcd34d}.dpf:hover{background:#fef9c3}
.dpi-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.dpi-meta{font-size:11px;color:#9ca3af;margin-top:1px}
.dp-sel{padding:4px 12px;border:none;background:#2563eb;color:#fff;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer}
/* MODAL */
#mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
#mbg.on{display:flex}
#mdl{background:#fff;border-radius:10px;padding:22px;width:440px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
#mdl h2{font-size:15px;font-weight:800;margin-bottom:16px}
.mf{margin-bottom:11px}
.mf label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:#9ca3af;margin-bottom:4px}
.mf input,.mf select,.mf textarea{width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.mbtns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.mbtns button{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid}
#msave{background:#2563eb;color:#fff;border-color:#2563eb}
#mcancel{background:#fff;color:#374151;border-color:#d1d5db}
#mdel{background:#fff1f2;color:#9f1239;border-color:#fecdd3;margin-left:auto;display:none}
#mtbl-lbl{font-size:10px;color:#9ca3af;margin-top:6px}
</style>
</head>
<body>
<div id="hdr">
  <h1>💊 MB Audit</h1>
  <button class="mbtn on" id="mi" onclick="setMode('inj')">💉 Injections</button>
  <button class="mbtn" id="mw" onclick="setMode('wkt')">🏋️ Workouts</button>
  <span class="badge bblue" id="b-par">Parseur: 0</span>
  <span class="badge bblue" id="b-log">Log: 0</span>
  <span class="badge bgreen" id="b-ok">✓ 0</span>
  <span class="badge bamber" id="b-df">⚠ 0</span>
  <span class="badge bred" id="b-ms">✗ 0</span>
  <div id="hdr-r">
    <button id="drive-btn" class="no" onclick="signIn()">🔴 Sign In</button>
    <span id="st"></span>
    <button class="btn bs bxs" onclick="reloadBoth()">↻</button>
  </div>
</div>

<div id="body">
  <!-- PDF -->
  <div id="pp">
    <div class="phdr">
      <span class="plbl">📄 PDF Reference</span>
      <div class="prow">
        <input id="pp-id" class="idf" type="text" placeholder="Drive file ID">
        <button class="btn bp bxs" onclick="pdfLoad()">Load</button>
        <button class="btn bs bxs" onclick="openPicker()" title="Browse">📂</button>
      </div>
      <div class="prow">
        <label class="btn bs bxs" style="cursor:pointer">⬆ Local<input type="file" accept=".pdf" style="display:none" onchange="pdfLocal(this)"></label>
        <span id="pp-msg" style="font-size:10px;color:#9ca3af;margin-left:4px">No PDF loaded</span>
      </div>
    </div>
    <div id="pp-area"><div id="pp-ph">Load PDF above</div><canvas id="pp-canvas"></canvas></div>
    <div id="pp-nav">
      <button id="btn-prev" onclick="pdfPrev()">◀</button>
      <input id="pp-jp" type="number" min="1" onchange="pgGo(+this.value)" style="width:52px;padding:5px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;text-align:center;font-weight:700">
      <span id="pp-pg">— / —</span>
      <button id="btn-next" onclick="pdfNext()">▶</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="dnav">
      <button onclick="navD(-1)">◀ Prev</button>
      <select id="d-sel" onchange="selDate()"><option value="">— Select Date —</option></select>
      <button onclick="navD(1)">Next ▶</button>
      <span id="d-info"></span>
      <div id="dnav-r">
        <button class="btn bs bxs" onclick="openAdd('par')">+ Parseur</button>
        <button class="btn bp bxs" onclick="openAdd('log')">+ Log</button>
        <button class="btn" style="background:#16a34a;color:#fff;border-color:#16a34a;padding:3px 10px;font-size:10px;font-weight:700;border-radius:5px" onclick="copyToLog()">→ Copy Parseur → Log</button>
        <button class="btn" style="background:#dc2626;color:#fff;border-color:#dc2626;padding:3px 10px;font-size:10px;font-weight:700;border-radius:5px" onclick="deleteBlankDates()">🗑 Delete Blank-Date Parseur</button>
      </div>
    </div>
    <div id="cols">
      <!-- PARSEUR -->
      <div class="col">
        <div class="chdr">
          <span class="ctitle" style="color:#7c3aed">📋 Parseur-Injections</span>
          <span class="ccnt" id="pc">0</span>
          <span style="margin-left:auto;font-size:10px;color:#9ca3af" id="pd-lbl"></span>
        </div>
        <div class="cbody" id="par-body"><div class="cempty">Select a date to view Parseur records</div></div>
      </div>
      <!-- LOG -->
      <div class="col">
        <div class="chdr">
          <span class="ctitle" style="color:#2563eb">🗄 Injection Log</span>
          <span class="ccnt" id="lc">0</span>
          <span style="margin-left:auto;font-size:10px;color:#9ca3af" id="ld-lbl"></span>
        </div>
        <div class="cbody" id="log-body"><div class="cempty">Select a date to view Log records</div></div>
      </div>
    </div>
  </div>
</div>

<!-- PICKER -->
<div id="dpbg" onclick="if(event.target===this)closePicker()">
  <div id="dp">
    <div id="dp-hdr"><h3>Select PDF from Drive</h3><button class="btn bs bxs" onclick="closePicker()">✕</button></div>
    <div id="dp-bc"></div>
    <div id="dp-sc"></div>
    <div id="dp-qi-wrap"><input id="dp-qi" type="text" placeholder="Search…" oninput="filterPicker()"></div>
    <div id="dp-list"></div>
  </div>
</div>

<!-- MODAL -->
<div id="mbg" onclick="if(event.target===this)closeMdl()">
  <div id="mdl">
    <h2 id="mtitle">Edit Record</h2>
    <div id="inj-f">
      <div class="mf"><label>Date</label><input id="ef-date" type="date"></div>
      <div class="mf"><label>Compound</label>
        <select id="ef-cmp"><option value="">— Select —</option>
          <option>NAD+</option><option>LipoMinoMix</option><option>Tesamorelin</option>
          <option>Tirzepatide</option><option>Anavar (Oxandrolone)</option><option>BPC-157</option>
          <option>TB-500</option><option>CJC-1295</option><option>CJC-1295 No DAC</option>
          <option>Ipamorelin</option><option>GHK-Cu</option><option>Retatrutide</option>
          <option>Selank</option><option>DSIP</option><option>KPV</option><option>Semax</option>
          <option>Mots-C</option><option>SS-31</option><option>Epitalon</option>
          <option>Melanotan II (MT2)</option><option>Deca (Nandrolone)</option>
          <option>Testosterone</option><option>Winstrol (Stanozolol)</option><option>Cagrilintide</option>
        </select>
      </div>
      <div class="mf"><label>Dose</label><input id="ef-dose" type="text" placeholder="e.g. 5u, 75u, 200mg"></div>
      <div class="mf"><label>Site</label>
        <select id="ef-site"><option value="">— Select —</option><option>L</option><option>R</option><option>L+R</option><option>Pill</option><option>X</option><option>Nasal</option><option>Abd</option><option>S</option></select>
      </div>
      <div class="mf"><label>Timing</label>
        <select id="ef-time"><option value="">— Select —</option><option>Morning</option><option>Night</option><option>Evening</option><option>Daily</option></select>
      </div>
      <div class="mf"><label>Status</label>
        <select id="ef-stat"><option value="">— Select —</option><option>Todo</option><option>In progress</option><option>Done</option></select>
      </div>
      <div class="mf"><label>Notes</label><textarea id="ef-notes" style="min-height:60px;resize:vertical"></textarea></div>
    </div>
    <div id="wkt-f" style="display:none">
      <div class="mf"><label>Date</label><input id="wf-date" type="date"></div>
      <div class="mf"><label>Exercise</label><input id="wf-ex" type="text"></div>
      <div class="mf"><label>Variation</label><input id="wf-var" type="text"></div>
      <div class="mf"><label>Set #</label><input id="wf-set" type="number" min="1"></div>
      <div class="mf"><label>Reps</label><input id="wf-reps" type="number"></div>
      <div class="mf"><label>Weight (lbs)</label><input id="wf-wt" type="number"></div>
      <div class="mf"><label>Day</label>
        <select id="wf-day"><option value="">— Select —</option><option>Push</option><option>Pull</option><option>Legs</option><option>Arms</option><option>Shoulders</option><option>Cardio</option></select>
      </div>
      <div class="mf"><label>Notes</label><textarea id="wf-notes" style="min-height:60px;resize:vertical"></textarea></div>
    </div>
    <div id="mtbl-lbl"></div>
    <div class="mbtns">
      <button id="msave" onclick="saveRec()">Save</button>
      <button id="mcancel" onclick="closeMdl()">Cancel</button>
      <button id="mdel" onclick="delRec()">Delete</button>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── CONFIG ─────────────────────────────────────────────────────────
const AT_TOK='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const AT_BASE='appmHDG4TGT1xy6R6';
const GCL_ID='478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const GSCOPE='https://www.googleapis.com/auth/drive.readonly';
const PDF_QA='https://mikeblack001.github.io/health-protocol/pdf_qa.html';

// Parseur-Injections
const PAR={
  tbl:'tblCTOGIrF3NjdyTE',
  date:'Date', compound:'Compound', dose:'Dose', timing:'Timing',
  site:'Site', medication:'Medication', location:'Location'
};
// Injection Log
const LOG={
  tbl:'tblBvEaLkGGipnOFc',
  name:'fldt9vYT8Tm37Gf3k', date:'fldhYEtLEGA4VxvvO',
  compound:'fldwVFyizH4mBANBa', site:'fldHDlJY8FpAvK018',
  timing:'fldIdzew4Jd0qO4Uc', dose:'fld8d8mtRapfaIyqL',
  notes:'fldAbczu73mINwLmx', status:'fldD9kegiwk6mINV8'
};
// Workout Sets
const WKT={
  tbl:'tblKDqjy5RzqaJvjr',
  date:'fld75zYXknF0RtCWH', exercise:'fldZ93A1t7fGjjsSS',
  variation:'fld2TZdmCOloH0gAK', setnum:'fldNm9Ao0rmcwwDXo',
  reps:'fldelUngWHRTm48m1', weight:'fldmrbBmfgSMtREMt',
  day:'fldypzlwqw9AzWrEE', notes:'fldfR4vyBtj2VWB2b'
};
const QUICK_INJ=[{n:'📋 Injections PDF',id:'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6',f:false}];
const QUICK_WKT=[{n:'📁 Workouts 2024-25',id:'1eYtQT3c14psKbxRkKtbLoNtiLFEnOFhF',f:true},{n:'📁 Workouts 2025',id:'1VgIqXOQUc5qLzzAaWQ1FQZxIMBAacGP9',f:true}];

const LS={get:k=>localStorage.getItem('mba_'+k),set:(k,v)=>localStorage.setItem('mba_'+k,v)};

let mode='inj', curDate=null, parRecs=[], logRecs=[], parDates=[];
let editId=null, editTbl=null, pdfDoc=null, gTok=null;
window.pg=1; let pg=1;
let pickerFiles=[], pickerStack=[{id:'root',name:'My Drive'}];

// ── AUTH ────────────────────────────────────────────────────────────
function initAuth(){
  if(location.hash&&location.hash.includes('access_token')){
    const p=new URLSearchParams(location.hash.slice(1));
    const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||3600);
    if(tok){gTok=tok;localStorage.setItem('mb_pdfqat',tok);localStorage.setItem('mb_pdfqae',Date.now()+(exp-60)*1000);history.replaceState(null,'',location.pathname);setDriveOK();return;}
  }
  const t=localStorage.getItem('mb_pdfqat'),e=parseInt(localStorage.getItem('mb_pdfqae')||0);
  if(t&&Date.now()<e){gTok=t;setDriveOK();return;}
  setDriveNo();
}
function signIn(){
  sessionStorage.setItem('mb_oauth_return',location.href.split('#')[0]);
  location.href='https://accounts.google.com/o/oauth2/v2/auth?client_id='+encodeURIComponent(GCL_ID)+'&redirect_uri='+encodeURIComponent(PDF_QA)+'&response_type=token&scope='+encodeURIComponent(GSCOPE);
}
function setDriveOK(){const b=document.getElementById('drive-btn');b.textContent='🟢 Drive';b.className='ok';b.onclick=null;autoLoadPDF();}
function setDriveNo(){const b=document.getElementById('drive-btn');b.textContent='🔴 Sign In';b.className='no';b.onclick=signIn;}

// ── PDF ─────────────────────────────────────────────────────────────
async function pdfLoad(){
  const id=document.getElementById('pp-id').value.trim();
  if(!id){pmsg('Enter Drive file ID');return;}
  if(!gTok){signIn();return;}
  pmsg('Loading…');
  try{
    const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+gTok}});
    if(!r.ok){if(r.status===401||r.status===403){localStorage.removeItem('mb_pdfqat');gTok=null;setDriveNo();signIn();}else throw new Error('Drive '+r.status);return;}
    pdfDoc=await pdfjsLib.getDocument({data:await r.arrayBuffer()}).promise;
    window.pg=1; let pg=1;document.getElementById('pp-ph').style.display='none';document.getElementById('pp-canvas').style.display='block';
    await pdfPage(1);LS.set('pdf_'+mode,id);pmsg(pdfDoc.numPages+' pages ✓');
  }catch(e){pmsg('Error: '+e.message);}
}
function pdfLocal(inp){if(!inp.files[0])return;pmsg('Loading…');inp.files[0].arrayBuffer().then(async buf=>{pdfDoc=await pdfjsLib.getDocument({data:buf}).promise;window.pg=1; let pg=1;document.getElementById('pp-ph').style.display='none';document.getElementById('pp-canvas').style.display='block';await pdfPage(1);pmsg(pdfDoc.numPages+' pages ✓');});}
async function pdfPage(n){
  if(!pdfDoc)return;
  n=Math.max(1,Math.min(n,pdfDoc.numPages));
  window.pg=n; pg=n;
  const page=await pdfDoc.getPage(n);
  const canvas=document.getElementById('pp-canvas');
  const area=document.getElementById('pp-area');
  const w=area.clientWidth||460;
  const vp1=page.getViewport({scale:1});
  const scale=w/vp1.width;
  const vp=page.getViewport({scale});
  canvas.width=vp.width;
  canvas.height=vp.height;
  canvas.style.display='block';
  area.scrollTop=0;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('pp-pg').textContent=n+' / '+pdfDoc.numPages;
  document.getElementById('pp-jp').value=n;
  document.getElementById('btn-prev').disabled=(n<=1);
  document.getElementById('btn-next').disabled=(n>=pdfDoc.numPages);
}


function pgGo(n){pdfPage(n);}
function pdfPrev(){if(pdfDoc&&pg>1)pdfPage(pg-1);}
function pdfNext(){if(pdfDoc&&pg<pdfDoc.numPages)pdfPage(pg+1);}
function pmsg(m){document.getElementById('pp-msg').textContent=m;}

// ── AT ───────────────────────────────────────────────────────────────
async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

// Load Parseur dates for dropdown (first load only)
async function loadParDates(){
  setSt('Loading dates…');
  let recs=[],off=null;
  do{
    // Only fetch Date and Compound fields to keep it fast
    const url=PAR.tbl+'?fields%5B%5D=Date&fields%5B%5D=Compound&pageSize=100'+(off?'&offset='+off:'');

async function setDate(date){
  curDate=date;
  document.getElementById('d-sel').value=date;
  setSt('Loading '+date+'…');
  // Load each independently so one failure doesn't block the other
  try{
    parRecs=await loadByDate(PAR.tbl,'Date',date,false);
    document.getElementById('pc').textContent=parRecs.length;
    document.getElementById('b-par').textContent='Parseur: '+parRecs.length;
    document.getElementById('pd-lbl').textContent=date;
    renderPar();
  }catch(e){
    document.getElementById('par-body').innerHTML='<div style="color:#dc2626;padding:16px;font-size:12px">Parseur error: '+e.message+'</div>';
    setSt('Parseur err: '+e.message);
  }
  try{
    logRecs=await loadByDate(LOG.tbl,LOG.date,date,true);
    document.getElementById('lc').textContent=logRecs.length;
    document.getElementById('b-log').textContent='Log: '+logRecs.length;
    document.getElementById('ld-lbl').textContent=date;
    renderLog();
  }catch(e){
    document.getElementById('log-body').innerHTML='<div style="color:#dc2626;padding:16px;font-size:12px">Log error: '+e.message+'</div>';
    setSt('Log err: '+e.message);
  }
  updateBadges();setSt('');
}

async function loadByDate(tbl,dateFld,date,useFieldIds){
  // Use IS_SAME() for AT date field comparison — simple = doesn't work on date fields
  const q=encodeURIComponent('IS_SAME({'+dateFld+'},"'+date+'","day")');
  let recs=[],off=null;
  do{
    let url=tbl+'?filterByFormula='+q+'&pageSize=100'+(off?'&offset='+off:'');
    if(useFieldIds) url+='&returnFieldsByFieldId=true';
    const d=await atFetch(url);
    if(!d.records) throw new Error(JSON.stringify(d).substring(0,200));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  return recs;
}

async function reloadBoth(){if(curDate)await setDate(curDate);}

// ── RENDER ───────────────────────────────────────────────────────────
function renderPar(){
  const b=document.getElementById('par-body');
  if(!parRecs.length){b.innerHTML='<div class="cempty">No Parseur records for '+curDate+'</div>';return;}
  b.innerHTML=parRecs.map(r=>parCard(r)).join('');
}

function parCard(r){
  const f=r.fields;
  const cmp=f[PAR.compound]||f[PAR.medication]||'?';
  const dose=f[PAR.dose]||'';
  const timing=f[PAR.timing]||'';
  const site=f[PAR.site]||'';
  // Check match against log
  const logMatch=logRecs.find(l=>l.fields[LOG.compound]===cmp);
  const st=!logMatch?'only':matchesLog(cmp,dose,site,timing)?'match':'diff';
  const tag=st==='match'?['✓ In Log','tm']:st==='diff'?['⚠ Diff','td']:['Not in Log','te'];
  const dh=st==='diff'?diffHtml(cmp,dose,site,timing):'';
  return`<div class="card ${st}">
    <div class="ch">
      <span class="cn">${esc(cmp)}</span>
      ${dose?`<span class="pill pd">${esc(dose)}</span>`:''}
      ${timing?`<span class="pill pt">${esc(timing)}</span>`:''}
      ${site?`<span class="pill ps">${esc(site)}</span>`:''}
      <span style="font-size:10px;color:#9ca3af;margin-left:2px">${r.fields[PAR.date]||'no date'}</span>
      <span class="mtag ${tag[1]}">${tag[0]}</span>
    </div>
    ${dh}
    <div class="cbtns">
      <button class="cbtn ce" onclick="openEdit('par','${r.id}')">✎ Edit</button>
      ${st!=='match'?`<button class="cbtn ca" onclick="copyOneToLog('${r.id}')">→ Copy to Log</button>`:''}
      <button class="cbtn cd" onclick="confirmDel('par','${r.id}')">✕ Delete</button>
    </div>
  </div>`;
}

function renderLog(){
  const b=document.getElementById('log-body');
  if(!logRecs.length){b.innerHTML='<div class="cempty">No Log records for '+curDate+'</div>';return;}
  b.innerHTML=logRecs.map(r=>logCard(r)).join('');
}

function logCard(r){
  const f=r.fields;
  const cmp=f[LOG.compound]||'?';
  const dose=f[LOG.dose]||'';
  const timing=f[LOG.timing]||'';
  const site=f[LOG.site]||'';
  const stat=f[LOG.status]||'';
  const notes=f[LOG.notes]||'';
  const inPar=parRecs.some(p=>(p.fields[PAR.compound]||p.fields[PAR.medication]||'')===cmp);
  return`<div class="card ${inPar?'match':'only'}">
    <div class="ch">
      <span class="cn">${esc(cmp)}</span>
      ${dose?`<span class="pill pd">${esc(dose)}</span>`:''}
      ${timing?`<span class="pill pt">${esc(timing)}</span>`:''}
      ${site?`<span class="pill ps">${esc(site)}</span>`:''}
      ${stat?`<span class="pill ${stat==='Done'?'pk':'pn'}">${esc(stat)}</span>`:''}
      <span style="font-size:10px;color:#9ca3af;margin-left:2px">${f[LOG.date]||'no date'}</span>
      <span class="mtag ${inPar?'tm':'te'}">${inPar?'✓ Confirmed':'Log Only'}</span>
    </div>
    ${notes?`<div style="font-size:11px;color:#9ca3af;margin-top:3px;font-style:italic">${esc(notes)}</div>`:''}
    <div class="cbtns">
      <button class="cbtn ce" onclick="openEdit('log','${r.id}')">✎ Edit</button>
      <button class="cbtn cd" onclick="confirmDel('log','${r.id}')">✕</button>
    </div>
  </div>`;
}

function matchesLog(cmp,dose,site,timing){
  const m=logRecs.find(l=>l.fields[LOG.compound]===cmp);
  if(!m)return false;
  const f=m.fields;
  return(!dose||f[LOG.dose]===dose)&&(!site||f[LOG.site]===site)&&(!timing||f[LOG.timing]===timing);
}

function diffHtml(cmp,dose,site,timing){
  const m=logRecs.find(l=>l.fields[LOG.compound]===cmp);if(!m)return'';
  const f=m.fields;let h='';
  // Normalize dose for comparison: strip spaces, lowercase units
  const normDose=d=>String(d||'').replace(/\s+/g,'').toLowerCase().replace('units','u').replace('unit','u').replace('ml','ml');
  if(dose&&normDose(f[LOG.dose])!==normDose(dose))h+=`<div class="dr">Dose: <span class="old">${f[LOG.dose]||'—'}</span><span class="nw">${dose}</span></div>`;
  // Only show site diff if both have meaningful values
  const normSite=s=>String(s||'').trim().toUpperCase();
  if(site&&site!=='X'&&normSite(f[LOG.site])!==normSite(site))h+=`<div class="dr">Site: <span class="old">${f[LOG.site]||'—'}</span><span class="nw">${site}</span></div>`;
  // Skip timing diff — PDF doesn't indicate AM/PM
  return h;
}

function updateBadges(){
  let ok=0,df=0,ms=0;
  parRecs.forEach(r=>{
    const f=r.fields;
    const cmp=f[PAR.compound]||f[PAR.medication]||'';
    const st=!logRecs.find(l=>l.fields[LOG.compound]===cmp)?'ms':matchesLog(cmp,f[PAR.dose]||'',f[PAR.site]||'',f[PAR.timing]||'')?'ok':'df';
    if(st==='ok')ok++;else if(st==='df')df++;else ms++;
  });
  document.getElementById('b-ok').textContent='✓ '+ok;
  document.getElementById('b-df').textContent='⚠ '+df;
  document.getElementById('b-ms').textContent='✗ '+ms;
}

// ── COPY PARSEUR → LOG ───────────────────────────────────────────────
async function copyOneToLog(parId){
  const r=parRecs.find(x=>x.id===parId);if(!r)return;
  setSt('Copying…');
  try{
    const f=r.fields;
    const cmp=f[PAR.compound]||'';
    const fields={};
    if(curDate)fields[LOG.date]=curDate;
    if(cmp){fields[LOG.compound]=cmp;fields[LOG.name]=cmp;}
    if(f[PAR.dose])fields[LOG.dose]=f[PAR.dose];
    if(f[PAR.site]&&['L','R','Pill','X','Nasal','Abd','S'].includes(f[PAR.site]))fields[LOG.site]=f[PAR.site];
    if(f[PAR.timing])fields[LOG.timing]=f[PAR.timing];
    await atFetch(LOG.tbl,{method:'POST',body:JSON.stringify({fields})});
    await setDate(curDate);setSt('✓ Copied to Log');
  }catch(e){setSt('Error: '+e.message);}
}

async function copyToLog(){
  const missing=parRecs.filter(r=>{
    const cmp=r.fields[PAR.compound]||r.fields[PAR.medication]||'';
    return!logRecs.find(l=>l.fields[LOG.compound]===cmp);
  });
  if(!missing.length){alert('All Parseur records already in Log');return;}
  if(!confirm('Copy '+missing.length+' missing records to Injection Log?'))return;
  setSt('Copying '+missing.length+'…');
  try{
    for(const r of missing)await copyOneToLog(r.id);
    setSt('✓ Copied '+missing.length);
  }catch(e){setSt('Error: '+e.message);}
}

async function saveRec(){
  const date=document.getElementById('ef-date').value;if(!date){alert('Date required');return;}
  const cmp=document.getElementById('ef-cmp').value;
  const dose=document.getElementById('ef-dose').value;
  const site=document.getElementById('ef-site').value;
  const timing=document.getElementById('ef-time').value;
  const stat=document.getElementById('ef-stat').value;
  const notes=document.getElementById('ef-notes').value;
  let fields={},tbl;
  if(editTbl==='par'){
    tbl=PAR.tbl;
    fields[PAR.date]=date;
    if(cmp)fields[PAR.compound]=cmp;
    if(dose)fields[PAR.dose]=dose;
    if(site)fields[PAR.site]=site;
    if(timing)fields[PAR.timing]=timing;
  } else {
    tbl=LOG.tbl;
    fields[LOG.date]=date;
    if(cmp){fields[LOG.compound]=cmp;fields[LOG.name]=cmp;}
    if(dose)fields[LOG.dose]=dose;
    if(site)fields[LOG.site]=site;
    if(timing)fields[LOG.timing]=timing;
    if(stat)fields[LOG.status]=stat;
    if(notes)fields[LOG.notes]=notes;
  }
  setSt('Saving…');
  try{
    if(editId) await atFetch(tbl+'/'+editId,{method:'PATCH',body:JSON.stringify({fields})});
    else await atFetch(tbl,{method:'POST',body:JSON.stringify({fields})});
    closeMdl();await setDate(curDate);setSt('✓ Saved');
  }catch(e){alert('Save failed: '+e.message);setSt('err');}
}

async function delRec(){
  if(!editId||!confirm('Delete this record?'))return;
  const tbl=editTbl==='par'?PAR.tbl:LOG.tbl;
  setSt('Deleting…');
  try{
    await atFetch(tbl+'/'+editId,{method:'DELETE'});
    closeMdl();await setDate(curDate);setSt('✓ Deleted');
  }catch(e){setSt('err: '+e.message);}
}

async function confirmDel(tbl,id){
  if(!confirm('Delete?'))return;
  const table=tbl==='par'?PAR.tbl:LOG.tbl;
  setSt('Deleting…');
  try{
    await atFetch(table+'/'+id,{method:'DELETE'});
    await setDate(curDate);setSt('✓ Deleted');
  }catch(e){setSt('err: '+e.message);}
}

async function loadFolder(fid){

    const pq=fid==='root'?"'root' in parents":"'"+fid+"' in parents";

    const q=encodeURIComponent(pq+' and trashed=false and ('+mf+')');
    const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime,size,mimeType)&orderBy=folder,name&pageSize=50',{headers:{Authorization:'Bearer '+gTok}});

async function popTo(i){pickerStack=pickerStack.slice(0,i+1);document.getElementById('dp-qi').value='';await loadFolder(pickerStack[i].id);}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">No files</div>';return;}
  window._dpf=files;
  el.innerHTML=files.map((f,i)=>{
    const isF=f.mimeType==='application/vnd.google-apps.folder';
    const icon=isF?'📁':'📄';
    const dt=f.modifiedTime?new Date(f.modifiedTime).toLocaleDateString():'';
    const sz=(!isF&&f.size)?Math.round(f.size/1024)+'KB':'';
    return`<div class="dpi${isF?' dpf':''}" onclick="dpClick(${i})">
      <div style="font-size:18px;flex-shrink:0">${icon}</div>
      <div style="flex:1;min-width:0"><div class="dpi-name">${esc(f.name)}</div><div class="dpi-meta">${dt}${sz?' · '+sz:''}</div></div>
      ${isF?'<span style="color:#9ca3af">›</span>':`<button class="dp-sel" onclick="event.stopPropagation();dpClick(${i})">Select</button>`}
    </div>`;
  }).join('');
}
function dpClick(i){
  const f=window._dpf[i];if(!f)return;
  if(f.mimeType==='application/vnd.google-apps.folder'){navFolder(f.id,f.name);return;}
  closePicker();document.getElementById('pp-id').value=f.id;LS.set('pdf_'+mode,f.id);pdfLoad();
}

async function deleteBlankDates(){
  setSt('Loading — scanning for blank dates…');
  // Load all records with Date + Compound + Medication fields so user can see what will be deleted
  let recs=[],off=null;
  do{
    const d=await atFetch(PAR.tbl+'?fields%5B%5D=Date&fields%5B%5D=Compound&fields%5B%5D=Medication&pageSize=100'+(off?'&offset='+off:''));
    recs=recs.concat(d.records);off=d.offset;
  }while(off);
  const noDates=recs.filter(r=>!r.fields['Date']||String(r.fields['Date']).trim()==='');
  setSt('');
  if(!noDates.length){alert('No blank-date records found — nothing to delete.');return;}

  // Show preview of exactly what will be deleted
  const preview=noDates.slice(0,20).map(r=>{
    const cmp=r.fields['Compound']||r.fields['Medication']||'(no compound)';
    return '  • '+cmp+' ['+r.id+']';
  }).join('\n');
  const more=noDates.length>20?' \n  ...and '+(noDates.length-20)+' more':'';

  const confirmed=confirm(
    'PREVIEW — '+noDates.length+' records with NO DATE will be deleted:\n\n'+
    preview+more+
    '\n\n'+'These records have a blank Date field. All other records are safe.\n\nProceed?'
  );
  if(!confirmed)return;

  setSt('Deleting '+noDates.length+'…');
  let done=0;
  for(let i=0;i<noDates.length;i+=10){
    const batch=noDates.slice(i,i+10);
    const qs=batch.map(r=>'records%5B%5D='+r.id).join('&');
    try{
      await atFetch(PAR.tbl+'?'+qs,{method:'DELETE'});
      done+=batch.length;
    }catch(e){setSt('Error at batch '+i+': '+e.message);return;}
    setSt('Deleted '+done+' / '+noDates.length+'…');
    await new Promise(r=>setTimeout(r,200));
  }
  setSt('✓ Deleted '+done+' blank-date records');
  await loadParDates();
  // Jump to first available date
  if(parDates.length) setDate(parDates[0]);
}

window.onload=()=>{
  initAuth();
  document.getElementById('pp-id').value=LS.get('pdf_inj')||'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6';
  loadParDates();
};
</script>
