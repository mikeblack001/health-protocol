    const ratio=Math.min(1,maxW/canvas.width);
    tmp.width=Math.round(canvas.width*ratio);
    tmp.height=Math.round(canvas.height*ratio);
    tmp.getContext('2d').drawImage(canvas,0,0,tmp.width,tmp.height);
    const b64=tmp.toDataURL('image/jpeg',0.80).split(',')[1];

    const resp=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTH_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:1200,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:`This is a handwritten injection log page. Extract every injection record you can see.
Return ONLY a JSON array, no other text. Each object: {"compound":"name","date":"YYYY-MM-DD","site":"L or R or S or X","timing":"Morning or Night or Daily"}.
Rules:
- date: derive from any date visible on the page (column headers, row labels, or written dates). Use YYYY-MM-DD format.
- site: L=left, R=right, S=subcutaneous/sub-q/stomach, X=taken/oral/done. If unclear use "X".
- timing: Morning or Night. If unclear use "Morning".
- compound: match exactly to one of these known compounds if possible: ${CMPS.join(', ')}.
- Only include rows where you can see a clear checkmark, X, date entry, or site mark.
- If no injections are visible, return [].
Example: [{"compound":"Testosterone","date":"2025-06-01","site":"L","timing":"Morning"}]`}
        ]}]
      })
    });
    const data=await resp.json();
    const txt=(data.content?.[0]?.text||'').trim();
    let records=[];
    try{
      // Strip any markdown fences
      const clean=txt.replace(/^```[a-z]*
?/,'').replace(/```$/,'').trim();
      records=JSON.parse(clean);
    }catch(e){setSt('⚠ Scan parse error');scanInProgress=false;return;}

    if(!Array.isArray(records)||!records.length){setSt('🔍 No injections found on page');scanInProgress=false;return;}

    // Filter to valid records only
    const validSites=['L','R','S','X'];
    const validTimings=['Morning','Night','Evening','Daily'];
    records=records.filter(r=>r.compound&&r.date&&r.date.match(/^\d{4}-\d{2}-\d{2}$/));

    setSt('🔍 Found '+records.length+' records, checking AT…');

    // For each unique date in results, fetch existing AT records to avoid duplicates
    const dates=[...new Set(records.map(r=>r.date))];
    const existing={};
    for(const d of dates){
      const q=encodeURIComponent('IS_SAME({'+LOG.date+'},"'+d+'","day")');
      const flds=[LOG.compound,LOG.site,LOG.timing].map(f=>'fields%5B%5D='+f).join('&');
      try{
        const res=await atFetch(LOG.tbl+'?filterByFormula='+q+'&returnFieldsByFieldId=true&'+flds+'&pageSize=100');
        (res.records||[]).forEach(r=>{
          const c=r.fields[LOG.compound]||'';
          const s=r.fields[LOG.site]||'';
          const t=r.fields[LOG.timing]||'';
          existing[d+'||'+c+'||'+t]=true;
        });
      }catch(e){}
    }

    // Create only missing records
    const toCreate=records.filter(r=>{
      const key=r.date+'||'+r.compound+'||'+(r.timing||'');
      return !existing[key];
    });

    if(!toCreate.length){setSt('✓ Scan complete — all records already in AT');scanInProgress=false;return;}

    // Push in batches of 10
    let created=0;
    for(let i=0;i<toCreate.length;i+=10){
      const batch=toCreate.slice(i,i+10).map(r=>{
        const fields={};
        fields[LOG.date]=r.date;
        fields[LOG.compound]=r.compound;
        fields[LOG.name]=r.compound;
        if(r.site&&validSites.includes(r.site))fields[LOG.site]=r.site;
        if(r.timing&&validTimings.includes(r.timing))fields[LOG.timing]=r.timing;
        return {fields};
      });
      await atFetch(LOG.tbl+'?returnFieldsByFieldId=true',{method:'POST',body:JSON.stringify({records:batch,typecast:true})});
      created+=batch.length;
    }

    setSt('✓ Scan: added '+created+' record'+(created!==1?'s':'')+' to AT');
    // Reload current date view if any created records match curDate
    if(toCreate.some(r=>r.date===curDate)){
      await reloadLog();
      loadWeekGrid(curDate);
    }
  }catch(e){setSt('⚠ Scan error: '+e.message);}
  scanInProgress=false;
}

function getWkDates(dateStr){
  // Parse date parts directly to avoid timezone issues
  const [yr,mo,dy]=dateStr.split('-').map(Number);
  const d=new Date(yr,mo-1,dy);
  const dow=d.getDay(); // 0=Sun,1=Mon...6=Sat
  const diff=(dow+6)%7; // days back to Monday
  const mon=new Date(yr,mo-1,dy-diff);
  return Array.from({length:7},(_,i)=>{
    const dd=new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+i);
    return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
  });
}
function getWeekMon(dateStr){
  if(!dateStr)return '';
  const [yr,mo,dy]=dateStr.split('-').map(Number);
  const d=new Date(yr,mo-1,dy);
  const diff=(d.getDay()+6)%7;
  const mon=new Date(yr,mo-1,dy-diff);
  return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
}
function getRowOrder(dateStr){
  const key='row_order_'+(getWeekMon(dateStr||curDate)||'global');
  try{return JSON.parse(LS.get(key)||'[]');}catch(e){return [];}
}
function saveRowOrder(arr, dateStr){
  const key='row_order_'+(getWeekMon(dateStr||curDate)||'global');
  LS.set(key,JSON.stringify(arr));
}
function siteColor(s){
  const m={'L':{bg:'#dbeafe',fg:'#1d4ed8'},'R':{bg:'#fef9c3',fg:'#92400e'},'S':{bg:'#fce7f3',fg:'#be185d'},'X':{bg:'#d1fae5',fg:'#065f46'}};
  return m[s]||{bg:'#f3f4f6',fg:'#374151'};
}

async function loadWeekGrid(date){
  const wg=document.getElementById('wgrid'),ws=document.getElementById('wg-status');
  if(!wg)return;
  const days=getWkDates(date);
  ws.textContent='Loading…';
  const orParts=days.map(d=>`IS_SAME({${LOG.date}},"${d}","day")`).join(',');
  const q=encodeURIComponent(`OR(${orParts})`);
  const flds=[LOG.date,LOG.compound,LOG.site,LOG.timing,LOG.dose,LOG.verified].map(f=>'fields%5B%5D='+f).join('&');
  let recs=[],off=null;
  try{
    do{
      const d=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true&filterByFormula='+q+'&'+flds+'&pageSize=100'+(off?'&offset='+off:''));
      recs=recs.concat(d.records);off=d.offset;
    }while(off);
  }catch(e){wg.innerHTML=`<tr><td style="color:#dc2626;padding:8px">Grid error: ${e.message}</td></tr>`;ws.textContent='';return;}

  // Build compound+timing lookup — each unique compound+timing gets its own row
  const data={};  // key = "CJC-1295 No DAC||Night"
  const keyOrder=[];
  recs.forEach(r=>{
    const f=r.fields,cmp=f[LOG.compound]||'',day=(f[LOG.date]||'').slice(0,10),site=f[LOG.site]||'',timing=f[LOG.timing]||'';
    if(!cmp||!day)return;
    if((cmp||'').toLowerCase().trim()==='week note')return;
    const key=cmp+'||'+timing;
    // Also track by compound-only key for grouping same compound different timings
    if(!data[key]){data[key]={cmp,timing,days:{}};keyOrder.push(key);}
    if(!data[key].days[day])data[key].days[day]={sites:[],doses:[],n:0};
    data[key].days[day].n++;
    if(site)data[key].days[day].sites.push(site);
    const dose=f[LOG.dose]||'';if(dose)data[key].days[day].doses.push(dose);

  });

  // Apply saved order — only use keys that exist in actual data this week
  const saved=getRowOrder(date).filter(s=>keyOrder.includes(s)||keyOrder.some(k=>k.startsWith(s+'||')));
  const allKeys=keyOrder;
  const orderedKeys=[];
  saved.forEach(s=>{
    if(allKeys.includes(s)){if(!orderedKeys.includes(s))orderedKeys.push(s);}
    else{allKeys.filter(k=>k.startsWith(s+'||')).forEach(k=>{if(!orderedKeys.includes(k))orderedKeys.push(k);});}
  });
  allKeys.forEach(k=>{if(!orderedKeys.includes(k))orderedKeys.push(k);});

  // Build table
  const DN=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h=`<thead><tr><th>Compound</th>`;
  days.forEach((d,i)=>{
    const today=d===date;
    h+=`<th class="wg-day${today?' wg-today':''}" onclick="setDate('${d}')" title="${d}">${DN[i]}<br><span style="font-size:9px;opacity:.8">${d.slice(5)}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;

  orderedKeys.forEach(key=>{
    const {cmp,timing,days:dayMap}=data[key];
    const badge=timing?`<span style="font-size:9px;font-weight:600;color:#9ca3af;margin-left:4px">${timing.slice(0,3).toUpperCase()}</span>`:'';
    const firstDose=Object.values(dayMap).flatMap(d=>d.doses||[]).find(d=>d)||'';
    const doseBadge=firstDose?`<span style="font-size:9px;font-weight:600;color:#2563eb;margin-left:4px">${esc(firstDose)}</span>`:'';
    h+=`<tr data-cmp="${esc(cmp)}" data-key="${esc(key)}"><td><span class="drag-handle">⠿</span>${esc(cmp)}${doseBadge}${badge}</td>`;
    days.forEach(d=>{
      const cell=dayMap[d];
      const onclick=`onclick="gridCellClick('${d}','${esc(cmp)}','${esc(timing)}')"`;
      if(!cell||!cell.n){h+=`<td ${onclick} style="cursor:pointer"></td>`;}
      else{
        const siteVal=cell.sites.length?cell.sites[0]:'X';
        const sc=siteColor(siteVal);
        h+=`<td ${onclick} style="cursor:pointer;background:${sc.bg};color:${sc.fg};font-weight:800;font-size:11px">${esc(siteVal)}</td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody>`;
  wg.innerHTML=h;
  ws.textContent=orderedKeys.length+' compounds';
  // Update Verify Week button color based on week verification status
  const wBtn=document.getElementById('verify-week-btn');
  if(wBtn){
    const totalRecs=recs.length;
    const verifiedRecs=recs.filter(r=>r.fields[LOG.verified]===true).length;
    const weekDone=totalRecs>0&&verifiedRecs===totalRecs;
    wBtn.style.background=weekDone?'#16a34a':'#eab308';
    wBtn.style.borderColor=weekDone?'#16a34a':'#eab308';
    wBtn.textContent=weekDone?'✓ Week Verified':'✓ Verify Week';
  }
  initGridDrag();
  renderRecordsOrdered(orderedKeys);
}

function initGridDrag(){
  const tbody=document.querySelector('#wgrid tbody');
  if(!tbody)return;
  let src=null,lastOver=null;

  tbody.addEventListener('mousedown',e=>{
    const row=e.target.closest('tr[data-key]');
    if(!row)return;
    src=row;
    row.classList.add('wg-dragging');
    document.body.style.userSelect='none';
  });

  tbody.addEventListener('mouseover',e=>{
    if(!src)return;
    const target=e.target.closest('tr[data-key]');
    if(target===lastOver)return;
    if(lastOver)lastOver.classList.remove('wg-drop-above');
    lastOver=null;
    if(!target||target===src)return;
    target.classList.add('wg-drop-above');
    lastOver=target;
  });

  document.addEventListener('mouseup',e=>{
    if(!src)return;
    const target=e.target.closest('tr[data-key]');
    tbody.querySelectorAll('.wg-dragging').forEach(r=>r.classList.remove('wg-dragging'));
    tbody.querySelectorAll('.wg-drop-above').forEach(r=>r.classList.remove('wg-drop-above'));
    document.body.style.userSelect='';
    lastOver=null;
    if(target&&target!==src){
      const rows=[...tbody.querySelectorAll('tr[data-key]')];
      if(rows.indexOf(target)>rows.indexOf(src))tbody.insertBefore(src,target.nextSibling);
      else tbody.insertBefore(src,target);
      const visibleOrder=[...tbody.querySelectorAll('tr[data-key]')].map(r=>r.dataset.key);
      saveRowOrder(visibleOrder, curDate);
      renderRecordsOrdered(visibleOrder);
      saveRowOrderToAT(visibleOrder, curDate);
    }
    src=null;
  });
}


async function saveRowOrderToAT(orderedKeys, weekDate) {
  const useDate = weekDate || curDate;
  if (!useDate) return;
  try {
    const compoundOrder = {};
    orderedKeys.forEach((key, idx) => {
      const compound = key.split('||')[0];
      if (compound && compound !== 'Week Note' && (!compoundOrder[compound] || idx < compoundOrder[compound])) {
        compoundOrder[compound] = idx + 1;
      }
    });
    const days = getWkDates(useDate);
    const orParts = days.map(d => `IS_SAME({${LOG.date}},"${d}","day")`).join(',');
    const url = `https://api.airtable.com/v0/${AT_BASE}/${LOG.tbl}?filterByFormula=OR(${encodeURIComponent(orParts)})&fields[]=Compound&fields[]=fldoGvhlbs8oHCRjP&pageSize=100`;
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${AT_TOK}` } });
    const data = await resp.json();
    const updates = [];
    (data.records || []).forEach(r => {
      const c = Array.isArray(r.fields['Compound']) ? r.fields['Compound'][0] : r.fields['Compound'];
      if (c && compoundOrder[c] !== undefined) {
        updates.push({ id: r.id, fields: { 'fldoGvhlbs8oHCRjP': compoundOrder[c] } });
      }
    });
    for (let i = 0; i < updates.length; i += 10) {
      await fetch(`https://api.airtable.com/v0/${AT_BASE}/${LOG.tbl}`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${AT_TOK}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ records: updates.slice(i, i + 10) })
      });
    }
  } catch(e) { console.error('saveRowOrderToAT failed:', e); }
}

async function verifyWeek(){
  if(!curDate){setSt('Select a date first');return;}
  const days=getWkDates(curDate);
  setSt('Verifying week…');
  // Fetch all unverified records for the week
  const orParts=days.map(d=>`IS_SAME({${LOG.date}},"${d}","day")`).join(',');
  const q=encodeURIComponent(`AND(OR(${orParts}),{${LOG.verified}}=FALSE())`);
  let recs=[],off=null;
  try{
    do{
      const d=await atFetch(LOG.tbl+'?filterByFormula='+q+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));
      recs=recs.concat(d.records);off=d.offset;
    }while(off);
    if(!recs.length){setSt('Week already verified');return;}
    // Patch in batches of 10
    for(let i=0;i<recs.length;i+=10){
      const batch=recs.slice(i,i+10).map(r=>({id:r.id,fields:{[LOG.verified]:true}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records:batch,returnFieldsByFieldId:true})});
    }
    setSt('✓ Week verified ('+recs.length+' records)');
    // Flash verify week button green then back to yellow
    const wBtn=document.getElementById('verify-week-btn');
    if(wBtn){wBtn.style.background='#16a34a';wBtn.style.borderColor='#16a34a';wBtn.textContent='✓ Verified!';}
    // Jump to first date after this week that has unverified records
    const lastDayOfWeek=days[days.length-1];
    const nextDate=allDates.find(d=>d>lastDayOfWeek);
    if(nextDate)setTimeout(()=>setDate(nextDate),1200);
    else await setDate(curDate);
  }catch(e){setSt('Error: '+e.message);}
}

let cmDate=null,cmCmp=null;
async function gridCellClick(date,cmp,timing=''){
  // Navigate to date if different, then scroll to compound in records
  if(date!==curDate){
    await setDate(date);
  }
  // Scroll to and highlight the matching card — match by compound+timing
  const cards=[...document.querySelectorAll('.card')];
  let found=cards.find(card=>{
    const sel=card.querySelector('select.fe-compound');
    const tim=card.querySelector('select.fe-timing');
    return sel&&sel.value===cmp&&(!timing||(tim&&tim.value===timing));
  });
  // No fallback — require compound+timing match to avoid wrong card
  if(found){
    document.querySelectorAll('.card').forEach(card=>card.style.outline='');
    found.scrollIntoView({behavior:'smooth',block:'center'});
    found.style.outline='3px solid #2563eb';
    window._highlightedCard={cmp,timing};
  } else {
    // Compound not in records — open add modal, pre-fill from most recent record
    cmDate=date;cmCmp=cmp;
    document.getElementById('cm-title').textContent=cmp+' — '+date;
    document.getElementById('cm-dose').value='';
    document.getElementById('cm-site').selectedIndex=0;
    document.getElementById('cm-timing').selectedIndex=0;
    document.getElementById('cm-existing').innerHTML='<i>Loading…</i>';
    document.getElementById('cm').style.display='flex';
    // Fetch most recent record specifically for this compound
    try{
      // Use {Compound}="name" — standard AT formula with actual field name
      // Filter to records BEFORE curDate so we get the last used dose for this date context
      const beforeFilter=encodeURIComponent('AND({Compound}="'+cmp+'",IS_BEFORE({Date},"'+cmDate+'"))');
      const d=await atFetch(LOG.tbl+'?filterByFormula='+beforeFilter+'&sort%5B0%5D%5Bfield%5D='+LOG.date+'&sort%5B0%5D%5Bdirection%5D=desc&returnFieldsByFieldId=true&pageSize=1');
      const rec=d.records?.[0];
      if(rec){
        const f=rec.fields;
        const fromDate=(f[LOG.date]||'').slice(0,10);
        if(f[LOG.dose])document.getElementById('cm-dose').value=f[LOG.dose];
        const site=f[LOG.site]||'';
        const siteEl=document.getElementById('cm-site');
        [...siteEl.options].forEach((o,i)=>{if(o.value===site||o.text===site)siteEl.selectedIndex=i;});
        const timing=f[LOG.timing]||'';
        const timingEl=document.getElementById('cm-timing');
        [...timingEl.options].forEach((o,i)=>{if(o.value===timing||o.text===timing)timingEl.selectedIndex=i;});
        document.getElementById('cm-existing').innerHTML=`<i>From ${fromDate} — update if dose changed</i>`;
      } else {
        document.getElementById('cm-existing').innerHTML='<i>No prior records found</i>';
      }
    }catch(e){document.getElementById('cm-existing').innerHTML='<i>No records for this compound on this date</i>';}
  }
}

async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

async function loadDates(){
  setSt('Loading dates…');
  const flds='fields%5B%5D='+LOG.date+'&fields%5B%5D='+LOG.verified;
  let recs=[],off=null;
  do{const d=await atFetch(LOG.tbl+'?'+flds+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
  allDates=[...new Set(recs.map(r=>r.fields[LOG.date]).filter(Boolean))].sort();
  document.getElementById('d-cnt').textContent=allDates.length+' dates';
  buildDateSel();
  buildWeekSel();
  setSt('');
  if(!allDates.length)return;
  // Group by date, check if ALL records per date are verified
  const byDate={};
  recs.forEach(r=>{
    const dt=r.fields[LOG.date];if(!dt)return;
    if(!byDate[dt])byDate[dt]={total:0,verified:0};
    byDate[dt].total++;
    if(r.fields[LOG.verified]===true)byDate[dt].verified++;
  });
  // Find last verified date, then jump to next unverified
  let target=allDates[0];
  for(let i=0;i<allDates.length;i++){
    const s=byDate[allDates[i]];
    if(s&&s.total>0&&s.verified===s.total){
      // This date fully verified — target is the next one
      if(i+1<allDates.length)target=allDates[i+1];
      else target=allDates[i]; // all done
    } else {
      // First unverified date after the verified run
      target=allDates[i];break;
    }
  }
  setSt('↳ '+target);
  setDate(target);
}

function buildDateSel(){
  const sel=document.getElementById('d-sel');
  sel.innerHTML='<option value="">— Select Date —</option>';
  allDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  if(curDate)sel.value=curDate;
}
function selDate(){const d=document.getElementById('d-sel').value;if(d)setDate(d);}

function buildWeekSel(){
  const sel=document.getElementById('w-sel');
  sel.innerHTML='<option value="">— Week —</option>';
  // Build unique weeks from allDates
  const seen=new Set();
  allDates.forEach(d=>{
    const dt=new Date(d+'T12:00:00'),dow=dt.getDay();
    const mon=new Date(dt);mon.setDate(dt.getDate()-((dow+6)%7));
    const monISO=mon.toISOString().slice(0,10);
    if(!seen.has(monISO)){
      seen.add(monISO);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      const fmt=d=>`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
      const o=document.createElement('option');
      o.value=monISO;
      o.textContent=`${fmt(mon)} – ${fmt(sun)}`;
      sel.appendChild(o);
    }
  });
}

function autoSlash(el){
  let v=el.value.replace(/\D/g,'').slice(0,8);
  if(v.length>4)v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
  el.value=v;
}
function jumpToDate(date){
  if(!date)return;
  let iso=date.trim();
  // Accept MM/DD/YYYY → convert to YYYY-MM-DD
  const m=iso.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m)iso=m[3]+'-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)){setSt('Use MM/DD/YYYY');return;}
  setDate(iso);
  document.getElementById('w-date').value='';
}
function selWeek(){
  const monISO=document.getElementById('w-sel').value;
  if(!monISO)return;
  // Find first date in allDates that falls in this week
  const mon=new Date(monISO+'T12:00:00');
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const target=allDates.find(d=>{const dt=new Date(d+'T12:00:00');return dt>=mon&&dt<=sun;});
  if(target)setDate(target);
}
function navD(dir){
  if(!allDates.length)return;
  const i=curDate?allDates.indexOf(curDate):-1;
  const d=allDates[Math.max(0,Math.min(allDates.length-1,i+dir))];
  if(d)setDate(d);
}
function navW(dir){
  const sel=document.getElementById('w-sel');
  const opts=[...sel.options].filter(o=>o.value);
  if(!opts.length)return;
  const cur=sel.value;
  const i=opts.findIndex(o=>o.value===cur);
  const next=opts[Math.max(0,Math.min(opts.length-1,i+dir))];
  if(next){sel.value=next.value;selWeek();}
}

async function setDate(date){
  curDate=date;
  document.getElementById('d-sel').value=date;
  // Sync week select to current date's week
  const _dt=new Date(date+'T12:00:00'),_dow=_dt.getDay();
  const _mon=new Date(_dt);_mon.setDate(_dt.getDate()-((_dow+6)%7));
  document.getElementById('w-sel').value=_mon.toISOString().slice(0,10);
  setSt('Loading…');
  try{
    const q=encodeURIComponent('IS_SAME({'+LOG.date+'},"'+date+'","day")');
    let recs=[],off=null;
    do{const d=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true&filterByFormula='+q+'&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
    logRecs=recs;
    document.getElementById('b-total').textContent=recs.length+' records';
    loadWeekGrid(date);
    // Check if all records are verified
    const allVerified=recs.length>0&&recs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allVerified);
    renderRecords();setSt('');
  }catch(e){setSt('Error: '+e.message);}
}

async function reloadLog(){if(curDate)await setDate(curDate);}

// Date-level verification — stores one checkbox per date using Injection Verified field
// We mark ALL records for the date as verified (or unverified) at once
let dateVerified=false;

function updateVerifyBtn(verified){
  dateVerified=verified;
  const btn=document.getElementById('verify-date-btn');
  if(!btn)return;
  if(verified){btn.textContent='✓ Date Verified';btn.style.background='#15803d';btn.style.borderColor='#15803d';}
  else{btn.textContent='○ Mark Date Verified';btn.style.background='#eab308';btn.style.borderColor='#eab308';}
}

async function toggleDateVerified(){
  if(!logRecs.length){setSt('No records to verify');return;}
  const newVal=!dateVerified;
  setSt('Saving…');
  try{
    // Update all records for this date
    for(let i=0;i<logRecs.length;i+=10){
      const batch=logRecs.slice(i,i+10);
      const records=batch.map(r=>({id:r.id,fields:{[LOG.verified]:newVal}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records,returnFieldsByFieldId:true})});
    }
    logRecs.forEach(r=>r.fields[LOG.verified]=newVal);
    updateVerifyBtn(newVal);
    setSt(newVal?'✓ Date verified':'✓ Date unverified');
    // Auto-advance to next date when marking verified
    if(newVal){
      const i=allDates.indexOf(curDate);
      if(i>=0&&i+1<allDates.length)setTimeout(()=>setDate(allDates[i+1]),400);
    }
  }catch(e){setSt('Error: '+e.message);}
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderRecordsOrdered(order){
  if(!logRecs.length)return;
  // Sort cards by compound||timing key to match grid order exactly
  const sorted=[...logRecs].filter(r=>r.fields[LOG.compound]).sort((a,b)=>{
    const ak=(a.fields[LOG.compound]||'')+'||'+(a.fields[LOG.timing]||'');
    const bk=(b.fields[LOG.compound]||'')+'||'+(b.fields[LOG.timing]||'');
    const ai=order.indexOf(ak), bi=order.indexOf(bk);
    // Fall back to compound-only position for unmatched keys
    const aFallback=ai===-1?order.findIndex(k=>k.split('||')[0]===(a.fields[LOG.compound]||'')):ai;
    const bFallback=bi===-1?order.findIndex(k=>k.split('||')[0]===(b.fields[LOG.compound]||'')):bi;
    return (aFallback===-1?999:aFallback)-(bFallback===-1?999:bFallback);
  });
  document.getElementById('records').innerHTML=sorted.map(r=>cardHTML(r)).join('');
  if(window._highlightedCard){
    const {cmp,timing}=window._highlightedCard;
    const cards=[...document.querySelectorAll('.card')];
    const card=cards.find(c=>{
      const s=c.querySelector('select.fe-compound'),t=c.querySelector('select.fe-timing');
      return s&&s.value===cmp&&(!timing||(t&&t.value===timing));
    });
    if(card){
      card.style.outline='3px solid #2563eb';
      // Re-scroll only if card is not visible
      const rect=card.getBoundingClientRect();
      const inView=rect.top>=0&&rect.bottom<=(window.innerHeight||document.documentElement.clientHeight);
      if(!inView)card.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }
}
function renderRecords(){
  const el=document.getElementById('records');
  if(!logRecs.length){el.innerHTML='<div class="empty">No records for '+curDate+'</div>';return;}
  const order=getRowOrder(curDate);
  if(order.length){renderRecordsOrdered(order);}
  else{
    const validRecs=logRecs.filter(r=>r.fields[LOG.compound]);
    if(!validRecs.length){el.innerHTML='<div class="empty">No records for '+curDate+'</div>';return;}
    el.innerHTML=validRecs.map(r=>cardHTML(r)).join('');
  }
}

function cardHTML(r){
  const f=r.fields;
  const cmp=f[LOG.compound]||'';
  const dose=f[LOG.dose]||'';
  const site=f[LOG.site]||'';
  const timing=f[LOG.timing]||'';
  const verified=f[LOG.verified]===true;

  const cmpOpts=CMPS.map(c=>`<option ${c===cmp?'selected':''}>${c}</option>`).join('');
  const siteOpts=['','L','R','X','S'].map(s=>`<option ${s===site?'selected':''}>${s}</option>`).join('');
  const timingOpts=['','Morning','Night','Evening','Daily'].map(t=>`<option ${t===timing?'selected':''}>${t}</option>`).join('');
  return`<div class="card ${verified?'verified':'unverified'}" id="card_${r.id}">
    <div class="card-body">
      <select class="fe fe-compound" onchange="saveField('${r.id}','${LOG.compound}',this.value)" title="Compound">
        <option value=""></option>${cmpOpts}
      </select>
      <input class="fe fe-dose" value="${esc(dose)}" placeholder="Dose" title="Dose"
        onblur="saveField('${r.id}','${LOG.dose}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <select class="fe fe-site" onchange="saveField('${r.id}','${LOG.site}',this.value)" title="Site">
        ${siteOpts}
      </select>
      <select class="fe fe-timing" onchange="saveField('${r.id}','${LOG.timing}',this.value)" title="Timing">
        ${timingOpts}
      </select>

    </div>
    <div class="card-actions">
      <button class="abtn ${verified?'a-verified':'a-verify'}" onclick="toggleVerify('${r.id}',${verified})">${verified?'✓':'○'}</button>
      <button class="abtn a-del" onclick="delRec('${r.id}')">✕</button>
    </div>
  </div>`;
}

// ── INLINE SAVE ───────────────────────────────────────────────────────
async function saveField(id,field,value){
  const fields={};fields[field]=value===''?null:value;
  try{
    const res=await atFetch(LOG.tbl+'/'+id+'?returnFieldsByFieldId=true',{method:'PATCH',body:JSON.stringify({fields})});
    const i=logRecs.findIndex(r=>r.id===id);
    if(i>=0){logRecs[i]={...logRecs[i],fields:{...logRecs[i].fields,...res.fields}};refreshCard(logRecs[i]);}
    flashSaved(id);
    updateGridCell(id);
    const allV2=logRecs.length>0&&logRecs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allV2);
    loadWeekGrid(curDate);
  }catch(e){setSt('Save error: '+e.message);}
}


// Update grid cell immediately from in-memory logRecs (no AT refetch)
function updateGridCell(recId){
  const rec=logRecs.find(r=>r.id===recId);
  if(!rec)return;
  const cmp=rec.fields[LOG.compound]||'';
  const site=rec.fields[LOG.site]||'';
  const dose=rec.fields[LOG.dose]||'';
  const timing=rec.fields[LOG.timing]||'';
  // Match by compound+timing key to handle duplicates like BPC-157 MOR/NIG
  const key=cmp+'||'+timing;
  let row=document.querySelector(`#wgrid tbody tr[data-key="${CSS.escape(key)}"]`);
  // Fallback to compound-only if key not found
  if(!row)row=document.querySelector(`#wgrid tbody tr[data-cmp="${CSS.escape(cmp)}"]`);
  if(!row)return;
  const label=row.querySelector('td');
  if(label){
    const handle=label.querySelector('.drag-handle');
    const badge=label.querySelector('span:last-child');
    // Rebuild inner content preserving drag handle and timing badge
    const timingBadge=badge&&badge!==handle?badge.outerHTML:'';
    const doseBadge=dose?`<span style="font-size:9px;font-weight:600;color:#2563eb;margin-left:4px">${esc(dose)}</span>`:'';
    label.innerHTML=`<span class="drag-handle">⠿</span>${esc(cmp)}${doseBadge}${timingBadge}`;
  }
  // Update the cell for curDate
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const hdr=[...document.querySelectorAll('#wgrid thead th')];
  const colIdx=hdr.findIndex(th=>{
    const d=th.querySelector('span');
    if(!d)return false;
    const txt=d.textContent.trim(); // MM-DD
    const full='2025-'+txt; // approximate — use full date match
    return curDate.endsWith(txt.replace('-','-'));
  });
  if(colIdx>0){
    const cells=[...row.querySelectorAll('td')];
    const cell=cells[colIdx];
    if(cell){
      if(!site&&!rec.fields[LOG.dose]){cell.textContent='';cell.style.background='';cell.style.color='';}
      else{
        const sc=siteColor(site||'X');
        cell.style.background=sc.bg;cell.style.color=sc.fg;
        cell.style.fontWeight='800';cell.style.fontSize='11px';
        cell.textContent=site||'X';
      }
    }
  }
}
function flashSaved(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  card.style.outline='2px solid #4ade80';
  setTimeout(()=>card.style.outline='',800);
}

function refreshCard(r){
  const el=document.getElementById('card_'+r.id);
  if(!el)return;
  const f=r.fields;
  const doseEl=el.querySelector('.fe-dose');
  const siteEl=el.querySelector('.fe-site');
  const timingEl=el.querySelector('.fe-timing');
  const cmpEl=el.querySelector('.fe-compound');
  if(doseEl)doseEl.value=f[LOG.dose]||'';
  if(siteEl)siteEl.value=f[LOG.site]||'';
  if(timingEl)timingEl.value=f[LOG.timing]||'';
  if(cmpEl)cmpEl.value=f[LOG.compound]||'';
  const verified=f[LOG.verified]===true;
  el.className='card '+(verified?'verified':'unverified');
  const vBtn=el.querySelector('.abtn');
  if(vBtn){vBtn.className='abtn '+(verified?'a-verified':'a-verify');vBtn.textContent=verified?'✓':'○';}
}

async function toggleVerify(id,currentVerified){
  await saveField(id,LOG.verified,currentVerified!==true);
}

async function delRec(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  // Soft-hide with undo option
  card.style.opacity='0.3';card.style.pointerEvents='none';
  setSt('Deleted — <a href="#" onclick="undoDel(event,\''+id+'\')">Undo</a>');
  window._pendingDel=setTimeout(async()=>{
    try{
      await atFetch(LOG.tbl+'/'+id,{method:'DELETE'});
      logRecs=logRecs.filter(r=>r.id!==id);
      card.remove();
      document.getElementById('b-total').textContent=logRecs.length+' records';
      setSt('✓ Deleted');
      loadWeekGrid(curDate);
    }catch(e){card.style.opacity='';card.style.pointerEvents='';setSt('Error: '+e.message);}
  },3000);
}
function undoDel(e,id){
  e.preventDefault();
  clearTimeout(window._pendingDel);
  const card=document.getElementById('card_'+id);
  if(card){card.style.opacity='';card.style.pointerEvents='';}
  setSt('Undo — record kept');
}

async function qCmpChange(){
  const cmp=document.getElementById('q-cmp').value;
  if(!cmp)return;
  // Clear fields while loading
  document.getElementById('q-dose').value='';
  document.getElementById('q-site').selectedIndex=0;
  document.getElementById('q-timing').selectedIndex=0;
  try{
    const beforeFilter=encodeURIComponent('AND({Compound}="'+cmp+'"'+(curDate?',IS_BEFORE({Date},"'+curDate+'")':'')+')');
    const d=await atFetch(LOG.tbl+'?filterByFormula='+beforeFilter+'&sort%5B0%5D%5Bfield%5D='+LOG.date+'&sort%5B0%5D%5Bdirection%5D=desc&returnFieldsByFieldId=true&pageSize=1');
    const rec=d.records?.[0];
    if(rec){
      const f=rec.fields;
      if(f[LOG.dose])document.getElementById('q-dose').value=f[LOG.dose];
      const site=f[LOG.site]||'';
      const siteEl=document.getElementById('q-site');
      [...siteEl.options].forEach((o,i)=>{if(o.text===site)siteEl.selectedIndex=i;});
      const timing=f[LOG.timing]||'';
      const timingEl=document.getElementById('q-timing');
      [...timingEl.options].forEach((o,i)=>{if(o.text===timing)timingEl.selectedIndex=i;});
    }
  }catch(e){/* silent fail */}
}

// ── QUICK ADD ─────────────────────────────────────────────────────────
async function quickAdd(){
  const cmp=document.getElementById('q-cmp').value;
  if(!cmp||!curDate){alert('Select a compound and date first');return;}
  const fields={};
  fields[LOG.date]=curDate;
  fields[LOG.compound]=cmp;fields[LOG.name]=cmp;
  const dose=document.getElementById('q-dose').value;if(dose)fields[LOG.dose]=dose;
  const site=document.getElementById('q-site').value;if(site)fields[LOG.site]=site;
  const timing=document.getElementById('q-timing').value;if(timing)fields[LOG.timing]=timing;
  try{
    const res=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true',{method:'POST',body:JSON.stringify({fields,typecast:true})});
    logRecs.push(res);
    document.getElementById('records').insertAdjacentHTML('beforeend',cardHTML(res));
    document.getElementById('b-total').textContent=logRecs.length+' records';
    // Clear fields
    document.getElementById('q-cmp').selectedIndex=0;
    document.getElementById('q-dose').value='';
    document.getElementById('q-site').selectedIndex=0;
    document.getElementById('q-timing').selectedIndex=0;
    setSt('✓ Added');
    updateGridCell(res.id);
    loadWeekGrid(curDate);
    const allV=logRecs.length>0&&logRecs.every(r=>r.fields[LOG.verified]===true);
    updateVerifyBtn(allV);
  }catch(e){setSt('Error: '+e.message);}
}

function openAddModal(){

  document.getElementById('q-cmp').focus();
}

async function loadFolder(fid){
  document.getElementById('dp-list').innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Loading…</div>';
  renderBC();
  try{
    const pq=fid==='root'?"'root' in parents":"'"+fid+"' in parents";
    const mf="(mimeType='application/pdf' or mimeType='application/vnd.google-apps.folder')";
    const q=encodeURIComponent(pq+' and trashed=false and ('+mf+')');
    const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime,size,mimeType)&orderBy=folder,name&pageSize=50',{headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();pickerFiles=d.files||[];renderPickerList(pickerFiles);
  }catch(e){document.getElementById('dp-list').innerHTML='<div style="color:#dc2626;padding:16px">'+e.message+'</div>';}
}
async function navFolder(id,name){pickerStack.push({id,name});document.getElementById('dp-qi').value='';await loadFolder(id);}
async function popTo(i){pickerStack=pickerStack.slice(0,i+1);document.getElementById('dp-qi').value='';await loadFolder(pickerStack[i].id);}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Empty</div>';return;}
  window._dpf=files;
  el.innerHTML=files.map((f,i)=>{
    const isF=f.mimeType==='application/vnd.google-apps.folder';
    return`<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid #e2e5ea;border-radius:7px;margin-bottom:5px;cursor:pointer;background:${isF?'#fffbeb':'#fff'}" onclick="dpClick(${i})">
      <span style="font-size:18px">${isF?'📁':'📄'}</span>
      <span style="flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      ${isF?'<span style="color:#9ca3af">›</span>':`<button style="padding:3px 10px;border:none;background:#2563eb;color:#fff;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer" onclick="event.stopPropagation();dpClick(${i})">Select</button>`}
    </div>`;
  }).join('');
}
function dpClick(i){
  const f=window._dpf[i];if(!f)return;
  if(f.mimeType==='application/vnd.google-apps.folder'){navFolder(f.id,f.name);return;}
  closePicker();document.getElementById('pp-id').value=f.id;LS.set('pdf',f.id);pdfLoad();
}
function filterPicker(){const q=document.getElementById('dp-qi').value.toLowerCase().trim();renderPickerList(q?pickerFiles.filter(f=>f.name.toLowerCase().includes(q)):pickerFiles);}
function closePicker(){document.getElementById('dpbg').style.display='none';}

};

  <!-- CELL MODAL -->
  <div id="cm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:10px;width:340px;box-shadow:0 12px 40px rgba(0,0,0,.3);padding:0;overflow:hidden">
      <div style="background:#1e2433;color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
        <span id="cm-title" style="font-weight:800;font-size:13px"></span>
        <button onclick="closeCM()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1">×</button>
      </div>
      <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
        <div style="display:flex;gap:8px">
          <input id="cm-dose" placeholder="Dose (e.g. 50u)" style="flex:1;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
          <select id="cm-site" style="padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
            <option value="">Site</option><option>L</option><option>R</option><option>X</option><option>S</option>
          </select>
          <select id="cm-timing" style="padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
            <option value="">Timing</option><option>Morning</option><option>Night</option><option>Evening</option><option>Daily</option>
          </select>
        </div>
        <div id="cm-existing" style="font-size:11px;color:#6b7280;max-height:80px;overflow-y:auto"></div>
        <button onclick="cmSave()" style="background:#2563eb;color:#fff;border:none;border-radius:6px;padding:9px;font-size:13px;font-weight:700;cursor:pointer">+ Add Record</button>
      </div>
    </div>
  </div>
</body>
</html>
