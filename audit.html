    const ni=Math.max(0,Math.min(steps.length-1,(idx===-1?2:idx)+dir));
    window.pdfZoomLevel=steps[ni];
  }

  if(!canvas||canvas.width===0)return;
  try{
    // Capture top portion of canvas (date is at top of page)
    const crop=document.createElement('canvas');
    crop.width=canvas.width;
    crop.height=Math.min(canvas.height,Math.round(canvas.height*0.18));
    crop.getContext('2d').drawImage(canvas,0,0,crop.width,crop.height,0,0,crop.width,crop.height);
    const b64=crop.toDataURL('image/jpeg',0.85).split(',')[1];
    const resp=await fetch(WORKER,{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':ANTH_KEY,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:60,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
          {type:'text',text:'What is the month and year shown at the top of this page? Reply with ONLY: YYYY-MM (e.g. 2025-07). If unclear reply UNKNOWN.'}
        ]}]
      })
    });
    const data=await resp.json();
    const txt=(data.content?.[0]?.text||'').trim();
    const m=txt.match(/(20\d\d)-(0[1-9]|1[0-2])/);
    if(m){
      const target=allDates.find(d=>d.startsWith(m[0]));
      if(target&&target!==curDate){
        // Only navigate if target is unverified (don't override auto-order with verified dates)
        const targetDate=new Date(target+'T12:00:00');
        const curDateObj=new Date((curDate||'2099-01-01')+'T12:00:00');
        // Only jump if target is ahead of or equal to current position
        if(targetDate>=curDateObj){
          setSt('📅 '+m[0]);
          setDate(target);
        }
      }
    }
  }catch(e){/* silent */}
}

let wgVisible=true;
function toggleWGrid(){
  wgVisible=!wgVisible;
  document.getElementById('wgrid-body').style.display=wgVisible?'':'none';
  document.getElementById('wg-tog').textContent=wgVisible?'▲ Hide':'▼ Show';

function getWkDates(dateStr){
  const d=new Date(dateStr+'T12:00:00'),dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-((dow+6)%7));
  return Array.from({length:7},(_,i)=>{const dd=new Date(mon);dd.setDate(mon.getDate()+i);return dd.toISOString().slice(0,10);});
}
function getRowOrder(){try{return JSON.parse(LS.get('row_order')||'[]');}catch(e){return [];}}
function saveRowOrder(arr){LS.set('row_order',JSON.stringify(arr));}
function siteColor(s){
  const m={'L':{bg:'#dbeafe',fg:'#1d4ed8'},'R':{bg:'#fef9c3',fg:'#92400e'},'S':{bg:'#fce7f3',fg:'#be185d'},'X':{bg:'#d1fae5',fg:'#065f46'},'Pill':{bg:'#f3f4f6',fg:'#374151'}};
  return m[s]||{bg:'#f3f4f6',fg:'#374151'};
}

async function loadWeekGrid(date){
  const wg=document.getElementById('wgrid'),ws=document.getElementById('wg-status');
  if(!wg)return;
  const days=getWkDates(date);
  ws.textContent='Loading…';
  const orParts=days.map(d=>`IS_SAME({${LOG.date}},"${d}","day")`).join(',');
  const q=encodeURIComponent(`OR(${orParts})`);
  const flds=[LOG.date,LOG.compound,LOG.site,LOG.timing,LOG.dose].map(f=>'fields%5B%5D='+f).join('&');
  let recs=[],off=null;
  try{
    do{
      const d=await atFetch(LOG.tbl+'?returnFieldsByFieldId=true&filterByFormula='+q+'&'+flds+'&pageSize=100'+(off?'&offset='+off:''));
      recs=recs.concat(d.records);off=d.offset;
    }while(off);
  }catch(e){wg.innerHTML=`<tr><td style="color:#dc2626;padding:8px">Grid error: ${e.message}</td></tr>`;ws.textContent='';return;}

  // Build compound lookup
  const data={};
  recs.forEach(r=>{
    const f=r.fields,cmp=f[LOG.compound]||'',day=(f[LOG.date]||'').slice(0,10),site=f[LOG.site]||'',timing=f[LOG.timing]||'';
    if(!cmp||!day)return;
    if(!data[cmp])data[cmp]={timing,days:{}};
    if(!data[cmp].days[day])data[cmp].days[day]={sites:[],doses:[],n:0};
    data[cmp].days[day].n++;
    if(site)data[cmp].days[day].sites.push(site);
    const dose=f[LOG.dose]||'';if(dose)data[cmp].days[day].doses.push(dose);
  });

  // Apply saved order, append new compounds at bottom
  const allC=Object.keys(data);
  const saved=getRowOrder();
  const ordered=[...saved.filter(c=>allC.includes(c)),...allC.filter(c=>!saved.includes(c))];

  // Build table
  const DN=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let h=`<thead><tr><th>Compound</th>`;
  days.forEach((d,i)=>{
    const today=d===date;
    h+=`<th class="wg-day${today?' wg-today':''}" onclick="setDate('${d}')" title="${d}">${DN[i]}<br><span style="font-size:9px;opacity:.8">${d.slice(5)}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;

  ordered.forEach(cmp=>{
    const dayMap=data[cmp].days,timing=data[cmp].timing;
    const badge=timing?`<span style="font-size:9px;font-weight:600;color:#9ca3af;margin-left:4px">${timing.slice(0,3).toUpperCase()}</span>`:'';
    // Find first dose for this compound across the week
    const firstDose=Object.values(dayMap).flatMap(d=>d.doses||[]).find(d=>d)||'';
    const doseBadge=firstDose?`<span style="font-size:9px;font-weight:600;color:#2563eb;margin-left:4px">${esc(firstDose)}</span>`:'';
    h+=`<tr draggable="true" data-cmp="${esc(cmp)}"><td><span class="drag-handle">⠿</span>${esc(cmp)}${doseBadge}${badge}</td>`;
    days.forEach(d=>{
      const cell=dayMap[d];
      const onclick=`onclick="gridCellClick('${d}','${esc(cmp)}')"`;
      if(!cell||!cell.n){h+=`<td ${onclick} style="cursor:pointer"></td>`;}
      else{
        const siteVal=cell.sites.length?cell.sites[0]:'X';
        const sc=siteColor(siteVal);
        h+=`<td ${onclick} style="cursor:pointer;background:${sc.bg};color:${sc.fg};font-weight:800;font-size:11px">${esc(siteVal)}</td>`;
      }
    });
    h+=`</tr>`;
  });
  h+=`</tbody>`;
  wg.innerHTML=h;
  ws.textContent=ordered.length+' compounds';
  initGridDrag();
}

function initGridDrag(){
  const tbody=document.querySelector('#wgrid tbody');
  if(!tbody)return;
  let src=null;
  tbody.querySelectorAll('tr[draggable]').forEach(row=>{
    row.addEventListener('dragstart',e=>{src=row;row.classList.add('wg-dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{
      src&&src.classList.remove('wg-dragging');
      tbody.querySelectorAll('.wg-drop-above').forEach(r=>r.classList.remove('wg-drop-above'));
      const order=[...tbody.querySelectorAll('tr[data-cmp]')].map(r=>r.dataset.cmp);
      saveRowOrder(order);src=null;
      // Re-render records in same compound order
      renderRecordsOrdered(order);
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      tbody.querySelectorAll('.wg-drop-above').forEach(r=>r.classList.remove('wg-drop-above'));
      if(row!==src){
        const mid=row.getBoundingClientRect().top+row.getBoundingClientRect().height/2;
        if(e.clientY<mid){row.classList.add('wg-drop-above');tbody.insertBefore(src,row);}
        else tbody.insertBefore(src,row.nextSibling);
      }
    });
  });
}


async function verifyWeek(){
  if(!curDate){setSt('Select a date first');return;}
  const days=getWkDates(curDate);
  setSt('Verifying week…');
  // Fetch all unverified records for the week
  const orParts=days.map(d=>`IS_SAME({${LOG.date}},"${d}","day")`).join(',');
  const q=encodeURIComponent(`AND(OR(${orParts}),{${LOG.verified}}=FALSE())`);
  let recs=[],off=null;
  try{
    do{
      const d=await atFetch(LOG.tbl+'?filterByFormula='+q+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));
      recs=recs.concat(d.records);off=d.offset;
    }while(off);
    if(!recs.length){setSt('Week already verified');return;}
    // Patch in batches of 10
    for(let i=0;i<recs.length;i+=10){
      const batch=recs.slice(i,i+10).map(r=>({id:r.id,fields:{[LOG.verified]:true}}));
      await atFetch(LOG.tbl,{method:'PATCH',body:JSON.stringify({records:batch,returnFieldsByFieldId:true})});
    }
    setSt('✓ Week verified ('+recs.length+' records)');
    // Jump to first date after this week that has unverified records
    const lastDayOfWeek=days[days.length-1];
    const nextDate=allDates.find(d=>d>lastDayOfWeek);
    if(nextDate)setTimeout(()=>setDate(nextDate),400);
    else await setDate(curDate);
  }catch(e){setSt('Error: '+e.message);}
}

async function atFetch(path,opts={}){
  const r=await fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+path,{...opts,headers:{Authorization:'Bearer '+AT_TOK,'Content-Type':'application/json',...(opts.headers||{})}});
  if(!r.ok){const e=await r.json().catch(()=>({error:{message:r.status}}));throw new Error(e.error?.message||r.status);}
  return r.json();
}

async function loadDates(){
  setSt('Loading dates…');
  const flds='fields%5B%5D='+LOG.date+'&fields%5B%5D='+LOG.verified;
  let recs=[],off=null;
  do{const d=await atFetch(LOG.tbl+'?'+flds+'&returnFieldsByFieldId=true&pageSize=100'+(off?'&offset='+off:''));recs=recs.concat(d.records);off=d.offset;}while(off);
  allDates=[...new Set(recs.map(r=>r.fields[LOG.date]).filter(Boolean))].sort();
  document.getElementById('d-cnt').textContent=allDates.length+' dates';
  buildDateSel();
  setSt('');
  if(!allDates.length)return;
  // Group by date, check if ALL records per date are verified
  const byDate={};
  recs.forEach(r=>{
    const dt=r.fields[LOG.date];if(!dt)return;
    if(!byDate[dt])byDate[dt]={total:0,verified:0};
    byDate[dt].total++;
    if(r.fields[LOG.verified]===true)byDate[dt].verified++;
  });
  // Find last verified date, then jump to next unverified
  let target=allDates[0];
  for(let i=0;i<allDates.length;i++){
    const s=byDate[allDates[i]];
    if(s&&s.total>0&&s.verified===s.total){
      // This date fully verified — target is the next one
      if(i+1<allDates.length)target=allDates[i+1];
      else target=allDates[i]; // all done
    } else {
      // First unverified date after the verified run
      target=allDates[i];break;
    }
  }
  setSt('↳ '+target);
  setDate(target);
}

function buildDateSel(){
  const sel=document.getElementById('d-sel');
  sel.innerHTML='<option value="">— Select Date —</option>';
  allDates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  if(curDate)sel.value=curDate;
}

function navD(dir){

  const d=allDates[Math.max(0,Math.min(allDates.length-1,i+dir))];

}

// ── RENDER ────────────────────────────────────────────────────────────
function renderRecordsOrdered(order){
  if(!logRecs.length)return;
  const sorted=[...logRecs].filter(r=>r.fields[LOG.compound]).sort((a,b)=>{
    const ai=order.indexOf(a.fields[LOG.compound]||'');
    const bi=order.indexOf(b.fields[LOG.compound]||'');
    return (ai===-1?999:ai)-(bi===-1?999:bi);
  });
  document.getElementById('records').innerHTML=sorted.map(r=>cardHTML(r)).join('');
}
function renderRecords(){
  const el=document.getElementById('records');
  if(!logRecs.length){el.innerHTML='<div class="empty">No records for '+curDate+'</div>';return;}
  const order=getRowOrder();
  if(order.length){renderRecordsOrdered(order);}
  else{
    const validRecs=logRecs.filter(r=>r.fields[LOG.compound]);
    if(!validRecs.length){el.innerHTML='<div class="empty">No records for '+curDate+'</div>';return;}
    el.innerHTML=validRecs.map(r=>cardHTML(r)).join('');
  }
}

function cardHTML(r){
  const f=r.fields;
  const cmp=f[LOG.compound]||'';
  const dose=f[LOG.dose]||'';
  const site=f[LOG.site]||'';
  const timing=f[LOG.timing]||'';
  const verified=f[LOG.verified]===true;

  const cmpOpts=CMPS.map(c=>`<option ${c===cmp?'selected':''}>${c}</option>`).join('');
  const siteOpts=['','L','R','Pill','X','S'].map(s=>`<option ${s===site?'selected':''}>${s}</option>`).join('');
  const timingOpts=['','Morning','Night','Evening','Daily'].map(t=>`<option ${t===timing?'selected':''}>${t}</option>`).join('');
  return`<div class="card ${verified?'verified':'unverified'}" id="card_${r.id}">
    <div class="card-body">
      <select class="fe fe-compound" onchange="saveField('${r.id}','${LOG.compound}',this.value)" title="Compound">
        <option value=""></option>${cmpOpts}
      </select>
      <input class="fe fe-dose" value="${esc(dose)}" placeholder="Dose" title="Dose"
        onblur="saveField('${r.id}','${LOG.dose}',this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">
      <select class="fe fe-site" onchange="saveField('${r.id}','${LOG.site}',this.value)" title="Site">
        ${siteOpts}
      </select>
      <select class="fe fe-timing" onchange="saveField('${r.id}','${LOG.timing}',this.value)" title="Timing">
        ${timingOpts}
      </select>

    </div>
    <div class="card-actions">
      <button class="abtn a-verify" onclick="toggleVerify('${r.id}',${verified})">${verified?'✓':'○'}</button>
      <button class="abtn a-del" onclick="delRec('${r.id}')">✕</button>
    </div>
  </div>`;
}

async function saveField(id,field,value){
  const fields={};fields[field]=value===''?null:value;
  try{
    const res=await atFetch(LOG.tbl+'/'+id,{method:'PATCH',body:JSON.stringify({fields})});
    const i=logRecs.findIndex(r=>r.id===id);
    if(i>=0){logRecs[i]=res;refreshCard(res);}
    flashSaved(id);
    await new Promise(r=>setTimeout(r,300));
    await loadWeekGrid(curDate);
  }catch(e){setSt('Save error: '+e.message);}
}

function flashSaved(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  card.style.outline='2px solid #4ade80';
  setTimeout(()=>card.style.outline='',800);
}

function refreshCard(r){
  const el=document.getElementById('card_'+r.id);

async function delRec(id){
  const card=document.getElementById('card_'+id);
  if(!card)return;
  // Soft-hide with undo option
  card.style.opacity='0.3';card.style.pointerEvents='none';
  setSt('Deleted — <a href="#" onclick="undoDel(event,\''+id+'\')">Undo</a>');
  window._pendingDel=setTimeout(async()=>{
    try{
      await atFetch(LOG.tbl+'/'+id,{method:'DELETE'});
      logRecs=logRecs.filter(r=>r.id!==id);
      card.remove();
      document.getElementById('b-total').textContent=logRecs.length+' records';
      setSt('✓ Deleted');
      loadWeekGrid(curDate);
    }catch(e){card.style.opacity='';card.style.pointerEvents='';setSt('Error: '+e.message);}
  },3000);
}
function undoDel(e,id){
  e.preventDefault();
  clearTimeout(window._pendingDel);
  const card=document.getElementById('card_'+id);
  if(card){card.style.opacity='';card.style.pointerEvents='';}
  setSt('Undo — record kept');
}

  document.getElementById('q-cmp').focus();
}

// ── DRIVE PICKER ──────────────────────────────────────────────────────
async function openPicker(){
  if(!gTok){signIn();return;}
  pickerStack=[{id:'root',name:'My Drive'}];
  document.getElementById('dp-qi').value='';
  renderQuick();renderBC();
  document.getElementById('dpbg').style.display='flex';
  await loadFolder('root');
}
function renderQuick(){
  const el=document.getElementById('dp-sc');
  el.innerHTML='<span style="font-size:10px;font-weight:800;color:#9ca3af">QUICK: </span>';
  QUICK_PDF.forEach(s=>{const b=document.createElement('button');b.style='padding:3px 10px;border:1px solid #fcd34d;background:#fef9c3;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:#92400e';b.textContent=s.n;b.onclick=()=>{closePicker();document.getElementById('pp-id').value=s.id;LS.set('pdf',s.id);pdfLoad();};el.appendChild(b);});
}
function renderBC(){
  const el=document.getElementById('dp-bc');el.innerHTML='';
  pickerStack.forEach((f,i)=>{
    if(i>0){const s=document.createElement('span');s.style='color:#9ca3af';s.textContent=' › ';el.appendChild(s);}
    const sp=document.createElement('span');sp.style='font-size:11px;font-weight:700;cursor:pointer;color:#2563eb;padding:2px 4px;border-radius:3px';
    if(i===pickerStack.length-1){sp.style.color='#374151';sp.style.cursor='default';}
    else sp.onclick=()=>popTo(i);
    sp.textContent='📁 '+f.name;el.appendChild(sp);
  });
}
async function loadFolder(fid){
  document.getElementById('dp-list').innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Loading…</div>';
  renderBC();
  try{
    const pq=fid==='root'?"'root' in parents":"'"+fid+"' in parents";
    const mf="(mimeType='application/pdf' or mimeType='application/vnd.google-apps.folder')";
    const q=encodeURIComponent(pq+' and trashed=false and ('+mf+')');
    const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id,name,modifiedTime,size,mimeType)&orderBy=folder,name&pageSize=50',{headers:{Authorization:'Bearer '+gTok}});
    const d=await r.json();pickerFiles=d.files||[];renderPickerList(pickerFiles);
  }catch(e){document.getElementById('dp-list').innerHTML='<div style="color:#dc2626;padding:16px">'+e.message+'</div>';}
}
async function navFolder(id,name){pickerStack.push({id,name});document.getElementById('dp-qi').value='';await loadFolder(id);}
async function popTo(i){pickerStack=pickerStack.slice(0,i+1);document.getElementById('dp-qi').value='';await loadFolder(pickerStack[i].id);}
function renderPickerList(files){
  const el=document.getElementById('dp-list');
  if(!files.length){el.innerHTML='<div style="text-align:center;padding:24px;color:#9ca3af">Empty</div>';return;}
  window._dpf=files;
  el.innerHTML=files.map((f,i)=>{
    const isF=f.mimeType==='application/vnd.google-apps.folder';
    return`<div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid #e2e5ea;border-radius:7px;margin-bottom:5px;cursor:pointer;background:${isF?'#fffbeb':'#fff'}" onclick="dpClick(${i})">
      <span style="font-size:18px">${isF?'📁':'📄'}</span>
      <span style="flex:1;font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span>
      ${isF?'<span style="color:#9ca3af">›</span>':`<button style="padding:3px 10px;border:none;background:#2563eb;color:#fff;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer" onclick="event.stopPropagation();dpClick(${i})">Select</button>`}
    </div>`;
  }).join('');
}
function dpClick(i){
  const f=window._dpf[i];if(!f)return;
  if(f.mimeType==='application/vnd.google-apps.folder'){navFolder(f.id,f.name);return;}
  closePicker();document.getElementById('pp-id').value=f.id;LS.set('pdf',f.id);pdfLoad();
}
function filterPicker(){const q=document.getElementById('dp-qi').value.toLowerCase().trim();renderPickerList(q?pickerFiles.filter(f=>f.name.toLowerCase().includes(q)):pickerFiles);}
function closePicker(){document.getElementById('dpbg').style.display='none';}

// ── KEYBOARD NAV ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowLeft')navD(-1);
  if(e.key==='ArrowRight')navD(1);
  if(e.key==='ArrowUp')pdfPrev();
  if(e.key==='ArrowDown')pdfNext();
});

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setSt(m){document.getElementById('st').textContent=m;}

window.onload=()=>{
  initAuth();
  document.getElementById('pp-id').value=LS.get('pdf')||'1Yk3aWqXPWRpFWCvXYasWoo9hA202KQG6';
  loadDates();

};
</script>
