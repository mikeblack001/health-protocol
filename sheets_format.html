<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheets Formatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#111; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
  h1 { font-size:20px; font-weight:600; color:#fff; margin-bottom:6px; }
  p.sub { font-size:13px; color:#888; margin-bottom:30px; }
  .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:24px; width:100%; max-width:560px; margin-bottom:16px; }
  .btn { display:inline-flex; align-items:center; gap:8px; padding:12px 24px; border-radius:7px; font-size:14px; font-weight:500; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; }
  .btn-primary { background:#2563eb; color:#fff; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  #log { font-size:12px; font-family:monospace; line-height:2; }
  .ok   { color:#4ade80; } .err { color:#f87171; } .info { color:#93c5fd; }
  .center { text-align:center; }
</style>
</head>
<body>
<h1>Sheets Formatter</h1>
<p class="sub">Clears bad formatting → applies Airtable-style in one step</p>
<div class="card center">
  <button class="btn btn-primary" onclick="signIn()" id="btnSign">Sign in with Google → Auto-Format</button>
</div>
<div class="card"><div id="log"><span class="info">Waiting for sign-in…</span></div></div>

<script>
const CLIENT_ID = '478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_ID  = '1rQ9KTvnO8-iEihjP2cTcDVbkoNdr153pFUcLjwZwm_E';
let tokenClient, accessToken;

const VAR_COLORS = {
  'Cable 1/2':      {bg:{r:1,   g:.82,b:.27},fg:{r:.25,g:.15,b:0}},
  'Cables (2:1)':   {bg:{r:.22, g:.48,b:.96},fg:{r:1,  g:1,  b:1}},
  'Cable - 2 Hand': {bg:{r:.22, g:.48,b:.96},fg:{r:1,  g:1,  b:1}},
  'DBs':            {bg:{r:.18, g:.72,b:.42},fg:{r:1,  g:1,  b:1}},
  'Rope 1/2':       {bg:{r:.95, g:.35,b:.35},fg:{r:1,  g:1,  b:1}},
  'Smith 35lb':     {bg:{r:1,   g:.55,b:.1 },fg:{r:1,  g:1,  b:1}},
  'EZ-Bar (15lbs)': {bg:{r:.42, g:.32,b:.85},fg:{r:1,  g:1,  b:1}},
  '45lbs':          {bg:{r:.18, g:.72,b:.42},fg:{r:1,  g:1,  b:1}},
  'V-Bar':          {bg:{r:.5,  g:.5, b:.55},fg:{r:1,  g:1,  b:1}},
  'UClip':          {bg:{r:.45, g:.8, b:.95},fg:{r:.1, g:.2, b:.4}},
  'Bar':            {bg:{r:.22, g:.22,b:.25},fg:{r:1,  g:1,  b:1}},
  'Lat Machine':    {bg:{r:.58, g:.32,b:.88},fg:{r:1,  g:1,  b:1}},
};
const DAY_COLORS = {
  'Push':      {bg:{r:.18,g:.4, b:.86},fg:{r:1,g:1,b:1}},
  'Pull':      {bg:{r:.5, g:.2, b:.85},fg:{r:1,g:1,b:1}},
  'Legs/Core': {bg:{r:.1, g:.6, b:.42},fg:{r:1,g:1,b:1}},
  'Arms/Chest':{bg:{r:.88,g:.32,b:.22},fg:{r:1,g:1,b:1}},
  'Shoulders': {bg:{r:.88,g:.68,b:.08},fg:{r:.2,g:.1,b:0}},
  'Cardio':    {bg:{r:.1, g:.7, b:.7 },fg:{r:1,g:1,b:1}},
};

function initClient(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback: async resp => {
      if(resp.error) return log('Auth error: '+resp.error,'err');
      accessToken = resp.access_token;
      document.getElementById('btnSign').disabled = true;
      log('Signed in ✓ — starting…','ok');
      await run();
    }
  });
}
function signIn(){ tokenClient.requestAccessToken(); }

async function api(method, path, body){
  const opts={method,headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets'+path,opts);
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return d;
}
async function getHeaders(title){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(title+'!1:1')}`,
    {headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();
  return ((d.values||[[]])[0]||[]).map(h=>h.toLowerCase());
}

function log(msg,type='info'){
  const d=document.getElementById('log');
  if(d.innerHTML.includes('Waiting')) d.innerHTML='';
  d.innerHTML+=`<div class="${type}">${msg}</div>`;
  d.scrollTop=d.scrollHeight;
}

async function run(){
  // 1. Get all sheets
  const info = await api('GET',`/${SHEET_ID}?fields=sheets(properties,conditionalFormats)`);
  const sheets = info.sheets||[];
  log(`Found tabs: ${sheets.map(s=>s.properties.title).join(', ')}`,'info');

  for(const sheet of sheets){
    const sid   = sheet.properties.sheetId;
    const title = sheet.properties.title;
    log(`→ ${title}`);
    const requests = [];

    // A. Clear all existing conditional format rules
    const cfCount = (sheet.conditionalFormats||[]).length;
    for(let i=cfCount-1;i>=0;i--)
      requests.push({deleteConditionalFormatRule:{sheetId:sid,index:i}});

    // B. Reset all cell formatting to plain
    requests.push({repeatCell:{
      range:{sheetId:sid},
      cell:{userEnteredFormat:{
        backgroundColor:{r:1,g:1,b:1},
        textFormat:{bold:false,fontSize:11,foregroundColor:{r:.15,g:.15,b:.18}},
        verticalAlignment:'MIDDLE', horizontalAlignment:'LEFT', wrapStrategy:'CLIP'
      }},
      fields:'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,horizontalAlignment,wrapStrategy)'
    }});

    // C. Header row
    requests.push({repeatCell:{
      range:{sheetId:sid,startRowIndex:0,endRowIndex:1},
      cell:{userEnteredFormat:{
        backgroundColor:{r:.1,g:.1,b:.12},
        textFormat:{bold:true,fontSize:11,foregroundColor:{r:.85,g:.85,b:.88}},
        verticalAlignment:'MIDDLE', horizontalAlignment:'LEFT', wrapStrategy:'CLIP'
      }},
      fields:'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,horizontalAlignment,wrapStrategy)'
    }});

    // D. Freeze row 1
    requests.push({updateSheetProperties:{
      properties:{sheetId:sid,gridProperties:{frozenRowCount:1}},
      fields:'gridProperties.frozenRowCount'
    }});

    // E. Row heights
    requests.push({updateDimensionProperties:{range:{sheetId:sid,dimension:'ROWS',startIndex:0,endIndex:1},properties:{pixelSize:36},fields:'pixelSize'}});
    requests.push({updateDimensionProperties:{range:{sheetId:sid,dimension:'ROWS',startIndex:1,endIndex:20000},properties:{pixelSize:32},fields:'pixelSize'}});

    // F. Header border
    requests.push({updateBorders:{
      range:{sheetId:sid,startRowIndex:0,endRowIndex:1},
      bottom:{style:'SOLID_MEDIUM',color:{r:.25,g:.25,b:.3}}
    }});

    // Apply base requests first
    await api('POST',`/${SHEET_ID}:batchUpdate`,{requests});

    // G. Conditional formatting — detect columns from headers
    const headers = await getHeaders(title);
    const varCol  = headers.indexOf('variation');
    const dayCol  = headers.indexOf('day');
    log(`  Variation→col ${varCol}, Day→col ${dayCol}`,'info');

    const cfRequests = [];
    let idx = 0;

    if(varCol>=0){
      for(const [val,{bg,fg}] of Object.entries(VAR_COLORS)){
        cfRequests.push({addConditionalFormatRule:{
          rule:{
            ranges:[{sheetId:sid,startRowIndex:1,endRowIndex:20000,startColumnIndex:varCol,endColumnIndex:varCol+1}],
            booleanRule:{
              condition:{type:'TEXT_EQ',values:[{userEnteredValue:val}]},
              format:{backgroundColor:bg,textFormat:{foregroundColor:fg,bold:true}}
            }
          },index:idx++
        }});
      }
    }
    if(dayCol>=0){
      for(const [val,{bg,fg}] of Object.entries(DAY_COLORS)){
        cfRequests.push({addConditionalFormatRule:{
          rule:{
            ranges:[{sheetId:sid,startRowIndex:1,endRowIndex:20000,startColumnIndex:dayCol,endColumnIndex:dayCol+1}],
            booleanRule:{
              condition:{type:'TEXT_EQ',values:[{userEnteredValue:val}]},
              format:{backgroundColor:bg,textFormat:{foregroundColor:fg,bold:true}}
            }
          },index:idx++
        }});
      }
    }

    if(cfRequests.length) await api('POST',`/${SHEET_ID}:batchUpdate`,{requests:cfRequests});
    log(`${title} ✓`,'ok');
  }

  log('All done! Hard-refresh your sheet (Cmd+Shift+R).','ok');
  log(`https://docs.google.com/spreadsheets/d/${SHEET_ID}`,'info');
  document.getElementById('btnSign').disabled = false;
  document.getElementById('btnSign').textContent = 'Re-run';
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
