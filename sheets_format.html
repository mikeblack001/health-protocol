<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheets Formatter — Health Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #111; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #888; margin-bottom: 30px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 24px; width: 100%; max-width: 560px; }
  .card + .card { margin-top: 16px; }
  .card h2 { font-size: 13px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  input { width: 100%; background: #111; border: 1px solid #333; border-radius: 6px; padding: 10px 12px; color: #fff; font-size: 13px; font-family: monospace; outline: none; }
  input:focus { border-color: #555; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-secondary { background: #222; color: #ccc; border: 1px solid #333; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .row { display: flex; gap: 10px; margin-top: 16px; }
  #log { margin-top: 20px; font-size: 12px; font-family: monospace; line-height: 1.8; max-height: 300px; overflow-y: auto; }
  .log-ok  { color: #4ade80; }
  .log-err { color: #f87171; }
  .log-info{ color: #93c5fd; }
  .tag-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<h1>Sheets Formatter</h1>
<p class="sub">Apply Airtable-style formatting to Health Protocol Google Sheet</p>

<div class="card">
  <h2>Sheet ID</h2>
  <label>Google Spreadsheet ID</label>
  <input id="sheetId" value="1rQ9KTvnO8-iEihjP2cTcDVbkoNdr153pFUcLjwZwm_E" />
  <div class="row">
    <button class="btn btn-secondary" onclick="signIn()" id="btnSign">Sign in with Google</button>
    <button class="btn btn-primary" onclick="runFormat()" id="btnFmt" disabled>Apply Formatting</button>
  </div>
</div>

<div class="card">
  <h2>Tag Colors Preview</h2>
  <div style="margin-bottom:8px;font-size:12px;color:#666;">Variation</div>
  <div class="tag-preview" id="prevVar"></div>
  <div style="margin:12px 0 8px;font-size:12px;color:#666;">Day</div>
  <div class="tag-preview" id="prevDay"></div>
</div>

<div id="log"></div>

<script>
const CLIENT_ID = '478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
let tokenClient, accessToken;

// ── Color maps ──────────────────────────────────────────────────────────────
const VAR_COLORS = {
  'Cable 1/2':      { bg: { r:1,    g:.78,  b:.25 }, fg: { r:.3,  g:.2,  b:0    } },
  'Cables (2:1)':   { bg: { r:.24,  g:.51,  b:.98 }, fg: { r:1,   g:1,   b:1    } },
  'Cable - 2 Hand': { bg: { r:.24,  g:.51,  b:.98 }, fg: { r:1,   g:1,   b:1    } },
  'DBs':            { bg: { r:.2,   g:.75,  b:.45 }, fg: { r:1,   g:1,   b:1    } },
  'Rope 1/2':       { bg: { r:.96,  g:.36,  b:.36 }, fg: { r:1,   g:1,   b:1    } },
  'Smith 35lb':     { bg: { r:1,    g:.55,  b:.1  }, fg: { r:1,   g:1,   b:1    } },
  'EZ-Bar (15lbs)': { bg: { r:.42,  g:.35,  b:.85 }, fg: { r:1,   g:1,   b:1    } },
  '45lbs':          { bg: { r:.2,   g:.75,  b:.45 }, fg: { r:1,   g:1,   b:1    } },
  'V-Bar':          { bg: { r:.55,  g:.55,  b:.6  }, fg: { r:1,   g:1,   b:1    } },
  'UClip':          { bg: { r:.5,   g:.82,  b:.95 }, fg: { r:.1,  g:.2,  b:.4   } },
  'Bar':            { bg: { r:.25,  g:.25,  b:.28 }, fg: { r:1,   g:1,   b:1    } },
  'Lat Machine':    { bg: { r:.6,   g:.35,  b:.85 }, fg: { r:1,   g:1,   b:1    } },
};

const DAY_COLORS = {
  'Push':       { bg: { r:.18, g:.4,  b:.86 }, fg: { r:1,  g:1,  b:1 } },
  'Pull':       { bg: { r:.5,  g:.2,  b:.85 }, fg: { r:1,  g:1,  b:1 } },
  'Legs/Core':  { bg: { r:.1,  g:.6,  b:.45 }, fg: { r:1,  g:1,  b:1 } },
  'Arms/Chest': { bg: { r:.9,  g:.35, b:.25 }, fg: { r:1,  g:1,  b:1 } },
  'Shoulders':  { bg: { r:.9,  g:.7,  b:.1  }, fg: { r:.2, g:.1, b:0 } },
  'Cardio':     { bg: { r:.1,  g:.7,  b:.7  }, fg: { r:1,  g:1,  b:1 } },
};

// ── Preview ──────────────────────────────────────────────────────────────────
function toHex(c) {
  return '#' + [c.r, c.g, c.b].map(v => Math.round(v*255).toString(16).padStart(2,'0')).join('');
}
function renderPreviews() {
  const pv = document.getElementById('prevVar');
  const pd = document.getElementById('prevDay');
  for (const [label, {bg, fg}] of Object.entries(VAR_COLORS)) {
    const el = document.createElement('span');
    el.className = 'tag';
    el.textContent = label;
    el.style.background = toHex(bg);
    el.style.color = toHex(fg);
    pv.appendChild(el);
  }
  for (const [label, {bg, fg}] of Object.entries(DAY_COLORS)) {
    const el = document.createElement('span');
    el.className = 'tag';
    el.textContent = label;
    el.style.background = toHex(bg);
    el.style.color = toHex(fg);
    pd.appendChild(el);
  }
}
renderPreviews();

// ── Auth ─────────────────────────────────────────────────────────────────────
function initClient() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: resp => {
      if (resp.error) return log('Auth error: ' + resp.error, 'err');
      accessToken = resp.access_token;
      document.getElementById('btnFmt').disabled = false;
      log('Signed in ✓', 'ok');
    }
  });
}
function signIn() { tokenClient.requestAccessToken(); }

// ── API helper ───────────────────────────────────────────────────────────────
async function sheetsReq(method, path, body) {
  const sid = document.getElementById('sheetId').value.trim();
  const opts = { method, headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets' + path, opts);
  return r.json();
}

// ── Log ──────────────────────────────────────────────────────────────────────
function log(msg, type='info') {
  const d = document.getElementById('log');
  d.innerHTML += `<div class="log-${type}">${msg}</div>`;
  d.scrollTop = d.scrollHeight;
}

// ── Main formatter ───────────────────────────────────────────────────────────
async function runFormat() {
  const btn = document.getElementById('btnFmt');
  btn.disabled = true;
  btn.textContent = 'Working…';
  const sid = document.getElementById('sheetId').value.trim();

  try {
    // Get sheet metadata
    log('Fetching sheet info…');
    const info = await sheetsReq('GET', `/${sid}?fields=sheets.properties`);
    const sheets = info.sheets || [];

    // Find all tabs to format
    const targets = ['Sets', 'Sessions', 'Peptides', 'Supplements', 'DailyLog'];
    const found = sheets.filter(s => targets.includes(s.properties.title));
    log(`Found tabs: ${found.map(s => s.properties.title).join(', ')}`, 'ok');

    for (const sheet of found) {
      const sheetId = sheet.properties.sheetId;
      const title   = sheet.properties.title;
      log(`Formatting: ${title}…`);

      const requests = [];

      // 1 — Freeze row 1
      requests.push({ updateSheetProperties: {
        properties: { sheetId, gridProperties: { frozenRowCount: 1 } },
        fields: 'gridProperties.frozenRowCount'
      }});

      // 2 — Header row: dark bg, white bold text
      requests.push({ repeatCell: {
        range: { sheetId, startRowIndex: 0, endRowIndex: 1 },
        cell: {
          userEnteredFormat: {
            backgroundColor: { r: .13, g: .13, b: .15 },
            textFormat: { bold: true, foregroundColor: { r: 1, g: 1, b: 1 }, fontSize: 11 },
            verticalAlignment: 'MIDDLE',
            padding: { top: 8, bottom: 8, left: 10, right: 10 }
          }
        },
        fields: 'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,padding)'
      }});

      // 3 — Data rows: white bg, 12px, middle-aligned
      requests.push({ repeatCell: {
        range: { sheetId, startRowIndex: 1, endRowIndex: 10000 },
        cell: {
          userEnteredFormat: {
            backgroundColor: { r: 1, g: 1, b: 1 },
            textFormat: { fontSize: 11, foregroundColor: { r: .15, g: .15, b: .18 } },
            verticalAlignment: 'MIDDLE',
            padding: { top: 6, bottom: 6, left: 10, right: 10 }
          }
        },
        fields: 'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,padding)'
      }});

      // 4 — Row height (header)
      requests.push({ updateDimensionProperties: {
        range: { sheetId, dimension: 'ROWS', startIndex: 0, endIndex: 1 },
        properties: { pixelSize: 36 },
        fields: 'pixelSize'
      }});

      // 5 — Row height (data)
      requests.push({ updateDimensionProperties: {
        range: { sheetId, dimension: 'ROWS', startIndex: 1, endIndex: 10000 },
        properties: { pixelSize: 32 },
        fields: 'pixelSize'
      }});

      // 6 — Column widths by tab
      const colWidths = getColWidths(title);
      colWidths.forEach(({ col, px }) => {
        requests.push({ updateDimensionProperties: {
          range: { sheetId, dimension: 'COLUMNS', startIndex: col, endIndex: col+1 },
          properties: { pixelSize: px },
          fields: 'pixelSize'
        }});
      });

      // 7 — Conditional formatting for Variation + Day columns
      const cfRules = buildCFRules(title, sheetId);
      cfRules.forEach(rule => requests.push({ addConditionalFormatRule: { rule, index: 0 } }));

      // 8 — Outer border on header
      requests.push({ updateBorders: {
        range: { sheetId, startRowIndex: 0, endRowIndex: 1 },
        bottom: { style: 'SOLID_MEDIUM', color: { r: .3, g: .3, b: .35 } }
      }});

      // Execute
      await sheetsReq('POST', `/${sid}:batchUpdate`, { requests });
      log(`${title} done ✓`, 'ok');
    }

    log('All formatting applied! Open your sheet.', 'ok');
    log(`https://docs.google.com/spreadsheets/d/${sid}`, 'info');

  } catch(e) {
    log('Error: ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Apply Formatting';
}

// ── Column widths per tab ─────────────────────────────────────────────────────
function getColWidths(title) {
  if (title === 'Sets') return [
    {col:0,px:200}, // SetID
    {col:1,px:190}, // Session
    {col:2,px:220}, // Exercise
    {col:3,px:140}, // Variation
    {col:4,px:60},  // Set#
    {col:5,px:60},  // Reps
    {col:6,px:100}, // Weight
    {col:7,px:100}, // Date
    {col:8,px:110}, // Day
    {col:9,px:220}, // Notes
  ];
  if (title === 'Sessions') return [
    {col:0,px:200},{col:1,px:100},{col:2,px:110},{col:3,px:100},{col:4,px:120},{col:5,px:100},{col:6,px:300}
  ];
  return [];
}

// ── Conditional format rules ──────────────────────────────────────────────────
function buildCFRules(title, sheetId) {
  const rules = [];

  if (title === 'Sets') {
    // Variation = column D (index 3)
    for (const [val, {bg, fg}] of Object.entries(VAR_COLORS)) {
      rules.push({
        ranges: [{ sheetId, startColumnIndex: 3, endColumnIndex: 4, startRowIndex: 1 }],
        booleanRule: {
          condition: { type: 'TEXT_EQ', values: [{ userEnteredValue: val }] },
          format: { backgroundColor: bg, textFormat: { foregroundColor: fg, bold: true } }
        }
      });
    }

    // Day = column I (index 8)
    for (const [val, {bg, fg}] of Object.entries(DAY_COLORS)) {
      rules.push({
        ranges: [{ sheetId, startColumnIndex: 8, endColumnIndex: 9, startRowIndex: 1 }],
        booleanRule: {
          condition: { type: 'TEXT_EQ', values: [{ userEnteredValue: val }] },
          format: { backgroundColor: bg, textFormat: { foregroundColor: fg, bold: true } }
        }
      });
    }
  }

  if (title === 'Sessions') {
    // Day = column B (index 1)
    for (const [val, {bg, fg}] of Object.entries(DAY_COLORS)) {
      rules.push({
        ranges: [{ sheetId, startColumnIndex: 1, endColumnIndex: 2, startRowIndex: 1 }],
        booleanRule: {
          condition: { type: 'TEXT_EQ', values: [{ userEnteredValue: val }] },
          format: { backgroundColor: bg, textFormat: { foregroundColor: fg, bold: true } }
        }
      });
    }
  }

  return rules;
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
