<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sheets Formatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#111; color:#e0e0e0; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
  h1 { font-size:20px; font-weight:600; color:#fff; margin-bottom:6px; }
  p.sub { font-size:13px; color:#888; margin-bottom:24px; }
  .card { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:24px; width:100%; max-width:620px; margin-bottom:16px; }
  .btn { padding:12px 24px; border-radius:7px; font-size:14px; font-weight:500; cursor:pointer; border:none; font-family:'DM Sans',sans-serif; background:#2563eb; color:#fff; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  #log { font-size:12px; font-family:monospace; line-height:2; max-height:500px; overflow-y:auto; }
  .ok{color:#4ade80} .er{color:#f87171} .inf{color:#93c5fd} .wn{color:#fbbf24}
</style>
</head>
<body>
<h1>Sheets Formatter</h1>
<p class="sub">Applies Airtable-style formatting to Health Protocol sheet</p>
<div class="card" style="text-align:center">
  <button class="btn" onclick="signIn()" id="btn">Sign in → Format</button>
</div>
<div class="card"><div id="log"><span class="inf">Waiting…</span></div></div>
<script>
const CLIENT_ID = '478191426516-94rflpalsl5ev56ptck62k5imes6jk8l.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const SHEET_ID  = '1rQ9KTvnO8-iEihjP2cTcDVbkoNdr153pFUcLjwZwm_E';
let tokenClient, accessToken;

// All colors use red/green/blue as required by Sheets API
function c(red,green,blue){ return {red,green,blue}; }

const VAR_COLORS = {
  'Cable 1/2':      { bg:c(1,.82,.27),    fg:c(.25,.15,0)  },
  'Cables (2:1)':   { bg:c(.22,.48,.96),  fg:c(1,1,1)      },
  'Cable - 2 Hand': { bg:c(.22,.48,.96),  fg:c(1,1,1)      },
  'DBs':            { bg:c(.18,.72,.42),  fg:c(1,1,1)      },
  'Rope 1/2':       { bg:c(.95,.35,.35),  fg:c(1,1,1)      },
  'Smith 35lb':     { bg:c(1,.55,.1),     fg:c(1,1,1)      },
  'EZ-Bar (15lbs)': { bg:c(.42,.32,.85),  fg:c(1,1,1)      },
  '45lbs':          { bg:c(.18,.72,.42),  fg:c(1,1,1)      },
  'V-Bar':          { bg:c(.5,.5,.55),    fg:c(1,1,1)      },
  'UClip':          { bg:c(.45,.8,.95),   fg:c(.1,.2,.4)   },
  'Bar':            { bg:c(.22,.22,.25),  fg:c(1,1,1)      },
  'Lat Machine':    { bg:c(.58,.32,.88),  fg:c(1,1,1)      },
};
const DAY_COLORS = {
  'Push':       { bg:c(.18,.4,.86),  fg:c(1,1,1)    },
  'Pull':       { bg:c(.5,.2,.85),   fg:c(1,1,1)    },
  'Legs/Core':  { bg:c(.1,.6,.42),   fg:c(1,1,1)    },
  'Arms/Chest': { bg:c(.88,.32,.22), fg:c(1,1,1)    },
  'Shoulders':  { bg:c(.88,.68,.08), fg:c(.2,.1,0)  },
  'Cardio':     { bg:c(.1,.7,.7),    fg:c(1,1,1)    },
};

function initClient(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID, scope:SCOPES,
    callback: async resp => {
      if(resp.error) return log('Auth error: '+resp.error,'er');
      accessToken = resp.access_token;
      document.getElementById('btn').disabled = true;
      log('Signed in ✓','ok');
      await run();
      document.getElementById('btn').disabled = false;
      document.getElementById('btn').textContent = 'Re-run';
    }
  });
}
function signIn(){ tokenClient.requestAccessToken(); }

function log(msg,t='inf'){
  const d=document.getElementById('log');
  if(d.innerHTML.includes('Waiting')) d.innerHTML='';
  d.innerHTML+=`<div class="${t}">${msg}</div>`;
  d.scrollTop=d.scrollHeight;
}

async function api(method,path,body){
  const opts={method,headers:{Authorization:'Bearer '+accessToken,'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets'+path,opts);
  const d=await r.json();
  if(d.error){ log(`ERROR: ${d.error.message}`,'er'); throw new Error(d.error.message); }
  return d;
}

async function getHeaders(title){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(title+'!1:1')}`,
    {headers:{Authorization:'Bearer '+accessToken}});
  const d=await r.json();
  return ((d.values||[[]])[0]||[]).map(h=>h.toLowerCase());
}

async function run(){
  try{
    const info = await api('GET',`/${SHEET_ID}?fields=sheets(properties,conditionalFormats)`);
    const sheets = info.sheets||[];
    log(`Tabs: ${sheets.map(s=>s.properties.title).join(', ')}`);

    for(const sheet of sheets){
      const sid=sheet.properties.sheetId, title=sheet.properties.title;
      log(`\n── ${title}`,'wn');

      // 1. Delete existing CF rules
      const cfCount=(sheet.conditionalFormats||[]).length;
      if(cfCount>0){
        const del=[];
        for(let i=cfCount-1;i>=0;i--) del.push({deleteConditionalFormatRule:{sheetId:sid,index:i}});
        await api('POST',`/${SHEET_ID}:batchUpdate`,{requests:del});
        log(`  Cleared ${cfCount} CF rules`);
      }

      // 2. Base formatting
      await api('POST',`/${SHEET_ID}:batchUpdate`,{requests:[
        // Reset data rows to white
        {repeatCell:{
          range:{sheetId:sid,startRowIndex:1,endRowIndex:50000,startColumnIndex:0,endColumnIndex:50},
          cell:{userEnteredFormat:{
            backgroundColor:c(1,1,1),
            textFormat:{bold:false,fontSize:11,foregroundColor:c(.13,.13,.16)},
            verticalAlignment:'MIDDLE',horizontalAlignment:'LEFT'
          }},
          fields:'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,horizontalAlignment)'
        }},
        // Header row dark
        {repeatCell:{
          range:{sheetId:sid,startRowIndex:0,endRowIndex:1,startColumnIndex:0,endColumnIndex:50},
          cell:{userEnteredFormat:{
            backgroundColor:c(.1,.1,.12),
            textFormat:{bold:true,fontSize:11,foregroundColor:c(.85,.85,.88)},
            verticalAlignment:'MIDDLE',horizontalAlignment:'LEFT'
          }},
          fields:'userEnteredFormat(backgroundColor,textFormat,verticalAlignment,horizontalAlignment)'
        }},
        // Freeze row 1
        {updateSheetProperties:{properties:{sheetId:sid,gridProperties:{frozenRowCount:1}},fields:'gridProperties.frozenRowCount'}},
        // Row heights
        {updateDimensionProperties:{range:{sheetId:sid,dimension:'ROWS',startIndex:0,endIndex:1},properties:{pixelSize:36},fields:'pixelSize'}},
        {updateDimensionProperties:{range:{sheetId:sid,dimension:'ROWS',startIndex:1,endIndex:50000},properties:{pixelSize:32},fields:'pixelSize'}},
        // Header bottom border
        {updateBorders:{
          range:{sheetId:sid,startRowIndex:0,endRowIndex:1,startColumnIndex:0,endColumnIndex:50},
          bottom:{style:'SOLID_MEDIUM',color:c(.25,.25,.3)}
        }}
      ]});
      log('  Base formatting applied','ok');

      // 3. Conditional formatting
      const headers=await getHeaders(title);
      const varCol=headers.indexOf('variation');
      const dayCol=headers.indexOf('day');
      log(`  varCol=${varCol} dayCol=${dayCol}`);

      const cfReqs=[];
      let idx=0;
      if(varCol>=0){
        for(const [val,{bg,fg}] of Object.entries(VAR_COLORS)){
          cfReqs.push({addConditionalFormatRule:{
            rule:{
              ranges:[{sheetId:sid,startRowIndex:1,endRowIndex:50000,startColumnIndex:varCol,endColumnIndex:varCol+1}],
              booleanRule:{condition:{type:'TEXT_EQ',values:[{userEnteredValue:val}]},format:{backgroundColor:bg,textFormat:{foregroundColor:fg,bold:true}}}
            },index:idx++
          }});
        }
      }
      if(dayCol>=0){
        for(const [val,{bg,fg}] of Object.entries(DAY_COLORS)){
          cfReqs.push({addConditionalFormatRule:{
            rule:{
              ranges:[{sheetId:sid,startRowIndex:1,endRowIndex:50000,startColumnIndex:dayCol,endColumnIndex:dayCol+1}],
              booleanRule:{condition:{type:'TEXT_EQ',values:[{userEnteredValue:val}]},format:{backgroundColor:bg,textFormat:{foregroundColor:fg,bold:true}}}
            },index:idx++
          }});
        }
      }
      if(cfReqs.length){
        await api('POST',`/${SHEET_ID}:batchUpdate`,{requests:cfReqs});
        log(`  CF rules applied`,'ok');
      }
      log(`${title} done ✓`,'ok');
    }
    log('\nAll done — hard-refresh your sheet (Cmd+Shift+R)','ok');
  }catch(e){ log('Fatal: '+e.message,'er'); }
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()"></script>
</body>
</html>
