<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Compare Tables</title>
<style>
body{font-family:-apple-system,sans-serif;font-size:13px;padding:20px;background:#f4f5f7}
h2{font-size:15px;font-weight:800;margin:16px 0 8px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px;background:#fff}
th{background:#1e2433;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
td{padding:6px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:hover td{background:#f8f9fa}
.diff{background:#fef9c3}
pre{background:#1e2433;color:#a3e635;padding:14px;border-radius:8px;font-size:11px;overflow:auto;max-height:300px}
</style></head><body>
<h1 style="font-size:18px;font-weight:900;margin-bottom:4px">Table Comparison</h1>
<div id="out" style="color:#6b7280;margin-bottom:16px">Loading both tables…</div>

<script>
const AT='pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE='appmHDG4TGT1xy6R6';
const INJ_TBL='tblBvEaLkGGipnOFc';
const PAR_TBL='tblCTOGIrF3NjdyTE';

async function get(url){
  const r=await fetch(url,{headers:{Authorization:'Bearer '+AT}});
  const d=await r.json();if(!r.ok)throw new Error(d.error?.message||r.status);return d;
}

async function getSample(tbl,n=5){
  const d=await get('https://api.airtable.com/v0/'+BASE+'/'+tbl+'?pageSize='+n);
  return d.records;
}

function tableHTML(title,records){
  if(!records.length)return'<h2>'+title+'</h2><p>No records</p>';
  const keys=Object.keys(records[0].fields);
  let h='<h2>'+title+' — fields: <code>'+keys.join(', ')+'</code></h2>';
  h+='<table><tr>'+keys.map(k=>'<th>'+k+'</th>').join('')+'</tr>';
  records.forEach(r=>{
    h+='<tr>'+keys.map(k=>'<td>'+(r.fields[k]||'')+'</td>').join('')+'</tr>';
  });
  return h+'</table>';
}

async function run(){
  try{
    const [injRecs, parRecs] = await Promise.all([
      getSample(INJ_TBL, 8),
      getSample(PAR_TBL, 8)
    ]);
    document.getElementById('out').innerHTML='';
    document.body.insertAdjacentHTML('beforeend',
      tableHTML('Injection Log (AT — source of truth)', injRecs) +
      tableHTML('Parseur-Injections (after normalization)', parRecs)
    );
  }catch(e){
    document.getElementById('out').textContent='Error: '+e.message;
  }
}
run();
</script>
</body></html>
