<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AT Sets Reset</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0a0a0f; color: #e0e0e0; padding: 24px; }
  h1 { color: #ff4444; font-size: 16px; letter-spacing: 2px; margin-bottom: 4px; }
  .sub { color: #666; font-size: 11px; margin-bottom: 24px; }
  .phase { background: #111; border: 1px solid #222; border-radius: 4px; padding: 16px; margin-bottom: 16px; }
  .phase-title { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .bar-wrap { background: #1a1a1a; border-radius: 2px; height: 8px; margin: 8px 0; }
  .bar { height: 8px; border-radius: 2px; transition: width 0.3s; }
  .bar-red { background: #ff4444; }
  .bar-green { background: #00ff88; }
  .status { font-size: 12px; color: #888; margin-top: 6px; }
  .status.done { color: #00ff88; }
  .status.error { color: #ff4444; }
  .big { font-size: 28px; font-weight: bold; }
  .log { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 4px; padding: 12px; height: 160px; overflow-y: auto; font-size: 10px; color: #555; margin-top: 12px; }
  .log .ok { color: #00ff88; }
  .log .err { color: #ff4444; }
  .log .info { color: #4488ff; }
  .btn { background: #ff4444; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-family: inherit; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 16px; letter-spacing: 1px; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn.green { background: #00ff88; color: #000; }
  .summary { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; }
  .scard { background: #111; border: 1px solid #222; padding: 12px 16px; border-radius: 4px; }
  .sval { font-size: 22px; font-weight: bold; }
  .slbl { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>⚠ AT SETS RESET</h1>
<div class="sub">Wipe 8,072 AT records → push 4,208 fresh extracted sets</div>

<div class="summary" id="summary">
  <div class="scard"><div class="sval" id="s-del">—</div><div class="slbl">Deleted</div></div>
  <div class="scard"><div class="sval" id="s-pushed">—</div><div class="slbl">Pushed</div></div>
  <div class="scard"><div class="sval" id="s-err" style="color:#ff4444">0</div><div class="slbl">Errors</div></div>
  <div class="scard"><div class="sval" id="s-phase" style="color:#888">READY</div><div class="slbl">Phase</div></div>
</div>

<div class="phase" style="margin-top:16px;">
  <div class="phase-title">Phase 1 — Delete existing records</div>
  <div class="bar-wrap"><div class="bar bar-red" id="del-bar" style="width:0%"></div></div>
  <div class="status" id="del-status">Waiting...</div>
</div>

<div class="phase">
  <div class="phase-title">Phase 2 — Push extracted sets</div>
  <div class="bar-wrap"><div class="bar bar-green" id="push-bar" style="width:0%"></div></div>
  <div class="status" id="push-status">Waiting...</div>
</div>

<div class="log" id="log"></div>
<button class="btn" id="startBtn" onclick="start()">🚨 WIPE + REIMPORT</button>

<script>
const AT_TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE = 'appmHDG4TGT1xy6R6';
const TABLE = 'tblKDqjy5RzqaJvjr';
const AT_URL = `https://api.airtable.com/v0/${BASE}/${TABLE}`;
const HEADERS = { 'Authorization': `Bearer ${AT_TOKEN}`, 'Content-Type': 'application/json' };
const PDF_URL = 'https://raw.githubusercontent.com/mikeblack001/health-protocol/main/extract_progress.json';

let totalDel = 0, totalPushed = 0, totalErr = 0;

function log(msg, cls='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setPhase(p) { document.getElementById('s-phase').textContent = p; }

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchAllIds() {
  let ids = [], offset = null;
  do {
    const url = new URL(AT_URL);
    url.searchParams.set('fields[]', 'fld75zYXknF0RtCWH');
    url.searchParams.set('pageSize', '100');
    if (offset) url.searchParams.set('offset', offset);
    const r = await fetch(url, { headers: HEADERS });
    const j = await r.json();
    if (j.error) throw new Error(j.error.message);
    (j.records || []).forEach(rec => ids.push(rec.id));
    offset = j.offset;
    if (ids.length % 1000 === 0) log(`Fetched ${ids.length} IDs...`, 'info');
  } while (offset);
  return ids;
}

async function deleteChunk(ids) {
  const url = new URL(AT_URL);
  ids.forEach(id => url.searchParams.append('records[]', id));
  const r = await fetch(url, { method: 'DELETE', headers: HEADERS });
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return (j.records || []).length;
}

async function pushChunk(records) {
  const r = await fetch(AT_URL, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify({ records, typecast: true })
  });
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return (j.records || []).length;
}

function buildRecords(sets) {
  // Field IDs: Date=fld75zYXknF0RtCWH, Session=fldBChNmPkNg61oTN, Exercise=fldZ93A1t7fGjjsSS
  // Variation=fld2TZdmCOloH0gAK, Set#=fldNm9Ao0rmcwwDXo, Reps=fldelUngWHRTm48m1
  // Weight=fldmrbBmfgSMtREMt, Day=fldypzlwqw9AzWrEE
  return sets.map(s => ({
    fields: {
      'fld75zYXknF0RtCWH': s.date,
      'fldBChNmPkNg61oTN': s.session || s.date,
      'fldZ93A1t7fGjjsSS': s.exercise || '',
      'fldNm9Ao0rmcwwDXo': parseInt(s.set_number) || 1,
      'fldelUngWHRTm48m1': parseInt(s.reps) || 0,
      'fldmrbBmfgSMtREMt': parseFloat(s.weight) || 0,
      'fldypzlwqw9AzWrEE': s.day_type || ''
    }
  }));
}

async function start() {
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = 'Running...';

  try {
    // === PHASE 1: DELETE ===
    setPhase('DELETING');
    log('Fetching all AT record IDs...', 'info');
    document.getElementById('del-status').textContent = 'Fetching IDs...';

    const allIds = await fetchAllIds();
    log(`Found ${allIds.length} records to delete`, 'info');
    document.getElementById('del-status').textContent = `Deleting ${allIds.length} records...`;

    const chunks = [];
    for (let i = 0; i < allIds.length; i += 10) chunks.push(allIds.slice(i, i+10));

    for (let i = 0; i < chunks.length; i++) {
      try {
        const n = await deleteChunk(chunks[i]);
        totalDel += n;
        document.getElementById('s-del').textContent = totalDel;
        const pct = Math.round((i+1)/chunks.length*100);
        document.getElementById('del-bar').style.width = pct + '%';
        if (i % 50 === 0) log(`Deleted ${totalDel}/${allIds.length}`, 'ok');
        await sleep(30);
      } catch(e) {
        totalErr++;
        document.getElementById('s-err').textContent = totalErr;
        log(`Delete error chunk ${i}: ${e.message}`, 'err');
        await sleep(500);
      }
    }
    document.getElementById('del-status').textContent = `✓ Deleted ${totalDel} records`;
    document.getElementById('del-status').className = 'status done';
    log(`Phase 1 complete: ${totalDel} deleted`, 'ok');

    // === PHASE 2: PUSH ===
    setPhase('PUSHING');
    log('Loading extracted sets from GitHub...', 'info');
    document.getElementById('push-status').textContent = 'Loading extracted sets...';

    const r = await fetch(PDF_URL + '?t=' + Date.now());
    const data = await r.json();
    const allSets = (data.all_sets || []).filter(s => s.date >= '2024-10-28' && s.date <= '2026-12-31');
    log(`Loaded ${allSets.length} sets to push`, 'info');
    document.getElementById('push-status').textContent = `Pushing ${allSets.length} sets...`;

    const pushChunks = [];
    for (let i = 0; i < allSets.length; i += 10) pushChunks.push(allSets.slice(i, i+10));

    for (let i = 0; i < pushChunks.length; i++) {
      try {
        const records = buildRecords(pushChunks[i]);
        const n = await pushChunk(records);
        totalPushed += n;
        document.getElementById('s-pushed').textContent = totalPushed;
        const pct = Math.round((i+1)/pushChunks.length*100);
        document.getElementById('push-bar').style.width = pct + '%';
        if (i % 50 === 0) log(`Pushed ${totalPushed}/${allSets.length}`, 'ok');
        await sleep(30);
      } catch(e) {
        totalErr++;
        document.getElementById('s-err').textContent = totalErr;
        log(`Push error chunk ${i}: ${e.message}`, 'err');
        await sleep(500);
      }
    }

    document.getElementById('push-status').textContent = `✓ Pushed ${totalPushed} sets`;
    document.getElementById('push-status').className = 'status done';
    setPhase('DONE');
    log(`COMPLETE — Deleted: ${totalDel}, Pushed: ${totalPushed}, Errors: ${totalErr}`, 'ok');
    document.getElementById('startBtn').textContent = '✓ DONE';
    document.getElementById('startBtn').className = 'btn green';
    document.getElementById('startBtn').disabled = false;

  } catch(e) {
    log('FATAL: ' + e.message, 'err');
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = 'RETRY';
  }
}
</script>
</body>
</html>
