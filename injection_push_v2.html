<!DOCTYPE html>
<html>
<head>
<title>Injection Push — Jan 30–Mar 14 (PDF-sourced)</title>
<style>
  body { font-family: monospace; background: #111; color: #e0e0e0; padding: 24px; max-width: 900px; margin: 0 auto; }
  h2 { color: #4ade80; } .sub { color: #888; font-size: 13px; margin-bottom: 16px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  button { background: #4ade80; color: #000; border: none; padding: 10px 18px; cursor: pointer; font-size: 14px; border-radius: 4px; font-weight: bold; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  button.done { background: #1e40af; color: #fff; }
  #status { font-size: 13px; color: #aaa; margin-bottom: 8px; }
  #log { height: 440px; overflow-y: auto; border: 1px solid #222; padding: 12px; background: #0d0d0d; border-radius: 4px; font-size: 12px; line-height: 1.6; }
  .ok { color: #4ade80; } .err { color: #f87171; } .info { color: #60a5fa; } .warn { color: #fbbf24; }
  p { margin: 1px 0; }
</style>
</head>
<body>
<h2>💉 Injection Log Push — Jan 30 → Mar 14, 2026</h2>
<div class="sub">Source: PDF pages 20–22 read directly. CJC+IPA always Morning/L + Night/R. BPC/TB-500 sites from PDF. BPC+TB-500 done after Feb 6.</div>
<div id="status">Building records...</div>
<div class="btn-row">
  <button id="b1" onclick="push(1)">Batch 1 · 1–50</button>
  <button id="b2" onclick="push(2)" disabled>Batch 2 · 51–100</button>
  <button id="b3" onclick="push(3)" disabled>Batch 3 · 101–131</button>
</div>
<div id="log"></div>

<script>
const TOKEN = 'pat45cU4qfPplkXEl.f6103ec8979937577762911c0549000ecc4ec5f358c2639d3db62638a28f4b4a';
const BASE  = 'appmHDG4TGT1xy6R6';
const TABLE = 'tblBvEaLkGGipnOFc';
const URL   = `https://api.airtable.com/v0/${BASE}/${TABLE}`;
const F = { NAME:'fldt9vYT8Tm37Gf3k', DATE:'fldhYEtLEGA4VxvvO', COMP:'fldwVFyizH4mBANBa', SITE:'fldHDlJY8FpAvK018', TIME:'fldIdzew4Jd0qO4Uc', DOSE:'fld8d8mtRapfaIyqL' };

function r(comp, date, site, timing, dose) {
  return { fields: { [F.NAME]:comp, [F.DATE]:date, [F.COMP]:comp, [F.SITE]:site, [F.TIME]:timing, [F.DOSE]:dose }};
}
function cjc(d)          { return [r('CJC-1295',  d,'L','Morning','2.5u'), r('CJC-1295',  d,'R','Night','2.5u')]; }
function ipa(d)          { return [r('Ipamorelin',d,'L','Morning','5u'),   r('Ipamorelin',d,'R','Night','5u')]; }
function bpc(d,s,dose)   { return [r('BPC-157',   d, s,'Morning', dose||'10u')]; }
function tb(d,s,dose)    { return [r('TB-500',    d, s,'Morning', dose||'40u')]; }

const ALL = [
  // === JAN 30 (Fri) — PDF p20 Wk4 ===
  ...cjc('2026-01-30'), ...ipa('2026-01-30'), ...bpc('2026-01-30','L'), ...tb('2026-01-30','L'),
  // === JAN 31 (Sat) ===
  ...cjc('2026-01-31'), ...ipa('2026-01-31'), ...bpc('2026-01-31','R'),
  // === FEB 1 (Sun) ===
  ...cjc('2026-02-01'), ...ipa('2026-02-01'), ...bpc('2026-02-01','L'),
  // === FEB 2 (Mon) — CJC/IPA not active Mon ===
  ...bpc('2026-02-02','R'),
  // === FEB 3 (Tue) ===
  ...cjc('2026-02-03'), ...ipa('2026-02-03'), ...bpc('2026-02-03','L'), ...tb('2026-02-03','R'),
  // === FEB 4 (Wed) ===
  ...cjc('2026-02-04'), ...ipa('2026-02-04'), ...bpc('2026-02-04','R'),
  // === FEB 5 (Thu) — CJC/IPA not active Thu ===
  ...bpc('2026-02-05','L'),
  // === FEB 6 (Fri) — vials ending: BPC=15u, TB500=25u ===
  ...cjc('2026-02-06'), ...ipa('2026-02-06'), ...bpc('2026-02-06','R','15u'), ...tb('2026-02-06','L','25u'),
  // Feb 7+8: DONE — no records

  // === FEB 9 ONWARDS: CJC + IPA only (BPC/TB-500 vials empty) ===
  // Week 1 (Feb 9): active Tue/Wed/Fri/Sat/Sun
  ...cjc('2026-02-10'), ...ipa('2026-02-10'),
  ...cjc('2026-02-11'), ...ipa('2026-02-11'),
  ...cjc('2026-02-13'), ...ipa('2026-02-13'),
  ...cjc('2026-02-14'), ...ipa('2026-02-14'),
  ...cjc('2026-02-15'), ...ipa('2026-02-15'),
  // Week 2 (Feb 16)
  ...cjc('2026-02-17'), ...ipa('2026-02-17'),
  ...cjc('2026-02-18'), ...ipa('2026-02-18'),
  ...cjc('2026-02-20'), ...ipa('2026-02-20'),
  ...cjc('2026-02-21'), ...ipa('2026-02-21'),
  ...cjc('2026-02-22'), ...ipa('2026-02-22'),
  // Week 3 (Feb 23)
  ...cjc('2026-02-24'), ...ipa('2026-02-24'),
  ...cjc('2026-02-25'), ...ipa('2026-02-25'),
  ...cjc('2026-02-27'), ...ipa('2026-02-27'),
  ...cjc('2026-02-28'), ...ipa('2026-02-28'),
  ...cjc('2026-03-01'), ...ipa('2026-03-01'),
  // Week 4 (Mar 2)
  ...cjc('2026-03-03'), ...ipa('2026-03-03'),
  ...cjc('2026-03-04'), ...ipa('2026-03-04'),
  ...cjc('2026-03-06'), ...ipa('2026-03-06'),
  ...cjc('2026-03-07'), ...ipa('2026-03-07'),
  ...cjc('2026-03-08'), ...ipa('2026-03-08'),
  // Week 5 (Mar 9) — cutoff is Sat Mar 14
  ...cjc('2026-03-10'), ...ipa('2026-03-10'),
  ...cjc('2026-03-11'), ...ipa('2026-03-11'),
  ...cjc('2026-03-13'), ...ipa('2026-03-13'),
  ...cjc('2026-03-14'), ...ipa('2026-03-14'),
];

document.getElementById('status').textContent = `Total records: ${ALL.length} · 3 batches (50 / 50 / ${ALL.length-100})`;

function log(msg, cls='') {
  const d = document.getElementById('log');
  const p = document.createElement('p');
  if (cls) p.className = cls;
  p.textContent = msg;
  d.appendChild(p);
  d.scrollTop = d.scrollHeight;
}

async function push(batchNum) {
  const SZ = 50;
  const start = (batchNum-1)*SZ;
  const end   = Math.min(start+SZ, ALL.length);
  const slice = ALL.slice(start, end);
  document.getElementById(`b${batchNum}`).disabled = true;
  log(`\n━━━ Batch ${batchNum}: records ${start+1}–${end} (${slice.length}) ━━━`, 'info');
  let pushed=0, errs=0;
  for (let i=0; i<slice.length; i+=10) {
    const chunk = slice.slice(i, i+10);
    try {
      const resp = await fetch(URL, {
        method:'POST',
        headers:{'Authorization':`Bearer ${TOKEN}`,'Content-Type':'application/json'},
        body: JSON.stringify({records:chunk, typecast:true})
      });
      const d = await resp.json();
      if (d.records) {
        pushed += d.records.length;
        log(`  ✓ +${d.records.length}  [${start+i+1}–${start+i+chunk.length}]  ${chunk[0].fields[F.DATE]}`, 'ok');
      } else {
        errs++;
        log(`  ✗ ${JSON.stringify(d.error||d)}`, 'err');
      }
    } catch(e) { errs++; log(`  ✗ ${e.message}`, 'err'); }
    await new Promise(r=>setTimeout(r,250));
  }
  log(`Batch ${batchNum} done — pushed: ${pushed}  errors: ${errs}`, errs===0?'ok':'err');
  document.getElementById(`b${batchNum}`).classList.add('done');
  if (errs===0 && batchNum<3) {
    document.getElementById(`b${batchNum+1}`).disabled = false;
    log(`→ Batch ${batchNum+1} ready.`, 'warn');
  }
  if (batchNum===3 && errs===0) log('\n🎉 ALL 131 RECORDS PUSHED.', 'ok');
}
</script>
</body>
</html>
